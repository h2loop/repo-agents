  Title: Fix Viterbi Test Compilation and Runtime Issues\n\n### Summary\nThe viterbi_test.c
  file in the PHY/CODING/TESTBENCH directory had multiple compilation and runtime
  issues that prevented the main function from executing properly. The test was failing
  to build due to incorrect header file includes and missing function declarations.
  Additionally, at runtime it would segfault when trying to call non-existent CRC
  functions and viterbi decoder functions with mismatched parameters.\n\nThe root
  cause was incorrect header references, usage of undefined crc24 function instead
  of the available crc24a, and calling phy_viterbi_dot11_sse2 with wrong parameter
  count. These issues have been resolved by updating the header includes, replacing
  crc24 calls with crc24a, and using the correct phy_viterbi_dot11 function.\n\n###
  Changes\n- `openair1/PHY/CODING/TESTBENCH/viterbi_test.c`: Fixed header includes
  to use correct file paths\n- `openair1/PHY/CODING/TESTBENCH/viterbi_test.c`: Replaced
  undefined crc24 function calls with crc24a\n- `openair1/PHY/CODING/TESTBENCH/viterbi_test.c`:
  Changed phy_viterbi_dot11_sse2 to phy_viterbi_dot11 to match parameter count\n","extra_fields":{"bug_description":"missing
