  Title: Fix unreachable code path in M3AP MCE SCTP initialization\n\n### Summary\nThe
  M3AP MCE module contained unreachable error handling code due to incorrect conditional
  logic in the SCTP initialization flow. The bug manifested when memory allocation
  failed during SCTP message creation, causing a segmentation fault instead of proper
  error handling.\n\nThe unreachable code was in `m3ap_MCE_handle_register_MCE` function
  where the error handling block (lines 375-376) could never be executed because `m3ap_MCE_init_sctp`
  always returned 0 regardless of allocation success.\n\n### Changes\n- `openair3/M3AP/m3ap_MCE.c`:
  Added NULL check for `itti_alloc_new_message` in `m3ap_MCE_init_sctp` and return
  -1 on failure to make error handling reachable\n- `openair3/M3AP/m3ap_MCE.c`: Added
