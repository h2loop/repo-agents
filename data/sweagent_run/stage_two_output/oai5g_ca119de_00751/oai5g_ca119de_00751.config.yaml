  Title: Fix NULL pointer dereference in UE signal handler\n\n### Summary\nThe UE
  process in the NAS stack had a critical bug where the signal handler `_nas_signal_handler()`
  would crash with a segmentation fault when receiving SIGINT or SIGTERM. This happened
  because:\n\n1. The global `user` pointer was never allocated but was accessed in
  the signal handler\n2. The `user_api_id` was declared locally in main() but accessed
  globally in the signal handler\n3. No NULL checks were performed before dereferencing
  these pointers\n\nThis caused the UE process to crash instead of exiting cleanly
  when terminated with Ctrl+C.\n\n### Reproduction Steps\n1. Start the OAI UE process
  with any configuration\n2. Send SIGINT (Ctrl+C) or SIGTERM to the process\n3. Process
  crashes with segmentation fault instead of exiting cleanly\n\n### Changes\n- `openair3/NAS/UE/UEprocess.c`:
  \n  - Moved `user_api_id` to global scope for proper signal handler access\n  -
  Added proper memory allocation for `user` and `user_api_id` structures\n  - Added
  NULL pointer checks throughout signal handler and related functions\n  - Properly
  link `user->user_api_id` after allocation\n  - Added cleanup code to prevent memory
  leaks on both normal exit and signal termination\n  - Fixed user manager thread
  to handle NULL user pointer safely\n\n","extra_fields":{"bug_description":"off-by-one
