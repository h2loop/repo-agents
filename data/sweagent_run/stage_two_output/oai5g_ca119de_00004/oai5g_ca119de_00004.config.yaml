  Title: Fix incorrect generator matrix selection due to const-correctness issue\n\n###
  Summary\nThe `choose_generator_matrix()` function was returning `short *` but internally
  casting away const qualifiers from the source arrays. This could lead to undefined
  behavior when the returned pointer was used.\n\nIn some edge cases with specific
  BG/Zc combinations, this caused incorrect shift values to be used during LDPC encoding,
  resulting in corrupted codewords that failed CRC checks.\n\n### Reproduction\nTo
  reproduce the issue:\n1. Configure NR UE with BG=2 and Zc=64\n2. Transmit data with
  block length requiring lifting size 64\n3. Observe CRC failures on received data
  due to incorrect encoding\n4. Debug trace shows wrong shift values being applied
  in parity computation\n\nThe root cause was the explicit casts discarding const
  that could potentially corrupt memory access patterns.\n\n### Changes\n- `openair1/PHY/CODING/nrLDPC_encoder/ldpc_generate_coefficient.c`:
  Updated function signature to return `const short *` and removed unsafe casts\n-
  `openair1/PHY/CODING/nrLDPC_encoder/ldpc_generate_coefficient.c`: Updated local
  variable types to maintain const-correctness\n\n","extra_fields":{"bug_description":"file
