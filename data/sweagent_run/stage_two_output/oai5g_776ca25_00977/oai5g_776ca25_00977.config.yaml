  Title: Fix missing return value handling in m2ap_eNB_register_eNB function\n\n###
  Summary\nThe `m2ap_eNB_register_eNB` function was not properly returning the result
  of `itti_send_msg_to_task`, causing callers to be unable to detect if the SCTP message
  was successfully sent. This could lead to silent failures in M2AP connection establishment.\n\n###
  Changes\n- `openair2/M2AP/m2ap_eNB.c`: \n  - Changed function signature from `void`
  to `int` to properly return status\n  - Added `return` statement for `itti_send_msg_to_task`
  result\n  - Updated function calls to check return values and log errors\n  - Removed
  redundant/conflicting forward declaration\n\n### Reproduction\nWhen the M2AP SCTP
  connection fails to establish due to network issues or misconfiguration, the system
  would not properly detect the failure and would continue as if the connection was
  successful. This can lead to:\n- M2 setup procedures hanging indefinitely\n- No
  error messages in logs to indicate connection failure\n- eNB appearing to be in
  connected state when it''s actually not\n\nThe issue can be observed by configuring
  an invalid M2 IP address and noting that no error is reported when the connection
  attempt fails.\n","extra_fields":{"bug_description":"missing return statement in
