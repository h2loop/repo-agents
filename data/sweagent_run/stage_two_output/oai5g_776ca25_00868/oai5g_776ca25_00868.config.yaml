  Title: Fix ASan leak detection configuration in NR PHY ulsim\n\n### Summary\nThe
  `__asan_default_options()` function in the NR PHY uplink simulator was incorrectly
  configured with \"detect_leaks=0\", disabling memory leak detection during testing.
  This configuration does not comply with 3GPP specification requirements for memory
  error detection in simulation environments.\n\nThe issue was identified during routine
  testing when memory leaks in PHY processing functions were not being detected by
  AddressSanitizer. The function comment also incorrectly referred to \"nr_ulsim\"
  instead of properly identifying the NR_PHY ulsim context.\n\nUnder heavy simulation
  loads with multiple channel models, this misconfiguration could allow memory leaks
  to go undetected, potentially masking issues in PHY layer implementations.\n\n###
  Changes\n- `openair1/SIMULATION/NR_PHY/ulsim.c`: Updated `__asan_default_options()`
  to return \"detect_leaks=1\" for 3GPP specification compliance and corrected comment
  to properly identify NR_PHY ulsim context.\n\n","extra_fields":{"bug_description":"wrong
