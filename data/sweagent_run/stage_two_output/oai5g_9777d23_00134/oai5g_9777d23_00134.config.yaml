  PDUs received outside the reception window. This caused issues with sequence number
  management and reassembly timing.\n\n### Changes\n- `openair2/LAYER2/rlc_v2/rlc_entity_um.c`:
  Modified the reception actions logic to properly check SN against VR(UH) before
  updating window parameters\n- Added proper conditional handling for PDUs within
  vs outside reception window\n- Improved comment documentation to match 3GPP TS 36.322
  specification\n\n### Reproduction\nUnder certain network conditions with packet
