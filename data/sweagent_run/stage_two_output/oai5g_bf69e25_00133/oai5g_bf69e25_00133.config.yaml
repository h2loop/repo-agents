  it to configure the wrong eNB when multiple instances were present. This led to
  S1 setup failures and incorrect MME registration.\n\nThis fix ensures the function
  directly uses the provided index instead of looping through all eNB configurations.\n\n###
  Changes\n- `openair2/ENB_APP/enb_config.c`: Modified RCconfig_S1 to use direct indexing\n-
  `openair2/ENB_APP/enb_config.c`: Added active eNB list verification\n- `openair2/ENB_APP/enb_config.c`:
  Removed unnecessary nested loops\n\n### Reproduction\nWhen running multiple eNB
  instances with different configurations, the S1AP registration would sometimes use
  parameters from the wrong eNB instance, causing MME connection failures. The issue
  was more prevalent when the active eNB list order didn''t match the configuration
  file order.\n\nTo reproduce:\n1. Configure multiple eNB instances with different
  MME addresses\n2. Start the eNB application\n3. Observe that some eNBs fail to register
  with their designated MMEs\n4. Check S1AP logs to see mismatched configuration parameters
  being used\n\n","extra_fields":{"bug_description":"use-after-free vulnerability
