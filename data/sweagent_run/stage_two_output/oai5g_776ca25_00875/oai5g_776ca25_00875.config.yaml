  parameters, leading to unexpected behavior when processing uplink control channel
  requests.\n\nThe issue was traced to the `pack_ul_tti_request_pucch_pdu` and `unpack_ul_tti_request_pucch_pdu`
  functions missing the beamforming field handling. When these functions were called,
  the beamforming data was not being properly serialized/deserialized, causing data
  corruption.\n\n### Changes\n- `nfapi/open-nFAPI/nfapi/src/nfapi_p7.c`: Added beamforming
  structure packing/unpacking helper functions and updated PUCCH PDU processing to
  include beamforming data handling.\n- `nfapi/open-nFAPI/nfapi/src/nfapi_p7.c`: Updated
  PRACH PDU processing to also handle beamforming data for consistency.\n\n### Reproduction
  Steps\n1. Configure a NR gNB with PUCCH beamforming enabled\n2. Send UL TTI requests
