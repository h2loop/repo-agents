  Title: Fix incorrect error code usage in NR PNF response functions\n\n### Summary\nThe
  NR PNF (Physical Network Function) response functions were using LTE error codes
  instead of NR-specific error codes when checking response status. This caused the
  PNF state to not update correctly after receiving configuration and start responses,
  leading to unexpected behavior in the NR PNF state machine.\n\nSpecifically, `nfapi_nr_pnf_pnf_config_resp`
  and `nfapi_nr_pnf_pnf_start_resp` were checking for `NFAPI_MSG_OK` (LTE error code)
  instead of `NFAPI_NR_CONFIG_MSG_OK` and `NFAPI_NR_START_MSG_OK` respectively.\n\nThis
  fix ensures that NR PNF functions use the appropriate NR error codes, allowing proper
  state transitions in the PNF.\n\n### Changes\n- `nfapi/open-nFAPI/pnf/src/pnf_interface.c`:
  \n  - Updated `nfapi_nr_pnf_pnf_config_resp` to use `NFAPI_NR_CONFIG_MSG_OK` instead
