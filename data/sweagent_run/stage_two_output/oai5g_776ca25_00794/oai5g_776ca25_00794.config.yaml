  Title: Fix inconsistent polar decoder tree construction causing power control errors\n\n###
  Summary\nThe `add_nodes` function in the polar decoder was creating an inconsistent
  tree structure where the right subtree was not always properly initialized when
  `all_frozen_below==0`. This led to downstream decoding functions accessing uninitialized
  pointers, causing incorrect transmit power levels.\n\n### Changes\n- `openair1/PHY/CODING/nrPolar_tools/nr_polar_decoding_tools.c`:
  Consolidated left and right subtree creation logic in `add_nodes` function to ensure
  both are created together when needed.\n\n### Reproduction\nUnder certain RNTI values
  and aggregation levels, the gNB would calculate incorrect transmit power levels
  for UEs, causing UEs to transmit at wrong power levels. This was observable as UEs
  either not being able to establish connections or having poor throughput due to
  power mismatch.\n\nThe issue was particularly noticeable with DCI formats where
  the polar decoder tree construction would result in an inconsistent structure, leading
