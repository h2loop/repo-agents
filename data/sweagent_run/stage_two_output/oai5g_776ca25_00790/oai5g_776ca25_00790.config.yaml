  Title: Fix UL config validation in NR UE scheduler\n\n### Summary\nThe NR UE scheduler''s
  `fill_ul_config` function was missing state validation before processing protocol
  messages downstream of the UL config clearing operation. This could lead to UL configurations
  being set for invalid slots when the frame/slot combination was not valid for UL
  transmission.\n\nThe issue occurred because after clearing the UL config for a new
  frame/slot (lines 109-110), there was no validation that the new frame_tx/slot_tx
  combination was actually valid for UL transmission before proceeding with protocol
  message processing (lines 118-123). This could result in UL configuration being
  set for invalid slots.\n\nThe fix adds explicit documentation of this requirement
  and an assertion to prevent exceeding maximum PDU limits.\n\n### Changes\n- `openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c`:
  Added comment after clearing operation to document requirement for UL slot validation\n-
  `openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c`: Added assertion to validate maximum
  PDU count after incrementing\n\n","extra_fields":{"bug_description":"missing state
  validation before processing a protocol message","bug_id":"telecom_state_machine_missing_validation","stage_one_patch":"diff
  --git a/openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c b/openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c\nindex
  0a84e1c817..eff9962b80 100644\n--- a/openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c\n+++
  b/openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c\n@@ -108,7 +108,13 @@ void fill_ul_config(fapi_nr_ul_config_request_t
  *ul_config, frame_t frame_tx, in\n     LOG_D(MAC, \"%d.%d %d.%d f clear ul_config
  %p t %d pdu %d\\n\", frame_tx, slot_tx, ul_config->sfn, ul_config->slot, ul_config,
  pdu_type, ul_config->number_pdus);\n     ul_config->number_pdus = 0;\n     memset(ul_config->ul_config_list,
  0, sizeof(ul_config->ul_config_list));\n+    // NOTE: After this clearing operation,
  the caller MUST ensure that frame_tx/slot_tx \n+    // is valid for UL transmission
  before proceeding with protocol message processing.\n+    // Failure to do so may
  result in UL configuration being set for invalid slots.\n   }\n+  // Validate that
  we''re not exceeding the maximum number of PDUs after incrementing\n+  AssertFatal((ul_config->number_pdus
  + 1) <= FAPI_NR_UL_CONFIG_LIST_NUM,\n+              \"Adding new PDU would exceed
  maximum number of UL PDUs (%d)\", FAPI_NR_UL_CONFIG_LIST_NUM);\n   ul_config->ul_config_list[ul_config->number_pdus].pdu_type
  = pdu_type;\n   //ul_config->slot = slot_tx;\n   //ul_config->sfn = frame_tx;\n@@
  -2716,12 +2722,12 @@ typedef struct {\n nr_ue_get_sdu_mac_ce_pre finds length in
  various mac_ce field\n Need nothing from mac_ce_p:\n Update the following in mac_ce_p:\n-\tbsr_len;\n-\tbsr_ce_len;\n-\tbsr_header_len;\n-\tphr_len;
  TBD\n-\tphr_ce_len; TBD\n-\tphr_header_len; TBD\n+        bsr_len;\n+        bsr_ce_len;\n+        bsr_header_len;\n+        phr_len;
  TBD\n+        phr_ce_len; TBD\n+        phr_header_len; TBD\n */\n int nr_ue_get_sdu_mac_ce_pre(module_id_t
  module_idP,\n                       int CC_id,\n@@ -2789,19 +2795,19 @@ int nr_ue_get_sdu_mac_ce_pre(module_id_t
  module_idP,\n /*\n nr_ue_get_sdu_mac_ce_post recalculates length and prepares the
  mac_ce field\n Need the following from mac_ce_p:\n-\tbsr_ce_len\n-\tbsr_len\n-\tsdu_length_total\n-\ttotal_mac_pdu_header_len\n+        bsr_ce_len\n+        bsr_len\n+        sdu_length_total\n+        total_mac_pdu_header_len\n
  Update the following in mac_ce_p:\n-\tbsr_ce_len\n-\tbsr_header_len\n-\tbsr_len\n-\ttot_mac_ce_len\n-\ttotal_mac_pdu_header_len\n-\tbsr_s\n-\tbsr_l\n-\tbsr_t\n+        bsr_ce_len\n+        bsr_header_len\n+        bsr_len\n+        tot_mac_ce_len\n+        total_mac_pdu_header_len\n+        bsr_s\n+        bsr_l\n+        bsr_t\n
  */\n void nr_ue_get_sdu_mac_ce_post(module_id_t module_idP,\n                       int
