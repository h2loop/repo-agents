  Title: Fix incorrect loop bounds in RRC NGAP PDU session handling\n\n### Summary\nIncorrect
  loop bounds and array indexing in RRC NGAP PDU session handling functions can cause
  buffer overflows and incorrect behavior when processing PDU session modify and release
  commands.\n\n### Changes\n- `openair2/RRC/NR/rrc_gNB_NGAP.c`: Fixed multiple instances
  of incorrect array indexing and missing bounds checking in PDU session processing
  functions.\n\n### Reproduction\nWhen a UE with many PDU sessions receives a PDU
  session modify request for a non-existing session, the code incorrectly accesses
  memory beyond the allocated PDU session array, leading to potential crashes or data
  corruption. Similarly, when processing PDU session release commands for non-existing
  sessions, buffer overflows can occur due to missing bounds checks before incrementing
  the session count.\n\nSymptoms include:\n- Segmentation faults during PDU session
  management\n- Incorrect PDU session state handling\n- Potential memory corruption
  in UE context data\n","extra_fields":{"bug_description":"incorrect loop bounds causing
