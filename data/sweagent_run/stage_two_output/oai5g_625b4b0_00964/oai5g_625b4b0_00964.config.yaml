  Title: Fix sequence number validation and logging in PDCP layer\n\n### Summary\nThe
  PDCP sequence manager had incorrect logging format strings and redundant validation
  checks that could cause issues with debugging and performance. When the pdcp_is_seq_num_size_valid()
  function was called with an invalid sequence number size, the log message would
  be malformed due to a missing closing parenthesis, making it difficult to parse
  error logs.\n\nAdditionally, the pdcp_is_seq_num_valid() function contained a redundant
  check for negative sequence numbers even though the parameter is unsigned, and the
  maximum sequence number calculation used an unnecessarily complex bit-shifting approach.\n\nThis
  fix corrects the logging format string, removes redundant validation logic, and
  simplifies the sequence number calculations.\n\n### Changes\n- `openair2/LAYER2/PDCP_v10.1.0/pdcp_sequence_manager.c`:
  \n  * Fixed missing closing parenthesis in log message format string in pdcp_is_seq_num_size_valid()\n  *
  Removed redundant seq_num >= 0 check in pdcp_is_seq_num_valid() since uint16_t cannot
  be negative\n  * Simplified pdcp_calculate_max_seq_num_for_given_size() implementation\n  *
  Streamlined function returns for better readability\n\n### Reproduction Steps\nTo
  reproduce the original logging issue:\n1. Configure a PDCP entity with an invalid
  sequence number size (not 5, 7, or 12)\n2. Call pdcp_is_seq_num_size_valid() on
  this entity\n3. Check the PDCP warning logs - the message will be missing the closing
  parenthesis\n\nThe malformed log entries would appear as:\n\"Incoming SN size is
  invalid! (Expected: {5 | 7 | 12}, Received: 15\\n\"\n\nInstead of the correct format:\n\"Incoming
  SN size is invalid! (Expected: {5 | 7 | 12}, Received: 15)\\n\"\n\nPerformance impact
  from the redundant validation was minimal but measurable in high-throughput scenarios.\n","extra_fields":{"bug_description":"incorrect
  information element value set in outgoing protocol message","bug_id":"telecom_incorrect_ie","stage_one_patch":"diff
  --git a/openair2/LAYER2/PDCP_v10.1.0/pdcp_sequence_manager.c b/openair2/LAYER2/PDCP_v10.1.0/pdcp_sequence_manager.c\nindex
  5aa5e33304..619740deb5 100644\n--- a/openair2/LAYER2/PDCP_v10.1.0/pdcp_sequence_manager.c\n+++
  b/openair2/LAYER2/PDCP_v10.1.0/pdcp_sequence_manager.c\n@@ -66,7 +66,7 @@ bool pdcp_is_seq_num_size_valid(pdcp_t*
  pdcp_entity)\n \n   // Check if the size of SN is valid (see 3GPP TS 36.323 v10.1.0
  item 6.3.2)\n   if (pdcp_entity->seq_num_size != 5 && pdcp_entity->seq_num_size
  != 7 && pdcp_entity->seq_num_size != 12) {\n-    LOG_W(PDCP, \"Incoming SN size
  is invalid! (Expected: {5 | 7 | 12}, Received: %d\\n\", pdcp_entity->seq_num_size);\n+    LOG_W(PDCP,
  \"Incoming SN size is invalid! (Expected: {5 | 7 | 12}, Received: %d)\\n\", pdcp_entity->seq_num_size);\n     return
  false;\n   }\n \n@@ -78,20 +78,12 @@ bool pdcp_is_seq_num_size_valid(pdcp_t* pdcp_entity)\n  */\n
  bool pdcp_is_seq_num_valid(uint16_t seq_num, uint8_t seq_num_size)\n {\n-  if (seq_num
  >= 0 && seq_num <= pdcp_calculate_max_seq_num_for_given_size(seq_num_size)) {\n-    return
  true;\n-  }\n-\n-  return false;\n+  return seq_num <= pdcp_calculate_max_seq_num_for_given_size(seq_num_size);\n
  }\n \n uint16_t pdcp_calculate_max_seq_num_for_given_size(uint8_t seq_num_size)\n
  {\n-  uint16_t max_seq_num = 1;\n-\n-  max_seq_num <<= seq_num_size;\n-\n-  return
  max_seq_num - 1;\n+  return (1U << seq_num_size) - 1;\n }\n \n uint16_t pdcp_get_next_tx_seq_number(pdcp_t*
  pdcp_entity)\n","start_fn":"pdcp_is_seq_num_size_valid","start_fn_file":"openair2/LAYER2/PDCP_v10.1.0/pdcp_sequence_manager.c","subsystem":"openair2/LAYER2/PDCP_v10.1.0"},"type":"text","id":"oai5g_625b4b0_00964"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
