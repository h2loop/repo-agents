  issues by:\n- Enabling proper context validation and returning `RLC_OP_STATUS_BAD_PARAMETER`
  for invalid contexts\n- Fixing MBMS section conditional compilation \n- Implementing
  proper DRB release functionality with validation\n- Replacing `exit(1)` calls with
