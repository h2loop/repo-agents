  */\n+#  define COMPILER_VERSION_TWEAK DEC(__INTEL_COMPILER_BUILD_DATE)\n+# endif\n+#
  if defined(_MSC_VER)\n+   /* _MSC_VER = VVRR */\n+#  define SIMULATE_VERSION_MAJOR
