  Title: Fix incorrect error handling in T tracer record tool\n\n### Summary\nThe
  T tracer record tool had incorrect error handling that could cause it to return
  success (0) even when encountering read errors from the socket. This could lead
  to truncated output files being treated as successful recordings.\n\nAdditionally,
  the code was missing the stdint.h include needed for int32_t, which could cause
  compilation failures on some systems.\n\n### Changes\n- `common/utils/T/tracer/record.c`:
  Added stdint.h include for int32_t definition\n- `common/utils/T/tracer/record.c`:
  Improved error handling by printing error messages before goto read_error\n- `common/utils/T/tracer/record.c`:
  Changed return value from read_error label from 0 to 1 to properly indicate error
  condition\n\nTo reproduce the issue:\n1. Run the record tool with valid parameters\n2.
  Interrupt the connection or cause a socket read failure during recording\n3. Observe
  that the tool exits with code 0 (success) instead of 1 (error)\n4. The output file
  may be truncated but appears to be successfully created\n\nThis fix ensures that
  read errors are properly reported and the tool returns an appropriate error code.\n\n","extra_fields":{"bug_description":"incorrect
