  \"common/utils/LOG/log.h\"\n \n static int DEFBANDS[] = {7};\n static int DEFENBS[]
  = {0};\n static int DEFBFW[] = {0x00007fff};\n static int DEFRUTPCORES[] = {-1,-1,-1,-1};\n
  \n+/**\n+ * @brief Returns true when pattern2 is filled in\n+ */\n+static bool is_pattern2_config(const
  NR_TDD_UL_DL_Pattern_t *pattern2)\n+{\n+  if (pattern2 == NULL)\n+    return false;\n+  \n+  //
  Check if any pattern2 parameter is configured (not the default values)\n+  // Default
  values are: periodicity=321, others=-1 (set in fill_scc_sim)\n+  if (pattern2->dl_UL_TransmissionPeriodicity
  != 321 ||\n+      pattern2->nrofDownlinkSlots != -1 ||\n+      pattern2->nrofDownlinkSymbols
  != -1 ||\n+      pattern2->nrofUplinkSlots != -1 ||\n+      pattern2->nrofUplinkSymbols
  != -1)\n+    return true;\n+  \n+  return false;\n+}\n+\n /**\n  * @brief Helper
  define to allocate and initialize SetupRelease structures\n  */\n@@ -76,7 +98,7
