  Title: Fix pattern2 TDD configuration handling in gNB\n\n### Summary\nThe NR gNB
  configuration handling for TDD pattern2 had several issues that caused improper
  memory allocation and configuration parsing. The main problem was that pattern2
  memory was always allocated even when not configured, and there was no proper function
  to check if pattern2 was actually configured by the user.\n\nThis caused issues
  when running gNB with TDD configurations where pattern2 was not explicitly defined
  in the configuration file, leading to crashes during RRC configuration processing.\n\n###
  Changes\n- `openair2/GNB_APP/gnb_config.c`: \n  * Added `is_pattern2_config()` function
  to properly check if pattern2 parameters are configured\n  * Modified `prepare_scc()`
  to initialize pattern2 as NULL instead of always allocating memory\n  * Updated
  `fill_scc_sim()` to safely handle NULL pattern2\n  * Fixed `fix_scc()` to properly
  check pattern2 configuration before accessing it\n  * Added proper pattern2 configuration
  handling in `get_scc_config()` that reads parameters into temporary variables first,
  checks if configured, and only then allocates pattern2 memory\n- Added required
  header includes for logging and assertions\n\n","extra_fields":{"bug_description":"signed/unsigned
