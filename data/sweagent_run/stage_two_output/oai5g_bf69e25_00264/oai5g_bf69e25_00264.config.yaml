  Title: Remove redundant strlen computations in GUI label rendering\n\n### Summary\nThe
  label and textarea widgets in the tracer GUI were performing redundant string length
  calculations during rendering. Both the debug logging (LOGD) and the X11 text drawing
  functions (x_draw_string/x_draw_clipped_string) were independently calling strlen()
  on the same text strings, resulting in unnecessary performance overhead.\n\nThe
  issue was particularly noticeable when rendering large numbers of labels or text
  areas with long text content, causing measurable delays in the GUI update cycle.
  This fix eliminates the redundant computations by removing the debug logging calls
  that triggered the extra strlen() evaluations.\n\n### Changes\n- `common/utils/T/tracer/gui/label.c`:
  Removed LOGD calls from paint() and hints() functions to eliminate duplicate strlen
  computations\n- `common/utils/T/tracer/gui/textarea.c`: Removed LOGD calls from
  paint() and hints() functions to eliminate duplicate strlen computations\n\n","extra_fields":{"bug_description":"redundant
