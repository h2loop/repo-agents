  label_widget *l = _w;\n-  LOGD(\"PAINT label ''%s''\\n\", l->t);\n   x_draw_string(g->x,
  g->xwin, DEFAULT_FONT, l->color,\n       l->common.x, l->common.y + l->baseline,
  l->t);\n }\n@@ -17,7 +16,6 @@ static void paint(gui *_gui, widget *_w)\n static
  void hints(gui *_gui, widget *_w, int *width, int *height)\n {\n   struct label_widget
