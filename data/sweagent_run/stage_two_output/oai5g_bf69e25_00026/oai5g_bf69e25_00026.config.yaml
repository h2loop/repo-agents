  Title: Fix infinite loop in EMM attach restart procedure\n\n### Summary\nThe `emm_proc_attach_restart()`
  function was creating an infinite loop by calling itself recursively through the
  EMM state machine. When the state machine received `_EMMREG_ATTACH_INIT`, it was
  calling `emm_proc_attach_restart()` again instead of initiating the attach procedure
  directly.\n\nThis fix modifies the state machine handlers to call `emm_proc_attach()`
  directly with the appropriate attach type, eliminating the recursive loop.\n\n###
  Changes\n- `openair3/NAS/UE/EMM/SAP/EmmDeregistered.c`: Replaced recursive call
  to `emm_proc_attach_restart()` with direct calls to `emm_proc_attach()` with proper
  attach type determination.\n- `openair3/NAS/UE/EMM/SAP/EmmDeregisteredAttemptingToAttach.c`:
  Same fix applied to eliminate recursive loop.\n- `openair3/NAS/UE/EMM/SAP/EmmRegisteredInitiated.c`:
  Same fix applied to eliminate recursive loop.\n- All modified files now include
  `emm_proc_defs.h` for attach type constants.\n\n### Reproduction\nTo reproduce the
  issue:\n1. Trigger an attach restart scenario (e.g., timer T3402 or T3411 expiration)\n2.
  Call `emm_proc_attach_restart()` \n3. Observe infinite recursion as the function
  calls itself through the state machine\n4. System will eventually crash with stack
  overflow\n\nThe fix ensures that when `emm_proc_attach_restart()` is called, the
  state machine transitions to the appropriate state and then initiates the attach
  procedure directly without creating a recursive loop.\n","extra_fields":{"bug_description":"format
  string vulnerability where user-controlled data is passed as format argument","bug_id":"c_format_string_vulnerability","stage_one_patch":"diff
