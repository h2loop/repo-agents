  compute_new_pdu_size(rlc_entity_am_t *entity, int maxsize)\n \n /* return number
  of missing parts of a sn\n  * if everything is missing (nothing received), return
  0\n+ * if segments received but no gaps and end not missing, return 0\n+ * if segments
  received with gaps or end missing, return number of gaps\n  */\n static int count_nack_missing_parts(rlc_entity_am_t
  *entity, int sn)\n {\n@@ -907,6 +909,7 @@ static int count_nack_missing_parts(rlc_entity_am_t
  *entity, int sn)\n   int last_byte;\n   int new_last_byte;\n   int count;\n+  int
  so_value;\n \n   while (l != NULL) {\n     if (l->sn == sn)\n@@ -920,13 +923,19
  @@ static int count_nack_missing_parts(rlc_entity_am_t *entity, int sn)\n   last_byte
  = -1;\n   count = 0;\n   while (l != NULL && l->sn == sn) {\n-    if (l->so > last_byte
