  Title: Fix potential integer underflow in count_nack_missing_parts function\n\n###
  Summary\nThe `count_nack_missing_parts` function in the RLC AM entity can experience
  integer underflow when processing PDU segments with negative `so` (segment offset)
  values or when calculating `new_last_byte` with malformed segment parameters. This
  can lead to incorrect missing part counts and potentially cause the RLC entity to
  generate malformed status PDUs with incorrect NACK information.\n\nThe issue manifests
  when the gNB receives PDU segments from UEs with corrupted or maliciously crafted
  RLC headers. Under certain conditions, this can cause the gNB to incorrectly report
  missing segments, leading to unnecessary retransmissions or, in extreme cases, RLC
  entity stall due to inconsistent state.\n\n### Changes\n- `openair2/LAYER2/rlc_v2/rlc_entity_am.c`:
  Added bounds checking for `so` values and `new_last_byte` calculations in `count_nack_missing_parts`
  to prevent integer underflow.\n- `openair2/LAYER2/rlc_v2/rlc_entity_am.c`: Updated
  function comment to better document the return value semantics.\n\n","extra_fields":{"bug_description":"socket
