  Title: Fix memory leak in Modify EPS Bearer Context Reject message decoding\n\n###
  Summary\nThe NR UE NAS layer contained a memory leak when decoding Modify EPS Bearer
  Context Reject messages with Protocol Configuration Options. The leak occurred when
  the decode function was called multiple times on the same message structure or when
  decoding failed partway through processing optional fields.\n\nThe issue was introduced
  during the initial implementation of the Protocol Configuration Options decoding
  logic, where allocated memory was not properly freed in error paths or when overwriting
  existing data.\n\n### Changes\n- `openair3/NAS/COMMON/ESM/MSG/ModifyEpsBearerContextReject.c`:
  Added check to free existing protocol configuration options before decoding new
  ones and provided cleanup function.\n- `openair3/NAS/COMMON/ESM/MSG/ModifyEpsBearerContextReject.h`:
  Added declaration for cleanup function.\n- `openair3/NAS/COMMON/IES/ProtocolConfigurationOptions.c`:
  Enhanced error handling to free partially allocated memory and added proper cleanup
  function.\n- `openair3/NAS/COMMON/IES/ProtocolConfigurationOptions.h`: Added declaration
  for cleanup function.\n\n","extra_fields":{"bug_description":"memory leak where
