  :\"default\"},\"problem_statement\":{\"text\":\"\\n## Title: Implement missing find_gscn_to_scan\
  \ function for NR synchronization\\n\\n### Summary\\nThe `find_gscn_to_scan` function\
  \ was referenced in the codebase but never implemented, causing undefined behavior\
  \ when trying to determine GSCN (Global Synchronization Channel Number) values for\
  \ NR cell search. This function is critical for UE synchronization as it provides\
  \ the list of GSCN values that need to be scanned for a given frequency band and\
  \ subcarrier spacing.\\n\\nWhen users attempted to call `find_gscn_to_scan()`, their\
  \ application would either fail to link or crash at runtime due to the missing implementation.\
  \ The function is now properly implemented in `nr_common.c` with a corresponding\
  \ declaration in `nr_common.h`.\\n\\nThe implementation includes the complete synchronization\
  \ raster table data from 3GPP TS 38.101-1/2 Table 5.4.3.3-1, supporting all defined\
  \ NR bands and subcarrier spacing combinations. It correctly handles different step\
  \ sizes for various band/SCS pairs and respects the maximum GSCN count parameter.\\\
  n\\n### Changes\\n- `common/utils/nr/nr_common.h`: Added function declaration for\
  \ `find_gscn_to_scan`\\n- `common/utils/nr/nr_common.c`: Implemented `find_gscn_to_scan`\
  \ function with full sync raster table\\n- The function returns the number of GSCN\
  \ values found or -1 for invalid band/SCS combinations\\n- Properly handles step\
  \ sizes greater than 1 (e.g., Band 79 with SCS 1 uses step size 16)\\n- Respects\
  \ the `max_gscn` parameter to limit returned values\\n\\n\",\"extra_fields\":{\"\
