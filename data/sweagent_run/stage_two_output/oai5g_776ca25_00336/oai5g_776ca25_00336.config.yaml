  Title: Fix missing mandatory SCI fields and null pointer dereference in SL procedures\n\n###
  Summary\nThe sidelink procedures had two critical issues:\n1. Missing initialization
  of mandatory fixed fields in SCI format 1A structure leading to undefined values
  in outgoing signaling\n2. Null pointer dereference in resource pool handling functions
  when called with invalid parameters\n\nThese issues caused incorrect SCI message
  generation and potential crashes during sidelink operation.\n\n### Changes\n- `openair2/LAYER2/NR_MAC_UE/nr_ue_procedures_sl.c`:
  \n  * Added null pointer checks in `sl_get_subchannel_size()` and `sl_get_num_subch()`
  functions\n  * Initialized fixed SCI fields (priority, mcs, etc.) with default values
  in `sl_determine_sci_1a_len()`\n  * Fixed formatting issues in SL MAC PDU processing\n\n###
  Reproduction\nTo reproduce the original issue:\n1. Configure UE with sidelink resource
  pool\n2. Trigger SCI format 1A generation with uninitialized fields\n3. Observe
  garbage values in priority/mcs fields of outgoing SCI\n4. Call `sl_get_num_subch()`
  with NULL resource pool pointer\n5. Observe segmentation fault\n\nThe fix ensures
  all mandatory SCI fields are properly initialized and prevents crashes from invalid
  resource pool parameters.\n","extra_fields":{"bug_description":"missing mandatory
  information element in outgoing signaling message","bug_id":"telecom_missing_mandatory_ie","stage_one_patch":"diff
  --git a/openair2/LAYER2/NR_MAC_UE/nr_ue_procedures_sl.c b/openair2/LAYER2/NR_MAC_UE/nr_ue_procedures_sl.c\nindex
  0f7266a930..22e2d62b49 100644\n--- a/openair2/LAYER2/NR_MAC_UE/nr_ue_procedures_sl.c\n+++
  b/openair2/LAYER2/NR_MAC_UE/nr_ue_procedures_sl.c\n@@ -366,6 +366,8 @@ uint32_t
  sl_prepare_MIB(NR_TDD_UL_DL_ConfigCommon_t *TDD_UL_DL_Config,\n uint16_t sl_get_subchannel_size(NR_SL_ResourcePool_r16_t
  *rpool)\n {\n \n+  AssertFatal(rpool, \"Resource pool cannot be NULL\\n\");\n+\n   uint16_t
  subch_size = 0;\n   const uint8_t subchsizes[8] = {10, 12, 15, 20, 25, 50, 75, 100};\n   subch_size
  = (rpool->sl_SubchannelSize_r16)\n@@ -379,6 +381,8 @@ uint16_t sl_get_subchannel_size(NR_SL_ResourcePool_r16_t
  *rpool)\n uint16_t sl_get_num_subch(NR_SL_ResourcePool_r16_t *rpool)\n {\n \n+  AssertFatal(rpool,
  \"Resource pool cannot be NULL\\n\");\n+\n   uint16_t num_subch = 0;\n   uint16_t
  subch_size = sl_get_subchannel_size(rpool);\n   uint16_t num_rbs = (rpool->sl_RB_Number_r16)
  ? *rpool->sl_RB_Number_r16 : 0;\n@@ -401,6 +405,13 @@ uint8_t sl_determine_sci_1a_len(uint16_t
  *num_subchannels,\n \n   uint8_t num_bits = 0;\n \n+  // Initialize fixed fields
  with default values\n+  sci_1a->priority = 0; // 3 bits - default lowest priority\n+  sci_1a->sci_format_2nd_stage
  = 0; // 2 bits - default SCI format 2A\n+  sci_1a->beta_offset_indicator = 0; //
  2 bits - default value\n+  sci_1a->num_dmrs_ports = 0; // 1 bit - default single
  port\n+  sci_1a->mcs = 0; // 5 bits - default MCS\n+\n   //Size of Fixed fields
  prio (3), sci_2ndstage(2),\n   //betaoffsetindicator(2), num dmrs ports (1), mcs
  (5bits)\n   uint8_t sci_1a_len = SL_SCI_FORMAT_1A_LEN_IN_BITS_FIXED_FIELDS;\n@@
  -1112,7 +1123,7 @@ void nr_ue_process_mac_sl_pdu(int module_idP,\n                          mac_len,\n                          1,\n                          NULL);\n-\t      break;\n+              break;\n       case
  SL_SCH_LCID_SL_CSI_REPORT:\n         {\n           NR_MAC_SUBHEADER_FIXED* sub_pdu_header
  = (NR_MAC_SUBHEADER_FIXED*) pduP;\n@@ -1148,9 +1159,9 @@ void nr_ue_process_mac_sl_pdu(int
  module_idP,\n       case SL_SCH_LCID_SL_INTER_UE_COORD_REQ:\n       case SL_SCH_LCID_SL_INTER_UE_COORD_INFO:\n       case
  SL_SCH_LCID_SL_DRX_CMD:\n-\t      LOG_W(NR_MAC,\"Received unsupported SL LCID %d\\n\",rx_lcid);\n-\t      return;\n-\t      break;\n+              LOG_W(NR_MAC,\"Received
  unsupported SL LCID %d\\n\",rx_lcid);\n+              return;\n+              break;\n     }\n     pduP
  += ( mac_subheader_len + mac_len );\n     pdu_len -= ( mac_subheader_len + mac_len
