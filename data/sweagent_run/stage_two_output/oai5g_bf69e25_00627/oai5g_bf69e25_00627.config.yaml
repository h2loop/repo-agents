  Title: Fix BSR handling in nr_ue_get_sdu_mac_ce_post function\n\n### Summary\nThe
  `nr_ue_get_sdu_mac_ce_post()` function in the NR UE MAC scheduler had several critical
  bugs that caused incorrect BSR (Buffer Status Report) handling and potential memory
  access issues. \n\nWhen the UE attempted to transmit uplink data, the function would
  incorrectly calculate which LCGs (Logical Channel Groups) had data available, leading
  to wrong BSR values being reported to the gNB. In some cases with multiple LCGs
  having data, this caused a segmentation fault due to accessing uninitialized memory
  structures.\n\nThis issue was particularly noticeable during high traffic scenarios
  where multiple logical channels were actively transmitting data.\n\n### Changes\n-
  `openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c`: Fixed variable shadowing issue in
  BSR calculation loop\n- `openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c`: Corrected
  LCGID selection logic to properly iterate through LCGs instead of LCIDs\n- `openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c`:
  Fixed BSR structure handling by using memset instead of NULL pointer assignment\n-
  `openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c`: Added proper periodic BSR timer reset
  logic based on actual BSR truncation state\n\n","extra_fields":{"bug_description":"incorrect
