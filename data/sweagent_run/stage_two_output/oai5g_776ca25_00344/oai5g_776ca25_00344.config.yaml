  Title: Fix redundant computation and missing auth reject handling in NR UE NAS\n\n###
  Summary\nThere was redundant computation in the NR UE NAS authentication response
  generation due to inconsistent field access in the `generateAuthenticationResp`
  function. The function was mixing `fgs_identity_response` and `fgs_auth_response`
  when accessing the message union, causing unnecessary computations and potential
  incorrect behavior.\n\nAdditionally, the UE was missing handling for authentication
  reject messages from the network, which could lead to the UE continuing operation
  in an unauthenticated state.\n\n### Changes\n- `openair3/NAS/NR_UE/nr_nas_msg_sim.h`:
  \n  * Added missing `FGS_AUTHENTICATION_REJECT` message type constant\n  * Fixed
  typo in structure field name from `fgs_identiy_response_msg` to `fgs_identity_response_msg`\n-
  `openair3/NAS/NR_UE/nr_nas_msg_sim.c`:\n  * Fixed inconsistent field access in `generateAuthenticationResp`
  function (lines 532-536)\n  * Added handling for FGS_AUTHENTICATION_REJECT messages
  in the message processing switch statement\n\n### Reproduction\nTo reproduce the
  issue:\n1. Run the NR UE with 5G NSA mode\n2. Configure the core network to send
  authentication reject messages\n3. Observe that the UE does not properly handle
  the reject and may continue attempting registration\n4. Monitor CPU usage during
  authentication procedures - the inconsistent field access causes redundant computations
  that increase processing overhead\n\nThe fix ensures consistent field access in
  the authentication response generation and adds proper handling for authentication
  reject messages from the network.\n","extra_fields":{"bug_description":"redundant
