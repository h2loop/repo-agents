  Title: Fix stale signal quality state not cleared after NAS procedure completion\n\n###
  Summary\nThe NAS procedure manager in the UE stack was not properly clearing signal
  quality measurements (RSRQ/RSRP) after network procedures completed or failed. This
  caused `nas_proc_get_signal_quality()` to return stale values from previous network
  attachments or measurements.\n\nThe issue occurred because the `rsrq` and `rsrp`
  fields in the `proc_data_t` structure were only initialized during `nas_proc_initialize()`
  but never reset when procedures like attach, detach, or cleanup completed.\n\nThis
  fix ensures that signal quality parameters are reset to their \"unknown\" state
  (255) after key NAS procedures to prevent stale measurements from being reported
  to upper layers.\n\n### Changes\n- `openair3/NAS/UE/nas_proc.c`: Added `nas_proc_reset_signal_quality()`
  function and integrated calls to it in `nas_proc_cleanup()`, `nas_proc_detach()`,
  and `nas_proc_attach()` to clear stale signal quality state.\n\n### Reproduction\nTo
  reproduce this issue:\n1. Initialize UE NAS procedures with `nas_proc_initialize()`\n2.
  Perform a network attach procedure with `nas_proc_attach()`\n3. Call `nas_proc_cell_info()`
  with valid RSRQ/RSRP measurements\n4. Verify signal quality with `nas_proc_get_signal_quality()`
  - should return valid values\n5. Perform a network detach with `nas_proc_detach()`\n6.
  Call `nas_proc_get_signal_quality()` again - incorrectly returns previous valid
  values instead of \"unknown\" (255)\n7. After `nas_proc_cleanup()`, signal quality
  values remain stale\n\nWith this fix, after step 5 and 7, `nas_proc_get_signal_quality()`
  correctly returns 255 for both RSRQ and RSRP, indicating unknown signal quality
  as expected after network detachment.\n\n","extra_fields":{"bug_description":"stale
  protocol state not cleared after procedure completion or failure","bug_id":"telecom_state_machine_stale_state","stage_one_patch":"diff
  --git a/openair3/NAS/UE/nas_proc.c b/openair3/NAS/UE/nas_proc.c\nindex 3fdef5ce73..1ecb7ee07d
  100644\n--- a/openair3/NAS/UE/nas_proc.c\n+++ b/openair3/NAS/UE/nas_proc.c\n@@ -67,6
  +67,30 @@ Description NAS procedure call manager\n static int _nas_proc_activate(nas_user_t
  *user, int cid, bool apply_to_all);\n static int _nas_proc_deactivate(nas_user_t
  *user, int cid, bool apply_to_all);\n \n+/****************************************************************************\n+
  **                                                                        **\n+
  ** Name:    nas_proc_reset_signal_quality()                           **\n+ **                                                                        **\n+
  ** Description: Reset the signal strength/quality parameters to unknown   **\n+
  **                                                                        **\n+
  ** Inputs:  user:      The user data                                  **\n+ **      Others:    None                                       **\n+
  **                                                                        **\n+
  ** Outputs:     None                                                      **\n+
  **      Return:    RETURNok, RETURNerror                      **\n+ **      Others:    None                                       **\n+
  **                                                                        **\n+
  ***************************************************************************/\n+static
  int nas_proc_reset_signal_quality(nas_user_t *user)\n+{\n+  LOG_FUNC_IN;\n+\n+  user->proc.rsrq
  = NAS_PROC_RSRQ_UNKNOWN;\n+  user->proc.rsrp = NAS_PROC_RSRP_UNKNOWN;\n+\n+  LOG_FUNC_RETURN
  (RETURNok);\n+}\n+\n /****************************************************************************/\n
  /******************  E X P O R T E D    F U N C T I O N S  ******************/\n
  /****************************************************************************/\n@@
  -142,6 +166,9 @@ void nas_proc_cleanup(nas_user_t *user)\n   /* Perform the EPS
  Session Manager''s clean up procedure */\n   esm_main_cleanup(user->esm_data);\n
  \n+  /* Reset signal quality parameters */\n+  nas_proc_reset_signal_quality(user);\n+\n   LOG_FUNC_OUT;\n
  }\n \n@@ -580,6 +607,9 @@ int nas_proc_detach(nas_user_t *user, bool switch_off)\n     rc
  = emm_sap_send(user, &emm_sap);\n   }\n \n+  /* Reset signal quality parameters
  after initiating detach */\n+  nas_proc_reset_signal_quality(user);\n+\n   LOG_FUNC_RETURN
  (rc);\n }\n \n@@ -611,6 +641,9 @@ int nas_proc_attach(nas_user_t *user)\n     rc
  = emm_sap_send(user, &emm_sap);\n   }\n \n+  /* Reset signal quality parameters
  after initiating attach */\n+  nas_proc_reset_signal_quality(user);\n+\n   LOG_FUNC_RETURN
  (rc);\n }\n \n","start_fn":"nas_proc_get_signal_quality","start_fn_file":"openair3/NAS/UE/nas_proc.c","subsystem":"openair3/NAS/UE"},"type":"text","id":"oai5g_625b4b0_00836"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
