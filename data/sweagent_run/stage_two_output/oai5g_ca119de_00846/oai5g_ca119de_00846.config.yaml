  Title: Fix CRC32 lookup table initialization and calculation in PHY coding\n\n###
  Summary\nThe CRC32 functions in the PHY coding module had two critical issues that
  prevented proper operation. First, the `crc32_init_lut` function was declared in
  the header but never implemented, causing link-time errors when users attempted
  to initialize CRC32 lookup tables. Second, the `crc32_calc_lut` inline function
  used an inconsistent calculation pattern that didn''t match the established conventions
  in the codebase.\n\nThis fix implements the missing `crc32_init_lut` function and
  corrects the calculation pattern in `crc32_calc_lut` to align with other CRC implementations.
  Additionally, a complete CRC32 processing function `crc32` was added to provide
  a built-in table-driven implementation similar to the existing CRC16/CRC24 functions.\n\n###
  Changes\n- `openair1/PHY/CODING/crc.h`: Fixed calculation pattern in `crc32_calc_lut`
  and added declaration for `crc32` function.\n- `openair1/PHY/CODING/crc_byte.c`:
  Implemented `crc32_init_lut` function, added `crc32` table-driven function, and
  integrated CRC32 table initialization into `crcTableInit`.\n\nWhen calling `crc32_calc_lut()`
  with an uninitialized lookup table, the behavior was undefined due to missing table
  initialization. After this fix, users can properly initialize CRC32 lookup tables
  using `crc32_init_lut(0x04C11DB7, lut)` before calling `crc32_calc_lut()`.\n\n","extra_fields":{"bug_description":"format
