  Title: Fix cross-layer parameter mismatch in AT error handling\n\n### Summary\nThe
  AT error handling module had a type mismatch between the declaration and definition
  of global variables used for AT command response formatting. The variable `at_response_format_v1`
  was defined as `bool` in `at_response.c` but declared as `extern int` in both `at_error.c`
  and `at_command.c`, causing undefined behavior when these variables were accessed.\n\nThis
  inconsistency led to incorrect error code formatting and occasional crashes during
  AT command processing, particularly when switching between numeric and verbose error
  modes.\n\nThe fix ensures consistent type declarations across all files by:\n1.
  Moving proper `extern bool` declarations to the respective header files\n2. Removing
  incorrect `extern int` declarations from source files\n3. Adding missing header
  includes\n4. Correcting function documentation\n\n### Changes\n- `openair3/NAS/UE/API/USER/at_response.h`:
  Added `extern bool at_response_format_v1;` declaration\n- `openair3/NAS/UE/API/USER/at_error.h`:
  Added `extern bool at_error_code_suppression_q1;` and `extern at_error_format_t
  at_error_format;` declarations\n- `openair3/NAS/UE/API/USER/at_error.c`: Removed
  incorrect extern declaration, added proper includes, fixed function documentation\n-
  `openair3/NAS/UE/API/USER/at_command.c`: Removed incorrect extern declarations,
  reordered includes for proper header access\n","extra_fields":{"bug_description":"cross-layer
