  Title: Fix error propagation in telnet client thread\n\n### Summary\nThe `run_telnetclt`
  function was not properly propagating errors when socket operations failed, leading
  to potential crashes or undefined behavior. This fix ensures errors are properly
  handled and propagated.\n\n### Changes\n- `common/utils/telnetsrv/telnetsrv.c`:
  \n  - Changed `run_telnetclt` function signature from `void` to `void *` to allow
  error returns\n  - Added proper error handling for socket creation failures\n  -
  Improved connection error handling with retry logic\n  - Added resource cleanup
  when send operations fail\n  - Added pthread_detach for proper thread management\n  -
  Fixed indentation issues\n\n### Reproduction\nWithout this fix, when the telnet
  client thread encounters a socket creation error, it would continue execution with
  an invalid socket descriptor, potentially causing:\n- Segmentation faults when attempting
  to use the invalid socket\n- Infinite loops due to improper error handling\n- Resource
  leaks from unclosed sockets\n\nThe issue can be observed by running the telnet server
  with `listenstdin` enabled under conditions that cause socket creation to fail (e.g.,
  system resource exhaustion).\n\n","extra_fields":{"bug_description":"missing error
