  Title: Fix segmentation fault in oai_nfapi_nr_slot_indication when p7_config_g is
  NULL\n\n### Summary\nThe `oai_nfapi_nr_slot_indication` function and related NR/LTE
  indication functions were dereferencing a NULL `p7_config_g` pointer, causing segmentation
  faults when called before P7 initialization. This typically occurred during early
  PHY startup or in RF simulator modes.\n\nThe functions now check for NULL `p7_config_g`
  and return -1 with appropriate error logging.\n\n### Reproduction\nRunning OAI gNB
  with NFAPI interface in RF simulator mode triggers a segmentation fault in `oai_nfapi_nr_slot_indication`
  during early slot processing. The crash occurs because `p7_config_g` is not yet
  initialized when the first slot indications are sent.\n\nSymptoms include:\n- Segmentation
  fault during gNB startup\n- Core dump with stack trace showing `oai_nfapi_nr_slot_indication`
  \n- Error occurs consistently in RF simulator mode with NFAPI enabled\n\n### Changes\n-
  `nfapi/oai_integration/nfapi_pnf.c`: Added NULL checks for `p7_config_g` in all
  indication functions\n- `nfapi/oai_integration/nfapi_pnf.c`: Replaced hardcoded
  `phy_id = 1` with dynamic `p7_config_g->phy_id`\n- `nfapi/oai_integration/nfapi_pnf.c`:
