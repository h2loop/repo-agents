  Title: Fix missing configuration application in O1 set_config command\n\n### Summary\nThe
  O1 interface''s `set_config` command in the telnet server was not applying parsed
  configuration parameters to the actual gNB configuration. While the function correctly
  parsed parameters like SSB frequency, ARFCN, bandwidth, and BWP settings, it never
  updated the underlying MAC configuration structures, making the command effectively
  a no-op.\n\nThis issue manifests when attempting to reconfigure the gNB through
  the O1 interface - the configuration values appear to be accepted but are never
  actually applied to the running system. Users would observe that subsequent `get_stats`
  calls still return the original configuration values.\n\nThe root cause was that
  the `set_config` function only parsed the input parameters but lacked the application
  logic present in similar functions like `set_bwconfig`. This fix adds the missing
  configuration application code that updates the ServingCellConfigCommon structure
  and reinitializes the MIB/SIB1 configurations.\n\n### Changes\n- `common/utils/telnetsrv/telnetsrv_o1.c`:
  Added configuration application logic to `set_config` function to actually update
  the gNB configuration with parsed parameters\n- `common/utils/telnetsrv/telnetsrv_o1.c`:
  Enhanced parameter handling to optionally parse UL parameters (ARFCNUL, BWUL) with
  proper TDD/FDD support\n- `common/utils/telnetsrv/telnetsrv_o1.c`: Added proper
  reinitialization of MIB and SIB1 configurations following the same pattern as `set_bwconfig`\n\n","extra_fields":{"bug_description":"missing
  state validation before processing a protocol message","bug_id":"telecom_state_machine_missing_validation","stage_one_patch":"diff
  --git a/common/utils/telnetsrv/telnetsrv_o1.c b/common/utils/telnetsrv/telnetsrv_o1.c\nindex
  04cd008655..3817e5c0d7 100644\n--- a/common/utils/telnetsrv/telnetsrv_o1.c\n+++
  b/common/utils/telnetsrv/telnetsrv_o1.c\n@@ -280,8 +280,61 @@ static int set_config(char
  *buf, int debug, telnet_printfunc_t prnt)\n   pos += processed;\n   prnt(\"setting
  \" STARTRB \":             %ld [len %d]\\n\", startrb, pos);\n \n+  // Try to read
  optional UL parameters\n+  long arfcnul = arfcn; // Default to DL value for TDD\n+  processed
  = read_long(buf + pos, end, ARFCNUL, &arfcnul);\n+  if (processed >= 0) {\n+    pos
  += processed;\n+    prnt(\"setting \" ARFCNUL \":        %ld [len %d]\\n\", arfcnul,
  pos);\n+  } else {\n+    prnt(\"setting \" ARFCNUL \":        %ld [default to ARFCNDL]\\n\",
  arfcnul);\n+  }\n+\n+  long bwul = bwdl; // Default to DL value for TDD\n+  processed
  = read_long(buf + pos, end, BWUL, &bwul);\n+  if (processed >= 0) {\n+    pos +=
  processed;\n+    prnt(\"setting \" BWUL \":  %ld [len %d]\\n\", bwul, pos);\n+  }
  else {\n+    prnt(\"setting \" BWUL \":  %ld [default to BWDL]\\n\", bwul);\n+  }\n+\n   int
  locationAndBandwidth = PRBalloc_to_locationandbandwidth0(numrbs, startrb, MAX_BWP_SIZE);\n   prnt(\"inferred
  locationAndBandwidth:       %d\\n\", locationAndBandwidth);\n+\n+  // Apply the
  configuration changes\n+  gNB_MAC_INST *mac = RC.nrmac[0];\n+  NR_ServingCellConfigCommon_t
  *scc = mac->common_channels[0].ServingCellConfigCommon;\n+  NR_FrequencyInfoDL_t
  *frequencyInfoDL = scc->downlinkConfigCommon->frequencyInfoDL;\n+  NR_BWP_t *initialDL
  = &scc->downlinkConfigCommon->initialDownlinkBWP->genericParameters;\n+  NR_FrequencyInfoUL_t
  *frequencyInfoUL = scc->uplinkConfigCommon->frequencyInfoUL;\n+  NR_BWP_t *initialUL
  = &scc->uplinkConfigCommon->initialUplinkBWP->genericParameters;\n+\n+  // Update
  the configuration with parsed values\n+  *scc->downlinkConfigCommon->frequencyInfoDL->absoluteFrequencySSB
  = ssbfreq;\n+  frequencyInfoDL->absoluteFrequencyPointA = arfcn;\n+  frequencyInfoDL->scs_SpecificCarrierList.list.array[0]->carrierBandwidth
  = bwdl;\n+  initialDL->locationAndBandwidth = locationAndBandwidth;\n+  \n+  //
  For UL, use parsed values or default to DL values (TDD mode)\n+  if (frequencyInfoUL->absoluteFrequencyPointA)
  {\n+    // FDD mode - use separate UL frequency\n+    *frequencyInfoUL->absoluteFrequencyPointA
  = arfcnul;\n+  }\n+  // else TDD mode - UL frequency is the same as DL, so we don''t
  set it\n+  frequencyInfoUL->scs_SpecificCarrierList.list.array[0]->carrierBandwidth
  = bwul;\n+  initialUL->locationAndBandwidth = locationAndBandwidth;\n+\n+  // Reinitialize
  MIB and SIB1 configurations\n+  free(RC.nrmac[0]->sched_ctrlSIB1);\n+  RC.nrmac[0]->sched_ctrlSIB1
  = NULL;\n+\n+  free_MIB_NR(mac->common_channels[0].mib);\n+  mac->common_channels[0].mib
  = get_new_MIB_NR(scc);\n+\n+  const f1ap_served_cell_info_t *info = &mac->f1_config.setup_req->cell[0].info;\n+  nr_mac_configure_sib1(mac,
  &info->plmn, info->nr_cellid, *info->tac);\n+\n   prnt(\"OK\\n\");\n   return 0;\n
  }\n","start_fn":"set_config","start_fn_file":"common/utils/telnetsrv/telnetsrv_o1.c","subsystem":"common/utils/telnetsrv"},"type":"text","id":"oai5g_9777d23_00965"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
