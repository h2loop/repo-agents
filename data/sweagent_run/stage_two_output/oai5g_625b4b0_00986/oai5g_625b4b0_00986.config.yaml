  call signature to `kdf()` function\n3. Memory leaks from allocated hex buffers\n4.
  Improper key padding for KDF function\n\nThis fix addresses all these issues to
  make the KDF tests work correctly.\n\n### Changes\n- `openair3/TEST/test_kdf.c`:
  Fixed function call to match `kdf()` signature, added proper key padding, and memory
  cleanup\n- `openair3/TEST/test_util.h`: Created new header with hex conversion utilities
  and HL macro implementation\n\nWhen running the KDF tests, users were experiencing
  crashes due to undefined HL macro and incorrect parameter passing to the kdf function.
  The test would compile but fail at runtime with segmentation faults when trying
  to process the test vectors.\n\nAfter this fix, the KDF tests should compile and
  run correctly, properly validating the key derivation function implementation against
  RFC 4231 test vectors.\n","extra_fields":{"bug_description":"integer truncation
