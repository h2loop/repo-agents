  */\n+\n+#ifndef TEST_UTIL_H\n+#define TEST_UTIL_H\n+\n+#include <stdio.h>\n+#include
  <stdlib.h>\n+#include <string.h>\n+#include <stdint.h>\n+\n+// Function to convert
  a hex character to its integer value\n+static inline int hex_char_to_hex_value(char
  c)\n+{\n+  if (c >= ''0'' && c <= ''9'') return c - ''0'';\n+  if (c >= ''A'' &&
  c <= ''F'') return c - ''A'' + 10;\n+  if (c >= ''a'' && c <= ''f'') return c -
  ''a'' + 10;\n+  return 0;\n+}\n+\n+// Function to convert a hex string to binary
  data\n+static inline int hex_string_to_hex_value(uint8_t *hex_value, const char
  *hex_string, int size)\n+{\n+  if (strlen(hex_string) != size*2) {\n+    fprintf(stderr,
  \"the string ''%s'' should be of length %d\\n\", hex_string, size*2);\n+    return
  -1;\n+  }\n+  \n+  for (int i = 0; i < size; i++) {\n+    int a = hex_char_to_hex_value(hex_string[2
  * i]);\n+    int b = hex_char_to_hex_value(hex_string[2 * i + 1]);\n+    \n+    if
