  buffer;\n+}\n+\n+// Function to get the length of decoded hex string\n+static inline
  unsigned decode_hex_length(const char* hex_string)\n+{\n+  return strlen(hex_string)
  / 2;\n+}\n+\n+// HL macro that returns both the decoded data and its length\n+#define
