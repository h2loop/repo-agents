  Title: Fix Cross-Layer Parameter Mismatch in Aerial FAPI VNF P7 Message Handling\n\n###
  Summary\nThe Aerial FAPI VNF P7 message handler in `fapi_vnf_p7.c` suffers from
  a cross-layer parameter mismatch between PHY, MAC, and RRC layers when processing
  TX_DATA.request messages. This mismatch manifests as inconsistent buffer size calculations
  and data packing operations, leading to potential memory corruption and SFN/slot
  synchronization errors during runtime.\n\nThe issue occurs because the buffer size
  calculation in `aerial_nr_send_p7_message` uses the original PDU lengths, while
  the actual data packing in `aerial_pack_tx_data_request` modifies these lengths
  based on TLV content. This inconsistency causes the allocated buffer to be either
  too small or too large for the actual data being packed, resulting in memory access
  violations or data corruption.\n\n### Reproduction Steps\n1. Configure OAI5G gNB
  with Aerial FAPI integration enabled\n2. Establish RRC connections with multiple
  UEs transmitting uplink data\n3. Observe intermittent SFN/slot mismatch errors in
  the logs:\n   ```\n   sfn slot doesn''t match unpacked one! L2->L1 X.X  vs L1->L2
  Y.Y\n   ```\n4. Under heavy load conditions, the gNB may crash with segmentation
  faults or exhibit incorrect data transmission behavior\n\n### Changes\n- `nfapi/oai_integration/aerial/fapi_vnf_p7.c`:
  \n  - Modified buffer size calculation in `aerial_nr_send_p7_message` to use TLV
  lengths when available, ensuring consistency with actual data packing\n  - Added
  safety check for TLV array access in `aerial_pack_tx_data_request` to prevent out-of-bounds
  access\n  - Fixed variable name in error logging message from `i` to `k` for correct
  TLV index reporting\n","extra_fields":{"bug_description":"cross-layer parameter
  mismatch between PHY, MAC, and RRC causing inconsistent operation","bug_id":"telecom_cross_layer_mismatch","stage_one_patch":"diff
  --git a/nfapi/oai_integration/aerial/fapi_vnf_p7.c b/nfapi/oai_integration/aerial/fapi_vnf_p7.c\nindex
  d9e3e0027b..0a05f58164 100644\n--- a/nfapi/oai_integration/aerial/fapi_vnf_p7.c\n+++
  b/nfapi/oai_integration/aerial/fapi_vnf_p7.c\n@@ -137,7 +137,9 @@ static int32_t
  aerial_pack_tx_data_request(void *pMessageBuf,\n     nfapi_nr_pdu_t *value = (nfapi_nr_pdu_t
  *)&pNfapiMsg->pdu_list[i];\n     // recalculate PDU_Length for Aerial (leave only
  the size occupied in the payload buffer afterward)\n     // assuming there is only
  1 TLV present\n-    value->PDU_length = value->TLVs[0].length;\n+    if (value->num_TLV
  > 0) {\n+      value->PDU_length = value->TLVs[0].length;\n+    }\n     for (uint32_t
  k = 0; k < value->num_TLV; ++k) {\n       // Ensure tag is 2\n       value->TLVs[k].tag
  = 2;\n@@ -163,7 +165,7 @@ static int32_t aerial_pack_tx_data_request(void *pMessageBuf,\n           }\n         }\n       }
  else {\n-        LOG_E(NR_MAC, \"value->TLVs[i].length was 0! (%d.%d) \\n\", pNfapiMsg->SFN,
  pNfapiMsg->Slot);\n+        LOG_E(NR_MAC, \"value->TLVs[%d].length was 0! (%d.%d)
  \\n\", k, pNfapiMsg->SFN, pNfapiMsg->Slot);\n       }\n     }\n   }\n@@ -189,7 +191,12
  @@ bool aerial_nr_send_p7_message(vnf_p7_t *vnf_p7, nfapi_nr_p7_message_header_t
  *h\n     nfapi_nr_tx_data_request_t *pNfapiMsg = (nfapi_nr_tx_data_request_t *)header;\n     uint64_t
  size = 0;\n     for (int i = 0; i < pNfapiMsg->Number_of_PDUs; ++i) {\n-      size
  += pNfapiMsg->pdu_list[i].PDU_length;\n+      // Use TLV length for size calculation
  to match what will be packed\n+      if (pNfapiMsg->pdu_list[i].num_TLV > 0) {\n+        size
  += pNfapiMsg->pdu_list[i].TLVs[0].length;\n+      } else {\n+        size += pNfapiMsg->pdu_list[i].PDU_length;\n+      }\n     }\n     AssertFatal(size
  <= 1024 * 1024 * 2, \"Message data larger than available buffer, tried to pack %\"
  PRId64, size);\n     uint8_t FAPI_data_buffer[1024 * 1024 * 2]; // 2MB\n","start_fn":"aerial_nr_send_p7_message","start_fn_file":"nfapi/oai_integration/aerial/fapi_vnf_p7.c","subsystem":"nfapi/oai_integration/aerial"},"type":"text","id":"oai5g_625b4b0_00274"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
