  Title: Fix eps_qos_bit_rate_value() function to properly handle reserved values\n\n###
  Summary\nThe `eps_qos_bit_rate_value()` function in the EPS Quality of Service IE
  handling code was incorrectly treating bit rate value 0 as the maximum bit rate
  (262144 kbps) instead of recognizing it as a reserved value according to 3GPP TS
  24.301 specification. This caused incorrect QoS parameter interpretation when UE
  or network sent reserved bit rate values.\n\nAdditionally, the function did not
  properly handle the upper boundary value 255, which is also reserved per specification.
  When these reserved values were processed, they would incorrectly contribute to
  QoS calculations instead of being treated as invalid/reserved.\n\nThe issue was
  reproduced by sending NG Setup Request messages with EPS QoS parameters containing
  bit rate value 0 in the QoS IE fields. This led to incorrect MBR/GBR values being
  configured in the gNB, causing unexpected radio bearer configurations and potential
  connection failures during initial UE attachment procedures.\n\n### Changes\n- `openair3/NAS/COMMON/IES/EpsQualityOfService.c`:
  \n  * Modified `eps_qos_bit_rate_value()` to return -1 for reserved values (0 and
  255) instead of maximum bit rate\n  * Improved conditional logic for better readability
  and correctness\n  * Added explicit handling for all value ranges according to 3GPP
  TS 24.301\n  * Fixed operator precedence issue in IE length checking conditions\n-
  `openair3/NAS/COMMON/IES/EpsQualityOfService.c`: \n  * Enhanced `eps_qos_bit_rate_ext_value()`
  with consistent reserved value handling\n  * Added proper comments explaining bit
  rate value ranges\n\n","extra_fields":{"bug_description":"missing cleanup of allocated
