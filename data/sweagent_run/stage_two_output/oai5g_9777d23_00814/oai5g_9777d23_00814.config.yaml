  Title: Fix potential array out-of-bounds access in get_Np() function\n\n### Summary\nThe
  `get_Np()` function in `phy_procedures_lte_common.c` could potentially access array
  elements out of bounds when called with unexpected parameter values, leading to
  undefined behavior. This fix adds proper parameter validation and bounds checking.\n\n###
  Changes\n- `openair1/SCHED/phy_procedures_lte_common.c`: Added validation for the
  `plus1` parameter and bounds checking for array accesses in the `get_Np()` function.\n\n###
  Reproduction\nWhen calling `get_Np()` with `plus1` values greater than 1, the function
  could attempt to access array indices beyond the valid range, potentially causing
  memory corruption or incorrect PUCCH resource allocation. The issue manifests as
  unexpected behavior in PUCCH scheduling and may lead to RRC connection failures
  or dropped connections in certain scenarios.\n\nTo reproduce:\n1. Call `get_Np(N_RB_DL,
  nCCE, plus1)` with `plus1 > 1`\n2. Observe potential out-of-bounds array access\n3.
  Monitor for incorrect PUCCH resource allocation or connection failures\n\nThe fix
  ensures that `plus1` is properly bounded to valid values (0 or 1) and that all array
  accesses remain within bounds, preventing undefined behavior while maintaining backward
  compatibility with existing code.\n","extra_fields":{"bug_description":"missing
