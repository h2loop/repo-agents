  Title: Fix HandoverRequest handling in NGAP gNB decoder\n\n### Summary\nThe NGAP
  gNB module was unable to process incoming HandoverRequest messages from the AMF
  due to missing decoder support for the HandoverResourceAllocation procedure. When
  a HandoverRequest was received, the decoder would hit an unhandled procedure code
  case and trigger a fatal assertion, causing the gNB to crash.\n\nAdditionally, the
  expected `decode_ng_handover_request()` function mentioned in user code was not
  implemented, leading to linker errors when trying to decode HandoverRequest messages
  directly.\n\nThe fix implements proper handling for HandoverResourceAllocation procedure
  codes in the NGAP decoder and adds the missing `decode_ng_handover_request()` function.
  A handler function for HandoverRequest messages has also been added to process these
  messages appropriately.\n\n### Changes\n- `openair3/NGAP/ngap_gNB_decoder.c`: Added
  case for `NGAP_ProcedureCode_id_HandoverResourceAllocation` in `ngap_gNB_decode_initiating_message`
  and implemented `decode_ng_handover_request()` function\n- `openair3/NGAP/ngap_gNB_decoder.h`:
  Added function prototype for `decode_ng_handover_request()`\n- `openair3/NGAP/ngap_gNB_handlers.c`:
  Added `ngap_gNB_handle_handover_request()` handler function and updated handler
  table\n- `openair3/NGAP/ngap_gNB_handlers.h`: Added function prototype for `ngap_gNB_handle_handover_request()`\n-
  `openair3/NGAP/ngap_common.h`: Added conditional include for `NGAP_HandoverRequest.h`\n\n","extra_fields":{"bug_description":"incorrect
