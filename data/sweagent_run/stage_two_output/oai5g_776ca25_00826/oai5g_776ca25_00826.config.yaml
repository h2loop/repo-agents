  Title: Fix HARQ process error in IF4p5 northbound interface for NR RRU\n\n### Summary\nThe
  `fh_if4p5_north_out` function in the NR RU processing was incorrectly sending IF4p5
  PULFFT packets during downlink and mixed slots in TDD mode. This caused downstream
  HARQ process errors due to incorrect retransmission timing and wrong redundancy
  version handling.\n\nThe issue was that the function always sent PULFFT regardless
  of slot type, unlike the LTE version which properly sends PULTICK during non-uplink
  slots. This led to the central unit expecting uplink data at wrong times.\n\n###
  Changes\n- `executables/nr-ru.c`: \n  - Added include for `SCHED_NR/phy_frame_config_nr.h`
  to access `nr_slot_select`\n  - Modified `fh_if4p5_north_out` to check slot type
  using `nr_slot_select`\n  - For TDD mode, now sends IF4p5_PULTICK during DL/mixed
  slots instead of PULFFT\n  - Only sends IF4p5_PULFFT during actual uplink slots\n  -
  Added logging for better debugging\n\n### Reproduction\nTo reproduce the issue:\n1.
  Configure NR RRU with IF4p5 interface in TDD mode\n2. Run traffic with mixed slot
  configuration (both DL and UL slots)\n3. Monitor HARQ process behavior - incorrect
  retransmissions and wrong RV handling will be observed\n4. Check fronthaul logs
  for PULFFT packets being sent during DL slots\n\nThe fix ensures proper TDD slot
  type handling matching the LTE implementation pattern.\n","extra_fields":{"bug_description":"HARQ
