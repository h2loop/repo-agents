  Title: Fix incorrect transpose offsets in FFT functions causing memory corruption\n\n###
  Summary\nThe NEON-optimized FFT implementation in OAI contains incorrect offset
  values in several transpose operations, leading to memory corruption and incorrect
  FFT results. The issue affects 512-point, 2048-point, and 8192-point FFT functions.\n\nThe
  root cause is that the `transpose4_ooff` function calls use incorrect offset parameters.
  For an N-point FFT processed 8 elements at a time, the offset should be N/8, but
  several functions were using N/4 or other incorrect values.\n\n### Changes\n- `openair1/PHY/TOOLS/oai_dfts_neon.c`:
  \n  - Fixed dft512 function - changed transpose offset from 128 to 64\n  - Fixed
  idft512 function - changed transpose offset from 128 to 64  \n  - Fixed dft2048
  function - changed transpose offset from 512 to 256\n  - Fixed idft2048 function
  - changed transpose offset from 512 to 256\n  - Fixed dft8192 function - changed
  transpose offset from 2048 to 1024\n  - Fixed idft8192 function - changed transpose
  offset from 2048 to 1024\n\n### Reproduction\nUnder heavy PHY processing load, users
  may observe:\n- Segmentation faults in PHY processing threads\n- Incorrect channel
  estimation and equalization results\n- PDSCH/PUSCH decoding failures with high BLER\n-
  Memory sanitizer errors indicating out-of-bounds accesses in FFT processing\n\nThe
  issue is most likely to manifest when processing large bandwidth configurations
  (100MHz+) where 2048-point and 8192-point FFTs are used frequently.\n","extra_fields":{"bug_description":"string
