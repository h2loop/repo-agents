  Title: Fix missing decode_fgs_service_accept implementation causing NAS decode failures\n\n###
  Summary\nThe function `decode_fgs_service_accept()` was referenced in the codebase
  but never implemented, causing segmentation faults when 5G Service Accept messages
  were received. This adds the missing implementation following the existing NAS message
  pattern.\n\n### Changes\n- `openair3/NAS/COMMON/EMM/MSG/FGSServiceAccept.h`: New
  header file with message structure and function declarations\n- `openair3/NAS/COMMON/EMM/MSG/FGSServiceAccept.c`:
  New implementation file with encode/decode functions\n- Message structure includes
  mandatory header fields and presence mask for optional fields\n- Follows same pattern
  as other FGS message implementations like RegistrationAccept\n\n### Reproduction\nWhen
  UE receives a 5G Service Accept message (message type 0x4e) during service request
  procedure, the NAS decoder attempts to call `decode_fgs_service_accept()` which
  results in undefined behavior since the function doesn''t exist. This causes immediate
  process termination or memory corruption depending on linking behavior.\n\nThe issue
  manifests as random crashes during initial registration or service request procedures
  when the network sends a Service Accept message back to the UE.\n","extra_fields":{"bug_description":"race
