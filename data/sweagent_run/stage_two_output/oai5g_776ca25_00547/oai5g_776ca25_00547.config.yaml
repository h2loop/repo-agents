  Significance: dual\n+ * Direction: network to UE\n+ */\n+\n+typedef struct fgs_service_accept_msg_tag
  {\n+  /* Mandatory fields */\n+  ExtendedProtocolDiscriminator protocoldiscriminator;\n+  SecurityHeaderType            securityheadertype:4;\n+  SpareHalfOctet                sparehalfoctet:4;\n+  MessageType                   messagetype;\n+  /*
  Optional fields - Service Accept can have optional fields like PDU session status,
