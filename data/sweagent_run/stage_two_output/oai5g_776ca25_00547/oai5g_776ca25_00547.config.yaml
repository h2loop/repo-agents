  -0,0 +1,85 @@\n+#include <stdio.h>\n+#include <stdlib.h>\n+#include <string.h>\n+#include
  <stdint.h>\n+\n+#include \"TLVEncoder.h\"\n+#include \"TLVDecoder.h\"\n+#include
  \"FGSServiceAccept.h\"\n+#include \"assertions.h\"\n+\n+int decode_fgs_service_accept(fgs_service_accept_msg
  *fgs_service_accept, uint8_t *buffer, uint32_t len)\n+{\n+  uint32_t decoded = 0;\n+  int
  decoded_result = 0;\n+\n+  /* Check buffer length */\n+  CHECK_PDU_POINTER_AND_LENGTH_DECODER(buffer,
  FGS_SERVICE_ACCEPT_MINIMUM_LENGTH, len);\n+\n+  /* Decoding mandatory fields */\n+  if
  ((decoded_result = decode_extended_protocol_discriminator(&fgs_service_accept->protocoldiscriminator,
  0,\n+      buffer + decoded, len - decoded)) < 0) {\n+    return decoded_result;\n+  }\n+  decoded
  += decoded_result;\n+\n+  if ((decoded_result = decode_security_header_type(&fgs_service_accept->securityheadertype,
  0,\n+      buffer + decoded, len - decoded)) < 0) {\n+    return decoded_result;\n+  }\n+  decoded
  += decoded_result;\n+\n+  if ((decoded_result = decode_spare_half_octet(&fgs_service_accept->sparehalfoctet,
  0,\n+      buffer + decoded, len - decoded)) < 0) {\n+    return decoded_result;\n+  }\n+  decoded
  += decoded_result;\n+\n+  if ((decoded_result = decode_message_type(&fgs_service_accept->messagetype,
  0,\n+      buffer + decoded, len - decoded)) < 0) {\n+    return decoded_result;\n+  }\n+  decoded
  += decoded_result;\n+\n+  /* Initialize presence mask */\n+  fgs_service_accept->presencemask
  = 0;\n+\n+  /* Service Accept message typically doesn''t have optional fields in
  the basic form */\n+  return decoded;\n+}\n+\n+int encode_fgs_service_accept(fgs_service_accept_msg
  *fgs_service_accept, uint8_t *buffer, uint32_t len)\n+{\n+  int encoded = 0;\n+  int
  encode_result = 0;\n+\n+  /* Checking IEI and pointer */\n+  CHECK_PDU_POINTER_AND_LENGTH_ENCODER(buffer,
  FGS_SERVICE_ACCEPT_MINIMUM_LENGTH, len);\n+\n+  /* Encoding mandatory fields */\n+  if
  ((encode_result = encode_extended_protocol_discriminator(&fgs_service_accept->protocoldiscriminator,
  0,\n+      buffer + encoded, len - encoded)) < 0) {\n+    return encode_result;\n+  }\n+  encoded
  += encode_result;\n+\n+  if ((encode_result = encode_security_header_type(&fgs_service_accept->securityheadertype,
  0,\n+      buffer + encoded, len - encoded)) < 0) {\n+    return encode_result;\n+  }\n+  encoded
  += encode_result;\n+\n+  if ((encode_result = encode_spare_half_octet(&fgs_service_accept->sparehalfoctet,
  0,\n+      buffer + encoded, len - encoded)) < 0) {\n+    return encode_result;\n+  }\n+  encoded
  += encode_result;\n+\n+  if ((encode_result = encode_message_type(&fgs_service_accept->messagetype,
  0,\n+      buffer + encoded, len - encoded)) < 0) {\n+    return encode_result;\n+  }\n+  encoded
  += encode_result;\n+\n+  return encoded;\n+}\n\\ No newline at end of file\ndiff
