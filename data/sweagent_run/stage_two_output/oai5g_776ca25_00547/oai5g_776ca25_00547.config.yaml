  <stdio.h>\n+#include <stdlib.h>\n+#include <stdint.h>\n+\n+#include \"ExtendedProtocolDiscriminator.h\"\n+#include
  \"SecurityHeaderType.h\"\n+#include \"SpareHalfOctet.h\"\n+#include \"MessageType.h\"\n+\n+/*
  Minimum length macro. Formed by minimum length of each mandatory field */\n+#define
  FGS_SERVICE_ACCEPT_MINIMUM_LENGTH ( \\\n+    sizeof(ExtendedProtocolDiscriminator)
  + \\\n+    sizeof(SecurityHeaderType) + \\\n+    sizeof(SpareHalfOctet) + \\\n+    sizeof(MessageType))\n+\n+/*
  Maximum length macro. Formed by maximum length of each field */\n+#define FGS_SERVICE_ACCEPT_MAXIMUM_LENGTH
  ( \\\n+    sizeof(ExtendedProtocolDiscriminator) + \\\n+    sizeof(SecurityHeaderType)
  + \\\n+    sizeof(SpareHalfOctet) + \\\n+    sizeof(MessageType))\n+\n+/*\n+ * Message
  name: Service accept\n+ * Description: This message is sent by the network to the
