  Title: Add missing create_ue_eth_if function for SDAP Ethernet interface creation\n\n###
  Summary\nThe SDAP layer was missing the `create_ue_eth_if` function that users expected
  to exist for creating UE Ethernet interfaces. When calling this function, the behavior
  was undefined since it didn''t exist.\n\nThis fix implements the missing `create_ue_eth_if`
  function that properly creates TUN interfaces for UE Ethernet connectivity. The
  function validates inputs, checks for existing SDAP entities, and creates TUN interfaces
  with proper error handling.\n\n### Changes\n- `openair2/SDAP/nr_sdap/nr_sdap.h`:
  Added function declaration for `create_ue_eth_if`\n- `openair2/SDAP/nr_sdap/nr_sdap.c`:
  Implemented the `create_ue_eth_if` function with proper TUN interface creation\n\n###
  Reproduction\nBefore this fix, attempting to call `create_ue_eth_if()` would result
  in a linker error or undefined behavior since the function didn''t exist. After
  this fix, the function properly creates TUN interfaces and returns 0 on success
  or -1 on failure.\n\nUsers can now call:\n```c\nint result = create_ue_eth_if(ue_id,
  pdusession_id, \"oaitun_ue1\");\n```\n\nThe function will create a TUN interface
  named \"oaitun_ue1\" associated with the specified UE and PDU session, returning
  0 on success or -1 if the SDAP entity doesn''t exist or interface creation fails.\n","extra_fields":{"bug_description":"incorrect
