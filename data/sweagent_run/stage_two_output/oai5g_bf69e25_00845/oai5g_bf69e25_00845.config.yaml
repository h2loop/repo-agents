  --git a/openair2/SDAP/nr_sdap/nr_sdap.c b/openair2/SDAP/nr_sdap/nr_sdap.c\nindex
  783ca5a914..141ab2d215 100644\n--- a/openair2/SDAP/nr_sdap/nr_sdap.c\n+++ b/openair2/SDAP/nr_sdap/nr_sdap.c\n@@
  -20,6 +20,15 @@\n  */\n \n #include \"nr_sdap.h\"\n+#include <inttypes.h>\n+#include
  <string.h>\n+#include <errno.h>\n+#include <sys/ioctl.h>\n+#include <sys/socket.h>\n+#include
  <linux/if.h>\n+#include <linux/if_tun.h>\n+#include <fcntl.h>\n+#include <unistd.h>\n
  \n uint8_t nas_qfi;\n uint8_t nas_pduid;\n@@ -92,3 +101,79 @@ void set_qfi_pduid(uint8_t
  qfi, uint8_t pduid){\n   nas_pduid = pduid;\n   return;\n }\n+\n+int create_ue_eth_if(ue_id_t
  ue_id, int pdusession_id, const char *interface_name) {\n+  // Validate inputs\n+  if
  (interface_name == NULL) {\n+    LOG_E(SDAP, \"Invalid interface name provided\\n\");\n+    return
  -1;\n+  }\n+\n+  // Check if SDAP entity already exists for this UE and PDU session\n+  nr_sdap_entity_t
  *sdap_entity = nr_sdap_get_entity(ue_id, pdusession_id);\n+  if (sdap_entity ==
  NULL) {\n+    LOG_E(SDAP, \"SDAP entity not found for UE ID: 0x%\"PRIx64\" and PDU
  session ID: %d\\n\", ue_id, pdusession_id);\n+    return -1;\n+  }\n+\n+  LOG_I(SDAP,
  \"Creating UE Ethernet interface ''%s'' for UE ID: 0x%\"PRIx64\", PDU session: %d\\n\",
  \n+         interface_name, ue_id, pdusession_id);\n+\n+  // Create TUN interface\n+  struct
  ifreq ifr;\n+  int fd, err;\n+  char if_name[IFNAMSIZ];\n+\n+  // Open TUN device\n+  if
  ((fd = open(\"/dev/net/tun\", O_RDWR)) < 0) {\n+    LOG_E(SDAP, \"Failed to open
  /dev/net/tun: %s\\n\", strerror(errno));\n+    return -1;\n+  }\n+\n+  // Configure
  interface request\n+  memset(&ifr, 0, sizeof(ifr));\n+  ifr.ifr_flags = IFF_TUN
  | IFF_NO_PI;  // TUN device without packet info\n+  \n+  // Set interface name\n+  if
  (strlen(interface_name) >= IFNAMSIZ) {\n+    LOG_E(SDAP, \"Interface name too long:
  %s\\n\", interface_name);\n+    close(fd);\n+    return -1;\n+  }\n+  strncpy(ifr.ifr_name,
  interface_name, IFNAMSIZ - 1);\n+\n+  // Create the interface\n+  if ((err = ioctl(fd,
  TUNSETIFF, (void *)&ifr)) < 0) {\n+    LOG_E(SDAP, \"Failed to create TUN interface
  %s: %s\\n\", interface_name, strerror(errno));\n+    close(fd);\n+    return -1;\n+  }\n+\n+  //
  Get the actual interface name (in case it was modified)\n+  strncpy(if_name, ifr.ifr_name,
  IFNAMSIZ - 1);\n+  if_name[IFNAMSIZ - 1] = ''\\0'';\n+\n+  LOG_I(SDAP, \"Successfully
  created TUN interface %s with fd %d\\n\", if_name, fd);\n+\n+  // Set the interface
  to non-blocking mode\n+  int flags = fcntl(fd, F_GETFL, 0);\n+  if (flags == -1
  || fcntl(fd, F_SETFL, flags | O_NONBLOCK) == -1) {\n+    LOG_E(SDAP, \"Failed to
  set non-blocking mode for interface %s: %s\\n\", if_name, strerror(errno));\n+    close(fd);\n+    return
  -1;\n+  }\n+\n+  // TODO: In a complete implementation, we would:\n+  // 1. Store
  the file descriptor in the SDAP entity for data transfer\n+  // 2. Set up appropriate
  IP configuration for the interface\n+  // 3. Configure routing if needed\n+  //
  4. Start a thread to handle data from this interface\n+\n+  LOG_I(SDAP, \"UE Ethernet
  interface ''%s'' created successfully\\n\", if_name);\n+  \n+  // For now, we''ll
  just close the fd since we''re not storing it\n+  // In a real implementation, this
  fd would be stored and used for data transfer\n+  close(fd);\n+  \n+  return 0;\n+}\ndiff
  --git a/openair2/SDAP/nr_sdap/nr_sdap.h b/openair2/SDAP/nr_sdap/nr_sdap.h\nindex
