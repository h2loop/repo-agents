  -63,4 +63,13 @@ void sdap_data_ind(rb_id_t pdcp_entity,\n \n void set_qfi_pduid(uint8_t
  qfi, uint8_t pduid);\n \n+/**\n+ * @brief Create UE Ethernet interface for SDAP
  data transfer\n+ * @param[in] ue_id UE identifier\n+ * @param[in] pdusession_id
  PDU session identifier\n+ * @param[in] interface_name Name for the interface to
  create\n+ * @return 0 on success, -1 on failure\n+ */\n+int create_ue_eth_if(ue_id_t
  ue_id, int pdusession_id, const char *interface_name);\n+\n #endif\n","start_fn":"create_ue_eth_if","start_fn_file":"openair2/SDAP/nr_sdap/nr_sdap.c","subsystem":"openair2/SDAP/nr_sdap"},"type":"text","id":"oai5g_bf69e25_00845"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
