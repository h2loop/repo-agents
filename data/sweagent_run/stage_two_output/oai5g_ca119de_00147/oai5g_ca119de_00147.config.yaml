  Title: Fix MME descriptor counter management in S1AP cleanup\n\n### Summary\nThe
  `s1ap_eNB_remove_mme_desc` function in the eNB S1AP module was not properly updating
  instance counters after removing all MME descriptors. This caused inconsistencies
  in the eNB''s internal state tracking, leading to incorrect behavior during subsequent
  S1 setup attempts and potential resource leaks.\n\nWhen all MME connections were
  removed via `s1ap_eNB_remove_mme_desc`, the `s1ap_mme_nb`, `s1ap_mme_pending_nb`,
  and `s1ap_mme_associated_nb` counters were left at their previous values instead
  of being reset to zero. This mismatch caused the eNB application to incorrectly
  believe there were still active MME connections when none existed.\n\nThe fix ensures
  that after all MME descriptors are removed, the associated counters are properly
  reset to reflect the clean state. Similar counter management was also missing in
  the NGAP AMF cleanup function and has been addressed for consistency.\n\n### Changes\n-
  `openair3/S1AP/s1ap_eNB_management_procedures.c`: Added counter reset logic in `s1ap_eNB_remove_mme_desc`
  to set all MME counters to 0 after descriptor removal\n- `openair3/NGAP/ngap_gNB_management_procedures.c`:
  Added counter reset logic in `ngap_gNB_remove_amf_desc` for consistency\n\n","extra_fields":{"bug_description":"missing
