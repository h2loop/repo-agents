  Title: Fix unchecked return value in lte_segmentation calls\n\n### Summary\nThe
  `lte_segmentation()` function can return -1 on error conditions but two call sites
  weren''t checking the return value, potentially leading to downstream issues with
  invalid segmentation parameters.\n\n### Changes\n- `openair1/PHY/LTE_TRANSPORT/ulsch_decoding.c`:
  Added error checking for lte_segmentation call when computing segmentation parameters\n-
  `openair1/PHY/LTE_UE_TRANSPORT/dlsch_decoding.c`: Added error checking for lte_segmentation
  call when computing segmentation parameters\n\n### Reproduction\nUnder certain conditions
  with large transport blocks that exceed MAX_NUM_DLSCH_SEGMENTS or invalid codeword
  sizes, the lte_segmentation function will return -1 but the error wasn''t being
  handled. This could lead to:\n- Invalid segmentation parameters (C, Cplus, Cminus,
  Kplus, Kminus, F) being used in subsequent processing\n- Potential buffer overflows
  or memory corruption when using these invalid parameters\n- Silent failures in the
  decoding process\n\nThe issue manifests as incorrect CRC calculations or memory
  access violations during ULSCH/DLSCH decoding when processing large transport blocks.\n","extra_fields":{"bug_description":"unchecked
