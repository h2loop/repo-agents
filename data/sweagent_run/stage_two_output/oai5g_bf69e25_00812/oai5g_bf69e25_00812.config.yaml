  functions, proper handling of `dummy_telnetsrv_params` memory management, and resetting
  the `websrvparams` structure to avoid stale pointers.\n- `common/utils/websrv/websrv.h`:
  Added function declaration for `websrv_end()` to make it part of the public API.\n\n###
  Reproduction Steps\n1. Start the web server using `websrv_autoinit()`\n2. Call `websrv_end()`
  with a NULL pointer or after the web server has already been stopped\n3. Observe
  potential crash due to NULL pointer dereference or memory leak due to improper cleanup\n\n###
  Symptoms\n- Segmentation fault when calling `websrv_end()` with NULL parameter\n-
  Memory leaks when `dummy_telnetsrv_params` is not properly freed\n- Stale pointer
  issues when restarting the web server after calling `websrv_end()`\n\n","extra_fields":{"bug_description":"NGAP
