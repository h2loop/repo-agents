  Title: Fix websrv_end() function to prevent crashes and memory leaks\n\n### Summary\nThe
  `websrv_end()` function in the web server implementation had several issues that
  could lead to crashes and memory leaks. This PR addresses these issues by adding
  proper NULL checks and cleanup procedures.\n\n### Changes\n- `common/utils/websrv/websrv.c`:
