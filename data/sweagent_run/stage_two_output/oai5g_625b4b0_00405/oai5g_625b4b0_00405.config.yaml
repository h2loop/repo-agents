  Title: Fix missing TLV tag initialization in measurement request packing\n\n###
  Summary\nThe `pack_measurement_request` function was not properly initializing TLV
  tags before attempting to pack measurement parameters. This caused the underlying
  `pack_tlv` calls to skip packing any measurement data because the tag comparison
  `tl->tag == tag` would fail when `tl->tag` was uninitialized (typically zero).\n\nThe
  issue manifested as missing measurement configuration in PNF parameter exchanges,
  causing incorrect RF power reporting. Under certain conditions with multiple measurement
  requests, this could lead to inconsistent power control behavior.\n\nThe root cause
  was that `pack_tlv` only packs data when the TLV''s tag matches the expected tag,
  but the measurement request function was not setting these tags before calling `pack_tlv`.\n\n###
  Changes\n- `nfapi/open-nFAPI/common/src/nfapi.c`: Added explicit TLV tag initialization
  in `pack_measurement_request` for all three measurement parameters (DL RS TX power,
  received interference power, and thermal noise power) before calling `pack_tlv`.\n\n","extra_fields":{"bug_description":"redundant
  computation performing the same calculation multiple times unnecessarily","bug_id":"c_redundant_computation","stage_one_patch":"diff
  --git a/nfapi/open-nFAPI/common/src/nfapi.c b/nfapi/open-nFAPI/common/src/nfapi.c\nindex
  f997552c1e..d9782903ad 100644\n--- a/nfapi/open-nFAPI/common/src/nfapi.c\n+++ b/nfapi/open-nFAPI/common/src/nfapi.c\n@@
  -1635,6 +1635,12 @@ uint8_t unpack_stop_response(uint8_t **ppReadPackedMsg, uint8_t
  *end, void *msg,\n uint8_t pack_measurement_request(void *msg, uint8_t **ppWritePackedMsg,
  uint8_t *end, nfapi_p4_p5_codec_config_t *config)\n {\n   nfapi_measurement_request_t
  *pNfapiMsg = (nfapi_measurement_request_t *)msg;\n+  \n+  // Set the tags for each
  TLV before packing\n+  pNfapiMsg->dl_rs_tx_power.tl.tag = NFAPI_MEASUREMENT_REQUEST_DL_RS_XTX_POWER_TAG;\n+  pNfapiMsg->received_interference_power.tl.tag
  = NFAPI_MEASUREMENT_REQUEST_RECEIVED_INTERFERENCE_POWER_TAG;\n+  pNfapiMsg->thermal_noise_power.tl.tag
  = NFAPI_MEASUREMENT_REQUEST_THERMAL_NOISE_POWER_TAG;\n+  \n   return pack_tlv(NFAPI_MEASUREMENT_REQUEST_DL_RS_XTX_POWER_TAG,\n                   &(pNfapiMsg->dl_rs_tx_power),\n                   ppWritePackedMsg,\n","start_fn":"pack_measurement_request","start_fn_file":"nfapi/open-nFAPI/common/src/nfapi.c","subsystem":"nfapi/open-nFAPI/common"},"type":"text","id":"oai5g_625b4b0_00405"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
