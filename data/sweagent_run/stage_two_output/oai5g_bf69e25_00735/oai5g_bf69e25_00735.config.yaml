  int comparator(const void *p, const void *q) {\n   return ((UEsched_t*)p)->coef
  < ((UEsched_t*)q)->coef;\n }\n \n+/* Check if UE needs to transmit any MAC CEs */\n+static
  bool needs_ce_transmission(NR_UE_sched_ctrl_t *sched_ctrl, frame_t frame) {\n+  return
  (frame == (sched_ctrl->ta_frame + 100) % 1024) ||\n+         sched_ctrl->UE_mac_ce_ctrl.pdcch_state_ind.is_scheduled
  ||\n+         sched_ctrl->UE_mac_ce_ctrl.SP_CSI_reporting_pucch.is_scheduled ||\n+         sched_ctrl->UE_mac_ce_ctrl.pdsch_TCI_States_ActDeact.is_scheduled
  ||\n+         sched_ctrl->UE_mac_ce_ctrl.aperi_CSI_trigger.is_scheduled ||\n+         sched_ctrl->UE_mac_ce_ctrl.sp_zp_csi_rs.is_scheduled
  ||\n+         sched_ctrl->UE_mac_ce_ctrl.csi_im.is_scheduled;\n+}\n+\n static void
  pf_dl(module_id_t module_id,\n                   frame_t frame,\n                   sub_frame_t
  slot,\n@@ -659,8 +670,8 @@ static void pf_dl(module_id_t module_id,\n         continue;\n       }\n
  \n-      /* Check DL buffer and skip this UE if no bytes and no TA necessary */\n-      if
  (sched_ctrl->num_total_bytes == 0 && frame != (sched_ctrl->ta_frame + 100) % 1024)\n+      /*
  Check DL buffer and skip this UE if no bytes and no MAC CEs necessary */\n+      if
  (sched_ctrl->num_total_bytes == 0 && !needs_ce_transmission(sched_ctrl, frame))\n         continue;\n
  \n       /* Calculate coeff */\n@@ -807,13 +818,21 @@ static void pf_dl(module_id_t
  module_id,\n     // PDUs, we replace with 3 * numPDUs\n     const int oh = 3 * 4
  + 2 * (frame == (sched_ctrl->ta_frame + 100) % 1024);\n     //const int oh = 3 *
  sched_ctrl->dl_pdus_total + 2 * (frame == (sched_ctrl->ta_frame + 100) % 1024);\n+    \n+    //
  Ensure minimum data size when MAC CEs need to be transmitted\n+    uint32_t data_with_oh
  = sched_ctrl->num_total_bytes + oh;\n+    if (data_with_oh == 0 && needs_ce_transmission(sched_ctrl,
  frame)) {\n+      // At least allocate space for MAC CEs (32 bytes should be sufficient
  for most CEs)\n+      data_with_oh = 32;\n+    }\n+    \n     nr_find_nb_rb(sched_pdsch->Qm,\n                   sched_pdsch->R,\n                   1,
  // no transform precoding for DL\n                   sched_pdsch->nrOfLayers,\n                   tda_info->nrOfSymbols,\n                   sched_pdsch->dmrs_parms.N_PRB_DMRS
  * sched_pdsch->dmrs_parms.N_DMRS_SLOT,\n-                  sched_ctrl->num_total_bytes
