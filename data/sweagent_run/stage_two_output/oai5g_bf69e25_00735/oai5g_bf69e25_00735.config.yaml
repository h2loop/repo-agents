  Title: Fix MAC CEs scheduling for UEs with no data to transmit\n\n### Summary\nThe
  gNB scheduler was not properly handling UEs that needed to transmit MAC Control
  Elements (CEs) but had no RLC data to send. This caused UEs requiring Timing Advance
  commands or other MAC CEs to be skipped during scheduling, leading to stalled connections
  and incorrect UE behavior.\n\nThe issue occurred because:\n1. The scheduler only
  considered UEs with `rbSize > 0` for scheduling\n2. The preprocessor didn''t allocate
  resources for UEs that only needed to transmit MAC CEs\n3. When `rbSize = 0`, the
  TBS calculation might result in 0, causing assertion failures\n\n### Changes\n-
  `openair2/LAYER2/NR_MAC_gNB/gNB_scheduler_dlsch.c`: Added helper function `needs_ce_transmission()`
  to check if UE requires any MAC CEs\n- `openair2/LAYER2/NR_MAC_gNB/gNB_scheduler_dlsch.c`:
  Modified `pf_dl` function to consider UEs for scheduling if they need MAC CEs even
  with no data\n- `openair2/LAYER2/NR_MAC_gNB/gNB_scheduler_dlsch.c`: Updated preprocessor
  to ensure minimum TBS when MAC CEs are needed\n- `openair2/LAYER2/NR_MAC_gNB/gNB_scheduler_dlsch.c`:
  Modified `nr_schedule_ue_spec` to allow scheduling of UEs needing MAC CEs even when
  `rbSize <= 0`\n\n","extra_fields":{"bug_description":"NGAP interface handling error
