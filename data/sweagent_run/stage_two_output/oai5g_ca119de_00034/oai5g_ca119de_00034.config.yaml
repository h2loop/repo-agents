  Title: Fix incorrect RE count assertion in MPDCCH initialization functions\n\n###
  Summary\nThe MPDCCH initialization functions in the LTE PHY transport layer contained
  incorrect assertions that were checking for wrong resource element (RE) counts.
  This caused initialization failures when the actual RE counts matched the array
  sizes and comments but not the incorrect assertion values.\n\nThe main issue was
  in `init_mpdcch5ss2tab_normal_regular_subframe_evenNRBDL()` which was asserting
  for 684 REs instead of the correct 792 REs as defined by the array size and comments.
  Similar inconsistencies were found in related functions.\n\nUnder certain network
  configurations, this would cause the eNB to fail during MPDCCH setup with fatal
  assertion errors, preventing proper M/EPDCCH transmission.\n\n### Changes\n- `openair1/PHY/LTE_TRANSPORT/edci.c`:
  \n  - Fixed assertion in `init_mpdcch5ss2tab_normal_regular_subframe_evenNRBDL()`
  from 684 to 792 REs\n  - Corrected coded_bits calculation in `generate_mdci_top()`
  from 684*2 to 792*2 for start_symbol == 2\n  - Fixed similar inconsistencies in
  `init_mpdcch5ss3tab_normal_regular_subframe_evenNRBDL()` and `init_mpdcch3ss1tab_normal_regular_subframe_evenNRBDL()`
  functions\n  - Corrected logging message typos and formatting issues\n","extra_fields":{"bug_description":"incorrect
