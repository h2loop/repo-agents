  Title: Fix protocol timer duration in OpenAirInterface 5G\n\n### Summary\nThe protocol
  timer duration in OpenAirInterface 5G was configured with incorrect duration violating
  3GPP timing requirements. This was caused by an incorrect time comparison in the
  `get_sf_time` and `get_slot_time` functions where the code was comparing the full
  time value with just the microsecond portion.\n\nThis fix corrects the time comparison
  logic to properly handle microsecond wraparound scenarios, ensuring that protocol
  timers operate with correct durations that comply with 3GPP timing requirements.\n\n###
  Changes\n- `nfapi/open-nFAPI/vnf/src/vnf_p7.c`: Fixed time comparison in `get_sf_time`
  and `get_slot_time` functions\n- `nfapi/open-nFAPI/pnf/src/pnf_p7.c`: Fixed time
  comparison in `get_sf_time` and `get_slot_time` functions\n\n### Reproduction\nThe
  issue manifests when running 5G NSA mode with specific timing configurations where
  protocol timers would have incorrect durations, leading to synchronization issues
  between the VNF and PNF components. The incorrect timer durations can be observed
  in the timing information logs where subframe and slot timing calculations are inaccurate.\n","extra_fields":{"bug_description":"protocol
