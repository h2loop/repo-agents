  Title: Fix thread-unsafe access to global variables in PSS timing measurements\n\n###
  Summary\nThe PSS synchronization code in the NR UE stack accessed global timing
  variables (`generic_time` array and `opp_enabled` flag) without proper synchronization.
  When `sl_generate_pss()` was called from multiple threads simultaneously, this caused
  race conditions and unpredictable behavior in timing measurements.\n\nThis fix adds
  proper mutex synchronization around all accesses to these global variables when
  `TEST_SYNCHRO_TIMING_PSS` is enabled.\n\n### Changes\n- `openair1/PHY/NR_UE_TRANSPORT/pss_nr.c`:
  Added pthread mutex to protect global timing variables\n- `openair1/PHY/NR_UE_TRANSPORT/pss_nr.c`:
  Wrapped all accesses to `generic_time` and `opp_enabled` with mutex locks\n- `openair1/PHY/NR_UE_TRANSPORT/pss_nr.c`:
  Added pthread.h include for mutex support\n\n### Reproduction\nWhen running the
  NR UE stack with multiple threads calling `sl_generate_pss()` concurrently and `TEST_SYNCHRO_TIMING_PSS`
  enabled, the application would exhibit inconsistent timing measurements and occasional
  crashes due to race conditions on the global timing variables. The issue was more
  pronounced under high CPU load conditions.\n","extra_fields":{"bug_description":"thread-unsafe
