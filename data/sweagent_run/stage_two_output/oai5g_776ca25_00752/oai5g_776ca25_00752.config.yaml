  Title: Fix inconsistent amplitude parameter and unused measurement flag in gNB TX
  procedures\n\n### Summary\nThe `phy_procedures_gNB_TX` function in the NR gNB had
  two issues:\n1. Inconsistent use of amplitude parameter in PRS generation\n2. Unused
  `do_meas` parameter that should control performance measurements\n\nThis fix ensures
  consistent amplitude usage and properly implements the measurement functionality.\n\n###
  Changes\n- `openair1/SCHED_NR/phy_procedures_nr_gNB.c`: \n  - Line 167: Changed
  `AMP` to `gNB->TX_AMP` in `nr_generate_prs` call\n  - Line 149: Added `if (do_meas)
  start_meas(&gNB->phy_proc_tx);` \n  - Line 242: Added `if (do_meas) stop_meas(&gNB->phy_proc_tx);`\n\n###
  Reproduction\nTo reproduce the original issue:\n1. Run a gNB with PRS configured\n2.
  Monitor PRS signal quality - it will be incorrect due to wrong amplitude\n3. Check
  performance measurements - they will not be recorded even when `do_meas=1` is passed\n\nWith
  the fix, PRS signals are generated with correct amplitude and performance measurements
  work as expected when `do_meas=1`.\n","extra_fields":{"bug_description":"stack buffer
