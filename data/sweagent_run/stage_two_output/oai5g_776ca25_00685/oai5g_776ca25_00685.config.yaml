  Title: Fix unreachable code path in parse_ue_user_data due to incorrect conditional
  logic\n\n### Summary\nThe `parse_ue_user_data` function in the NAS configuration
  parser contained an unreachable code path caused by an unnecessary variable initialization.
  Additionally, downstream usage of this function employed non-idiomatic conditional
  checks that could lead to confusion and potential logic errors.\n\nSpecifically,
  the integer variable `rc` was initialized to `true` but immediately overwritten
  by the return value of `config_setting_lookup_string`. This initialization was never
  used, creating dead code. Furthermore, in the calling function `parse_config_file`,
  the return value was checked using `if (rc != true)` instead of the more conventional
  `if (!rc)`.\n\nThis fix removes the unreachable initialization and updates the conditional
  checks to use idiomatic C boolean evaluation, improving code clarity and maintainability.\n\n###
  Changes\n- `openair3/NAS/TOOLS/conf_user_data.c`: Removed unused initialization
  `int rc = true;` in `parse_ue_user_data`.\n- `openair3/NAS/TOOLS/conf_usim.c`: Removed
  unused initialization `int rc = true;` in `parse_ue_sim_param` for consistency.\n-
  `openair3/NAS/TOOLS/conf_parser.c`: Changed `if (rc != true)` to `if (!rc)` for
  both calls to `parse_ue_user_data` and `parse_ue_sim_param`.\n\n","extra_fields":{"bug_description":"unreachable
