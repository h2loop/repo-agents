  Title: Fix PUSCH scheduling validation in RA procedure\n\n### Summary\nDuring random
  access procedure, the gNB scheduler incorrectly handled PUSCH configuration for
  Msg3 transmission. When the AMF triggered a high load scenario, the scheduler allocated
  invalid MCS indices (>27) for Msg3 PUSCH, causing corruption in the UL grant field
  of the RAR message. This led to UE failing to transmit Msg3 and eventually RACH
  failure.\n\nThe issue was traced to missing validation of PUSCH parameters before
  constructing the UL grant. Under certain timing conditions between CU and DU, the
  MCS index could be left uninitialized, causing the UL grant construction to use
  garbage values.\n\n### Changes\n- `openair2/LAYER2/NR_MAC_gNB/gNB_scheduler_RA.c`:
  Added validation checks in `nr_add_msg3()` to ensure MCS index is within valid range
  (0-27) and RB allocation does not exceed BWP size before calling `nr_fill_rar()`.\n\nReproduction
  steps:\n1. Configure gNB with aggressive RACH parameters (prach-ConfigurationIndex:
  157, zeroCorrelationZoneConfig: 13)\n2. Trigger 50+ concurrent UEs attempting RA
  simultaneously\n3. Monitor for \"Invalid MCS index\" assertion failures or RAR decoding
  errors in UEs\n4. Check gNB logs for segmentation faults during `nr_fill_rar()`
  execution\n\nThe fix prevents invalid PUSCH parameters from propagating to the RAR
  construction, ensuring proper Msg3 scheduling even under high load conditions.\n","extra_fields":{"bug_description":"F1AP
