  Title: Fix NULL pointer dereference in nr_ue_meas_neighboring_cell function\n\n###
  Summary\nThe `nr_ue_meas_neighboring_cell` function in the UE measurement module
  was experiencing undefined behavior when called under certain conditions. The function
  would crash with a segmentation fault when processing neighboring cell measurements
  due to improper NULL pointer handling.\n\nSpecifically, when the function was called
  with a NULL argument or when the UE structure within the arguments was NULL, the
  code would attempt to dereference these NULL pointers before checking their validity,
  leading to immediate crashes.\n\nThe issue was traced to missing NULL checks at
  the beginning of the function and improper handling of the UE structure pointer.
  This fix adds proper NULL pointer validation and ensures that allocated memory is
  only freed when safe to do so.\n\n### Changes\n- `openair1/PHY/NR_UE_ESTIMATION/nr_ue_measurements.c`:
  Added NULL pointer checks for the function argument and the UE structure pointer
  before dereferencing them.\n- `openair1/PHY/NR_UE_ESTIMATION/nr_ue_measurements.c`:
  Added proper error logging when NULL pointers are detected.\n- `openair1/PHY/NR_UE_ESTIMATION/nr_ue_measurements.c`:
  Ensured that memory is only freed after confirming the pointer is valid.\n\n","extra_fields":{"bug_description":"protocol
