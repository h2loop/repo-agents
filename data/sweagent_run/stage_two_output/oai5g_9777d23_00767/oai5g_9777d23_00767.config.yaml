  Title: Fix SCTP initialization in M2AP/M3AP/X2AP modules to properly handle IPv6
  addresses\n\n### Summary\nThe SCTP initialization functions in M2AP, M3AP, and X2AP
  modules were not properly checking the IPv4/IPv6 flags in the `net_ip_address_t`
  structure before accessing the address fields. This could lead to incorrect address
  handling when IPv6 was used or when the IPv4 address field was empty.\n\nThe issue
  was in functions that directly accessed `local_ip_addr->ipv4_address` without first
  checking if IPv4 was enabled or if the field contained a valid address. Similar
  issues existed for IPv6 addresses.\n\nThis fix ensures proper validation of the
  address type flags before accessing the corresponding address fields, and adds support
  for IPv6 addresses in SCTP initialization.\n\n### Changes\n- `openair2/M2AP/m2ap_eNB.c`:
  Fixed `m2ap_eNB_init_sctp` to check IPv4/IPv6 flags\n- `openair2/M2AP/m2ap_MCE.c`:
  Fixed `m2ap_MCE_init_sctp` and `MCE_task_send_sctp_init_req` to check IPv4/IPv6
  flags\n- `openair2/X2AP/x2ap_eNB.c`: Fixed `x2ap_eNB_init_sctp` to check IPv4/IPv6
  flags\n- `openair3/M3AP/m3ap_MME.c`: Fixed `m3ap_MME_init_sctp` and `MME_task_send_sctp_init_req`
  to check IPv4/IPv6 flags\n\n### Reproduction\nTo reproduce this issue:\n1. Configure
  an eNB or MCE with an IPv6 address for M2 interface\n2. Start the M2AP initialization
  process\n3. Observe that the SCTP connection fails to establish because the IPv6
  address is not properly handled\n4. Alternatively, configure with an empty IPv4
  address field and observe similar failure\n\nThe fix ensures that both IPv4 and
  IPv6 addresses are properly handled during SCTP initialization, preventing connection
  failures due to incorrect address processing.\n","extra_fields":{"bug_description":"unreachable
