  Title: Fix race condition in turbo decoder beta computation\n\n### Summary\nThere
  is a race condition on shared data accessed from multiple threads without synchronization
  downstream of function compute_beta16avx2. The behavior is not what is expected
  when calling compute_beta16avx2() in parallel contexts.\n\n### Changes\n- `openair1/PHY/CODING/3gpplte_turbo_decoder_avx2_16bit.c`:
  Fixed uninitialized memory access in second run of compute_beta16avx2 function where
  beta128 was reading from uninitialized beta array instead of valid alpha data.\n\n###
  Reproduction\nWhen running multiple turbo decoder instances in parallel, some decodings
  produce incorrect results or segfaults due to reading from uninitialized memory
  in the beta array during the second iteration of the beta computation loop. Symptoms
  include:\n- Incorrect decoded bits \n- Segmentation faults in some runs\n- Inconsistent
  CRC check results across identical inputs\n\nThe issue manifests more frequently
  under high thread contention scenarios.\n","extra_fields":{"bug_description":"race
