  state checking\n- `openair2/RRC/NR/rrc_gNB_radio_bearers.h`: Added function declaration\n-
  `openair2/RRC/NR/rrc_gNB_radio_bearers.c`: Added missing include for assertions\n\n###
  Reproduction\nPrior to this fix, attempting to call `get_drb()` would result in
  compilation errors or linker errors since the function was referenced but not implemented.
  After this change, users can successfully call `get_drb(ue, drb_id)` to retrieve
  a pointer to the DRB structure, or NULL if the DRB is inactive or invalid.\n\nThe
