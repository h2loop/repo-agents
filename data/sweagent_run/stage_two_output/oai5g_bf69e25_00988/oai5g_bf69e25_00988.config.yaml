  Title: Fix incorrect power control adjustment in UL scheduler\n\n### Summary\nThe
  `nr_ue_max_mcs_min_rb` function in the UL scheduler was not properly respecting
  the target TBS when adjusting MCS and RB allocation for power control. This led
  to situations where the scheduled transmission would not meet the required data
  size.\n\nThe function was ignoring the input `tbs` parameter and recalculating TBS
  based on current MCS/RB allocation, which meant it wasn''t respecting the target
  data transmission requirements.\n\n### Changes\n- `openair2/LAYER2/NR_MAC_gNB/gNB_scheduler_ulsch.c`:
  Modified `nr_ue_max_mcs_min_rb` to properly use the input TBS parameter as target
  for power calculations\n- Simplified RB reduction logic to properly track power
  consumption\n- Maintained original approach of reducing RBs first, then MCS for
  power constraint compliance\n\n### Reproduction\nUnder certain channel conditions
  with tight power constraints, UEs would experience repeated scheduling failures
  as the computed TBS after power adjustment was insufficient to carry the buffered
  data. This manifested as:\n- Stuck RLC queues at the gNB\n- Retransmission timeouts
  at the UE\n- Poor uplink throughput for edge UEs\n\nThe issue was most observable
  with UEs reporting low PHR values in poor coverage areas.\n","extra_fields":{"bug_description":"missing
