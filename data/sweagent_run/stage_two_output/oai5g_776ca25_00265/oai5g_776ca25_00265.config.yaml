  Title: Implement UE Context Modification Refuse Handler\n\n### Summary\nThe UE context
  modification failure handling was incomplete in the OAI5G codebase. There was dead
  code in `CU_handle_UE_CONTEXT_MODIFICATION_FAILURE` that just asserted, and the
  corresponding `ue_context_modification_refuse` function was missing in the MAC layer.
  This caused failures during UE context modification to be silently ignored or crash
  the system.\n\nThe fix implements the missing functionality to properly handle UE
  context modification failures by:\n1. Replacing the assertion in `CU_handle_UE_CONTEXT_MODIFICATION_FAILURE`
  with actual message processing\n2. Adding the missing `ue_context_modification_refuse`
  function in the MAC layer\n3. Connecting all the components with proper function
  pointers and message definitions\n\n### Changes\n- `openair2/COMMON/f1ap_messages_def.h`:
  Added `F1AP_UE_CONTEXT_MODIFICATION_FAIL` message definition\n- `openair2/F1AP/f1ap_cu_ue_context_management.c`:
  Implemented `CU_handle_UE_CONTEXT_MODIFICATION_FAILURE` to process F1AP failure
  messages\n- `openair2/LAYER2/NR_MAC_gNB/mac_rrc_dl_handler.c`: Added `ue_context_modification_refuse`
  function implementation\n- `openair2/LAYER2/NR_MAC_gNB/mac_rrc_dl_handler.h`: Added
  function declaration\n- `openair2/LAYER2/NR_MAC_gNB/mac_rrc_ul.h`: Added `ue_context_modification_refuse_func_t`
  type definition\n- `openair2/LAYER2/NR_MAC_gNB/nr_mac_gNB.h`: Added function pointer
  to UL interface structure\n- `openair2/RRC/NR/mac_rrc_dl.h`: Added `ue_context_modification_refuse_func_t`
  type definition\n- `openair2/RRC/NR/mac_rrc_dl_direct.c`: Initialized function pointer
  in direct init\n- `openair2/RRC/NR/mac_rrc_dl_f1ap.c`: Added F1AP wrapper function
  and initialized function pointer\n- `openair2/RRC/NR/nr_rrc_defs.h`: Added function
  pointer to DL interface structure\n- `openair2/RRC/NR/rrc_gNB.c`: Added handler
  for F1AP modification failure message\n\n","extra_fields":{"bug_description":"dead
