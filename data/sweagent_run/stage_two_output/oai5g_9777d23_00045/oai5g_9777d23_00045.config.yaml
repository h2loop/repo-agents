  (!(push16(req->dummy1, ppWritePackedMsg, end) && push16(req->dummy2, ppWritePackedMsg,
  end)));\n+  nfapi_nr_p4_p5_message_header_t *pHeader = (nfapi_nr_p4_p5_message_header_t
  *)header;\n+  \n+  switch (pHeader->message_id) {\n+    case P5_VENDOR_EXT_REQ:
  {\n+      vendor_ext_p5_req *req = (vendor_ext_p5_req *)(header);\n+      // NFAPI_TRACE(NFAPI_TRACE_INFO,
