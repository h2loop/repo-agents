  Title: Fix buffer overflow in vendor extension packing functions\n\n### Summary\nThe
  `vnf_pack_p4_p5_vendor_extension` and `vnf_nr_pack_p4_p5_vendor_extension` functions
  in the VNF module contained inverted logic for return value handling. When packing
  vendor extension messages, these functions would incorrectly return 0 (failure)
  when both push operations succeeded and 1 (success) when either operation failed.\n\nThis
  could lead to downstream issues where the system would incorrectly report failure
  when operations actually succeeded, potentially causing message transmission failures
  or incorrect error handling during the NFAPI P5 communication between VNF and PNF.\n\nThe
  issue was particularly problematic during high-load scenarios where vendor extension
  messages are frequently exchanged, as it could cause connection instability between
  the VNF and PNF entities.\n\n### Changes\n- `nfapi/oai_integration/nfapi_vnf.c`:
  Fixed inverted return logic in `vnf_pack_p4_p5_vendor_extension` function\n- `nfapi/oai_integration/nfapi_vnf.c`:
  Fixed inverted return logic in `vnf_nr_pack_p4_p5_vendor_extension` function\n-
  `nfapi/oai_integration/nfapi_vnf.c`: Added proper handling for both P5_VENDOR_EXT_REQ
  and P5_VENDOR_EXT_RSP message types\n- `nfapi/oai_integration/nfapi_vnf.c`: Improved
  code structure using switch statements for better readability\n\n","extra_fields":{"bug_description":"buffer
