  \"%s\\n\", __FUNCTION__);\n-  if (((nfapi_p4_p5_message_header_t *)header)->message_id
  == P5_VENDOR_EXT_REQ) {\n-    vendor_ext_p5_req *req = (vendor_ext_p5_req *)(header);\n-    //
  NFAPI_TRACE(NFAPI_TRACE_INFO, \"%s %d %d\\n\", __FUNCTION__, req->dummy1, req->dummy2);\n-    return
  (!(push16(req->dummy1, ppWritePackedMsg, end) && push16(req->dummy2, ppWritePackedMsg,
  end)));\n+  nfapi_p4_p5_message_header_t *pHeader = (nfapi_p4_p5_message_header_t
  *)header;\n+  \n+  switch (pHeader->message_id) {\n+    case P5_VENDOR_EXT_REQ:
  {\n+      vendor_ext_p5_req *req = (vendor_ext_p5_req *)(header);\n+      // NFAPI_TRACE(NFAPI_TRACE_INFO,
  \"%s %d %d\\n\", __FUNCTION__, req->dummy1, req->dummy2);\n+      // Return 1 if
  both push operations succeed, 0 otherwise\n+      return (push16(req->dummy1, ppWritePackedMsg,
