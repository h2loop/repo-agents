  P5_VENDOR_EXT_RSP: {\n+      vendor_ext_p5_rsp *rsp = (vendor_ext_p5_rsp *)(header);\n+      //
  Return 1 if push operation succeeds, 0 otherwise\n+      return push16(rsp->error_code,
  ppWritePackedMsg, end) ? 1 : 0;\n+    }\n   }\n \n   return 0;\n@@ -1198,10 +1208,20
  @@ int vnf_pack_p4_p5_vendor_extension(void *header, uint8_t **ppWritePackedMsg,
  ui\n int vnf_nr_pack_p4_p5_vendor_extension(void *header, uint8_t **ppWritePackedMsg,
