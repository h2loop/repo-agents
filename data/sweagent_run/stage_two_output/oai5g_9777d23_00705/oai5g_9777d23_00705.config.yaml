  couldn''t be properly decoded from RRC configuration.\n\nThis fix updates the function
  signature and implementation to use the correct enum type that''s actually defined
  in the codebase, ensuring proper mapping of maxCodeRate values from RRC PUCCH-Config
  to MAC layer processing.\n\n### Changes\n- `openair2/LAYER2/NR_MAC_COMMON/nr_mac_common.c`:
