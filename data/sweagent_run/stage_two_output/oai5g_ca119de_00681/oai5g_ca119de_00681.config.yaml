  Title: Fix eNB_send_MBMS_SESSION_START_FAILURE missing required IEs\n\n### Summary\nThe
  function `eNB_send_MBMS_SESSION_START_FAILURE` was not properly encoding all required
  Information Elements in the M2AP SessionStartFailure message. This caused issues
  when the function was called during MBMS session establishment failures.\n\n###
  Changes\n- `openair2/M2AP/m2ap_eNB_interface_management.c`: Added missing ENB_MBMS_M2AP_ID
  IE to SessionStartFailure message\n- `openair2/M2AP/m2ap_eNB_interface_management.c`:
  Fixed incorrect error log message\n- `openair2/M2AP/m2ap_eNB_interface_management.c`:
  Improved function structure to match successful response pattern\n\n### Reproduction\nWhen
  calling `eNB_send_MBMS_SESSION_START_FAILURE()` during MBMS session setup, the M2AP
  message encoding would fail or produce incomplete messages due to missing required
  IEs. This resulted in:\n- Incomplete M2AP SessionStartFailure messages being sent\n-
  Incorrect error logging showing \"Failed to encode M2 setup request\" instead of
  proper failure message\n- Potential interoperability issues with MCE nodes expecting
  complete message structures\n\nThe fix ensures that both MCE_MBMS_M2AP_ID and ENB_MBMS_M2AP_ID
  are properly included in the failure message, matching the structure expected by
  MCE implementations.\n","extra_fields":{"bug_description":"dead code that is never
