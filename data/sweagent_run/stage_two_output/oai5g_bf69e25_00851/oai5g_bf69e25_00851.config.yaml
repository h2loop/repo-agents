  Title: Fix uninitialized measurements in LTE UE emulation mode\n\n### Summary\nThe
  `lte_ue_measurements_emul()` function in the LTE UE PHY layer was not properly initializing
  measurement values when running in emulation mode. This caused unpredictable behavior
  when higher layers attempted to access these measurements.\n\nThe function was previously
  just a stub that logged a message but didn''t populate the measurements structure.
  This fix implements proper measurement initialization with reasonable default values
  for emulation mode.\n\n### Changes\n- `openair1/PHY/LTE_ESTIMATION/lte_ue_measurements.c`:
  Replaced stub implementation with proper measurement initialization\n- Fixed parameter
  name mismatch between header and implementation (subframe -> last_slot)\n\n### Reproduction\nWhen
  running LTE UE in emulation mode with channel estimation enabled, the UE would exhibit
  inconsistent behavior due to uninitialized measurement values. Symptoms included:\n-
  Random fluctuations in reported RSRP/RSRQ values\n- Incorrect CQI reporting affecting
  scheduling decisions\n- Potential segfaults when accessing uninitialized measurement
  arrays\n\nThe issue can be reproduced by running the LTE UE simulator with `--emul`
  flag and monitoring the measurement reports through the RRC interface.\n","extra_fields":{"bug_description":"off-by-one
