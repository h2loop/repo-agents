  aarx++) {\n+      // Spatial power\n+      for (int aatx = 0; aatx < 2; aatx++)
  {\n+        ue->measurements.rx_spatial_power[eNB_id][aatx][aarx] = 10000;\n+        ue->measurements.rx_spatial_power_dB[eNB_id][aatx][aarx]
