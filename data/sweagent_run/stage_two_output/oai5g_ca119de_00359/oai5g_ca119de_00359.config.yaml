  b/openair1/PHY/LTE_UE_TRANSPORT/sldch.c\n@@ -52,5 +52,6 @@ void generate_sldch(PHY_VARS_UE
  *ue,SLDCH_t *sldch,int frame_tx,int subframe_tx)\n         sldch->payload_length,\n         sldch_header_len+sizeof(SLDCH_t)-sizeof(uint8_t*)+sldch->payload_length);\n
  \n-  AssertFatal(false, \"multicast_link_write_sock() not implemented\\n\");\n+  //
  TODO: Implement multicast_link_write_sock() functionality\n+  LOG_W(PHY, \"multicast_link_write_sock()
  not implemented for SLDCH\\n\");\n }\ndiff --git a/openair1/PHY/LTE_UE_TRANSPORT/slsch.c
  b/openair1/PHY/LTE_UE_TRANSPORT/slsch.c\nindex 8dda31fbe4..df37faf3ba 100644\n---
