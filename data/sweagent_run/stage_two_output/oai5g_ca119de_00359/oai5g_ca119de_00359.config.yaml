  Title: Fix unreachable code path in SLDCH generation due to incorrect conditional
  logic\n\n### Summary\nThe `generate_sldch` function in the LTE UE transport layer
  contained an `AssertFatal(false, ...)` that always triggered, causing the program
  to crash and making any subsequent code unreachable. This issue affected the sidelink
  transmission chain when SLDCH data was present.\n\nWhen the UE attempted to transmit
  sidelink data, the `phy_procedures_UE_SL_TX` function would call `generate_sldch`,
  which immediately failed with a fatal assertion instead of gracefully handling the
  unimplemented functionality. This caused the entire sidelink transmission chain
  to halt unexpectedly.\n\nThe problem was also present in similar functions (`generate_slss`
  and `generate_slsch`) which had the same pattern of always-fatal assertions instead
  of proper stub implementations.\n\n### Changes\n- `openair1/PHY/LTE_UE_TRANSPORT/sldch.c`:
  Replaced `AssertFatal(false, ...)` with warning log and TODO comment\n- `openair1/PHY/LTE_UE_TRANSPORT/slss.c`:
  Replaced `AssertFatal(1==0, ...)` with warning log and TODO comment  \n- `openair1/PHY/LTE_UE_TRANSPORT/slsch.c`:
  Replaced `AssertFatal(false, ...)` with warning log and TODO comment\n\n","extra_fields":{"bug_description":"unreachable
  code path due to incorrect conditional logic","bug_id":"c_unreachable_code","stage_one_patch":"diff
