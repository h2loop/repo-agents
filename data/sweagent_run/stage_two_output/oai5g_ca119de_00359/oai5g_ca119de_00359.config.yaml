  + sizeof(uint8_t*));\n     memcpy((void*)&pdu.payload[0],\n-\t   (void*)slsch->payload,\n-\t   slsch->payload_length);\n+           (void*)slsch->payload,\n+           slsch->payload_length);\n     \n     LOG_I(PHY,\"SLSCH
  configuration %zd bytes, TBS payload %d bytes => %zd bytes\\n\",\n-\t  sizeof(SLSCH_t)-sizeof(uint8_t*),\n-\t  slsch->payload_length,\n-\t  slsch_header_len+sizeof(SLSCH_t)-sizeof(uint8_t*)+slsch->payload_length);\n+          sizeof(SLSCH_t)-sizeof(uint8_t*),\n+          slsch->payload_length,\n+          slsch_header_len+sizeof(SLSCH_t)-sizeof(uint8_t*)+slsch->payload_length);\n     \n-    AssertFatal(false,
