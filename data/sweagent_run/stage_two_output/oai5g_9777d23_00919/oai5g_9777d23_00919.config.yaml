  Title: Add range validation for cell configuration parameters in F1AP interface\n\n###
  Summary\nThe F1AP interface management code was missing range validation on configuration
  parameters that could lead to out-of-bounds array access downstream of function
  `free_f1ap_cell`. The issue occurred when `num_cells_available`, `num_cells_to_add`,
  `num_cells_to_modify`, or `num_cells_to_delete` exceeded `F1AP_MAX_NB_CELLS` (defined
  as 2), causing buffer overruns when looping through cell arrays.\n\nThe bug was
  triggered when processing F1AP configuration messages with cell counts exceeding
  the maximum supported. This could lead to memory corruption and potential crashes
  during cell configuration processing.\n\n### Changes\n- `openair2/F1AP/lib/f1ap_interface_management.c`:
  Added `DevAssert` checks to validate cell count parameters against `F1AP_MAX_NB_CELLS`
  in all encode, decode, copy, equality, and free functions that loop through cell
  arrays.\n- Fixed off-by-one indexing bug in `free_f1ap_cu_configuration_update`
  where `msg->cells_to_activate[j].num_SI` incorrectly used `j` instead of `i` as
  the loop index.\n","extra_fields":{"bug_description":"missing range validation on
