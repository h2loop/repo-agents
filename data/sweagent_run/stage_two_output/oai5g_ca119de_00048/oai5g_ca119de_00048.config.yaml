  *lockGet_ul_config(NR_UE_MAC_INST_t *mac, frame_\n static nr_lcordered_info_t *get_lc_info_from_lcid(NR_UE_MAC_INST_t
  *mac, NR_LogicalChannelIdentity_t lcid)\n {\n   nr_lcordered_info_t *lc_info = NULL;\n+  \n+  //
  Check for null pointer\n+  if (mac == NULL) {\n+    return NULL;\n+  }\n+  \n+  //
  Check for valid count and array\n+  if (mac->lc_ordered_list.count <= 0 || mac->lc_ordered_list.array
