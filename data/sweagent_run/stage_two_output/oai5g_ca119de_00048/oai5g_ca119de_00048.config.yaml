  Title: Fix null pointer dereference in get_lc_info_from_lcid function\n\n### Summary\nThe
  `get_lc_info_from_lcid` function in the UE MAC scheduler was causing segmentation
  faults when searching for logical channel IDs that don''t exist in the configured
  list. This occurred during BSR triggering procedures when the `regularBSR_trigger_lcid`
  referenced a logical channel that wasn''t properly configured.\n\nThe issue was
  reproduced by configuring a UE with a subset of logical channels and then triggering
  a regular BSR for an LCID that wasn''t in the `lc_ordered_list`. The function would
  attempt to access `mac->lc_ordered_list.array[i]->lcid` without first checking if
  `array[i]` was a valid pointer, leading to a crash before the AssertFatal could
  be reached.\n\nAdditional issues were found when the `lc_ordered_list` itself wasn''t
  initialized (count = 0, array = NULL), causing the loop bounds check to be bypassed
  and resulting in NULL pointer dereferences.\n\n### Changes\n- `openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c`:
  Added comprehensive null pointer checks and bounds validation in `get_lc_info_from_lcid`
  function\n- `openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c`: Added validation for
  mac instance pointer\n- `openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c`: Added validation
  for lc_ordered_list array and count\n- `openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c`:
  Added null pointer check for individual array elements\n\n","extra_fields":{"bug_description":"read
