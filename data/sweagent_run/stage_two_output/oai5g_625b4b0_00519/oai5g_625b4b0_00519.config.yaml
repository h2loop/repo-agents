  Title: Fix buffer overflow handling in XER encoding functions\n\n### Summary\nThe
  `xer__print2s()` and `xer__nr_print2s()` functions in the ASN.1 XER encoding were
  not properly handling buffer overflow conditions. These callback functions always
  returned 0 (success) even when the provided buffer was too small to hold all the
  encoded data. This could lead to truncated output and potential issues with the
  ASN.1 encoder''s error handling.\n\nThis fix modifies both functions to properly
  return -1 when they cannot consume all the provided bytes, signaling to the encoder
  that the buffer is too small.\n\n### Changes\n- `openair2/RRC/LTE/MESSAGES/asn1_msg.c`:
  Modified `xer__print2s()` to return -1 on buffer overflow\n- `openair2/RRC/NR/MESSAGES/asn1_msg.c`:
  Modified `xer__nr_print2s()` to return -1 on buffer overflow\n\n### Reproduction\nUnder
  heavy RRC message printing with XER formatting enabled, some encoded messages would
  appear truncated or cause inconsistent behavior in the ASN.1 encoder. The issue
  was particularly noticeable when printing large RRC structures where the default
  buffer size was insufficient.\n\nWith this fix, when the buffer is too small, the
  encoder properly detects the overflow condition and can handle it appropriately,
  either by allocating a larger buffer or by properly reporting the error condition.\n","extra_fields":{"bug_description":"format
