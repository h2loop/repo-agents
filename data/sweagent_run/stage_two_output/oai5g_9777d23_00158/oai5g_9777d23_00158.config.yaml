  Title: Fix incorrect NTN k-offset calculation in time alignment\n\n### Summary\nThe
  `set_time_alignment()` function in the NR UE MAC was not behaving as expected due
  to incorrect NTN k-offset calculations. The NTN offset was being exponentially scaled
  by the subcarrier spacing value (2^scs), causing incorrect frame and slot calculations
  for time alignment.\n\nThis fix corrects the NTN offset calculation by removing
  the erroneous scaling operation and using the k_offset value directly as a slot
  offset.\n\n### Changes\n- `openair2/LAYER2/NR_MAC_UE/nr_ue_procedures.c`: Modified
  `set_time_alignment()` to directly use `cell_specific_k_offset` instead of calling
  `GET_NTN_UE_K_OFFSET()` \n- `openair2/LAYER2/NR_MAC_UE/mac_defs.h`: Fixed `GET_NTN_UE_K_OFFSET()`
  macro to return k_offset directly without `<< scs` scaling\n- `openair2/LAYER2/NR_MAC_UE/mac_defs.h`:
  Updated `GET_DURATION_RX_TO_TX()` function to also use k_offset directly\n\n###
  Reproduction\nWhen running NTN simulations with non-zero k_offset values, the UE
  would incorrectly calculate transmission timing, leading to missed uplink transmissions
  and RAR windows being scheduled at wrong frames/slots. The issue becomes more pronounced
  with higher SCS values where the incorrect 2^scs scaling results in extremely large
  offset values.\n","extra_fields":{"bug_description":"power control error causing
  incorrect transmit power level","bug_id":"telecom_power_control_error","stage_one_patch":"diff
