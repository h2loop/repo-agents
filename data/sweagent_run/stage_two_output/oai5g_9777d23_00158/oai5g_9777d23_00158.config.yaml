  -581,7 +581,7 @@ typedef struct NR_UE_MAC_INST_s {\n \n   nr_csi_report_t csi_report_template[MAX_CSI_REPORTCONFIG];\n
  \n-  ////\tFAPI-like interface message\n+  ////  FAPI-like interface message\n   fapi_nr_ul_config_request_t
  *ul_config_request;\n   fapi_nr_dl_config_request_t *dl_config_request;\n \n@@ -643,12
  +643,12 @@ typedef struct NR_UE_MAC_INST_s {\n \n static inline int GET_NTN_UE_K_OFFSET(const
  fapi_nr_ntn_config_t *ntn_ta, int scs)\n {\n-  return (int)ntn_ta->cell_specific_k_offset
  << scs;\n+  return (int)ntn_ta->cell_specific_k_offset;\n }\n \n static inline long
  GET_DURATION_RX_TO_TX(const fapi_nr_ntn_config_t *ntn_ta, int scs)\n {\n-  return
  NR_UE_CAPABILITY_SLOT_RX_TO_TX + (ntn_ta->cell_specific_k_offset << scs);\n+  return
  NR_UE_CAPABILITY_SLOT_RX_TO_TX + ntn_ta->cell_specific_k_offset;\n }\n \n /*@}*/\ndiff
