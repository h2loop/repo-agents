  Title: Fix incorrect SR periodicity selection in TDD configurations\n\n### Summary\nThe
  `set_SR_periodandoffset()` function in nr_rrc_config.c was not correctly mapping
  subcarrier spacing enum values to the appropriate slots per frame array indices.
  This caused incorrect SR periodicity selection, particularly in TDD configurations
  where the first UL slot calculation was not properly bounded by the selected periodicity.\n\nThis
  fix implements proper mapping from subcarrier spacing enum values to slotsperframe
  array indices and ensures the SR offset is always less than the periodicity.\n\n###
  Changes\n- `openair2/RRC/NR/nr_rrc_config.c`: \n  - Replaced flawed conditional
  logic with proper enum-to-index mapping\n  - Added bounds checking for subcarrier
  spacing values\n  - Ensured SR offset is properly bounded using modulo operation\n  -
  Improved function clarity with better comments\n\n### Reproduction\nTo reproduce
  the issue:\n1. Configure a gNB with TDD UL/DL pattern\n2. Set subcarrier spacing
  to 30 kHz or higher\n3. Observe that SR periodicity is incorrectly set to sl10 instead
  of appropriate value\n4. UE may miss SR opportunities or experience collisions due
  to incorrect timing\n\nThe fix ensures proper SR periodicity selection based on
  actual subcarrier spacing and TDD configuration parameters.\n","extra_fields":{"bug_description":"unreachable
