  Title: Fix incorrect security header type in NR NAS deregistration request\n\n###
  Summary\nThe `generateDeregistrationRequest` function in NR UE NAS was using an
  inappropriate security header type for the inner message, causing unexpected behavior
  when sending NAS detach requests. This fix corrects the security header type to
  follow 3GPP specifications.\n\n### Changes\n- `openair3/NAS/NR_UE/nr_nas_msg_sim.c`:
  Changed the inner message security header type from `INTEGRITY_PROTECTED_AND_CIPHERED_WITH_NEW_SECU_CTX`
  to `PLAIN_5GS_MSG` in the `generateDeregistrationRequest` function (line 746).\n\n###
  How to Reproduce\nWhen calling `send_nas_detach_req()` function, the UE would exhibit
  unexpected behavior during deregistration procedures. The network might reject the
  deregistration request or handle it incorrectly due to the inappropriate security
  header type that was only meant for SECURITY MODE COMPLETE messages according to
  3GPP TS 24.501.\n\nThe fix ensures that the deregistration request follows the same
  pattern as other NAS messages in the codebase, using `PLAIN_5GS_MSG` for the inner
  message while maintaining proper integrity protection through the outer message
  security header.\n","extra_fields":{"bug_description":"string buffer overrun from
