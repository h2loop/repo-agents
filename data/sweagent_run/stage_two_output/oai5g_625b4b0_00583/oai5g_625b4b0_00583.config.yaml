  Title: Fix incomplete SIB2 configuration in phy_config_update_sib2_request\n\n###
  Summary\nThe `phy_config_update_sib2_request` function in `openair1/PHY/INIT/lte_init.c`
  was only partially implemented, configuring only MBSFN parameters but missing all
  other SIB2-related PHY configuration. This caused unexpected behavior when SIB2
  updates were processed, as critical uplink and downlink parameters were not being
  updated.\n\nThe function now properly configures all SIB2-related parameters including
  PUCCH, PDSCH, PUSCH configurations, SRS parameters, and FeMBMS settings, matching
  the complete SIB2 configuration done during initial PHY setup.\n\n### Changes\n-
  `openair1/PHY/INIT/lte_init.c`: Enhanced `phy_config_update_sib2_request` to configure
  all SIB2-related parameters\n","extra_fields":{"bug_description":"unchecked return
