  Title: Fix use-after-free in NR P7 vendor extension handling\n\n### Summary\nThe
  NR P7 vendor extension functions were incorrectly casting NR message headers to
  LTE-based vendor extension structures. This caused field misalignment since NR headers
  have a 4-byte message_length field while LTE headers have a 2-byte message_length
  field. When processing vendor extension messages, this misalignment led to accessing
  freed memory or corrupting adjacent memory regions.\n\nThe issue manifests as intermittent
  segfaults when handling P7_VENDOR_EXT_REQ messages in NR mode.\n\n### Changes\n-
  `nfapi/oai_integration/vendor_ext.h`: Added NR-specific vendor extension structures
  (`vendor_ext_nr_p7_req`, `vendor_ext_nr_p7_ind`) \n- `nfapi/oai_integration/nfapi_pnf.c`:
  Updated `pnf_nr_phy_unpack_p7_vendor_extension` to use NR structures\n- `nfapi/oai_integration/nfapi_pnf.c`:
  Updated `pnf_nr_phy_pack_p7_vendor_extension` to use NR structures  \n- `nfapi/oai_integration/nfapi_pnf.c`:
  Fixed `pnf_nr_phy_allocate_p7_vendor_ext` to allocate correct NR structure sizes\n-
  `nfapi/oai_integration/nfapi_pnf.c`: Added P7_VENDOR_EXT_IND support to allocation
  functions\n- `nfapi/oai_integration/nfapi_pnf.c`: Updated comment references to
  use NR structures\n\n### Reproduction\nTo reproduce the issue:\n1. Configure OAI5G
  in NR mode with vendor extensions enabled\n2. Send P7_VENDOR_EXT_REQ messages with
  non-zero dummy1/dummy2 values\n3. Observe intermittent segfaults or memory corruption
  in the unpacking function\n\nThe fix ensures proper structure alignment by using
  NR-specific vendor extension structures that match the NR header layout.\n","extra_fields":{"bug_description":"use-after-free
