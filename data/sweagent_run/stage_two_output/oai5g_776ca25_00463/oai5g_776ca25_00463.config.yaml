  = rdata->function(soft_bits + 96,\n                                             NULL,\n@@
  -304,6 +304,7 @@ static int ulsch_decoding_data(PHY_VARS_eNB *eNB, L1_rxtx_proc_t
  *proc, int UE_i\n   int G = ulsch_harq->G;\n   unsigned int E;\n   int ret=0;\n+  int
