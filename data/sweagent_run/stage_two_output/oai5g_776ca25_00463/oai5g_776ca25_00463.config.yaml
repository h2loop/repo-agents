  Title: Fix ULSCH decoding data completion before return\n\n### Summary\nThe `ulsch_decoding_data()`
  function in the LTE ULSCH decoder was returning immediately after submitting decoding
  tasks to the thread pool, without waiting for the actual decoding to complete. This
  caused unexpected behavior for callers who expected the function to complete the
  decoding before returning control.\n\nThe issue was particularly evident when directly
  calling `ulsch_decoding_data()` where the function would return before any of the
  turbo decoding segments were processed, leading to incomplete or corrupted data
  in the HARQ buffers.\n\nThe fix modifies the `ulsch_decoding_data()` function to
  wait for all submitted decoding tasks to complete before returning, ensuring that
  the decoded data is available when the function returns.\n\n### Changes\n- `openair1/PHY/LTE_TRANSPORT/ulsch_decoding.c`:
  Modified `ulsch_decoding_data()` to wait for completion of all decoding tasks before
  returning\n  - Added local counter to track submitted tasks\n  - Added waiting loop
  that pulls responses from thread pool until all tasks complete\n  - Properly manages
  the global `proc->nbDecode` counter\n  - Ensures unique task identification by using
  segment index in task keys\n\n","extra_fields":{"bug_description":"missing error
