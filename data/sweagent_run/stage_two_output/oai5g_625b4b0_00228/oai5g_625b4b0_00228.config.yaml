  Title: Fix NRACH indication packing to include instance length fields\n\n### Summary\nThe
  `pack_nrach_indication` function in the NFAPI P7 interface was not correctly packing
  the NRACH indication PDUs because it was missing the required 2-byte instance length
  field before each PDU''s TLVs. This caused unpacking failures when the VNF tried
  to process NRACH indications from the PNF.\n\nThe issue occurred because the unpack
  function expected each PDU to have:\n- 2 bytes for instance length\n- 4 bytes for
  TLV header (tag + length)  \n- 6 bytes for REL13 data content\n\nBut the pack function
  was only writing the TLV without the instance length field.\n\n### Changes\n- `nfapi/open-nFAPI/nfapi/src/nfapi_p7.c`:
  Modified `pack_nrach_indication_body_value` function to:\n  1. Write a placeholder
  for the instance length before packing each PDU''s TLVs\n  2. Pack the TLVs for
  that PDU using the existing `pack_tlv` function\n  3. Calculate the actual instance
  length (total bytes after the instance length field)\n  4. Update the placeholder
  with the calculated instance length\n\nThis ensures that the packed data format
  matches what the unpack function expects, resolving the issue where calling `pack_nrach_indication()`
  was not producing correctly formatted messages that could be successfully unpacked
  by the receiving end.\n","extra_fields":{"bug_description":"incorrect argument order
