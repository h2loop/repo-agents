  Title: Fix resource block allocation in Service Request NAS message generation\n\n###
  Summary\nThe Service Request NAS message generation in the UE incorrectly allocated
  memory for the security protected message, leading to buffer overflows and corrupted
  MAC computation. This issue occurred when the UE had valid security contexts and
  attempted to send an integrity-protected Service Request.\n\nThe root cause was
  that the security header size was added to the total message size AFTER memory allocation,
  rather than before. This resulted in the allocated buffer being too small to accommodate
  the complete security protected message, causing memory corruption during encoding
  and integrity protection.\n\n### Changes\n- `openair3/NAS/NR_UE/nr_nas_msg.c`: Moved
  memory allocation to occur after security header size calculation in `generateServiceRequest()`
  function. Added proper memory allocation in both security protected and plain message
  branches.\n\n","extra_fields":{"bug_description":"incorrect resource block allocation
  violating scheduling constraints","bug_id":"telecom_sched_incorrect_rb_allocation","stage_one_patch":"diff
  --git a/openair3/NAS/NR_UE/nr_nas_msg.c b/openair3/NAS/NR_UE/nr_nas_msg.c\nindex
  8f4f9bd280..b9b5522494 100644\n--- a/openair3/NAS/NR_UE/nr_nas_msg.c\n+++ b/openair3/NAS/NR_UE/nr_nas_msg.c\n@@
  -917,7 +917,6 @@ void generateServiceRequest(as_nas_info_t *initialNasMsg, nr_ue_nas_t
  *nas)\n   size += fill_fgstmsi(&mm_msg->fiveg_s_tmsi, nas->guti);\n \n   /* message
  encoding */\n-  initialNasMsg->nas_data = malloc_or_fail(size * sizeof(*initialNasMsg->nas_data));\n   if
  (security_protected) {\n     fgmm_nas_msg_security_protected_t sp = {0};\n \n@@
  -927,6 +926,8 @@ void generateServiceRequest(as_nas_info_t *initialNasMsg, nr_ue_nas_t
  *nas)\n     sp.header.sequence_number = nas->security.nas_count_ul & 0xff;\n     size
  += sizeof(sp.header);\n \n+    initialNasMsg->nas_data = malloc_or_fail(size * sizeof(*initialNasMsg->nas_data));\n+\n     //
  Payload: plain message\n     sp.plain = plain;\n \n@@ -963,6 +964,7 @@ void generateServiceRequest(as_nas_info_t
  *initialNasMsg, nr_ue_nas_t *nas)\n       initialNasMsg->nas_data[2 + i] = mac[i];\n   }
  else {\n     // plain encoding\n+    initialNasMsg->nas_data = malloc_or_fail(size
  * sizeof(*initialNasMsg->nas_data));\n     initialNasMsg->length = mm_msg_encode(&plain,
  initialNasMsg->nas_data, size);\n     LOG_I(NAS, \"PLAIN_5GS_MSG initial NAS message:
  Service Request with length %d \\n\", initialNasMsg->length);\n   }\n","start_fn":"generateServiceRequest","start_fn_file":"openair3/NAS/NR_UE/nr_nas_msg.c","subsystem":"openair3/NAS/NR_UE"},"type":"text","id":"oai5g_9777d23_00121"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
