  Title: Fix PUCCH format 3 generation for shortened formats and extended CP\n\n###
  Summary\nThe `generate_pucch3x()` function in the LTE UE transport layer had multiple
  issues that caused incorrect PUCCH format 3 signal generation. These issues manifested
  as garbled uplink signals and failed PUCCH transmission when using shortened formats
  or extended cyclic prefix configurations.\n\nThe main problems were:\n1. Incorrect
  payload bit indexing during channel coding\n2. Hardcoded symbol counts that didn''t
  account for CP type or shortened formats\n3. Faulty W sequence selection logic for
  DMRS and data symbols\n4. Improper symbol offset calculations for extended CP\n\n###
  Reproduction\nTo reproduce the issue:\n1. Configure a UE with PUCCH format 3 transmission\n2.
  Set up a scenario with extended cyclic prefix or shortened PUCCH format\n3. Attempt
  PUCCH format 3 transmission\n4. Observe incorrect signal generation and potential
  buffer overruns\n\nThe symptoms include:\n- Incorrect PUCCH signal constellation
  in uplink traces\n- UE failing to receive ACK/NACK responses from eNB\n- Potential
  memory access violations in extreme cases\n\n### Changes\n- `openair1/PHY/LTE_UE_TRANSPORT/pucch_ue.c`:
  \n  - Fixed payload bit indexing in channel coding (line 654)\n  - Corrected symbol
  offset calculations for extended CP (line 769)\n  - Rewrote W sequence selection
  logic for robust DMRS/data symbol handling\n  - Updated DFT processing loop to use
  dynamic symbol counts\n  - Added proper array initialization to prevent undefined
  behavior\n","extra_fields":{"bug_description":"incorrect flags or bitmask passed
