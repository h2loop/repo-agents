  Title: Fix file descriptor leak in ITTI task initialization and cleanup\n\n### Summary\nThere
  is a file descriptor leak where an opened fd is not closed on error paths downstream
  of function timer_setup in common/utils/ocp_itti/intertask_interface.cpp.\n\nThe
  leak occurs in two scenarios:\n1. When epoll_ctl fails during task initialization
  in itti_create_queue, the epoll_fd and sem_fd file descriptors are not closed before
  program termination\n2. When tasks are destroyed, the file descriptors are not properly
  closed, leading to resource leaks over time\n\nThis fix ensures proper cleanup of
  file descriptors in error paths and adds a task destruction function to handle resource
  cleanup.\n\n### Changes\n- `common/utils/ocp_itti/intertask_interface.cpp`: \n  *
  Added proper error handling in itti_create_queue to close file descriptors if epoll_ctl
  fails\n  * Added itti_destroy_task function to properly close file descriptors when
  tasks are destroyed\n  * Added necessary headers for file operations and error handling\n-
  `common/utils/ocp_itti/intertask_interface.h`: \n  * Added declaration for itti_destroy_task
  function\n\n### Reproduction\nTo reproduce the issue:\n1. Initialize multiple ITTI
  tasks in a long-running application\n2. Monitor file descriptor usage with lsof
  or similar tools\n3. Observe that file descriptors accumulate over time and are
  not released when tasks are terminated\n4. In error conditions during task initialization,
  observe that epoll file descriptors remain open even after program termination\n\nThe
  fix can be verified by monitoring file descriptor usage before and after the changes,
  ensuring that file descriptors are properly closed when tasks are destroyed or when
  initialization fails.\n","extra_fields":{"bug_description":"file descriptor leak
  where an opened fd is not closed on error paths","bug_id":"c_fd_leak","stage_one_patch":"diff
  --git a/common/utils/ocp_itti/intertask_interface.cpp b/common/utils/ocp_itti/intertask_interface.cpp\nindex
