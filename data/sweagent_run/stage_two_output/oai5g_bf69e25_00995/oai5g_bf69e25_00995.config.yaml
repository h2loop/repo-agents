  the message before going returning to main thread\n   }\n \n+  void itti_destroy_task(task_id_t
  task_id) {\n+    if (tasks[task_id] != NULL) {\n+      // Close file descriptors
  if they were created\n+      if (tasks[task_id]->sem_fd >= 0) {\n+        close(tasks[task_id]->sem_fd);\n+        tasks[task_id]->sem_fd
  = -1;\n+      }\n+      if (tasks[task_id]->epoll_fd >= 0) {\n+        close(tasks[task_id]->epoll_fd);\n+        tasks[task_id]->epoll_fd
  = -1;\n+      }\n+    }\n+  }\n+\n   int itti_create_queue(const task_info_t *taskInfo)
  {\n     pthread_mutex_lock (&lock_nb_queues);\n     int newQueue=nb_queues++;\n@@
  -346,9 +363,30 @@ typedef struct timer_elm_s {\n     LOG_D(ITTI, \"Starting itti
  queue: %s as task %d\\n\", taskInfo->name, newQueue);\n     pthread_mutex_init(&tasks[newQueue]->queue_cond_lock,
  NULL);\n     memcpy(&tasks[newQueue]->admin, taskInfo, sizeof(task_info_t));\n-    AssertFatal(
  ( tasks[newQueue]->epoll_fd = epoll_create1(0) ) >=0, \"\");\n-    AssertFatal(
  ( tasks[newQueue]->sem_fd = eventfd(0, EFD_SEMAPHORE) ) >=0, \"\");\n-    itti_subscribe_event_fd((task_id_t)newQueue,
  tasks[newQueue]->sem_fd);\n+    tasks[newQueue]->epoll_fd = epoll_create1(0);\n+    AssertFatal(tasks[newQueue]->epoll_fd
  >= 0, \"\");\n+    tasks[newQueue]->sem_fd = eventfd(0, EFD_SEMAPHORE);\n+    AssertFatal(tasks[newQueue]->sem_fd
  >= 0, \"\");\n+    \n+    // Use a variable to track if we need to clean up\n+    int
  result = 0;\n+    \n+    // Try to subscribe the event fd\n+    struct epoll_event
  event;\n+    event.events = EPOLLIN | EPOLLERR;\n+    event.data.u64 = 0;\n+    event.data.fd
  = tasks[newQueue]->sem_fd;\n+    result = epoll_ctl(tasks[newQueue]->epoll_fd, EPOLL_CTL_ADD,
  tasks[newQueue]->sem_fd, &event);\n+    if (result != 0) {\n+        // Clean up
  on failure\n+        close(tasks[newQueue]->sem_fd);\n+        close(tasks[newQueue]->epoll_fd);\n+        LOG_E(ITTI,
  \"epoll_ctl failed: %s\\n\", strerror(errno));\n+        AssertFatal(0, \"epoll_ctl
  (EPOLL_CTL_ADD) failed for task %s, fd %d: %s!\\n\",\n+                    taskInfo->name,
  tasks[newQueue]->sem_fd, strerror(errno));\n+    }\n+    \n+    tasks[newQueue]->nb_fd_epoll++;\n
