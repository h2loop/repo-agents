  Title: Fix dft4096 crash on ARM platforms due to missing NEON implementation\n\n###
  Summary\nThe dft4096 function and related large DFT functions (dft8192, dft16384,
  etc.) use x86-specific 256-bit AVX2 SIMD instructions that are not available on
  ARM platforms. When compiled for ARM, these functions cause undefined behavior or
  crashes because they reference SIMD256 intrinsics that don''t exist.\n\nThis fix
  adds platform guards to prevent compilation of these x86-only functions on ARM platforms.\n\n###
  Reproduction\nOn an ARM-based system (aarch64):\n1. Build OAI5G with ARM optimizations
  enabled\n2. Run a scenario that requires dft4096 (e.g., high bandwidth NR processing)\n3.
  Observe crash or incorrect FFT results when dft4096 is called\n\nThe issue manifests
  as either compile errors about missing SIMD256 functions or runtime crashes when
  the undefined SIMD instructions are executed.\n\n### Changes\n- `openair1/PHY/TOOLS/oai_dfts.c`:
  Added `#if defined(__x86_64__) || defined(__i386__)` guards around all functions
  using 256-bit SIMD operations\n- `openair1/PHY/TOOLS/oai_dfts.c`: Added corresponding
  `#endif` statements to properly scope the platform-specific code\n- Functions guarded
  include: dft4096, idft4096, dft8192, idft8192, dft16384, idft16384, dft32768, idft32768,
  idft65536, dft12288, idft12288\n\n","extra_fields":{"bug_description":"missing cleanup
