  :\"default\"},\"problem_statement\":{\"text\":\"\\n## Title: Fix incorrect subband\
  \ size calculation in NR PDCCH processing\\n\\n### Summary\\nThe `get_subband_size`\
  \ function in nr_common.c had incorrect boundary conditions that caused wrong subband\
  \ size calculations for edge cases. When NPRB values matched the upper bounds of\
  \ defined ranges (72, 144, 275), the function would incorrectly fall through to\
  \ the AssertFatal instead of returning the proper subband size.\\n\\nThis manifested\
  \ as unexpected termination during PDCCH processing when specific bandwidth configurations\
  \ were used.\\n\\n### Changes\\n- `common/utils/nr/nr_common.c`: Fixed boundary\
  \ conditions from `<` to `<=` for proper range handling\\n- `common/utils/nr/nr_common.c`:\
  \ Improved logic flow with explicit if-else structure\\n- `common/utils/nr/nr_common.c`:\
  \ Added explicit return path\\n\\nTo reproduce: Configure a UE with 72, 144, or\
  \ 275 PRBs and observe AssertFatal being triggered during PDCCH processing instead\
  \ of proper subband size calculation.\\n\",\"extra_fields\":{\"bug_description\"\
  :\"dead code that is never executed and may mask intended logic\",\"bug_id\":\"\
  c_dead_code\",\"stage_one_patch\":\"diff --git a/common/utils/nr/nr_common.c b/common/utils/nr/nr_common.c\\\
  nindex 7954db7d54..fac18a587e 100644\\n--- a/common/utils/nr/nr_common.c\\n+++ b/common/utils/nr/nr_common.c\\\
  n@@ -627,12 +627,12 @@ uint32_t to_nrarfcn(int nr_bandP, uint64_t dl_CarrierFreq,\
  \ uint8_t scs_index, ui\\n \\n   AssertFatal(dl_CarrierFreq_by_1k >= nr_bandtable[i].dl_min,\\\
  n               \\\"Band %d, bw %u : DL carrier frequency %llu kHz < %llu\\\\n\\\
  \",\\n-\\t      nr_bandP, bw, (long long unsigned int)dl_CarrierFreq_by_1k,\\n-\\\
  t      (long long unsigned int)nr_bandtable[i].dl_min);\\n+              nr_bandP,\
  \ bw, (long long unsigned int)dl_CarrierFreq_by_1k,\\n+              (long long\
  \ unsigned int)nr_bandtable[i].dl_min);\\n   AssertFatal(dl_CarrierFreq_by_1k <=\
  \ (nr_bandtable[i].dl_max - bw_kHz/2),\\n               \\\"Band %d, dl_CarrierFreq\
  \ %llu bw %u: DL carrier frequency %llu kHz > %llu\\\\n\\\",\\n-\\t      nr_bandP,\
  \ (long long unsigned int)dl_CarrierFreq,bw, (long long unsigned int)dl_CarrierFreq_by_1k,\\\
  n-\\t      (long long unsigned int)(nr_bandtable[i].dl_max - bw_kHz/2));\\n+   \
  \           nr_bandP, (long long unsigned int)dl_CarrierFreq,bw, (long long unsigned\
  \ int)dl_CarrierFreq_by_1k,\\n+              (long long unsigned int)(nr_bandtable[i].dl_max\
  \ - bw_kHz/2));\\n \\n   int deltaFglobal = 60;\\n   uint32_t N_REF_Offs = 2016667;\\\
  n@@ -803,18 +803,22 @@ int get_nr_table_idx(int nr_bandP, uint8_t scs_index)\\n\
  \ int get_subband_size(int NPRB,int size) {\\n   // implements table  5.2.1.4-2\
  \ from 36.214\\n   //\\n-  //Bandwidth part (PRBs)\\tSubband size (PRBs)\\n-  //\
  \ < 24\\t                   N/A\\n-  //24 \u2013 72\\t                   4, 8\\\
  n-  //73 \u2013 144\\t                   8, 16\\n-  //145 \u2013 275\\t        \
  \          16, 32\\n-\\n-  if (NPRB<24) return(1);\\n-  if (NPRB<72) return (size==0\
  \ ? 4 : 8);\\n-  if (NPRB<144) return (size==0 ? 8 : 16);\\n-  if (NPRB<275) return\
  \ (size==0 ? 16 : 32);\\n+  //Bandwidth part (PRBs)       Subband size (PRBs)\\\
  n+  // < 24                          N/A\\n+  //24 \u2013 72                   \
  \     4, 8\\n+  //73 \u2013 144                       8, 16\\n+  //145 \u2013 275\
  \                     16, 32\\n+\\n+  if (NPRB<24) \\n+    return(1); // For NPRB\
  \ < 24, return 1 as default (though spec says N/A)\\n+  else if (NPRB<=72) \\n+\
  \    return (size==0 ? 4 : 8);\\n+  else if (NPRB<=144) \\n+    return (size==0\
  \ ? 8 : 16);\\n+  else if (NPRB<=275) \\n+    return (size==0 ? 16 : 32);\\n   AssertFatal(1==0,\\\
  \"Shouldn't get here, NPRB %d\\\\n\\\",NPRB);\\n- \\n+  return -1; // This should\
  \ never be reached\\n }\\n \\n void get_samplerate_and_bw(int mu,\\n@@ -978,7 +982,7\
  \ @@ void get_samplerate_and_bw(int mu,\\n \\n     case 133 :\\n       if (threequarter_fs)\
  \ {\\n-\\tAssertFatal(1==0,\\\"N_RB %d cannot use 3/4 sampling\\\\n\\\",n_rb);\\\
  n+        AssertFatal(1==0,\\\"N_RB %d cannot use 3/4 sampling\\\\n\\\",n_rb);\\\
