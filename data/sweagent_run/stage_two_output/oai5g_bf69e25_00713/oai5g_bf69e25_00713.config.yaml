  Title: Fix client connection handling in RF simulator to prevent buffer overflow\n\n###
  Summary\nThe RF simulator''s client handling code was using file descriptor values
  directly as array indices when managing client connections. This caused buffer overflow
  issues when file descriptors had large values, leading to crashes and undefined
  behavior during client connections.\n\nThis fix implements a proper mapping between
  file descriptors and buffer indices to prevent out-of-bounds array access.\n\n###
  Changes\n- `radio/rfsimulator/simulator.c`: \n  * Added `fd_to_buf_map` array to
  map file descriptors to buffer indices\n  * Modified `allocCirBuf` to find free
  buffer slots and create proper mappings\n  * Modified `removeCirBuf` to use mappings
  and clear them properly\n  * Updated `socketError` to use the mapping system\n  *
  Modified data receiving code in `flushInput` to use mappings\n  * Added proper initialization
  of the mapping array\n\n### Reproduction\nTo reproduce the original issue:\n1. Start
  the RF simulator in server mode\n2. Connect multiple clients rapidly to force higher
  file descriptor values\n3. Observe crashes or memory corruption when file descriptor
  values exceed the buffer array size\n\nThe fix ensures stable client connection
  handling regardless of assigned file descriptor values.\n","extra_fields":{"bug_description":"missing
