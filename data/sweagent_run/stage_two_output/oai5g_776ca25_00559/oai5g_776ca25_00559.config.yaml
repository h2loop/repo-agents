  return value of the UL scheduling algorithm run function\n3. Commented out lines
  that set the `pre_allocated_nb_rb_ul` field\n4. Incorrect order of assignment and
  logging in the retransmission case\n\n### Changes\n- `openair2/LAYER2/MAC/pre_processor.c`:
  \n  - Fixed initialization of `start_ue` value in `rr_ul_setup` function from 0
  to -1\n  - Fixed order of assignment and logging in retransmission case\n  - Uncommented
