  Title: Fix incorrect HARQ configuration handling in nr_pdsch_ptrs_processing\n\n###
  Summary\nThe `nr_pdsch_ptrs_processing` function in the NR UE channel estimation
  module had a logic flaw that could cause incorrect PTRS processing when both HARQ
  processes were present. The function would overwrite configuration variables for
  dlsch[0] with those from dlsch[1], even when dlsch[1] was not active, leading to
  incorrect phase error estimation and compensation.\n\nThis manifested as degraded
  PDSCH performance when PTRS was enabled, particularly in scenarios with multiple
  active HARQ processes. Users reported unexpected behavior when calling `nr_pdsch_ptrs_processing()`
  where the function would not process PTRS correctly due to using configuration from
  the wrong HARQ process.\n\n### Changes\n- `openair1/PHY/NR_UE_ESTIMATION/nr_dl_channel_estimation.c`:
  Fixed logic flaw in HARQ process configuration handling.\n  - Added proper null
  pointer checks for both dlsch0_harq and dlsch1_harq\n  - Changed from sequential
  if statements to if/else if to prevent configuration overwrites\n  - Added early
  return when no active HARQ process is found\n  - Updated processing logic to use
  the correctly configured active HARQ process\n\n","extra_fields":{"bug_description":"race
