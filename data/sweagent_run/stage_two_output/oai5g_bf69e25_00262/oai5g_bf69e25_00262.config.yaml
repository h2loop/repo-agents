  Fixed parameter passing to use address-of operator for `coded_bits_per_codeword`\n\nWhen
  running simulations with debug output enabled, these incorrect calls would previously
  cause segmentation faults or produce garbled debug output files. The fix ensures
  all calls match the declared function signature in the header files.\n","extra_fields":{"bug_description":"missing
