  others passed values instead of pointers, causing undefined behavior when the function
  was invoked for debugging purposes.\n\nThe issue was particularly evident when running
  TM7 simulations where the function would access invalid memory locations due to
  missing HARQ process ID parameters.\n\n### Changes\n- `openair1/SIMULATION/LTE_PHY/dlsim_tm7.c`:
  Added missing `harq_pid` parameter to two `dump_dlsch2()` calls\n- `openair1/SIMULATION/LTE_PHY/syncsim.c`:
