  -326,13 +326,29 @@ get_next_ue_initial_id(\n //------------------------------------------------------------------------------\n
  {\n   static uint16_t ue_initial_id[NUMBER_OF_eNB_MAX];\n+  static int initialized
  = 0;\n+  \n+  // Initialize the array with valid values on first call\n+  if (!initialized)
  {\n+    for (int i = 0; i < NUMBER_OF_eNB_MAX; i++) {\n+      ue_initial_id[i] =
  UE_INITIAL_ID_INVALID;\n+    }\n+    initialized = 1;\n+  }\n+  \n+  // Boundary
  check to prevent array access out of bounds\n+  if (mod_id >= NUMBER_OF_eNB_MAX)
