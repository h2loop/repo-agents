  Title: Fix incorrect neighbor cell configuration parsing in gNB\n\n### Summary\nThe
  `fill_neighbour_cell_configuration` function in `gnb_config.c` was not properly
  handling neighbor cell configurations due to an incorrect parameter definition and
  several memory management issues. This caused unexpected behavior when loading neighbor
  cell configurations.\n\nThe main issues were:\n1. An incorrect parameter in `GNB_NEIGHBOUR_LIST_PARAM_LIST`
  that didn''t belong at that configuration level\n2. Memory leaks when the function
  was called multiple times\n3. Type mismatch between 64-bit configuration values
  and 32-bit structure fields\n4. Format string mismatches in logging\n\n### Changes\n-
  `openair2/GNB_APP/gnb_paramdef.h`: Removed incorrect `GNB_CONFIG_STRING_NEIGHBOUR_CELL_PHYSICAL_ID`
  parameter from `GNB_NEIGHBOUR_LIST_PARAM_LIST`\n- `openair2/GNB_APP/gnb_config.c`:
  \n  - Added proper memory cleanup before allocations\n  - Fixed type conversion
  for absoluteFrequencySSB field with bounds checking\n  - Corrected format strings
  in log messages\n  - Changed from malloc to calloc for better initialization\n\n###
  Reproduction\nTo reproduce the issue:\n1. Configure a gNB with neighbor cell configurations\n2.
  Call `fill_neighbour_cell_configuration()` multiple times\n3. Observe memory leaks
  and potentially incorrect neighbor cell data being loaded\n4. Check logs for incorrectly
  formatted SSB ARFCN values\n\nThe fix ensures that neighbor cell configurations
  are properly parsed and loaded without memory leaks or data corruption.\n","extra_fields":{"bug_description":"CRC
  computation or checking error causing false positive or missed error detection","bug_id":"telecom_crc_error","stage_one_patch":"diff
