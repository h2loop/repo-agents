  Title: Fix scheduling issue with open_bladerf_from_serial not being used\n\n###
  Summary\nThe BladeRF initialization code was not using the existing `open_bladerf_from_serial`
  function, causing missed scheduling opportunities when multiple BladeRF devices
  are connected. The code always opened the first available device instead of allowing
  specification of a specific device by serial number.\n\nThis fix enables proper
  device selection by using the serial number provided in the `sdr_addrs` configuration
  field.\n\n### Changes\n- `radio/BLADERF/bladerf_lib.c`: Modified `device_init` function
  to check for serial number in `sdr_addrs` and use `open_bladerf_from_serial` when
  provided\n- `radio/BLADERF/bladerf_lib.c`: Added proper error handling and memory
  cleanup\n- `radio/BLADERF/bladerf_lib.c`: Included `<string.h>` for `strlen` function\n\n###
  Reproduction\nWhen multiple BladeRF devices are connected and a specific device
  is intended to be used for a UE with pending data, the current implementation would
  open the first available device rather than the intended one. This leads to incorrect
  scheduling as the wrong device may be used for transmission/reception.\n\nTo reproduce:\n1.
  Connect multiple BladeRF devices to the system\n2. Configure OAI to use BladeRF
  without specifying a serial number\n3. Observe that the first enumerated device
  is always used regardless of which device was intended\n\nWith this fix, users can
  specify the device serial in their configuration:\n```\ndevice = {\n    name = \"bladerf\";\n    sdr_addrs
  = \"serial_number_here\";\n};\n```\nThis ensures the correct device is selected
  for scheduling.\n","extra_fields":{"bug_description":"missed scheduling opportunity
  where a UE with pending data is not scheduled","bug_id":"telecom_sched_missed_opportunity","stage_one_patch":"diff
  --git a/radio/BLADERF/bladerf_lib.c b/radio/BLADERF/bladerf_lib.c\nindex e834f8377e..16fbd43613
  100644\n--- a/radio/BLADERF/bladerf_lib.c\n+++ b/radio/BLADERF/bladerf_lib.c\n@@
  -27,6 +27,7 @@\n \n #include <stdio.h>\n #include <stdlib.h>\n+#include <string.h>\n
  #include <inttypes.h>\n #include \"bladerf_lib.h\"\n #include \"math.h\"\n@@ -1002,9
  +1003,22 @@ int device_init(openair0_device *device,\n     printf(\"\\n[BRF] sampling_rate
  %u, num_buffers %u,  buffer_size %u, num transfer %u, timeout_ms (rx %u, tx %u)\\n\",\n            brf->sample_rate,
  brf->num_buffers, brf->buffer_size,brf->num_transfers, brf->rx_timeout_ms, brf->tx_timeout_ms);\n
  \n-    if ((status=bladerf_open(&brf->dev, \"\")) != 0 ) {\n-        fprintf(stderr,\"Failed
  to open brf device: %s\\n\",bladerf_strerror(status));\n-        brf_error(status);\n+    //
  Use specific serial number if provided in sdr_addrs, otherwise open first available
  device\n+    if (openair0_cfg->sdr_addrs != NULL && strlen(openair0_cfg->sdr_addrs)
  > 0) {\n+        printf(\"[BRF] Opening device with serial: %s\\n\", openair0_cfg->sdr_addrs);\n+        brf->dev
  = open_bladerf_from_serial(openair0_cfg->sdr_addrs);\n+        if (brf->dev == NULL)
  {\n+            fprintf(stderr,\"Failed to open brf device with serial %s\\n\",
  openair0_cfg->sdr_addrs);\n+            free(brf);\n+            return -1;\n+        }\n+    }
  else {\n+        printf(\"[BRF] Opening first available device\\n\");\n+        if
  ((status=bladerf_open(&brf->dev, \"\")) != 0 ) {\n+            fprintf(stderr,\"Failed
  to open brf device: %s\\n\",bladerf_strerror(status));\n+            free(brf);\n+            return
  -1;\n+        }\n     }\n     printf(\"[BRF] init dev %p\\n\", brf->dev);\n     switch(bladerf_device_speed(brf->dev))
  {\n","start_fn":"open_bladerf_from_serial","start_fn_file":"radio/BLADERF/bladerf_lib.c","subsystem":"radio/BLADERF"},"type":"text","id":"oai5g_ca119de_00514"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
