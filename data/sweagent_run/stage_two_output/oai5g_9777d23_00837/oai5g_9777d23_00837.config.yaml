  in the mapping arrays. This led to segmentation faults during simulation visualization
  when mobility types or state values didn''t match expected mappings.\n\nThe bug
  was particularly evident when running simulations with custom mobility models or
  when UE states contained unexpected values. Users would observe crashes in the visualization
  thread with stack traces pointing to the `map_int_to_str` function.\n\n### Changes\n-
  `openair2/UTIL/OMV/communicationthread.cpp`: Fixed infinite loop condition in `map_int_to_str`
