  Summary\nThe `rrc_eNB_generate_HO_RRCConnectionReconfiguration` function was missing
  the `ho_state` parameter that was clearly intended to be part of its interface.
  This caused the function to always configure measurement events regardless of the
  handover state, leading to unexpected behavior during handover procedures.\n\nThe
  issue was identified when UE handover procedures were not behaving as expected,
  with measurement configurations being set up even when not needed for handover.\n\n###
  Changes\n- `openair2/RRC/LTE/rrc_proto.h`: Added missing `ho_state` parameter to
  function declaration\n- `openair2/RRC/LTE/rrc_eNB.c`: \n  - Added missing `ho_state`
  parameter to function definition\n  - Uncommented conditional code that depends
  on `ho_state` parameter\n  - Updated function call to include the `ho_state` parameter\n  -
