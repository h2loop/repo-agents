  returning success (0) instead of failure (-1) when encountering buffer read errors
  during channel matrix data unpacking. This caused downstream processing to proceed
  with potentially corrupted or uninitialized data.\n\n### Changes\n- `nfapi/open-nFAPI/nfapi/src/nfapi_p7.c`:
  Corrected return value from 0 to -1 on line 6170 when `pull8` operation fails during
  channel matrix unpacking.\n\n### Reproduction\nUnder certain network conditions
  with malformed SRS indication TLVs, the function would return 0 indicating success
  even though the channel matrix data was not properly unpacked. This led to downstream
  gNB processing using invalid channel state information, causing beamforming calculations
  to produce incorrect results and potentially leading to UE connection drops.\n\nThe
  issue can be observed when running OAI gNB with SRS-based beamforming enabled and
  receiving corrupted SRS reports from UEs or simulated RF sources.\n","extra_fields":{"bug_description":"incorrect
