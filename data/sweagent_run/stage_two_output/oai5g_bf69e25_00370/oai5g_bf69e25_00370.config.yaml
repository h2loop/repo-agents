  Title: Add missing PLMN configuration function implementation\n\n### Summary\nThe
  `set_plmn_config()` function was declared in the header but never implemented, causing
  linker errors when modules tried to use it. This fix provides a proper implementation
  that validates inputs and sets the PLMN fields correctly.\n\nThis resolves issues
  where gNB configuration would fail during startup with \"undefined reference\" errors.\n\n###
  Changes\n- `openair2/GNB_APP/gnb_config.c`: Added `set_plmn_config()` implementation
  with proper validation\n- `openair2/GNB_APP/gnb_config.h`: Kept existing function
  declaration\n\n### Reproduction\nTo reproduce the issue:\n1. Build OAI5G with gNB
  configuration that references multiple PLMNs\n2. Linker will fail with \"undefined
  reference to `set_plmn_config`\"\n3. gNB startup will abort with configuration errors\n\nWith
  this fix, the gNB should start normally and handle PLMN configuration without errors.\n","extra_fields":{"bug_description":"cross-layer
