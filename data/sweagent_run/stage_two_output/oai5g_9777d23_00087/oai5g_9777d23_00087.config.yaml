  Title: Fix E-RAB Modification Indication handling in NSA scenarios\n\n### Summary\nThe
  `rrc_eNB_send_E_RAB_Modification_Indication` function in the LTE RRC layer had several
  critical issues that caused incorrect E-RAB classification and message construction.
  In NSA (Non-Standalone) scenarios with EN-DC (E-UTRA-NR Dual Connectivity), this
  led to malformed S1AP messages being sent to the MME.\n\nThe primary issue was that
  the function was iterating only through setup E-RABs instead of all E-RABs, causing
  it to miss E-RABs marked for modification. Additionally, the `ue_initial_id` field
  was not being set in the S1AP message structure.\n\n### Changes\n- `openair2/RRC/LTE/rrc_eNB_S1AP.c`:
  Fixed E-RAB iteration logic and message construction\n- `openair2/RRC/LTE/rrc_eNB_S1AP.c`:
  Added missing `ue_initial_id` field initialization\n- `openair2/RRC/LTE/rrc_eNB_S1AP.c`:
  Improved E-RAB status validation and classification\n\n### Reproduction Steps\n1.
  Configure OAI eNB for NSA EN-DC operation\n2. Establish a UE connection with multiple
  E-RABs\n3. Trigger an E-RAB modification scenario (e.g., through gNB initiated reconfiguration)\n4.
  Observe that S1AP_E_RAB_MODIFICATION_IND message sent to MME contains incorrect
  E-RAB lists\n5. MME logs show validation errors for malformed E-RAB modification
  indication messages\n\nIn some cases, this could lead to segmentation faults when
  accessing invalid E-RAB indices, particularly when `setup_e_rabs` was less than
  the total number of E-RABs configured for the UE.\n\n","extra_fields":{"bug_description":"read
