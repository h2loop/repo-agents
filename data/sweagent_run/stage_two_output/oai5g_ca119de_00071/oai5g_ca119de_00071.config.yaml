  Title: Fix incorrect power correction factor in ULSCH demodulation\n\n### Summary\nThe
  `init_ulsch_power_LUT` function was initializing lookup table values that could
  cause downstream functions to receive incorrect parameters interpreted as flags
  or bitmasks. Specifically, `ulsch_power_LUT[0]` was set to 0, which when used in
  division operations could cause unexpected behavior in system functions.\n\nThis
  fix ensures all LUT values are at least 1 to prevent division by zero and related
  issues with flag/bitmask interpretation in downstream functions.\n\n### Changes\n-
  `openair1/PHY/LTE_TRANSPORT/ulsch_demodulation.c`: Modified `init_ulsch_power_LUT`
  to ensure all values are >= 1\n- `openair1/PHY/LTE_TRANSPORT/transport_proto.h`:
  Added function declaration to eNB transport header\n- `openair1/PHY/INIT/lte_init.c`:
  Removed incorrect dependency on UE transport header\n\n### Reproduction\nUnder certain
  channel conditions, ULSCH power calculations would result in division by zero when
  `ulsch_power_LUT[0]` was accessed, causing incorrect power correction factors to
  be passed to signal processing functions. This manifested as erroneous SNR calculations
  and potential crashes in downstream signal processing functions that interpreted
  the invalid values as control flags.\n","extra_fields":{"bug_description":"incorrect
