  Title: Fix file descriptor leak in thread pool implementation\n\n### Summary\nFixed
  a file descriptor leak in the thread pool implementation where file descriptors
  opened for thread pool tracing were not properly closed when the thread pool was
  destroyed or when initialization failed partially.\n\n### Changes\n- `common/utils/threadPool/thread-pool.c`:
  Added proper error handling to close the first file descriptor if the second one
  fails to open, and included `<unistd.h>` for the `close()` function.\n- `common/utils/threadPool/thread-pool.h`:
  Added cleanup function `cleanupTpool()` to properly close file descriptors, updated
  `abortTpool()` to use this cleanup function, added necessary includes for `fcntl.h`
  and `errno.h`, and fixed initialization checks to use -1 instead of 0.\n\n### Reproduction\nTo
  reproduce the issue:\n1. Enable thread pool tracing by setting the `OAI_THREADPOOLMEASUREMENTS`
  environment variable to a FIFO path\n2. Initialize a thread pool with `initNamedTpool()`\n3.
  Either let the initialization fail partially (second file descriptor fails to open)
  or call `abortTpool()` to destroy the thread pool\n4. Observe that file descriptors
  remain open using `lsof` or similar tools\n\nThe leak would be particularly noticeable
  in long-running applications that repeatedly create and destroy thread pools, eventually
  exhausting available file descriptors.\n\n","extra_fields":{"bug_description":"file
