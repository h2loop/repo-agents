  Title: Fix vnf_send_p5_msg return value handling in Open-nFAPI\n\n### Summary\nThe
  `vnf_send_p5_msg()` function in the VNF module was not properly returning error
  codes when message transmission failed. This caused the calling functions `vnf_pack_and_send_p5_message()`
  and `vnf_pack_and_send_p4_message()` to incorrectly assume that messages were successfully
  sent even when the underlying SCTP or UDP send operations failed.\n\nThe issue manifested
  as silent message loss during P5 communication between the VNF and PNF, leading
  to stalled initialization sequences and unresponsive radio interfaces. The root
  cause was that `vnf_send_p5_msg()` always returned 0 regardless of the send result.\n\nThis
  fix ensures that `vnf_send_p5_msg()` returns -1 on transmission failures and 0 on
  success, allowing proper error propagation up the call stack.\n\n### Changes\n-
  `nfapi/open-nFAPI/vnf/src/vnf.c`: Modified `vnf_send_p5_msg()` to return -1 when
  `sctp_sendmsg()` or `send()` fails or sends partial data, and 0 on successful transmission.\n","extra_fields":{"bug_description":"missing
