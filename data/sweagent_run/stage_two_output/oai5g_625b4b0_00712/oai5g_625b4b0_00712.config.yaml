  -121,25 +121,59 @@ extern \"C\"\n     uint32_t tx_byte_count;\n \n     mac_private
  *mac;\n+    \n+    volatile int stop_thread;\n+    pthread_t mac_rx_thread;\n \n   }
  mac_internal_t;\n \n   mac_t *mac_create(uint8_t wireshark_test_mode) {\n     mac_internal_t
  *instance = (mac_internal_t *)malloc(sizeof(mac_internal_t));\n     instance->mac
  = new mac_private((wireshark_test_mode >= 1));\n+    instance->rx_sock = -1;\n+    instance->tx_sock
  = -1;\n+    instance->stop_thread = 0;\n+    instance->mac_rx_thread = 0;\n     return
  (mac_t *)instance;\n   }\n \n   void mac_destroy(mac_t *mac) {\n+    if (mac ==
  NULL) {\n+      return;\n+    }\n+    \n     mac_internal_t *instance = (mac_internal_t
  *)mac;\n+    \n+    // Signal the thread to stop\n+    instance->stop_thread = 1;\n+    \n+    //
  Close sockets to unblock the recvfrom call\n+    if (instance->rx_sock >= 0) {\n+      close(instance->rx_sock);\n+      instance->rx_sock
  = -1;\n+    }\n+    \n+    if (instance->tx_sock >= 0) {\n+      close(instance->tx_sock);\n+      instance->tx_sock
  = -1;\n+    }\n+    \n+    // Wait for the thread to finish\n+    if (instance->mac_rx_thread
  != 0) {\n+      pthread_join(instance->mac_rx_thread, NULL);\n+    }\n+    \n+    //
  Clean up the mac_private object\n     delete instance->mac;\n+    \n+    // Free
  the instance\n     free(instance);\n   }\n \n   void *mac_rx_thread_start(void *ptr)
  {\n     mac_internal_t *instance = (mac_internal_t *)ptr;\n \n-    while(1) {\n+    while(!instance->stop_thread)
  {\n       mac_pdu *pdu = instance->mac->allocate_mac_pdu();\n       int len = recvfrom(instance->rx_sock,
  pdu->buffer, pdu->buffer_len, 0, 0, 0);\n \n@@ -178,11 +212,12 @@ extern \"C\"\n     if(bind(instance->rx_sock,
  (struct sockaddr *)&addr, sizeof(struct sockaddr_in)) < 0) {\n       printf(\"[MAC]
  Failed to bind to %u\\n\", rx_port);\n       close(instance->rx_sock);\n+      instance->rx_sock
  = -1;\n       return;\n     }\n \n-    pthread_t mac_rx_thread;\n-    pthread_create(&mac_rx_thread,
  NULL, &mac_rx_thread_start, instance);\n+    instance->stop_thread = 0;\n+    pthread_create(&instance->mac_rx_thread,
  NULL, &mac_rx_thread_start, instance);\n     instance->tx_sock = socket(AF_INET,
  SOCK_DGRAM, 0);\n     instance->tx_addr.sin_family = AF_INET;\n     instance->tx_addr.sin_port
