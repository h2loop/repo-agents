  Title: Fix thread resource leak in VNF MAC layer cleanup\n\n### Summary\nThe VNF
  MAC layer implementation had a critical resource management issue where the rx_thread
  would continue running after mac_destroy() was called, causing thread and socket
  resource leaks. This led to inconsistent behavior between protocol layers and potential
  system resource exhaustion under sustained operation.\n\nThis fix implements proper
  thread termination signaling and resource cleanup in the MAC layer destroy function.\n\n###
  Changes\n- `nfapi/open-nFAPI/vnf_sim/src/mac.cpp`: \n  - Added volatile stop_thread
  flag for thread termination signaling\n  - Added mac_rx_thread field to track thread
  ID\n  - Modified mac_create() to initialize all fields properly\n  - Updated mac_rx_thread_start()
  to check termination flag\n  - Enhanced mac_destroy() with comprehensive resource
  cleanup including thread joining and socket closure\n  - Fixed socket cleanup in
  error paths\n\n### Reproduction\nTo reproduce the original issue:\n1. Run VNF simulation
  with continuous MAC layer initialization/destruction cycles\n2. Monitor system for
  thread count growth using ''ps -T -p <pid>''\n3. Observe socket file descriptor
  leaks using ''lsof -p <pid>''\n4. Notice inconsistent behavior in downstream protocol
  layers after repeated MAC destroy/create cycles\n\nThe symptoms include gradual
  thread accumulation, socket resource exhaustion, and unpredictable behavior in NFAPI
  message handling.\n","extra_fields":{"bug_description":"configuration mismatch between
  protocol layers causing inconsistent behavior","bug_id":"telecom_config_layer_mismatch","stage_one_patch":"diff
  --git a/nfapi/open-nFAPI/vnf_sim/src/mac.cpp b/nfapi/open-nFAPI/vnf_sim/src/mac.cpp\nindex
