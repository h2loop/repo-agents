  #include \"queue.h\"\n+#include \"common/utils/ds/byte_array.h\"\n \n char *ngap_direction2String(int
  ngap_dir) {\n   static char *ngap_direction_String[] = {\n@@ -1245,25 +1246,31 @@
  static int ngap_gNB_handle_pdusession_modify_request(sctp_assoc_t assoc_id, uint\n   msg->amf_ue_ngap_id  =
  amf_ue_ngap_id;\n   msg->gNB_ue_ngap_id = gnb_ue_ngap_id;\n \n-  msg->nb_pdusessions_tomodify
  = ie->value.choice.PDUSessionResourceModifyListModReq.list.count;\n-\n+  // Process
  each PDU session item and count only valid ones\n+  int valid_pdusession_count =
  0;\n   for (int i = 0; i < ie->value.choice.PDUSessionResourceModifyListModReq.list.count;
  i++) {\n     NGAP_PDUSessionResourceModifyItemModReq_t *item_p = ie->value.choice.PDUSessionResourceModifyListModReq.list.array[i];\n
  \n-    msg->pdusession[i].pdusession_id = item_p->pDUSessionID;\n-\n     // check
  for the NAS PDU\n     if (item_p->nAS_PDU != NULL && item_p->nAS_PDU->size > 0)
  {\n-      msg->pdusession[i].nas_pdu = create_byte_array(item_p->nAS_PDU->size,
  item_p->nAS_PDU->buf);\n-      if (!decodePDUSessionResourceModify(&msg->pdusession[i].pdusessionTransfer,
  item_p->pDUSessionResourceModifyRequestTransfer)) {\n+      msg->pdusession[valid_pdusession_count].pdusession_id
  = item_p->pDUSessionID;\n+      msg->pdusession[valid_pdusession_count].nas_pdu
  = create_byte_array(item_p->nAS_PDU->size, item_p->nAS_PDU->buf);\n+      if (!decodePDUSessionResourceModify(&msg->pdusession[valid_pdusession_count].pdusessionTransfer,
  item_p->pDUSessionResourceModifyRequestTransfer)) {\n         NGAP_ERROR(\"Failed
  to decode pDUSessionResourceModifyRequestTransfer\\n\");\n+        // Clean up previously
  allocated NAS PDUs\n+        for (int j = 0; j < valid_pdusession_count; j++) {\n+          free_byte_array(msg->pdusession[j].nas_pdu);\n+        }\n+        itti_free(TASK_NGAP,
  message_p);\n         return -1;\n       }\n+      valid_pdusession_count++;\n     }
  else {\n       LOG_W(NGAP, \"received pdu session modify with void content for UE
  %u, pdu session %lu\\n\", msg->gNB_ue_ngap_id, item_p->pDUSessionID);\n-      continue;\n     }\n   }\n+  \n+  msg->nb_pdusessions_tomodify
  = valid_pdusession_count;\n   itti_send_msg_to_task(TASK_RRC_GNB, ue_desc_p->gNB_instance->instance,
