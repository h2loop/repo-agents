  Title: Fix PDU Session Modify Request Handling with Missing NAS PDU\n\n### Summary\nThe
  gNB NGAP module crashes when processing PDU Session Resource Modify Requests that
  contain items without NAS PDU content. The `ngap_gNB_handle_pdusession_modify_request`
  function incorrectly assumes all PDU session items will have valid NAS PDU data,
  leading to segmentation faults when accessing null pointers.\n\nThis issue manifests
  during normal 5G session management procedures when the core network sends modify
  requests with optional NAS payloads. The gNB process terminates unexpectedly, causing
  service disruption for connected UEs.\n\n### Reproduction Steps\n1. Establish a
  PDU session between a UE and the 5G core\n2. Trigger a PDU Session Resource Modify
  procedure from the AMF\n3. Send a modify request with at least one PDU session item
  containing NULL NAS PDU\n4. Observe segmentation fault in gNB process\n\n### Changes\n-
  `openair3/NGAP/ngap_gNB_handlers.c`: Added proper validation of NAS PDU content
  before processing PDU session modify items. The function now tracks valid sessions
  separately from total sessions and skips items with missing NAS PDU content while
  maintaining correct indexing.\n","extra_fields":{"bug_description":"incorrect type
