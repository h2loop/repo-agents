  Title: Fix NULL pointer dereference in update_cellGroupConfig function\n\n### Summary\nThe
  `update_cellGroupConfig` function in `openair2/RRC/NR/nr_rrc_config.c` had several
  potential NULL pointer dereferences that could cause crashes when certain UE capability
  structures were not properly initialized. This fix adds proper NULL checks before
  accessing nested structure members.\n\n### Changes\n- `openair2/RRC/NR/nr_rrc_config.c`:
  Added NULL checks before accessing `SpCellConfig->spCellConfigDedicated` and its
  nested members\n- `openair2/RRC/NR/nr_rrc_config.c`: Fixed condition check to include
  `&& uplinkConfig` to prevent NULL pointer access\n- `openair2/RRC/NR/nr_rrc_config.c`:
  Added missing NULL checks in maxMIMO_Layers calculation\n- `openair2/RRC/NR/nr_rrc_config.c`:
  Restructured function to ensure all structure accesses are properly guarded\n- `openair2/RRC/NR/nr_rrc_config.c`:
  Moved `update_cqitables` call to proper scope where variables are defined\n\n###
  Reproduction\nThe issue can be reproduced when a UE connects with incomplete capability
  information, causing `SpCellConfig->spCellConfigDedicated` or `uplinkConfig` to
  be NULL. This results in a segmentation fault when the function attempts to access
  these structures without proper NULL checks.\n\n","extra_fields":{"bug_description":"dead
