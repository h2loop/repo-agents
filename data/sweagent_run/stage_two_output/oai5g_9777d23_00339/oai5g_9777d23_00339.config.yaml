  b/common/utils/ocp_itti/intertask_interface.cpp\n@@ -25,6 +25,8 @@\n #include <map>\n
  #include <sys/eventfd.h>\n #include <semaphore.h>\n+#include <errno.h>\n+#include
  <string.h>\n \n \n extern \"C\" {\n@@ -102,7 +104,18 @@ typedef struct timer_elm_s
  {\n     //return itti_alloc_new_message_sized(origin_task_id, message_id, messages_info[message_id].size);\n   }\n
  \n-  static inline int itti_send_msg_to_task_locked(task_id_t destination_task_id,
  instance_t destinationInstance, MessageDef *message) {\n+  int itti_send_msg_to_task_locked(task_id_t
  destination_task_id, instance_t destinationInstance, MessageDef *message) {\n+    //
  Check for null pointers\n+    if (message == NULL) {\n+        LOG_E(ITTI, \"Message
  is NULL\\n\");\n+        return -1;\n+    }\n+    \n+    if (destination_task_id
  >= nb_queues || tasks[destination_task_id] == NULL) {\n+        LOG_E(ITTI, \"Invalid
  destination task ID: %d\\n\", destination_task_id);\n+        return -1;\n+    }\n+    \n     task_list_t
  *t=tasks[destination_task_id];\n     message->ittiMsgHeader.destinationTaskId =
  destination_task_id;\n     message->ittiMsgHeader.destinationInstance = destinationInstance;\n@@
  -131,7 +144,12 @@ typedef struct timer_elm_s {\n \n     t->message_queue.insert(t->message_queue.begin(),
  message);\n     eventfd_t sem_counter = 1;\n-    AssertFatal ( sizeof(sem_counter)
  == write(t->sem_fd, &sem_counter, sizeof(sem_counter)), \"\");\n+    ssize_t bytes_written
  = write(t->sem_fd, &sem_counter, sizeof(sem_counter));\n+    if (sizeof(sem_counter)
  != bytes_written) {\n+        LOG_E(ITTI, \"Failed to write to eventfd for task
  %s: %s\\n\", \n+              itti_get_task_name(destination_task_id), strerror(errno));\n+        return
  -1;\n+    }\n     LOG_D(ITTI, \"sent messages id=%s messages_info to %s\\n\", messages_info[message_id].name,
  t->admin.name);\n     return 0;\n   }\ndiff --git a/common/utils/ocp_itti/intertask_interface.h
