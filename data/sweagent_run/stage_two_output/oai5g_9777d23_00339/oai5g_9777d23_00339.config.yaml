  Title: Fix itti_send_msg_to_task_locked accessibility and error handling\n\n###
  Summary\nThe `itti_send_msg_to_task_locked` function was declared as `static inline`,
  making it inaccessible from other compilation units. When external modules attempted
  to call this function directly, they encountered linker errors. Additionally, the
  function lacked proper error handling for invalid parameters and system call failures.\n\nThis
  fix removes the `static inline` qualifier to make the function externally accessible,
  adds comprehensive error checking for null pointers and invalid task IDs, and implements
  proper error handling for system calls. A function declaration has been added to
  the header file along with documentation clarifying its intended usage.\n\n### Changes\n-
  `common/utils/ocp_itti/intertask_interface.cpp`: Removed `static inline` qualifier,
  added null pointer checks, task ID validation, and proper error handling for system
  calls. Added necessary includes for errno.h and string.h.\n- `common/utils/ocp_itti/intertask_interface.h`:
  Added function declaration and documentation explaining that this function should
  only be called when the task queue is already locked.\n\n### Reproduction Steps\n1.
  Attempt to call `itti_send_msg_to_task_locked()` from a source file other than `intertask_interface.cpp`\n2.
  Observe linker error: \"undefined reference to `itti_send_msg_to_task_locked''\"\n3.
  When calling with invalid parameters (null message pointer or invalid task ID),
  the function would previously crash or exhibit undefined behavior\n4. When the eventfd
  write operation fails, the function would previously crash due to AssertFatal rather
  than returning an error code\n\n","extra_fields":{"bug_description":"protocol timer
  not started or stopped at the required point in the procedure","bug_id":"telecom_timer_missing_start_stop","stage_one_patch":"diff
  --git a/common/utils/ocp_itti/intertask_interface.cpp b/common/utils/ocp_itti/intertask_interface.cpp\nindex
