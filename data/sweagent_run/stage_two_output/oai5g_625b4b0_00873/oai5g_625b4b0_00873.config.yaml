  Title: Fix buffer overflow in F1AP setup request handling\n\n### Summary\nThe F1AP
  interface management code contained a critical buffer overflow vulnerability in
  the `cp_f1ap_setup_request` function and related copy/decode functions. The issue
  occurred when processing setup requests with more cells than the statically allocated
  arrays could hold, leading to out-of-bounds memory writes.\n\nThis could result
  in memory corruption and \"type confusion where a pointer is cast to an incompatible
  struct type downstream\" as observed in some deployment scenarios. The bug was particularly
  problematic when handling gNB-DU configuration updates with large cell lists.\n\nThe
  vulnerability was introduced during the initial implementation when bounds checking
  was not properly enforced for array accesses in the F1AP message copying functions.\n\n###
  Changes\n- `openair2/F1AP/lib/f1ap_interface_management.c`: Added bounds checking
  to prevent buffer overflows in all F1AP copy and decode functions\n  - `cp_f1ap_setup_request`:
  Added validation for `num_cells_available` against `F1AP_MAX_NB_CELLS`\n  - `cp_f1ap_du_configuration_update`:
  Added bounds checking for all cell arrays\n  - `cp_f1ap_du_configuration_update_acknowledge`:
  Added bounds checking for cell activation arrays  \n  - `cp_f1ap_cu_configuration_update_acknowledge`:
  Added bounds checking for cells, TNL associations, and UE lists\n  - `cp_f1ap_reset`
  and `cp_f1ap_reset_ack`: Added bounds checking for UE arrays\n  - All corresponding
  decode functions: Added bounds validation when setting array counts from ASN.1 decoded
  data\n\n### Reproduction\nThe issue can be triggered by sending an F1AP Setup Request
  or gNB-DU Configuration Update message with more cells than `F1AP_MAX_NB_CELLS`
  (currently 2). Under high load conditions with multiple concurrent connections,
  this leads to:\n- Memory corruption in adjacent data structures\n- Segmentation
  faults in downstream processing functions\n- Incorrect behavior where pointers are
  interpreted as incompatible struct types\n- Potential crashes in the RRC layer when
  processing corrupted F1AP messages\n\nThe bug manifests most consistently when the
  gNB is processing multiple DU connections simultaneously and one DU sends a malformed
  setup request with an excessive number of served cells.\n","extra_fields":{"bug_description":"type
