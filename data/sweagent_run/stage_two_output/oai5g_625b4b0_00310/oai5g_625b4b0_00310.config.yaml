  *gNB,\n     future_ul_tti_req->pdus_list[i].pdu_size = 0;\n   }\n   future_ul_tti_req->n_pdus
  = 0;\n+  future_ul_tti_req->rach_present = 0;\n   future_ul_tti_req->n_ulsch = 0;\n   future_ul_tti_req->n_ulcch
  = 0;\n   future_ul_tti_req->n_group = 0;\ndiff --git a/openair2/LAYER2/NR_MAC_gNB/gNB_scheduler_primitives.c
  b/openair2/LAYER2/NR_MAC_gNB/gNB_scheduler_primitives.c\nindex 264150f314..81505bcd7e
  100644\n--- a/openair2/LAYER2/NR_MAC_gNB/gNB_scheduler_primitives.c\n+++ b/openair2/LAYER2/NR_MAC_gNB/gNB_scheduler_primitives.c\n@@
