  Title: Fix missing initialization of rach_present field in UL TTI requests\n\n###
  Summary\nThe `rach_present` field in `nfapi_nr_ul_tti_request_t` structures was
  not being properly initialized to 0 in two key locations. This field is conditionally
  mandatory per 3GPP specifications and should be set to 0 when no RACH is present
  in the slot.\n\nThis issue could lead to undefined behavior when the scheduler processes
  UL TTI requests with uninitialized `rach_present` values, potentially causing incorrect
  RACH detection or scheduling conflicts.\n\n### Changes\n- `openair2/LAYER2/NR_MAC_gNB/gNB_scheduler.c`:
  Added `future_ul_tti_req->rach_present = 0;` in the `clear_nr_nfapi_information`
  function to ensure proper initialization when clearing UL TTI requests.\n- `openair2/LAYER2/NR_MAC_gNB/gNB_scheduler_primitives.c`:
  Added `req->rach_present = 0;` in the `UL_tti_req_ahead_initialization` function
  to ensure proper initialization during buffer setup.\n\n### Reproduction\nTo reproduce
  this issue:\n1. Run the gNB with NR configuration\n2. Monitor UL TTI request processing\n3.
  Observe that `rach_present` field may contain garbage values when not explicitly
  set\n4. This can cause incorrect scheduling decisions when the uninitialized value
  is interpreted as RACH being present\n\nThe fix ensures that `rach_present` is always
  properly initialized to 0 as required by 3GPP specifications when no RACH is scheduled,
  preventing potential scheduling issues.\n","extra_fields":{"bug_description":"missing
  optional field that is conditionally mandatory per 3GPP specification","bug_id":"telecom_missing_optional_field","stage_one_patch":"diff
