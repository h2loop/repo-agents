  */\n+/*! \\file nfapi/open-nFAPI/fapi/src/nr_fapi_p7_utils.c\n+ * \\brief\n+ * \\author
  OpenAirInterface Software Alliance\n+ * \\date 2024\n+ * \\version 0.1\n+ * \\company
