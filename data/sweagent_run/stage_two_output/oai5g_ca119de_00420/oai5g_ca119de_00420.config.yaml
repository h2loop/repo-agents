  * \\note\n+ * \\warning\n+ */\n+\n+#include \"nr_fapi_p7_utils.h\"\n+#include <stdlib.h>\n+\n+void
  free_uci_indication(nfapi_nr_uci_indication_t *msg)\n+{\n+  if (msg == NULL) {\n+    return;\n+  }\n+\n+  //
  Free the memory allocated for each UCI in the list\n+  if (msg->uci_list != NULL)
  {\n+    for (int i = 0; i < msg->num_ucis; i++) {\n+      switch (msg->uci_list[i].pdu_type)
  {\n+        case NFAPI_NR_UCI_PUSCH_PDU_TYPE:\n+          // For PUSCH PDU, check
  and free any allocated payloads\n+          // Based on the structure, there don''t
  seem to be dynamically allocated fields\n+          break;\n+\n+        case NFAPI_NR_UCI_FORMAT_0_1_PDU_TYPE:
  {\n+          // For PUCCH Format 0/1 PDU, check and free any allocated payloads\n+          //
  Based on the structure definition, these are direct structures, not pointers\n+          //
  However, some implementations might allocate memory for these fields as pointers\n+          nfapi_nr_uci_pucch_pdu_format_0_1_t
  *pucch_pdu_0_1 = &msg->uci_list[i].pucch_pdu_format_0_1;\n+          \n+          //
  Check if sr field is a pointer (some implementations might do this)\n+          //
  This is defensive programming - in the standard structure it''s not a pointer\n+          //
  Uncomment the following lines if your implementation allocates sr as a pointer\n+          /*\n+          if
  (pucch_pdu_0_1->sr != NULL) {\n+            free(pucch_pdu_0_1->sr);\n+            pucch_pdu_0_1->sr
  = NULL;\n+          }\n+          */\n+          \n+          // Check if harq field
  is a pointer (some implementations might do this)\n+          // This is defensive
  programming - in the standard structure it''s not a pointer\n+          // Uncomment
  the following lines if your implementation allocates harq as a pointer\n+          /*\n+          if
  (pucch_pdu_0_1->harq != NULL) {\n+            // If harq->harq_list is also allocated
  dynamically\n+            if (pucch_pdu_0_1->harq->harq_list != NULL) {\n+              free(pucch_pdu_0_1->harq->harq_list);\n+              pucch_pdu_0_1->harq->harq_list
  = NULL;\n+            }\n+            free(pucch_pdu_0_1->harq);\n+            pucch_pdu_0_1->harq
  = NULL;\n+          }\n+          */\n+          break;\n+        }\n+\n+        case
  NFAPI_NR_UCI_FORMAT_2_3_4_PDU_TYPE: {\n+          // For PUCCH Format 2/3/4 PDU,
  free the dynamically allocated payloads\n+          nfapi_nr_uci_pucch_pdu_format_2_3_4_t
  *pucch_pdu = &msg->uci_list[i].pucch_pdu_format_2_3_4;\n+          \n+          //
  Free harq_payload if allocated\n+          if (pucch_pdu->harq.harq_payload != NULL)
  {\n+            free(pucch_pdu->harq.harq_payload);\n+            pucch_pdu->harq.harq_payload
  = NULL;\n+          }\n+          \n+          // Free sr_payload if allocated\n+          if
  (pucch_pdu->sr.sr_payload != NULL) {\n+            free(pucch_pdu->sr.sr_payload);\n+            pucch_pdu->sr.sr_payload
  = NULL;\n+          }\n+          \n+          // Free csi_part1_payload if allocated\n+          if
  (pucch_pdu->csi_part1.csi_part1_payload != NULL) {\n+            free(pucch_pdu->csi_part1.csi_part1_payload);\n+            pucch_pdu->csi_part1.csi_part1_payload
  = NULL;\n+          }\n+          \n+          // Free csi_part2_payload if allocated\n+          if
  (pucch_pdu->csi_part2.csi_part2_payload != NULL) {\n+            free(pucch_pdu->csi_part2.csi_part2_payload);\n+            pucch_pdu->csi_part2.csi_part2_payload
  = NULL;\n+          }\n+          break;\n+        }\n+        \n+        default:\n+          //
  Unknown PDU type, do nothing\n+          break;\n+      }\n+    }\n+    \n+    //
