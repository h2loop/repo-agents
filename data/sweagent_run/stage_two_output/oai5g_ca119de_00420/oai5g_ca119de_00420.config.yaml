  Title: Add missing free_uci_indication function to prevent memory leaks in UCI handling\n\n###
  Summary\nThe OpenAirInterface 5G codebase was missing a critical `free_uci_indication`
  function that should have been implemented in `nfapi/open-nFAPI/fapi/src/nr_fapi_p7_utils.c`.
  This function is needed to properly free memory allocated for UCI (Uplink Control
  Information) indications, particularly the dynamically allocated payload fields
  in FORMAT_2_3_4 PDU types.\n\nWithout this function, memory allocated for fields
  like `harq_payload`, `sr_payload`, `csi_part1_payload`, and `csi_part2_payload`
  was not being freed, leading to memory leaks under continuous UCI indication processing.\n\nThe
  issue was identified when analyzing the existing `phy_nr_uci_indication` functions
  in both the standard OAI implementation and the AERIAL integration, which allocate
  memory for these payload fields but lack corresponding cleanup code.\n\n### Changes\n-
  `nfapi/open-nFAPI/fapi/inc/nr_fapi_p7_utils.h`: Created new header file declaring
  the `free_uci_indication` function\n- `nfapi/open-nFAPI/fapi/src/nr_fapi_p7_utils.c`:
  Created new implementation file with proper memory freeing logic for all UCI PDU
  types\n- `nfapi/open-nFAPI/fapi/CMakeLists.txt`: Added the new source file to the
  build configuration\n- `nfapi/open-nFAPI/fapi/inc/nr_fapi.h`: Included the new header
  to make the function accessible\n\nThe implementation handles all three UCI PDU
  types and properly frees dynamically allocated memory while including defensive
  programming for different implementation variations. It follows the existing codebase
  patterns and includes proper NULL checks to prevent crashes.\n","extra_fields":{"bug_description":"missing
