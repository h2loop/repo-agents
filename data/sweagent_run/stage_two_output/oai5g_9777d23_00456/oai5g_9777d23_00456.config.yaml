  Title: Fix variable name conflicts in F1AP ASN.1 sequence encoding\n\n### Summary\nFixed
  variable name conflicts in the F1AP library that caused compilation failures when
  encoding multiple protocol extensions. The issue occurred in functions that add
  multiple extensions to the same ASN.1 sequence container using the `asn1cSequenceAdd`
  macro.\n\nWhen both HandoverPreparationInformation and MeasurementTimingConfiguration
  extensions were present in CU-to-DU RRC information, or when both DL and UL PDCP
  sequence number length extensions were present in DRB setup, the code would fail
  to compile due to variable redeclaration errors.\n\n### Changes\n- `openair2/F1AP/lib/f1ap_ue_context.c`:
  \n  - Fixed `encode_cu_to_du_rrc_info` function to use unique variable names (`ie_ext_ho`,
  `ie_ext_mtc`) for each extension\n  - Fixed DRB setup functions to use unique variable
  names (`ext_ie_dl`, `ext_ie_ul`) for PDCP extensions\n  - Applied same fixes to
  DRB modification functions\n\n","extra_fields":{"bug_description":"incorrect type
