  \n static int decode_guti_5gs_mobile_identity(Guti5GSMobileIdentity_t *guti, const
  uint8_t *buffer);\n+static int decode_imeisv_5gs_mobile_identity(Imeisv5GSMobileIdentity_t
  *imeisv, const uint8_t *buffer);\n \n static int encode_guti_5gs_mobile_identity(Guti5GSMobileIdentity_t
  *guti, uint8_t *buffer);\n static int encode_suci_5gs_mobile_identity(Suci5GSMobileIdentity_t
  *suci, uint8_t *buffer);\n@@ -64,6 +65,9 @@ int decode_5gs_mobile_identity(FGSMobileIdentity
  *fgsmobileidentity, uint8_t iei\n   if (typeofidentity == FGS_MOBILE_IDENTITY_5G_GUTI)
  {\n     decoded_rc = decode_guti_5gs_mobile_identity(&fgsmobileidentity->guti,\n                  buffer
  + decoded);\n+  } else if (typeofidentity == FGS_MOBILE_IDENTITY_IMEISV) {\n+    decoded_rc
  = decode_imeisv_5gs_mobile_identity(&fgsmobileidentity->imeisv,\n+                 buffer
  + decoded);\n   } else {\n     AssertFatal(false, \"Mobile Identity encoding of
  type %d not implemented\\n\", typeofidentity);\n   }\n@@ -75,6 +79,55 @@ int decode_5gs_mobile_identity(FGSMobileIdentity
  *fgsmobileidentity, uint8_t iei\n   return (decoded + decoded_rc);\n }\n \n+static
  int decode_imeisv_5gs_mobile_identity(Imeisv5GSMobileIdentity_t *imeisv, const uint8_t
  *buffer)\n+{\n+  int decoded = 0;\n+  \n+  imeisv->digittac01 = *(buffer + decoded)
  & 0xf;\n+  imeisv->oddeven = (*(buffer + decoded) >> 4) & 0x1;\n+  imeisv->typeofidentity
  = (*(buffer + decoded) >> 5) & 0x7;\n+  \n+  if (imeisv->typeofidentity != FGS_MOBILE_IDENTITY_IMEISV)
  {\n+    return (TLV_DECODE_VALUE_DOESNT_MATCH);\n+  }\n+  \n+  decoded++;\n+  \n+  imeisv->digittac02
  = *(buffer + decoded) & 0xf;\n+  imeisv->digittac03 = (*(buffer + decoded) >> 4)
  & 0xf;\n+  decoded++;\n+  \n+  imeisv->digittac04 = *(buffer + decoded) & 0xf;\n+  imeisv->digittac05
  = (*(buffer + decoded) >> 4) & 0xf;\n+  decoded++;\n+  \n+  imeisv->digittac06 =
  *(buffer + decoded) & 0xf;\n+  imeisv->digittac07 = (*(buffer + decoded) >> 4) &
  0xf;\n+  decoded++;\n+  \n+  imeisv->digittac08 = *(buffer + decoded) & 0xf;\n+  imeisv->digit09
  = (*(buffer + decoded) >> 4) & 0xf;\n+  decoded++;\n+  \n+  imeisv->digit10 = *(buffer
  + decoded) & 0xf;\n+  imeisv->digit11 = (*(buffer + decoded) >> 4) & 0xf;\n+  decoded++;\n+  \n+  imeisv->digit12
  = *(buffer + decoded) & 0xf;\n+  imeisv->digit13 = (*(buffer + decoded) >> 4) &
