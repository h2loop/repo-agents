  Title: Fix pack_config_request() num_tlv counting issue\n\n### Summary\nThe `pack_config_request()`
  function in nfapi_p5.c was not properly counting the number of valid TLVs before
  packing, causing mismatch between the reported count and actual packed TLVs. This
  led to unpacking errors on the receiving end.\n\n### Changes\n- `nfapi/open-nFAPI/nfapi/src/nfapi_p5.c`:
  Added logic to count valid TLVs by checking if each TLV''s tag matches the expected
  value, then updating `pNfapiMsg->num_tlv` with this count before pushing it\n- Also
  fixed the same issue in `pack_nr_config_request()` for consistency\n\n### Reproduction\nWhen
  calling `pack_config_request()` with partially populated TLVs, the function would
  push an incorrect `num_tlv` value that didn''t match the actual number of TLVs that
  were packed (since `pack_tlv` only packs TLVs with valid tags). This caused the
  receiving end to either read garbage data or miss TLVs entirely when unpacking.\n\nTo
  reproduce:\n1. Create a `nfapi_config_request_t` structure\n2. Set only a subset
  of TLVs with proper tag values\n3. Call `pack_config_request()` \n4. Observe that
  `num_tlv` pushed doesn''t match actual packed TLVs\n5. On unpacking side, incorrect
  number of TLVs are processed\n\nThe fix ensures that `num_tlv` accurately reflects
  the number of TLVs that will actually be packed by checking each TLV''s tag before
  incrementing the count.\n","extra_fields":{"bug_description":"incorrect protocol
