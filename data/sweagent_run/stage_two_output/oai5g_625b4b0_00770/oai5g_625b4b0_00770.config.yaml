  Title: Fix type confusion in nfapi_pnf_stop downstream functions\n\n### Summary\nWhen
  calling `nfapi_pnf_stop()`, certain downstream functions exhibit undefined behavior
  due to a type confusion bug in the `send_p5_msg` function pointer definition. The
  function pointer was declared to accept `nfapi_nr_p4_p5_message_header_t*` but was
  invoked with both NR and non-NR message headers, leading to memory access issues
  because of differing structure layouts.\n\nThis change modifies the function pointer
  to use the generic `nfapi_p4_p5_message_header_t*` type and updates all related
  implementations to prevent type mismatches.\n\n### Changes\n- `nfapi/open-nFAPI/pnf/public_inc/nfapi_pnf_interface.h`:
  Changed `send_p5_msg` function pointer signature.\n- `nfapi/oai_integration/socket/socket_pnf.c`:
  Updated function signature to match.\n- `nfapi/oai_integration/socket/include/socket_pnf.h`:
  Updated declaration.\n- `nfapi/oai_integration/wls_integration/include/wls_pnf.h`:
  Updated declaration.\n- `nfapi/oai_integration/wls_integration/wls_pnf.c`: Updated
  function signature.\n- `openair1/SCHED/nfapi_lte_dummy.c`: Updated dummy implementations.\n\n","extra_fields":{"bug_description":"type
