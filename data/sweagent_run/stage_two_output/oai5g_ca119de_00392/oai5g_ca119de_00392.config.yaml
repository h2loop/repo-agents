  in 5G NR gNB. When the gNB attempted to process a PositioningMeasurementFailureIndication
  message from the AMF, it would either fail to compile or exhibit undefined behavior
  due to the missing function.\n\nThe issue was traced to a missing source file `openair2/F1AP/lib/f1ap_positioning.c`
