  linking errors and runtime issues when positioning procedures were attempted.\n\n###
  Changes\n- `openair2/COMMON/f1ap_messages_types.h`: Added `f1ap_positioning_measurement_failure_indication_t`
  structure definition\n- `openair2/F1AP/lib/f1ap_positioning.c`: Created new file
