  Title: Fix version mismatch handling in telnetsrv shared library loader\n\n### Summary\nThe
  `telnetsrv_checkbuildver` function was not properly reporting version mismatches
  between the main executable and shared libraries. The function always returned 0,
  even when versions didn''t match, causing the loader to continue loading incompatible
  modules instead of aborting.\n\nThis fix ensures version mismatches are properly
  detected and reported to the loader.\n\n### Changes\n- `common/utils/telnetsrv/telnetsrv.c`:
  Modified `telnetsrv_checkbuildver` to return -1 on version mismatch\n- `common/utils/telnetsrv/telnetsrv.h`:
  Added function declaration and checkverfunc_t typedef\n\n### Reproduction\nTo reproduce
  the issue:\n1. Compile the code with mismatched versions between main executable
  and telnetsrv shared library\n2. Observe that the loader continues to load the module
  despite version mismatch\n3. With fix applied, the loader will abort when version
  mismatch is detected\n\nThe symptom is that incompatible modules are loaded which
  can lead to undefined behavior or crashes at runtime.\n","extra_fields":{"bug_description":"incorrect
