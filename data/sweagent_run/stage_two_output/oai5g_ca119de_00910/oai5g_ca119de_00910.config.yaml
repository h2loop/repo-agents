  Title: Fix segmentation fault in EMM registration initialization due to NULL user
  pointer\n\n### Summary\nThe `emm_reg_initialize()` function was being called with
  a NULL user pointer, causing segmentation faults when trying to access `user->emm_fsm_status`.
  This occurred because the global `user` structure in `UEprocess.c` was declared
  but never allocated before being passed to initialization functions.\n\nThis fix
  properly allocates the user structure and all its required sub-structures before
  calling any initialization functions.\n\n### Changes\n- `openair3/NAS/UE/UEprocess.c`:
  \n  - Allocate `user` structure using `calloc_or_fail` before initialization\n  -
  Initialize all required fields including `ueid`, file paths, and sub-structures\n  -
  Fix thread creation syntax error\n  - Add proper cleanup of all allocated memory
  in `_nas_clean()`\n  - Include necessary headers for memory management functions\n\n###
  Reproduction\nTo reproduce the issue:\n1. Start the UE process with standard configuration\n2.
  Observe segmentation fault immediately during startup when `emm_reg_initialize()`
  tries to access `user->emm_fsm_status`\n3. Backtrace shows crash in `emm_reg_initialize()`
  at `user->emm_fsm_status = emm_fsm_initialize()`\n\nThe fix ensures the user structure
  is properly allocated before any initialization functions are called, preventing
  the NULL pointer dereference.\n","extra_fields":{"bug_description":"unchecked return
