  Title: Fix race condition in MAC measurement display functions\n\n### Summary\nThe
  telnet server measurement display functions in `telnetsrv_enb_measurements.c` access
  shared RAN context data structures without proper synchronization, leading to race
  conditions when multiple threads access measurement data concurrently. This can
  cause inconsistent readings or crashes when displaying MAC/PHY/PDCP measurements.\n\nThis
  fix adds mutex protection around all measurement data access in the eNB measurement
  display functions.\n\n### Changes\n- `common/ran_context.h`: Added `measur_data_mutex`
  to RAN_CONTEXT_t structure for protecting measurement data access\n- `common/utils/telnetsrv/telnetsrv_enb_measurements.c`:
  \n  - Added pthread.h include\n  - Wrapped all measurement display functions with
  mutex lock/unlock:\n    - `measurcmd_display_phycpu`\n    - `measurcmd_display_maccpu`
  \n    - `measurcmd_display_pdcpcpu`\n    - `measurcmd_display_macstats_ue`\n    -
  `measurcmd_display_macstats`\n    - `measurcmd_display_rlcstats`\n  - Added missing
  `free(rlcstats)` in `measurcmd_display_rlcstats`\n- `executables/lte-ru.c`: Added
  initialization of `RC.measur_data_mutex` \n- `executables/nr-ru.c`: Added initialization
  of `RC.measur_data_mutex`\n\n### Reproduction\nTo reproduce the race condition:\n1.
  Start an eNB with telnet server enabled\n2. Connect multiple telnet clients simultaneously
  \n3. Run `measur maccpu` or `measur phycpu` commands concurrently from different
  clients\n4. Observe inconsistent measurement values or segmentation faults due to
  concurrent access to RC data structures\n\nThe mutex protection ensures only one
  thread can access the shared measurement data at a time, eliminating the race condition
  while preserving measurement functionality.\n","extra_fields":{"bug_description":"race
  condition on shared data accessed from multiple threads without synchronization","bug_id":"c_race_condition","stage_one_patch":"diff
