  Title: Fix file descriptor leak in VNF P7 socket initialization\n\n### Summary\nDuring
  VNF initialization, if the P7 socket binding fails or setsockopt operations encounter
  errors, the opened socket file descriptor is not properly closed, leading to resource
  leaks. This can cause the VNF to exhaust available file descriptors under repeated
  failure conditions, eventually preventing new connections.\n\nThe issue occurs in
  both LTE and NR VNF implementations where socket creation happens but error paths
  don''t ensure proper cleanup. Additionally, memory allocation failures in PNF connection
  handling could lead to crashes due to NULL pointer dereferences.\n\n### Changes\n-
  `nfapi/open-nFAPI/vnf/src/vnf_p7_interface.c`: Added `close(vnf_p7->socket)` calls
  in `nfapi_vnf_p7_start` error paths and NULL check in `nfapi_vnf_p7_add_pnf`\n-
  `nfapi/oai_integration/socket/socket_vnf.c`: Added `close(vnf_p7->socket)` calls
  in `nfapi_nr_vnf_p7_start` error paths and NULL check with socket cleanup in `nfapi_nr_vnf_p5_start`\n-
  `nfapi/oai_integration/nfapi_vnf.c`: Added NULL check in PNF allocation for AERIAL
  path\n\nTo reproduce: Configure VNF with invalid P7 port binding parameters or force
  setsockopt failures. Monitor file descriptor usage with `lsof` or `ls -l /proc/<pid>/fd/`
  - leaked sockets will accumulate over time. Alternatively, trigger memory allocation
  failures during PNF connection establishment to observe crashes.\n","extra_fields":{"bug_description":"file
