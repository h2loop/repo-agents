  Title: Fix NULL pointer dereference after memory allocation failure in RLC AM entity\n\n###
  Summary\nThe NR RLC AM entity contained a potential NULL pointer dereference when
  memory allocation failed during SDU segmentation. The bug could manifest under high
  memory pressure conditions when the system runs out of memory.\n\nThe issue was
  in the `resegment` function which used `AssertFatal` to handle allocation failures,
  causing the program to abort instead of gracefully handling the error. This was
  not considered a proper NULL check by the static analyzer.\n\n### Changes\n- `openair2/LAYER2/nr_rlc/nr_rlc_entity_am.c`:
  \n  * Changed `resegment` to return NULL on allocation failure instead of aborting\n  *
  Added proper NULL checks after memory allocation in calling functions\n  * Updated
  error handling to return -1 on failure instead of crashing\n  * Modified top-level
  PDU generation function to handle error returns gracefully\n\n","extra_fields":{"bug_description":"missing
