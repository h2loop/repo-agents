  b/openair2/LAYER2/nr_rlc/nr_rlc_entity_am.c\n@@ -986,7 +986,10 @@ static nr_rlc_sdu_segment_t
  *resegment(nr_rlc_sdu_segment_t *sdu,\n   pdu_header_size = compute_pdu_header_size(entity,
  sdu);\n \n   next = calloc(1, sizeof(nr_rlc_sdu_segment_t));\n-  AssertFatal(next
  != NULL, \"out of memory\\n\");\n+  if (next == NULL) {\n+    LOG_E(RLC, \"%s:%d:%s:
  out of memory\\n\", __FILE__, __LINE__, __FUNCTION__);\n+    return NULL;\n+  }\n   *next
  = *sdu;\n \n   over_size = pdu_header_size + sdu->size - pdu_size;\n@@ -1618,6 +1621,10
  @@ static int generate_retx_pdu(nr_rlc_entity_am_t *entity, char *buffer,\n   if
  (pdu_size > size) {\n     nr_rlc_sdu_segment_t *next_sdu;\n     next_sdu = resegment(sdu,
  entity, size);\n+    if (next_sdu == NULL) {\n+      /* Failed to allocate memory
  for segmentation */\n+      return -1;  /* Return error */\n+    }\n     /* put
  the second SDU back at the head of the retransmit list */\n     next_sdu->next =
  entity->retransmit_list;\n     entity->retransmit_list = next_sdu;\n@@ -1708,6 +1715,13
  @@ static int generate_tx_pdu(nr_rlc_entity_am_t *entity, char *buffer, int size)\n     LOG_D(RLC,
  \"Segmentation (header %d + data %d) / (%d)\\n\", pdu_header_size, size - pdu_header_size,
  pdu_size - pdu_header_size);\n     nr_rlc_sdu_segment_t *next_sdu;\n     next_sdu
  = resegment(sdu, entity, size);\n+    if (next_sdu == NULL) {\n+      /* Failed
  to allocate memory for segmentation, undo changes and return error */\n+      sdu->size
  += pdu_size - size;  /* Restore original size */\n+      sdu->is_last = 1;              /*
  Restore is_last flag */\n+      sdu->sdu->ref_count--;         /* Undo ref_count
  increment */\n+      return -1;                     /* Return error */\n+    }\n     /*
  put the second SDU back at the head of the TX list */\n     next_sdu->next = entity->tx_list;\n     entity->tx_list
  = next_sdu;\n@@ -1807,13 +1821,22 @@ int nr_rlc_entity_am_generate_pdu(nr_rlc_entity_t
  *_entity,\n \n   if (entity->retransmit_list != NULL) {\n     ret = generate_retx_pdu(entity,
  buffer, size);\n+    if (ret == -1) {\n+      /* Error occurred during retransmission
  PDU generation */\n+      return 0;  /* Return 0 to indicate no PDU was generated
  */\n+    }\n     if (ret != 0) {\n       LOG_D(RLC, \"RLC retransmit PDU\\n\");\n       return
