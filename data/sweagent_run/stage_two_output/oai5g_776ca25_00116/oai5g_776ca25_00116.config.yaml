  dereference and array out-of-bounds access when processing malformed or incomplete
  SIB1 messages. This issue could cause the UE to crash during initial cell selection,
  particularly when connecting to cells with incomplete configuration.\n\nThe root
  cause was missing validation of pointer and array bounds before accessing nested
  data structures in the decoded SIB1 message. The function assumed all optional fields
  were present and properly formatted.\n\n### Changes\n- `openair2/RRC/LTE/rrc_UE.c`:
  Added comprehensive null pointer checks and bounds validation in `decode_SIB1()`
  function\n- Added validation for PLMN identity list array access\n- Added validation
