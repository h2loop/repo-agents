  Title: Fix buffer overflow in XY view circular buffer management\n\n### Summary\nThe
  XY view component in the tracer utility had a critical buffer overflow issue in
  loop mode. When continuously appending data points, the circular buffer indexing
  would incorrectly wrap at `length` instead of `max_length`, causing data to be written
  beyond allocated memory boundaries.\n\nThis bug was particularly evident when plotting
  high-frequency signal data where more than the initial buffer size points were appended
  in a single call. The corruption would manifest as garbled plots and occasional
  segfaults in the GUI thread.\n\nThe root cause was in the `append_loop()` function
  where the wraparound check used the wrong boundary value.\n\n### Changes\n- `common/utils/T/tracer/view/xy.c`:
  Corrected buffer boundary checking in `append_loop()`\n- `common/utils/T/tracer/view/xy.c`:
  Updated buffer allocation to consistently use `max_length` \n- `common/utils/T/tracer/view/xy.c`:
  Fixed initialization of `length` and `max_length` fields for both modes\n\n","extra_fields":{"bug_description":"missing
