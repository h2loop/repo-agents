  maximum size of the buffer */\n   float *x;\n   float *y;\n   int insert_point;\n@@
  -54,11 +54,20 @@ static void append_loop(view *_this, float *x, float *y, int length)\n   for
  (i = 0; i < length; i++) {\n     this->x[ip] = x[i];\n     this->y[ip] = y[i];\n-    ip++;
  if (ip == this->length) ip = 0;\n+    ip++; if (ip == this->max_length) ip = 0;\n   }\n
  \n   this->insert_point = ip;\n \n+  /* Update the length if we haven''t filled
  the buffer yet */\n+  if (this->length < this->max_length) {\n+    this->length
  = this->insert_point;\n+    /* If we''ve wrapped around, the buffer is full */\n+    if
  (this->insert_point == 0) {\n+      this->length = this->max_length;\n+    }\n+  }\n+\n   if
  (pthread_mutex_unlock(&this->lock)) abort();\n }\n \n@@ -93,9 +102,10 @@ static
  void set(view *_this, char *name, ...)\n \n     free(this->x);\n     free(this->y);\n-    this->length
