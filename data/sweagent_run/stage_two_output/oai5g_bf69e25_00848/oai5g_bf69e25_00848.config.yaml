  Title: Fix potential buffer overread in F1AP DL RRC message encoding\n\n### Summary\nThe
  F1AP DL RRC message encoding functions in the CU and DU implementations lacked proper
  input validation, which could lead to crashes or undefined behavior when invalid
  parameters were passed. This issue was particularly problematic when the encode
  functions were called with NULL pointers or invalid buffer lengths.\n\nThis fix
  adds comprehensive input validation to all F1AP RRC message encoding functions to
  prevent buffer overreads and NULL pointer dereferences.\n\n### Changes\n- `openair2/F1AP/f1ap_cu_rrc_message_transfer.c`:
  Added input validation to `CU_send_DL_RRC_MESSAGE_TRANSFER` function and removed
  misleading comment.\n- `openair2/F1AP/f1ap_du_rrc_message_transfer.c`: Added input
  validation to `DU_send_INITIAL_UL_RRC_MESSAGE_TRANSFER` and `DU_send_UL_NR_RRC_MESSAGE_TRANSFER`
  functions and removed misleading comments.\n\n### Reproduction Steps\nTo reproduce
  this issue:\n1. Call `CU_send_DL_RRC_MESSAGE_TRANSFER` with a NULL `f1ap_dl_rrc`
  parameter\n2. Call `DU_send_UL_NR_RRC_MESSAGE_TRANSFER` with a NULL `msg` parameter
  or with `rrc_container` set to NULL\n3. Call `DU_send_INITIAL_UL_RRC_MESSAGE_TRANSFER`
  with invalid buffer lengths\n\nWithout these fixes, such calls would result in segmentation
  faults or undefined behavior. With the fixes, appropriate error messages are logged
  and the functions return -1.\n","extra_fields":{"bug_description":"ASN.1 encoding
