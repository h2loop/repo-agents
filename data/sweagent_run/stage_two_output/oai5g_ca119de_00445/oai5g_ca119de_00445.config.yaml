  Title: Fix segmentation fault in M2AP MCE setup response generation\n\n### Summary\nThe
  `m2ap_MCE_generate_m2_setup_response` function in `m2ap_MCE_generate_messages.c`
  was not properly populating the required Information Elements, causing segmentation
  faults when the incomplete message was encoded and sent over the network. This occurred
  because all the actual data population code was commented out, leaving only empty
  IE structures.\n\nThis fix implements the complete M2 Setup Response message generation
  with proper IE population.\n\n### Changes\n- `openair2/M2AP/m2ap_MCE_generate_messages.c`:
  Completely reimplemented the `m2ap_MCE_generate_m2_setup_response` function to properly
  populate all required IEs including GlobalMCE_ID, optional MCEname, and MCCHrelatedBCCH_ConfigPerMBSFNArea.\n-
  `openair3/UTILS/conversions.h`: Added `MACRO_MCE_ID_TO_BIT_STRING` macro for proper
  MCE ID to BIT STRING conversion.\n\n### Reproduction\nTo reproduce the original
  issue:\n1. Configure an MCE with M2 interface\n2. Trigger an M2 Setup procedure\n3.
  The MCE would attempt to generate an M2 Setup Response using the broken function\n4.
  Segmentation fault would occur during ASN.1 encoding due to improperly populated
  IEs\n\nWith this fix, the M2 Setup Response is properly generated and the M2 interface
  establishment succeeds.\n","extra_fields":{"bug_description":"file descriptor leak
