  Title: Fix M2AP Scheduling Information Response Handler\n\n### Summary\nThe M2AP
  MBMS Scheduling Information Response handler in the MCE was not properly processing
  incoming PDU responses from the eNB. This caused message loss and corruption downstream
  as critical IE information (MCE_MBMS_M2AP_ID, ENB_MBMS_M2AP_ID) was never extracted
  from the response.\n\nThe root cause was that the entire PDU processing logic was
  commented out in the handler function, leaving only skeleton code and a direct ITTI
  message send without any validation or IE extraction.\n\nThis fix implements the
  proper PDU parsing logic, extracts and validates the mandatory IEs, and ensures
  the response is correctly forwarded to the MCE application layer.\n\n### Changes\n-
  `openair2/M2AP/m2ap_MCE_interface_management.c`: Uncommented and implemented PDU
  processing logic in MCE_handle_MBMS_SCHEDULING_INFORMATION_RESPONSE\n- `openair2/M2AP/m2ap_MCE_interface_management.c`:
  Added proper IE extraction loop with switch statement for MCE_MBMS_M2AP_ID and ENB_MBMS_M2AP_ID\n-
  `openair2/M2AP/m2ap_MCE_interface_management.c`: Fixed ITTI message sending to use
  correct instance parameter\n- `openair2/M2AP/m2ap_MCE_interface_management.c`: Added
  proper logging for debugging\n\n","extra_fields":{"bug_description":"F1AP interface
