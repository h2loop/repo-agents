  Title: Fix missing configuration assignment in eth_get_dev_conf_raw_IF4p5\n\n###
  Summary\nThe `eth_get_dev_conf_raw_IF4p5` function in the ETHERNET transport layer
  was not properly assigning the received configuration data to `device->openair0_cfg`.
  This caused downstream functions to operate with uninitialized configuration data,
  leading to incorrect behavior in RRU initialization.\n\nAdditionally, both `eth_get_dev_conf_raw`
  and `eth_get_dev_conf_raw_IF4p5` had memory leaks where allocated memory was not
  freed in error paths.\n\nThis fix ensures that:\n1. Configuration data received
  in `eth_get_dev_conf_raw_IF4p5` is properly assigned to `device->openair0_cfg`\n2.
  Memory is properly freed in error cases for both configuration functions\n3. RRU
  initialization now works correctly with IF4p5 transport mode\n\n### Changes\n- `radio/ETHERNET/eth_raw.c`:
  \n  - Uncommented `device->openair0_cfg=(openair0_config_t *)(msg + MAC_HEADER_SIZE_BYTES);`
  in `eth_get_dev_conf_raw_IF4p5`\n  - Added `free(msg);` before exit calls in both
  `eth_get_dev_conf_raw` and `eth_get_dev_conf_raw_IF4p5` to fix memory leaks\n","extra_fields":{"bug_description":"signed/unsigned
