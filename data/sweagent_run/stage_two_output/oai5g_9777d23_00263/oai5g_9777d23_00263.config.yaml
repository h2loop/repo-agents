  Title: Fix CRC computation error in NAS message integrity checking\n\n### Summary\nThe
  NAS message integrity checking logic was incorrectly forcing MAC matching for all
  messages when there was no security context, causing false positive CRC errors.
  Additionally, AUTHENTICATION REJECT messages and other EMM messages that can be
  sent without integrity protection were being rejected when they should be processed
  normally.\n\nThis fix removes the problematic MAC forcing logic and properly handles
  messages with SECURITY_HEADER_TYPE_NOT_PROTECTED according to 3GPP TS 24.301 specification.\n\n###
  Changes\n- `openair3/NAS/COMMON/API/NETWORK/nas_message.c`: \n  - Removed the `NAS_CODE_TO_BE_MODIFIED`
  section that was forcing MAC values\n  - Added proper logic to skip integrity checking
  for messages with `SECURITY_HEADER_TYPE_NOT_PROTECTED`\n  - Added null check for
  emm_security_context in nas_message_decrypt\n  - Added necessary header includes
  for security header type constants\n\n### Reproduction\nTo reproduce the issue:\n1.
  Send an AUTHENTICATION REJECT message with security header type 0 (not protected)\n2.
  The message would be rejected due to failed integrity check even though it''s valid
  according to 3GPP spec\n3. Alternatively, messages with mismatched MAC values would
  incorrectly pass integrity checking due to the forced MAC logic\n\nThe fix ensures
  that messages allowed to be sent without integrity protection are processed correctly,
  while still maintaining proper integrity checking for protected messages.\n","extra_fields":{"bug_description":"CRC
