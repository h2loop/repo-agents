  and `eq_f1ap_drb_to_be_setup`\n- `openair2/F1AP/lib/f1ap_lib_common.c`: Implemented
  all required equality functions with proper NULL pointer handling and complete structure
  comparison\n\nThe implementation follows the existing patterns in the F1AP library
  and provides both the properly named function and the exact name mentioned in various
  parts of the codebase.\n","extra_fields":{"bug_description":"incorrect protocol
