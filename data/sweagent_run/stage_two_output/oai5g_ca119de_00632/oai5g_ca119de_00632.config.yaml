  during UE context management procedures.\n\nThe function was expected to exist based
  on the existing naming conventions and usage patterns in the codebase but was never
  implemented. This led to compilation errors and runtime issues when modules tried
  to use this function.\n\n### Changes\n- `openair2/F1AP/lib/f1ap_lib_common.h`: Added
