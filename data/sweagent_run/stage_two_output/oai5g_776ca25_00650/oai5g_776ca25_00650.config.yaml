  Title: Fix buffer overflow in nr_polar_rate_matching_int16 when i_bil=1\n\n### Summary\nThe
  `nr_polar_rate_matching_int16` function in the polar coding procedures was experiencing
  undefined behavior and producing incorrect results when `i_bil=1` due to improper
  buffer handling in the rate matching deinterleaving operation.\n\nWhen processing
  polar coded data with bit interleaving enabled, the function would call `nr_polar_rm_deinterleaving_cb(input,
  input, E)` with the same buffer for both input and output parameters. However, the
  deinterleaving function modifies the data while reading from it, causing data corruption
  and unpredictable decoder behavior.\n\nThis issue manifests as incorrect polar decoding
  results, particularly affecting PBCH and DCI processing where i_bil=1 is used for
  rate matching. Users may observe:\n- UE failing to synchronize with gNB\n- Random
  access failures\n- DCI detection and decoding failures\n- Inconsistent CRC validation
  results\n\n### Changes\n- `openair1/PHY/CODING/nrPolar_tools/nr_polar_procedures.c`:
  Modified `nr_polar_rate_matching_int16` to use a temporary buffer when `i_bil=1`
  to prevent self-modification during deinterleaving\n- Added bounds checking to prevent
  potential buffer overflows in rate matching pattern access\n- Improved error handling
  for memory allocation failures\n\n","extra_fields":{"bug_description":"wrong default
  configuration value not matching 3GPP specification default","bug_id":"telecom_config_wrong_default","stage_one_patch":"diff
