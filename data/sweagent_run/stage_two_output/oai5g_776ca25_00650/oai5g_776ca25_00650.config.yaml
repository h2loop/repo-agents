  b/openair1/PHY/CODING/nrPolar_tools/nr_polar_procedures.c\n@@ -507,23 +507,47 @@
  void nr_polar_rate_matching_int16(int16_t *input,\n                                   const
  uint16_t E,\n                                   const uint8_t i_bil)\n {\n+  int16_t
  *temp_input = NULL;\n+  const int16_t *input_ptr = input;\n+  \n   if (i_bil ==
  1) {\n-    nr_polar_rm_deinterleaving_cb(input, input, E);\n+    /* Need to use
  a temporary buffer since nr_polar_rm_deinterleaving_cb \n+     * modifies the data
  while reading from it */\n+    temp_input = malloc(E * sizeof(int16_t));\n+    if
  (temp_input != NULL) {\n+      memcpy(temp_input, input, E * sizeof(int16_t));\n+      nr_polar_rm_deinterleaving_cb(temp_input,
  temp_input, E);\n+      input_ptr = temp_input;\n+    } else {\n+      /* If malloc
  fails, we proceed with original input \n+       * This may give incorrect results
  but avoids crashing */\n+#ifdef DEBUG\n+      printf(\"Warning: Failed to allocate
  temporary buffer for deinterleaving\\n\");\n+#endif\n+    }\n   }\n \n-  if (E >=
  N) { // repetition\n+  if (E >= N) { /* repetition */\n     memset((void *)output,
  0, N * sizeof(int16_t));\n-    for (int i = 0; i <= E - 1; i++)\n-      output[rmp[i]]
  += input[i];\n+    for (int i = 0; i <= E - 1; i++) {\n+      if (rmp[i] < N)  /*
  Bounds check to prevent buffer overflow */\n+        output[rmp[i]] += input_ptr[i];\n+    }\n   }
  else {\n     if ((K / (double)E) <= (7.0 / 16))\n-      memset((void *)output, 0,
  N * sizeof(int16_t)); // puncturing\n-    else { // shortening\n+      memset((void
  *)output, 0, N * sizeof(int16_t)); /* puncturing */\n+    else { /* shortening */\n       for
  (int i = 0; i <= N - 1; i++)\n-        output[i] = 32767; // instead of INFINITY,
  to prevent [-Woverflow]\n+        output[i] = 32767; /* instead of INFINITY, to
  prevent [-Woverflow] */\n     }\n \n-    for (int i = 0; i <= E - 1; i++)\n-      output[rmp[i]]
  = input[i];\n+    for (int i = 0; i <= E - 1; i++) {\n+      if (rmp[i] < N)  /*
  Bounds check to prevent buffer overflow */\n+        output[rmp[i]] = input_ptr[i];\n+    }\n+  }\n+  \n+  if
