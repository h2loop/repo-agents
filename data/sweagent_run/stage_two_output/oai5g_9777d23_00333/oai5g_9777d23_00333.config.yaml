  Title: Fix pdcch_detection_mrc_i function implementation and declaration\n\n###
  Summary\nThe `pdcch_detection_mrc_i` function in the LTE UE transport layer had
  several issues that caused incorrect behavior when called:\n\n1. The function was
  missing a proper declaration in the header file, making it unusable from other modules\n2.
  The loop bounds were hardcoded to use `frame_parms->N_RB_DL*3` instead of a flexible
  `nb_rb*3` parameter\n3. There were no null pointer checks for optional parameters
  like `rho`, `rxdataF_comp_i`, and `rho_i`\n4. The function signature didn''t match
  the expected pattern from similar MRC functions in the codebase\n\nThis fix addresses
  all these issues by:\n- Adding proper function declarations to `transport_proto_ue.h`
  with appropriate documentation\n- Modifying the function signature to include an
  `nb_rb` parameter for flexible resource block handling\n- Adding null pointer checks
  to prevent crashes when optional parameters are not provided\n- Updating the loop
  bounds to use the flexible `nb_rb*3` parameter instead of hardcoded values\n\n###
  Changes\n- `openair1/PHY/LTE_UE_TRANSPORT/dci_ue.c`: Fixed function implementation
  with proper parameter handling and null checks\n- `openair1/PHY/LTE_UE_TRANSPORT/transport_proto_ue.h`:
  Added function declarations with proper documentation\n\n### Reproduction\nTo reproduce
  the original issue:\n1. Attempt to call `pdcch_detection_mrc_i()` from another module
  - this would fail to compile due to missing declaration\n2. If the function was
  called with a subset of resource blocks, it would process the wrong number of elements
  due to hardcoded loop bounds\n3. If any of the optional parameters were NULL, the
  function would crash with a segmentation fault\n4. The function behavior would be
  inconsistent with other similar MRC functions in the codebase\n\nAfter this fix,
  the function can be properly called with appropriate parameters and will behave
  consistently with the expected MRC processing pattern.\n","extra_fields":{"bug_description":"missing
