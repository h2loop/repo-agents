  Title: Fix SIB23 NB-IoT encoding function memory management and logic error\n\n###
  Summary\nThe `do_SIB23_NB_IoT` function in `openair2/RRC/LTE/MESSAGES/asn1_msg_NB_IoT.c`
  had critical issues that prevented proper SIB2/3 NB-IoT message generation. The
  function contained a backwards null check that would exit when the BCCH message
  pointer was valid, and lacked proper error handling for memory allocations.\n\n###
  Changes\n- Fixed backwards null check logic that was preventing proper initialization\n-
  Added comprehensive error handling for all CALLOC/malloc calls\n- Implemented proper
  resource cleanup on allocation failures\n- Moved variable declarations to appropriate
  locations\n\n### Reproduction\nWhen attempting to configure NB-IoT SIB2/3 messages,
  the function would incorrectly exit with \"BCCH_MESSAGE_NB is null, exiting\" even
  when the message pointer was valid. This resulted in SIB23_NB_IoT messages not being
  generated properly, causing RRC connection failures for NB-IoT UEs during initial
  access.\n\nIn some cases, memory allocation failures would cause segmentation faults
  or memory leaks due to missing error checking and cleanup paths.\n\n","extra_fields":{"bug_description":"configuration
