  Title: Fix PRACH scheduling in TDD mixed slots\n\n### Summary\nThe `nr_ue_prach_scheduler`
  function was incorrectly scheduling PRACH transmissions in TDD mixed slots where
  the PRACH symbols were not within the UL portion of the slot. This was causing resource
  block allocation violations downstream.\n\n### Changes\n- `openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c`:
  Added validation in `nr_ue_prach_scheduler` to ensure PRACH symbols are within the
  UL portion of mixed slots in TDD configurations.\n\n### Reproduction\nIn TDD configurations
  with mixed slots, PRACH was being scheduled even when the PRACH symbols fell outside
  the UL portion of the slot. This led to incorrect resource block allocation and
  scheduling constraint violations that could be observed as:\n- PRACH transmission
  failures\n- gNB rejecting PRACH due to symbol misalignment\n- UE unable to complete
  random access procedure\n\nThe issue can be reproduced by configuring a UE with
  TDD mixed slot configuration where PRACH occasions overlap with DL symbols in the
  mixed slot.\n","extra_fields":{"bug_description":"incorrect resource block allocation
  violating scheduling constraints","bug_id":"telecom_sched_incorrect_rb_allocation","stage_one_patch":"diff
  --git a/openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c b/openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c\nindex
  b95597a0ba..ef361dd6cb 100644\n--- a/openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c\n+++
  b/openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c\n@@ -2115,6 +2115,73 @@ static void
  nr_ue_prach_scheduler(NR_UE_MAC_INST_t *mac, frame_t frameP, slot_t\n \n   if (is_ul_slot(slotP,
  &mac->frame_structure)) {\n     if (slotP == prach_occasion_info->slot) {\n+      //
  For TDD mixed slots, we need to check that PRACH symbols are within the UL portion\n+      if
  (mac->frame_structure.frame_type == TDD) {\n+        // Get PRACH duration based
  on format\n+        int prach_duration = 0;\n+        int format = prach_occasion_info->format;\n+        switch
  (format) { // single PRACH format\n+          case 0:  // PRACH format 0 -> FAPI
  format 0 -> duration 2\n+            prach_duration = 2;\n+            break;\n+          case
  1:  // PRACH format 1 -> FAPI format 1 -> duration 4\n+            prach_duration
  = 4;\n+            break;\n+          case 2:  // PRACH format 2 -> FAPI format
  2 -> duration 6\n+            prach_duration = 6;\n+            break;\n+          case
  3:  // PRACH format 3 -> FAPI format 3 -> duration 12\n+            prach_duration
  = 12;\n+            break;\n+          case 0xa1:  // PRACH format A1 -> FAPI format
  4 -> duration 2\n+            prach_duration = 2;\n+            break;\n+          case
  0xa2:  // PRACH format A2 -> FAPI format 5 -> duration 4\n+            prach_duration
  = 4;\n+            break;\n+          case 0xa3:  // PRACH format A3 -> FAPI format
  6 -> duration 6\n+            prach_duration = 6;\n+            break;\n+          case
  0xb1:  // PRACH format B1 -> FAPI format 7 -> duration 2\n+            prach_duration
  = 2;\n+            break;\n+          case 0xb4:  // PRACH format B4 -> FAPI format
  8 -> duration 12\n+            prach_duration = 12;\n+            break;\n+          case
  0xc0:  // PRACH format C0 -> FAPI format 9 -> duration 2\n+            prach_duration
  = 2;\n+            break;\n+          case 0xc2:  // PRACH format C2 -> FAPI format
  10 -> duration 6\n+            prach_duration = 6;\n+            break;\n+          default:\n+            AssertFatal(false,
  \"Invalid PRACH format %d\", format);\n+        }\n+        \n+        int start_symbol
  = prach_occasion_info->start_symbol;\n+        int end_symbol = start_symbol + prach_duration;\n+        \n+        //
  For mixed slots, check if PRACH symbols are within UL portion\n+        if (is_mixed_slot(slotP,
  &mac->frame_structure)) {\n+          slot_t s = get_slot_idx_in_period(slotP, &mac->frame_structure);\n+          tdd_bitmap_t
  *bitmap = &mac->frame_structure.period_cfg.tdd_slot_bitmap[s];\n+          if (bitmap->num_ul_symbols
  > 0) {\n+            int ul_start = NR_NUMBER_OF_SYMBOLS_PER_SLOT - bitmap->num_ul_symbols;\n+            int
  ul_end = NR_NUMBER_OF_SYMBOLS_PER_SLOT - 1;\n+            // If PRACH symbols are
  not within UL portion, skip scheduling\n+            if (start_symbol < ul_start
  || end_symbol > ul_end) {\n+              LOG_W(NR_MAC, \"PRACH symbols [%d-%d]
  not within UL portion [%d-%d] of mixed slot %d\\n\", \n+                    start_symbol,
  end_symbol, ul_start, ul_end, slotP);\n+              return;\n+            }\n+          }
  else {\n+            // No UL symbols in mixed slot, can''t schedule PRACH\n+            LOG_W(NR_MAC,
  \"No UL symbols in mixed slot %d for PRACH scheduling\\n\", slotP);\n+            return;\n+          }\n+        }\n+      }\n+      \n       fapi_nr_ul_config_request_pdu_t
  *pdu = lockGet_ul_config(mac, frameP, slotP, FAPI_NR_UL_CONFIG_TYPE_PRACH);\n       if
  (!pdu) {\n         LOG_E(NR_MAC, \"Error in PRACH allocation\\n\");\n","start_fn":"nr_ue_prach_scheduler","start_fn_file":"openair2/LAYER2/NR_MAC_UE/nr_ue_scheduler.c","subsystem":"openair2/LAYER2/NR_MAC_UE"},"type":"text","id":"oai5g_625b4b0_00227"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
