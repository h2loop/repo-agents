  Title: Fix missing connection status notification in user API close\n\n### Summary\nWhen
  `user_api_close()` is called, it directly closes the connection endpoint without
  sending any notification to the user application about the connection being terminated.
  This causes the user application to miss a mandatory information element in outgoing
  signaling messages, leading to potential synchronization issues.\n\nThis fix adds
  a connection status notification mechanism that informs the user application when
  the connection is being closed.\n\n### Changes\n- `openair3/NAS/UE/API/USER/user_indication.h`:
  Added `USER_IND_CONN` notification type and `user_ind_conn_t` structure\n- `openair3/NAS/UE/API/USER/user_api.c`:
  \n  - Added `_user_api_connection_handler` function to handle connection status
  notifications\n  - Registered the new handler in `user_api_initialize`\n  - Modified
  `user_api_close` to send connection closed notification before closing endpoint\n\n###
  Reproduction\nTo reproduce the issue:\n1. Establish a connection through the user
  API\n2. Call `user_api_close()` \n3. Observe that no connection status notification
  is sent to the user application\n4. User application may experience synchronization
  issues due to missing connection status information\n\nThe fix ensures that when
  `user_api_close()` is called, a proper connection status notification is sent before
  the connection endpoint is closed, resolving the missing mandatory information element
  issue.\n","extra_fields":{"bug_description":"missing mandatory information element
  in outgoing signaling message","bug_id":"telecom_missing_mandatory_ie","stage_one_patch":"diff
