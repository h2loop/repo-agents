  -72,6 +72,7 @@ static int _user_api_registration_handler(user_api_id_t *user_api_id,
  unsigned c\n static int _user_api_location_handler(user_api_id_t *user_api_id, unsigned
  char id, const void* data, size_t size);\n static int _user_api_network_handler(user_api_id_t
  *user_api_id, unsigned char id, const void* data, size_t size);\n static int _user_api_pdn_connection_handler(user_api_id_t
  *user_api_id, unsigned char id, const void* data, size_t size);\n+static int _user_api_connection_handler(user_api_id_t
  *user_api_id, unsigned char id, const void* data, size_t size);\n \n static int
  _user_api_send(user_api_id_t *user_api_id, at_response_t* data);\n \n@@ -161,6 +162,9
  @@ int user_api_initialize(user_api_id_t *user_api_id, const char* host, const char\n   }
  else if (user_ind_register(USER_IND_PDN, AT_CGACT, NULL) != RETURNok) {\n     LOG_TRACE(WARNING,
  \"USR-API   - \"\n               \"Failed to enable PDN connection notification\");\n+  }
  else if (user_ind_register(USER_IND_CONN, 0, _user_api_connection_handler) != RETURNok)
  {\n+    LOG_TRACE(WARNING, \"USR-API   - \"\n+              \"Failed to register
  connection status notification\");\n   } else {\n     LOG_TRACE(INFO, \"USR-API   -
  \"\n               \"Notification handlers successfully registered\");\n@@ -350,6
  +354,11 @@ void user_api_close(user_api_id_t *user_api_id)\n {\n   LOG_FUNC_IN;\n
  \n+  /* Send connection closed notification */\n+  user_indication_t ind;\n+  ind.notification.conn.status
  = AT_ERROR_NO_CONNECTION_TO_PHONE;\n+  user_ind_notify(user_api_id, USER_IND_CONN,
  (void*)&ind, 0);\n+\n   /* Cleanup the connection endpoint */\n   user_api_id->close(user_api_id->endpoint)
  ;\n   user_api_id->endpoint = NULL;\n@@ -753,6 +762,44 @@ static int _user_api_pdn_connection_handler(user_api_id_t
  *user_api_id, unsigned\n   /* Encode and send the AT command response message to
  the user */\n   int bytes = _user_api_send(user_api_id, &at_response);\n \n+/****************************************************************************\n+
  **                                                                        **\n+
  ** Name:  _user_api_connection_handler()                            **\n+ **                                                                        **\n+
  ** Description: Procedure executed upon receiving connection status       **\n+
  **    notification whenever there is a change in the connection     **\n+ **    status
  between the NAS and the user application.              **\n+ **    The connection
  status data are then displayed to the user.    **\n+ **                                                                        **\n+
  ** Inputs:  id:    Not used                                   **\n+ **    data:    Generic
  pointer to the connection status data  **\n+ **    size:    Not used                                   **\n+
  **      Others:  None                                       **\n+ **                                                                        **\n+
