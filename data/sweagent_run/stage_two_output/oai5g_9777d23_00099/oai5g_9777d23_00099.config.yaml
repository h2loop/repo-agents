  Title: Fix PNF WLS initialization memory management\n\n### Summary\nThe `phy_wls_init()`
  function in the PNF was not properly initializing the WLS memory management structures,
  causing unexpected behavior during PNF operation. This fix aligns the PNF initialization
  with the VNF implementation.\n\n### Changes\n- `nfapi/oai_integration/wls_integration/wls_pnf.c`:
  Enhanced `phy_wls_init()` to properly initialize memory management structures\n-
  `nfapi/oai_integration/wls_integration/wls_common.c`: Moved common memory management
  functions from VNF to shared location\n- `nfapi/oai_integration/wls_integration/include/wls_common.h`:
  Added function declarations\n- `nfapi/oai_integration/wls_integration/wls_vnf.c`:
  Removed duplicate code now in common file\n\n### Reproduction\nWhen running the
  PNF with WLS transport, the `phy_wls_init()` function would return successfully
  but subsequent memory operations would fail due to uninitialized memory management
  structures. This manifested as segmentation faults during message processing or
  incorrect message handling.\n\nTo reproduce:\n1. Configure OAI 5G with WLS transport
  enabled\n2. Start PNF with WLS interface\n3. Observe segmentation fault or memory
  access errors during initial message exchange\n\nThe fix ensures proper initialization
  of mutexes, memory arrays, and block queues similar to the VNF implementation.\n","extra_fields":{"bug_description":"file
