  Title: Fix stale protocol state in DMRS channel estimation for multi-antenna configurations\n\n###
  Summary\nThe NR UE DMRS channel estimation contained a stale protocol state bug
  that manifested when using multiple receive antennas. The `delay_t` structure used
  for time delay estimation was shared across all antenna iterations without proper
  reinitialization, causing delay estimates from previous antennas to contaminate
  subsequent antenna processing.\n\nThis led to incorrect channel estimates and potential
  decoding failures, particularly noticeable in high mobility scenarios with 4+ receive
  antennas where timing differences between antennas were significant.\n\nThe bug
  was introduced when the delay estimation functionality was extended to support multiple
  antennas but the state management was not properly updated.\n\n### Changes\n- `openair1/PHY/NR_UE_ESTIMATION/nr_dl_channel_estimation.c`:
