  Title: Fix asymmetric comparison in x2ap_get_eNB red-black tree lookup\n\n### Summary\nThe
  x2ap_get_eNB function was returning incorrect results when searching for eNB entries
  in the red-black tree due to an asymmetric comparison function. The bug manifested
  when trying to look up entries by connection ID (cnx_id) in scenarios where the
  tree contained mixed entries identified by association ID (assoc_id) and connection
  ID.\n\nThe issue was in the x2ap_eNB_compare_assoc_id function which only checked
  p1->assoc_id to determine comparison logic but ignored p2->assoc_id, leading to
  inconsistent tree ordering and failed lookups.\n\n### Changes\n- `openair2/X2AP/x2ap_eNB_management_procedures.c`:
  Fixed comparison function to properly handle all combinations of assoc_id/cnx_id
  lookups\n- Made the comparison symmetric by checking both p1 and p2 assoc_id values\n-
  Added proper handling for mixed tree entries (some identified by assoc_id, others
  by cnx_id)\n\n","extra_fields":{"bug_description":"unchecked return value from a
  function that can indicate failure","bug_id":"c_unchecked_return_value","stage_one_patch":"diff
  --git a/openair2/X2AP/x2ap_eNB_management_procedures.c b/openair2/X2AP/x2ap_eNB_management_procedures.c\nindex
  442adbd045..5fd5050669 100644\n--- a/openair2/X2AP/x2ap_eNB_management_procedures.c\n+++
  b/openair2/X2AP/x2ap_eNB_management_procedures.c\n@@ -56,7 +56,8 @@ RB_GENERATE(x2ap_enb_map,
  x2ap_eNB_data_s, entry, x2ap_eNB_compare_assoc_id);\n int x2ap_eNB_compare_assoc_id(\n   struct
  x2ap_eNB_data_s *p1, struct x2ap_eNB_data_s *p2)\n {\n-  if (p1->assoc_id == -1)
  {\n+  if (p1->assoc_id == -1 && p2->assoc_id == -1) {\n+    /* Both are identified
  by cnx_id */\n     if (p1->cnx_id < p2->cnx_id) {\n       return -1;\n     }\n@@
  -64,7 +65,8 @@ int x2ap_eNB_compare_assoc_id(\n     if (p1->cnx_id > p2->cnx_id)
  {\n       return 1;\n     }\n-  } else {\n+  } else if (p1->assoc_id != -1 && p2->assoc_id
  != -1) {\n+    /* Both are identified by assoc_id */\n     if (p1->assoc_id < p2->assoc_id)
  {\n       return -1;\n     }\n@@ -72,6 +74,14 @@ int x2ap_eNB_compare_assoc_id(\n     if
  (p1->assoc_id > p2->assoc_id) {\n       return 1;\n     }\n+  } else {\n+    /*
  One is identified by assoc_id, the other by cnx_id - not equal */\n+    /* We need
  to determine the ordering - entries with assoc_id come first */\n+    if (p1->assoc_id
  == -1) {\n+      return -1; /* p1 (cnx_id) comes before p2 (assoc_id) */\n+    }
  else {\n+      return 1; /* p1 (assoc_id) comes after p2 (cnx_id) */\n+    }\n   }\n
  \n   /* Matching reference */\n@@ -246,7 +256,7 @@ x2ap_eNB_data_t  * x2ap_is_eNB_assoc_id_in_list
  (const uint32_t sctp_assoc_id)\n     found = RB_FIND(x2ap_enb_map, &inst->x2ap_enb_head,
  &temp);\n     if (found != NULL){\n       if (found->assoc_id == sctp_assoc_id)
  {\n-\treturn found;\n+        return found;\n       }\n     }\n   }\n","start_fn":"x2ap_get_eNB","start_fn_file":"openair2/X2AP/x2ap_eNB_management_procedures.c","subsystem":"openair2/X2AP"},"type":"text","id":"oai5g_9777d23_00878"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
