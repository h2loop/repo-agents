  Title: Fix buffer overflow in RRC UE DRB configuration processing\n\n### Summary\nThe
  RRC UE module had a buffer overflow vulnerability in `rrc_ue_process_radioResourceConfigDedicated`
  function when processing DRB configurations. The `DRB_config` array was sized for
  only 8 DRBs but LTE specifications allow up to 32 DRBs. When an eNB sent a configuration
  with DRB identity > 8, it would cause out-of-bounds array access.\n\nThis fix increases
  the DRB_config array size to accommodate all valid DRB identities and adds bounds
  checking to prevent buffer overflow.\n\n### Changes\n- `openair2/RRC/LTE/rrc_defs.h`:
  Increased DRB_config array size from 8 to 32\n- `openair2/RRC/LTE/rrc_UE.c`: Added
  bounds checking in rrc_ue_process_radioResourceConfigDedicated\n\n### Reproduction\nTo
  reproduce this issue:\n1. Configure an eNB to send RRCConnectionReconfiguration
  with DRB identity > 8\n2. Observe UE crash or memory corruption when processing
  the DRB configuration\n3. Valgrind or ASAN would show buffer overflow errors in
  the DRB_config array access\n\nThe fix prevents this by ensuring the array can accommodate
  all valid DRB identities and by adding defensive bounds checking.\n","extra_fields":{"bug_description":"buffer
