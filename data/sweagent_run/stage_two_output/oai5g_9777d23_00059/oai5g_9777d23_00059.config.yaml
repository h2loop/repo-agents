  Title: Fix buffer overflow in pack_tdd_channel_measurement_value function\n\n###
  Summary\nThe `pack_tdd_channel_measurement_value` function in nfapi_p7.c was missing
  bounds checking for `number_of_subbands` and `num_atennas` parameters, which could
  lead to buffer overflows when processing malformed input data. This fix adds proper
  bounds checking to prevent out-of-bounds array access.\n\n### Changes\n- `nfapi/open-nFAPI/nfapi/src/nfapi_p7.c`:
  Added bounds checking for `number_of_subbands` and `num_atennas` in `pack_tdd_channel_measurement_value`
  function\n- `nfapi/open-nFAPI/nfapi/src/nfapi_p7.c`: Added bounds checking for `number_of_subbands`,
  `num_antennas`, and `scheduled_ues` in `pack_tpm_value` function  \n- `nfapi/open-nFAPI/nfapi/src/nfapi_p7.c`:
  Added bounds checking for `number_of_subbands` in `pack_dl_config_dlsch_pdu_rel8_value`
  function\n- `nfapi/open-nFAPI/nfapi/src/nfapi_p7.c`: Added bounds checking for `num_antennas`
  in `pack_bf_vector_info` and `pack_bf_vector` functions\n- `nfapi/open-nFAPI/nfapi/src/nfapi_p7.c`:
  Added bounds checking for `epdcch_num_prb` in `pack_dl_config_epdcch_parameters_rel11_value`
  function\n- `nfapi/open-nFAPI/nfapi/src/nfapi_p7.c`: Added bounds checking for `number_of_ack_nack`
  in `pack_harq_indication_tdd_rel9_value` and `pack_harq_indication_tdd_rel13_value`
  functions\n\n### Reproduction\nTo reproduce the issue:\n1. Create a TDD channel
  measurement structure with `number_of_subbands` greater than `NFAPI_MAX_NUM_SUBBANDS`
  (13)\n2. Call `pack_tdd_channel_measurement_value` with this structure\n3. Observe
  buffer overflow when accessing `subands` array beyond its bounds\n4. Similar issue
  occurs with `num_atennas` greater than `NFAPI_MAX_NUM_PHYSICAL_ANTENNAS` (8)\n\nThe
  fix prevents these buffer overflows by checking the parameter values against the
  maximum allowed values before processing the arrays.\n","extra_fields":{"bug_description":"missing
  cleanup of allocated resources on early return or error path","bug_id":"c_missing_cleanup","stage_one_patch":"diff
