  indices to access static lookup tables without validating the indices against table
  bounds.\n\nThe bug manifested as memory corruption and segmentation faults during
  PDSCH/PUSCH configuration when the gNB signaled antenna port indices that exceeded
  the size of the corresponding lookup tables.\n\n### Changes\n- `openair2/LAYER2/NR_MAC_UE/mac_tables.c`:
