  Title: Fix missing copy_uci_indication_PUSCH implementation causing UCI PUSCH data
  loss\n\n### Summary\nThe `copy_uci_indication_PUSCH()` function was referenced in
  VNF code but the actual implementation was missing from the codebase. This caused
  UCI indication data for PUSCH PDU types to be improperly handled, with log messages
  showing \"unhandled NFAPI_NR_UCI_PUSCH_PDU_TYPE\". \n\nThe root cause was that while
  the function was called, there was no proper implementation to copy the dynamically
  allocated payload data in UCI PUSCH structures.\n\n### Changes\n- `nfapi/open-nFAPI/fapi/inc/nr_fapi_p7_utils.h`:
  New header file with function declarations for UCI indication copying\n- `nfapi/open-nFAPI/fapi/src/nr_fapi_p7_utils.c`:
  New implementation file with proper memory handling for UCI PUSCH data\n- `nfapi/open-nFAPI/fapi/CMakeLists.txt`:
  Added new source file to build\n- `nfapi/open-nFAPI/fapi/Makefile.am`: Added build
  configuration for new fapi library\n- `nfapi/open-nFAPI/Makefile.am`: Added fapi
  directory to build\n\n### Reproduction\nWhen running OAI gNB with UCI indications
  containing PUSCH PDU types, the VNF logs will show:\n```\n[ERROR] unhandled NFAPI_NR_UCI_PUSCH_PDU_TYPE\n```\n\nThis
  occurs because the shallow copy in the VNF code (`uci_ind->uci_list[i] = ind->uci_list[i];`)
  doesn''t properly copy dynamically allocated payload data, leading to data loss
  or corruption when the source data is freed.\n\nThe new implementation properly
  allocates and copies all payload data, ensuring UCI PUSCH indications are handled
  correctly.\n","extra_fields":{"bug_description":"NGAP interface handling error between
