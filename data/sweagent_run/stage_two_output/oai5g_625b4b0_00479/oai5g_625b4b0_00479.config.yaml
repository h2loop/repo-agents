  Title: Fix memory leak in gNB tracer application\n\n### Summary\nThe gNB tracer
  application (`gnb.c`) had several memory leaks due to an infinite loop that prevented
  proper cleanup of allocated resources. The application would run indefinitely without
  freeing:\n- Database allocated with `parse_database()`\n- `is_on` array allocated
  with `calloc()`\n- OBUF buffer allocated through `PUTC()` calls\n- Socket connections\n-
  Mutex resources\n\nThis fix adds signal handling for graceful shutdown and proper
  resource cleanup.\n\n### Changes\n- `common/utils/T/tracer/gnb.c`: \n  * Added signal
  handlers for SIGINT and SIGTERM\n  * Replaced infinite `while(1)` loop with `while(!exit_flag)`\n  *
  Added cleanup code for socket, buffer, database, array, and mutex\n  * Added proper
  exit handling to free all allocated resources\n\n### Reproduction\nTo reproduce
  the original issue:\n1. Run the gNB tracer application with a valid database file\n2.
  Let it run for an extended period while processing trace events\n3. Terminate the
  application with Ctrl+C\n4. Observe memory not being freed (can be checked with
  valgrind or similar tools)\n\nThe memory leaks were particularly noticeable during
  long-running tracing sessions where the OBUF buffer would grow significantly but
  never be freed.\n","extra_fields":{"bug_description":"memory leak where allocated
  memory is never freed on certain code paths","bug_id":"c_memory_leak","stage_one_patch":"diff
