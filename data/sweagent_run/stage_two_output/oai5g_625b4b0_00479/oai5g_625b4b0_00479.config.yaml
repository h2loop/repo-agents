  -3,6 +3,7 @@\n #include <string.h>\n #include <pthread.h>\n #include <unistd.h>\n+#include
  <signal.h>\n #include \"database.h\"\n #include \"event.h\"\n #include \"handler.h\"\n@@
  -15,6 +16,9 @@\n int ue_id[65536];\n int next_ue_id;\n \n+/* Flag to indicate if
  the program should exit gracefully */\n+static volatile int exit_flag = 0;\n+\n
  typedef struct {\n   widget *pucch_pusch_iq_plot;\n   widget *ul_freq_estimate_ue_xy_plot;\n@@
  -212,6 +216,12 @@ static void gnb_main_gui(gnb_gui *e, gui *g, event_handler *h,
  void *database, g\n   register_notifier(g, \"click\", e->next_ue_button, click,
