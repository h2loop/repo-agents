  , MESSAGE_PRIORITY_MED, e1ap_reset_t, e1ap_reset_req)\n+\n+MESSAGE_DEF(E1AP_RESET_ACK
  , MESSAGE_PRIORITY_MED, e1ap_reset_ack_t, e1ap_reset_ack)\n+\ndiff --git a/openair2/COMMON/e1ap_messages_types.h
  b/openair2/COMMON/e1ap_messages_types.h\nindex 7a88344efc..522adccd07 100644\n---
