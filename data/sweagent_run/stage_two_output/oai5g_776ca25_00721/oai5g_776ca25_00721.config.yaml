  Title: Fix incorrect signaling procedure sequence in E1AP RESET ACKNOWLEDGE handling\n\n###
  Summary\nThe E1AP RESET ACKNOWLEDGE handling function `e1ap_handle_RESET_ACKNOWLEDGE`
  was implemented with only an AssertFatal statement, causing the program to abort
  whenever a RESET ACKNOWLEDGE message was received. This violated the 3GPP message
  flow and prevented proper downstream signaling sequence continuation.\n\nThis fix
  implements the complete RESET procedure according to 3GPP TS 38.462 specification.\n\n###
  Changes\n- `openair2/E1AP/e1ap.c`: \n  * Fixed procedure code extraction logic to
  handle all PDU types correctly\n  * Updated message processing table to route RESET
  messages to proper handlers\n  * Implemented `e1apCUCP_handle_RESET` and `e1apCUUP_handle_RESET_ACKNOWLEDGE`
  functions\n  * Added `e1ap_send_RESET` and `e1ap_send_RESET_ACKNOWLEDGE` functions\n  *
  Properly implemented `e1ap_handle_RESET_ACKNOWLEDGE` to avoid AssertFatal abort\n-
  `openair2/COMMON/e1ap_messages_def.h`: Added RESET message definitions\n- `openair2/COMMON/e1ap_messages_types.h`:
  Added RESET type definitions\n\n### Reproduction\nTo reproduce the original issue:\n1.
  Establish an E1AP connection between CUCP and CUUP\n2. Trigger a RESET procedure
  from either side\n3. When the RESET ACKNOWLEDGE is sent back, the receiving node
  will crash with AssertFatal\n4. The signaling sequence will be interrupted and downstream
  procedures will not execute\n\nWith this fix, the RESET ACKNOWLEDGE is properly
  handled and the signaling sequence continues as expected per 3GPP specification.\n","extra_fields":{"bug_description":"incorrect
  signaling procedure sequence violating 3GPP message flow","bug_id":"telecom_wrong_procedure_sequence","stage_one_patch":"diff
