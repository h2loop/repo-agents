  <stdlib.h>\n+#include <stdint.h>\n+#include <string.h>\n+\n+// Simple hex string
  to byte array conversion\n+static inline uint8_t *decode_hex_dup(const char *hex_string)
  {\n+  size_t len = strlen(hex_string);\n+  size_t byte_len = len / 2;\n+  uint8_t
  *bytes = malloc(byte_len);\n+  \n+  for (size_t i = 0; i < byte_len; i++) {\n+    char
  byte_str[3] = {hex_string[i*2], hex_string[i*2+1], ''\\0''};\n+    bytes[i] = (uint8_t)
