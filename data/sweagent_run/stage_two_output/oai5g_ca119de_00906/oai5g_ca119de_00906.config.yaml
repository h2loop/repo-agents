  Title: Fix segmentation fault in EIA2 integrity test due to uninitialized context\n\n###
  Summary\nThe EIA2 integrity test was segfaulting when calling `nas_stream_encrypt_eia2()`
  because the `context` field of the `nas_stream_cipher_t` structure was never initialized.
  The function implementation tries to access `stream_cipher->context` directly, which
  caused a null pointer dereference.\n\nThis fix properly initializes the security
  context before calling the encryption function and ensures proper cleanup afterward.\n\n###
  Changes\n- `openair3/TEST/test_secu_knas_encrypt_eia2.c`: Initialize context using
  `stream_integrity_init_eia2()` before calling `nas_stream_encrypt_eia2()`, and properly
  clean up with `stream_integrity_free_eia2()`\n- `openair3/TEST/test_util.h`: Created
  missing helper functions for hex string conversion and buffer comparison since they
  were not available in the test directory\n\n### Reproduction\nTo reproduce the issue:\n1.
  Build the OAI5G codebase with SECU tests enabled\n2. Run the `test_secu_knas_encrypt_eia2`
  test binary\n3. Observe segmentation fault when the test tries to access the uninitialized
  context field\n\nWith the fix, the test now properly initializes the context and
  passes all test vectors from 3GPP TS 33.401 Appendix C.2.\n","extra_fields":{"bug_description":"integer
  underflow producing an unexpectedly large unsigned value","bug_id":"c_integer_underflow","stage_one_patch":"diff
  --git a/openair3/TEST/test_secu_knas_encrypt_eia2.c b/openair3/TEST/test_secu_knas_encrypt_eia2.c\nindex
