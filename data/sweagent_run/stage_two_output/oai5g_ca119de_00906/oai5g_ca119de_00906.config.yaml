  *context;\n \n+  // Initialize the context for EIA2\n+  // The key should be 16
  bytes for EIA2\n+  context = stream_integrity_init_eia2(key);\n+\n+  nas_cipher.context   =
  context;\n   nas_cipher.direction  = direction;\n   nas_cipher.count      = count;\n-  nas_cipher.key        =
  key;\n-  nas_cipher.key_length = key_length;\n   nas_cipher.bearer     = bearer;\n-  nas_cipher.blength    =
  length;\n   nas_cipher.message    = message;\n+  nas_cipher.blength    = length;\n
  \n-  if (nas_stream_encrypt_eia2(&nas_cipher, result) != 0) {\n-    fail(\"Fail:
  nas_stream_encrypt_eia2\\n\");\n-  }\n+  nas_stream_encrypt_eia2(&nas_cipher, result);\n
  \n   if (compare_buffer(result, 4, expected, length_expected) != 0) {\n     fail(\"Fail:
  eia2_encrypt\\n\");\n   }\n+\n+  // Clean up the context\n+  stream_integrity_free_eia2(context);\n+  \n+  //
  Clean up allocated memory\n+  free(key);\n+  free(message);\n+  free(expected);\n
