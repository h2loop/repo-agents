  Title: Fix off-by-one error in dlsch_scale_channel array indexing\n\n### Summary\nThere
  is an off-by-one error in array indexing downstream of function dlsch_scale_channel
  in openair1/PHY/LTE_UE_TRANSPORT/dlsch_demodulation.c. When calling dlsch_scale_channel()
  the behavior is not what is expected. The issue may be in dlsch_scale_channel or
  a function downstream/upstream of it.\n\n### Changes\n- Fixed hardcoded array indexing
  using bit shifts (<<1) and multiplication by 2\n- Replaced with dynamic indexing
  using frame_parms->nb_antennas_rx or n_rx parameter\n- Added missing ARM implementation
  for dlsch_scale_channel function\n- Corrected similar indexing issues in dlsch_channel_level,
  dlsch_channel_level_TM7 and related functions\n\n### Reproduction\nThe bug manifests
  when running LTE UE processing with nb_antennas_rx != 2. Symptoms include:\n- Incorrect
  channel scaling leading to poor demodulation performance\n- Potential array out-of-bounds
  access when nb_antennas_rx > 2\n- Segfaults in extreme cases with certain antenna
  configurations\n- Mismatched log2_maxh calculations causing incorrect LLR scaling\n\nTo
  reproduce, configure UE with 1 or 4 receive antennas and process PDSCH with TM3/4
  transmission modes.\n\n","extra_fields":{"bug_description":"off-by-one error in
