  Title: Fix race condition in SIB2 RRC configuration logging functions\n\n### Summary\nThe
  RRC UE module contained a race condition in several SIB2 configuration logging functions
  that could cause incorrect log output when multiple threads accessed these functions
  simultaneously. The functions used static character buffers that could be overwritten
  by concurrent calls.\n\nThe race condition affected logging of RACH configuration
  parameters during cell selection and reconfiguration procedures.\n\n### Changes\n-
  `openair2/RRC/LTE/rrc_UE.c`: Replaced static character buffers with precomputed
  static string arrays in SIB2 logging functions:\n  - `SIB2numberOfRA_Preambles`\n  -
  `SIB2preambleInitialReceivedTargetPower` \n  - `SIB2preambleTransMax`\n  - `SIB2ra_ResponseWindowSize`\n  -
  `SIB2mac_ContentionResolutionTimer`\n  - `SIB2modificationPeriodCoeff`\n  - `SIB2defaultPagingCycle`\n\nFunctions
  now return pointers to static const string literals instead of shared buffers, eliminating
  the race condition while maintaining identical external behavior.\n\n### Reproduction\nUnder
  heavy multithreaded load with multiple UEs performing cell reselection simultaneously,
  incorrect RACH parameter values were occasionally logged. For example, `preambleTransMax`
  values would sometimes show \"n200\" when the actual configuration was \"n3\".\n\nThe
  issue was most reproducible when UEs were rapidly switching between cells with different
  SIB2 configurations.\n","extra_fields":{"bug_description":"race condition on shared
