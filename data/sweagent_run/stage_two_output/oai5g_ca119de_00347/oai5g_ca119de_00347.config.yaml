  Title: Fix Dead Code in RU PRACH Thread Function\n\n### Summary\nThe `ru_thread_prach`
  function in `executables/lte-ru.c` contained dead code that was never executed and
  could mask intended logic downstream. The incorrect else branch has been removed
  to ensure proper PRACH processing flow.\n\n### Changes\n- `executables/lte-ru.c`:
  Removed dead else branch in `ru_thread_prach` function that called `rx_prach` with
  NULL parameters. The function now properly routes all PRACH processing through `prach_procedures`
  when `ru->eNB_list[0]` is present.\n\n### Reproduction\nWithout this fix, the dead
  code path could potentially be triggered in edge cases where RU initialization ordering
  is not properly handled, leading to:\n- Segmentation fault when `rx_prach` is called
  with NULL parameters\n- Incorrect PRACH processing due to missing preamble detection
  parameters\n- Deadlock conditions when mutexes are not properly released\n\nThe
  issue manifests when the PRACH thread starts before `ru->eNB_list[0]` is properly
  initialized, causing the incorrect code path to execute. This can be observed by
  monitoring the PRACH detection logs which would show no preamble detection activity.\n","extra_fields":{"bug_description":"dead
