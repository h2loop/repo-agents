  Title: Fix invalid memory access in send_standalone_dummy function\n\n### Summary\nThe
  `send_standalone_dummy` function in the PHY stub UE implementation was sending raw
  binary data instead of a properly formatted NFAPI message. This caused invalid memory
  access and segmentation faults when the receiving end attempted to unpack the message.\n\nThe
  issue occurred when no UL indication messages were generated during a subframe processing
  cycle, triggering the dummy message send path. The raw data `{0, 0}` was not a valid
  NFAPI message structure, causing the receiver to attempt parsing at invalid memory
  locations.\n\n### Changes\n- `openair2/PHY_INTERFACE/phy_stub_UE.c`: Modified `send_standalone_dummy()`
  to send a properly formatted empty NFAPI RX_INDICATION message instead of raw binary
  data.\n\nUnder high load conditions with frequent dummy message sends, this bug
  caused intermittent crashes in the standalone PNF processing thread. The fix ensures
  dummy messages follow the same NFAPI formatting as other indication messages, preventing
  memory access violations.\n","extra_fields":{"bug_description":"type confusion where
