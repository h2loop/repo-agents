  -188,11 +188,12 @@ static void nr_rrc_ue_process_rrcReconfiguration(NR_UE_RRC_INST_t
  *rrc,\n         if (ie->nonCriticalExtension->dedicatedNAS_MessageList) {\n           struct
  NR_RRCReconfiguration_v1530_IEs__dedicatedNAS_MessageList *tmp = ext->dedicatedNAS_MessageList;\n           for
