  Title: Fix dedicated NAS message list processing in RRC reconfiguration\n\n### Summary\nThere''s
  an inconsistency in how dedicated NAS messages are processed in RRC reconfiguration
  versus DL information transfer. The RRC reconfiguration processing was using incorrect
  message types and memory management approaches.\n\n### Changes\n- `openair2/RRC/NR_UE/rrc_UE.c`:
  Fixed the dedicated NAS message list processing in `nr_rrc_ue_process_rrcReconfiguration`
  to use consistent message types and memory management with DL information transfer
  processing\n\n### Reproduction\nWhen an RRC reconfiguration message contains a `dedicatedNAS_MessageList`,
  the UE may experience:\n- Incorrect NAS message handling due to wrong message type
  (`NAS_CONN_ESTABLI_CNF` instead of `NAS_DOWNLINK_DATA_IND`)\n- Potential memory
  issues from improper buffer management\n- NAS layer not receiving properly formatted
  messages\n\nThe issue manifests when the network sends RRC reconfiguration messages
  with dedicated NAS payloads during connection establishment or reconfiguration procedures.\n","extra_fields":{"bug_description":"power
