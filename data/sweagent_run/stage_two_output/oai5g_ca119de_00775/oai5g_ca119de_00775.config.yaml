  ? \"successful\" : \"failed\");\n+  \"[UE %ld] Received %s: frame %d RA %s\\n\",\n+  rrc->ue_id,\n+  ITTI_MSG_NAME(msg_p),\n+  NR_RRC_MAC_RA_IND(msg_p).frame,\n+  NR_RRC_MAC_RA_IND(msg_p).RA_succeeded
  ? \"successful\" : \"failed\");\n     nr_rrc_handle_ra_indication(rrc, NR_RRC_MAC_RA_IND(msg_p).RA_succeeded);\n     break;\n
