  rrc->ue_id, NAS_CONN_ESTABLI_CNF);\n-            nas_establish_cnf_t *msg = &NAS_CONN_ESTABLI_CNF(ittiMsg);\n-            msg->errCode
  = AS_SUCCESS;\n+            MessageDef *ittiMsg = itti_alloc_new_message(TASK_RRC_NRUE,
  rrc->ue_id, NAS_DOWNLINK_DATA_IND);\n+            dl_info_transfer_ind_t *msg =
  &NAS_DOWNLINK_DATA_IND(ittiMsg);\n+            msg->UEid = rrc->ue_id;\n             msg->nasMsg.length
  = tmp->list.array[i]->size;\n-            msg->nasMsg.nas_data = tmp->list.array[i]->buf;\n+            msg->nasMsg.nas_data
  = malloc(msg->nasMsg.length);\n+            memcpy(msg->nasMsg.nas_data, tmp->list.array[i]->buf,
  msg->nasMsg.length);\n             itti_send_msg_to_task(TASK_NAS_NRUE, rrc->ue_id,
  ittiMsg);\n           }\n           tmp->list.count = 0; // to prevent the automatic
