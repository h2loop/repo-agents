  Title: Fix format specifier issues in wls_mac_print_stats function\n\n### Summary\nThe
  `wls_mac_print_stats()` function was using incorrect format specifiers for `uint32_t`
  variables, causing unexpected behavior when printing statistics. This fix addresses
  format specifier mismatches and adds protection against integer underflow.\n\n###
  Changes\n- `nfapi/oai_integration/wls_integration/wls_vnf.c`: Fixed format specifiers
  in `wls_mac_print_stats()` and `wls_mac_create_mem_array()` functions, added inttypes.h
  include\n- `nfapi/oai_integration/wls_integration/wls_pnf.c`: Added inttypes.h include
  and implemented missing `wls_mac_print_stats()` function\n- `nfapi/oai_integration/wls_integration/include/wls_vnf.h`:
  Added function declaration\n- `nfapi/oai_integration/wls_integration/include/wls_pnf.h`:
  Added function declaration\n\n### Reproduction\nWhen calling `wls_mac_print_stats()`
  during WLS memory allocation failures, the output would show garbled or incorrect
  values due to format specifier mismatches. On some platforms, this could lead to
  segfaults or incorrect debug output making it difficult to diagnose memory allocation
  issues.\n\nThe function is called from `wls_mac_alloc_buffer()` when allocation
  fails, and the incorrect format specifiers would cause the debug trace to display
  wrong values for memory block counts and allocation statistics.\n","extra_fields":{"bug_description":"F1AP
