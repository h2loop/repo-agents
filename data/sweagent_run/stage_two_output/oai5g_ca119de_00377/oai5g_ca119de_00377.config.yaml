  :\"default\"},\"problem_statement\":{\"text\":\"\\n## Title: Fix RIV decoding boundary\
  \ condition causing incorrect MCS selection\\n\\n### Summary\\nThe NR RIV (Resource\
  \ Indicator Value) decoding functions in nr_common.c contained an off-by-one error\
  \ in the boundary condition check that caused incorrect bandwidth and RB offset\
  \ calculations. This bug directly impacted MCS selection algorithms which rely on\
  \ accurate bandwidth reporting from NRRIV2PRBOFFSET.\\n\\nThe issue occurred when\
  \ the decoded tmp value exactly matched the boundary condition, causing the decoder\
  \ to incorrectly select the first RIV formula instead of the second. This resulted\
  \ in bandwidth values being off by one and incorrect RB start positions, which then\
  \ propagated to channel quality calculations and MCS selection.\\n\\n### Changes\\\
  n- `common/utils/nr/nr_common.c`: \\n  - Fixed boundary condition in NRRIV2BW from\
  \ `((N_RB>>1)+1)` to `(N_RB>>1)`\\n  - Fixed boundary condition in NRRIV2PRBOFFSET\
  \ from `((N_RB>>1)+1)` to `(N_RB>>1)`  \\n  - Fixed encoding boundary in PRBalloc_to_locationandbandwidth0\
  \ from `1 + (BWPsize >> 1)` to `(BWPsize >> 1)`\\n\\nUnder high load conditions\
  \ with varied bandwidth allocations, this bug caused throughput degradation of up\
  \ to 15% due to suboptimal MCS selection. The fix ensures RIV encoding/decoding\
  \ complies with 3GPP TS 38.214 Section 6.1.2.2.2.\\n\\n\",\"extra_fields\":{\"bug_description\"\
  :\"incorrect MCS selection not matching channel quality or UE capability\",\"bug_id\"\
  :\"telecom_wrong_mcs\",\"stage_one_patch\":\"diff --git a/common/utils/nr/nr_common.c\
  \ b/common/utils/nr/nr_common.c\\nindex 09dd5e7d94..07f56e33e4 100644\\n--- a/common/utils/nr/nr_common.c\\\
  n+++ b/common/utils/nr/nr_common.c\\n@@ -449,7 +449,7 @@ uint16_t get_band(uint64_t\
  \ downlink_frequency, int32_t delta_duplex)\\n int NRRIV2BW(int locationAndBandwidth,int\
  \ N_RB) {\\n   int tmp = locationAndBandwidth/N_RB;\\n   int tmp2 = locationAndBandwidth%N_RB;\\\
  n-  if (tmp <= ((N_RB>>1)+1) && (tmp+tmp2)<N_RB) return(tmp+1);\\n+  if (tmp <=\
  \ (N_RB>>1) && (tmp+tmp2)<N_RB) return(tmp+1);\\n   else                      return(N_RB+1-tmp);\\\
  n \\n }\\n@@ -457,7 +457,7 @@ int NRRIV2BW(int locationAndBandwidth,int N_RB) {\\\
  n int NRRIV2PRBOFFSET(int locationAndBandwidth,int N_RB) {\\n   int tmp = locationAndBandwidth/N_RB;\\\
  n   int tmp2 = locationAndBandwidth%N_RB;\\n-  if (tmp <= ((N_RB>>1)+1) && (tmp+tmp2)<N_RB)\
  \ return(tmp2);\\n+  if (tmp <= (N_RB>>1) && (tmp+tmp2)<N_RB) return(tmp2);\\n \
  \  else                      return(N_RB-1-tmp2);\\n }\\n \\n@@ -468,7 +468,7 @@\
  \ int PRBalloc_to_locationandbandwidth0(int NPRB, int RBstart, int BWPsize)\\n \
  \              \\\"Illegal NPRB/RBstart Configuration (%d,%d) for BWPsize %d\\\\\
  n\\\",\\n               NPRB, RBstart, BWPsize);\\n \\n-  if (NPRB <= 1 + (BWPsize\
  \ >> 1))\\n+  if (NPRB <= (BWPsize >> 1))\\n     return (BWPsize * (NPRB - 1) +\
  \ RBstart);\\n   else\\n     return (BWPsize * (BWPsize + 1 - NPRB) + (BWPsize -\
  \ 1 - RBstart));\\n@@ -576,12 +576,12 @@ uint32_t to_nrarfcn(int nr_bandP, uint64_t\
  \ dl_CarrierFreq, uint8_t scs_index, ui\\n \\n   AssertFatal(dl_CarrierFreq_by_1k\
  \ >= nr_bandtable[i].dl_min,\\n               \\\"Band %d, bw %u : DL carrier frequency\
  \ %llu kHz < %llu\\\\n\\\",\\n-\\t      nr_bandP, bw, (long long unsigned int)dl_CarrierFreq_by_1k,\\\
  n-\\t      (long long unsigned int)nr_bandtable[i].dl_min);\\n+              nr_bandP,\
  \ bw, (long long unsigned int)dl_CarrierFreq_by_1k,\\n+              (long long\
  \ unsigned int)nr_bandtable[i].dl_min);\\n   AssertFatal(dl_CarrierFreq_by_1k <=\
  \ (nr_bandtable[i].dl_max - bw_kHz/2),\\n               \\\"Band %d, dl_CarrierFreq\
  \ %llu bw %u: DL carrier frequency %llu kHz > %llu\\\\n\\\",\\n-\\t      nr_bandP,\
  \ (long long unsigned int)dl_CarrierFreq,bw, (long long unsigned int)dl_CarrierFreq_by_1k,\\\
  n-\\t      (long long unsigned int)(nr_bandtable[i].dl_max - bw_kHz/2));\\n+   \
  \           nr_bandP, (long long unsigned int)dl_CarrierFreq,bw, (long long unsigned\
  \ int)dl_CarrierFreq_by_1k,\\n+              (long long unsigned int)(nr_bandtable[i].dl_max\
  \ - bw_kHz/2));\\n \\n   int deltaFglobal = 60;\\n   uint32_t N_REF_Offs = 2016667;\\\
  n@@ -749,11 +749,11 @@ int get_nr_table_idx(int nr_bandP, uint8_t scs_index)\\n\
  \ int get_subband_size(int NPRB,int size) {\\n   // implements table  5.2.1.4-2\
  \ from 36.214\\n   //\\n-  //Bandwidth part (PRBs)\\tSubband size (PRBs)\\n-  //\
