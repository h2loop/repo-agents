  Title: Fix race condition in TRP information type response item comparison\n\n###
  Summary\nThe `eq_trp_info_type_response_item` function in `openair2/F1AP/lib/f1ap_positioning.c`
  was accessing a shared counter variable without proper synchronization, leading
  to race conditions when multiple threads called this function simultaneously.\n\nThis
  issue manifested as corrupted counter values and unpredictable behavior during positioning
  measurements. The problem was particularly evident during high-frequency TRP information
  processing where multiple threads would concurrently compare TRP information type
  response items.\n\n### Changes\n- `openair2/F1AP/lib/f1ap_positioning.c`: Added
  mutex locking around shared data access in `eq_trp_info_type_response_item` and
  related functions\n- `openair2/F1AP/lib/f1ap_positioning.h`: Updated function declarations\n-
  `CMakeLists.txt`: Added new positioning files to F1AP library build configuration\n-
  Created placeholder ASN.1 header files for TRP information type definitions\n\n","extra_fields":{"bug_description":"race
