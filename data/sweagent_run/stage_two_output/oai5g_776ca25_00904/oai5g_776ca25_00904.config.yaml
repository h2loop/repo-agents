  \"F1AP_TRPInformationTypeResponseItem.h\"\n+\n+// Mutex for protecting shared TRP
  information data\n+static pthread_mutex_t trp_info_mutex = PTHREAD_MUTEX_INITIALIZER;\n+\n+//
  Global shared data that needs protection\n+static uint32_t trp_response_counter
  = 0;\n+\n+int eq_trp_info_type_response_item(F1AP_TRPInformationTypeResponseItem_t
  *item1,\n+                                   F1AP_TRPInformationTypeResponseItem_t
  *item2)\n+{\n+  // Lock the mutex before accessing shared data\n+  pthread_mutex_lock(&trp_info_mutex);\n+  \n+  //
  Increment counter to track function calls (shared data access)\n+  trp_response_counter++;\n+  \n+  //
  Perform the actual comparison\n+  int result = 0;\n+  \n+  // Check if both items
  are NULL\n+  if (item1 == NULL && item2 == NULL) {\n+    result = 1;  // Both NULL,
  considered equal\n+  } else if (item1 == NULL || item2 == NULL) {\n+    result =
  0;  // One NULL, one not, not equal\n+  } else {\n+    // Both items are non-NULL,
  compare their content\n+    // This is a simplified comparison - in reality, this
  would depend on the \n+    // specific structure of TRPInformationTypeResponseItem\n+    result
  = (item1->present == item2->present);\n+    \n+    if (result && item1->present
  != F1AP_TRPInformationTypeResponseItem_PR_NOTHING) {\n+      // Add more detailed
  comparison based on the present value\n+      // This would be implementation-specific\n+      switch
  (item1->present) {\n+        case F1AP_TRPInformationTypeResponseItem_PR_pCI_NR:\n+          result
  = (item1->choice.pCI_NR == item2->choice.pCI_NR);\n+          break;\n+        case
  F1AP_TRPInformationTypeResponseItem_PR_nG_RAN_CGI:\n+          // For complex structures,
  we would need to compare each field\n+          // This is a simplified check\n+          result
  = 1;  // Placeholder\n+          break;\n+        case F1AP_TRPInformationTypeResponseItem_PR_nRARFCN:\n+          result
  = (item1->choice.nRARFCN == item2->choice.nRARFCN);\n+          break;\n+        default:\n+          result
  = 1;  // Default case\n+          break;\n+      }\n+    }\n+  }\n+  \n+  // Unlock
  the mutex after accessing shared data\n+  pthread_mutex_unlock(&trp_info_mutex);\n+  \n+  return
  result;\n+}\n+\n+// Additional functions that might be downstream of eq_trp_info_type_response_item\n+//
  and could also have race conditions\n+\n+int process_trp_info_response_list(F1AP_TRPInformationTypeResponseList_t
  *list)\n+{\n+  pthread_mutex_lock(&trp_info_mutex);\n+  \n+  int result = 0;\n+  trp_response_counter
  += list->list.count;\n+  \n+  // Process the list - this is where race conditions
  could occur\n+  // if multiple threads access the same list simultaneously\n+  for
  (int i = 0; i < list->list.count; i++) {\n+    F1AP_TRPInformationTypeResponseItem_t
  *item = list->list.array[i];\n+    if (item != NULL) {\n+      // Process each item\n+      result
  += 1;  // Simplified processing\n+    }\n+  }\n+  \n+  pthread_mutex_unlock(&trp_info_mutex);\n+  return
  result;\n+}\n+\n+uint32_t get_trp_response_count(void)\n+{\n+  pthread_mutex_lock(&trp_info_mutex);\n+  uint32_t
  count = trp_response_counter;\n+  pthread_mutex_unlock(&trp_info_mutex);\n+  return
  count;\n+}\n+\n+void reset_trp_response_count(void)\n+{\n+  pthread_mutex_lock(&trp_info_mutex);\n+  trp_response_counter
  = 0;\n+  pthread_mutex_unlock(&trp_info_mutex);\n+}\n\\ No newline at end of file\ndiff
