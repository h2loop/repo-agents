  Title: Fix buffer overflow in CRC indication handling\n\n### Summary\nThe LTE eNB
  PHY procedures contained a critical buffer overflow vulnerability in the `fill_crc_indication`
  function and related indication functions. These functions used incorrect bounds
  checking assertions that allowed writing past the end of allocated arrays.\n\nWhen
  the eNB processed multiple UEs with CRC indications in the same subframe, the functions
  could access memory beyond their allocated pdu_list arrays, leading to memory corruption
  and potential crashes.\n\nThis fix corrects the bounds checking assertions in all
  indication functions to properly prevent buffer overflows.\n\n### Changes\n- `openair1/SCHED/phy_procedures_lte_eNb.c`:
  Fixed bounds checking assertions in `fill_crc_indication`, `fill_rx_indication`,
  `fill_ulsch_cqi_indication`, `fill_ulsch_harq_indication`, `fill_uci_harq_indication`,
  and `fill_sr_indication` functions.\n\n### Reproduction Steps\n1. Configure eNB
  with multiple UEs transmitting PUSCH\n2. Ensure high traffic load causing multiple
  CRC indications per subframe\n3. Run eNB until `number_of_crcs` reaches `NFAPI_CRC_IND_MAX_PDU`
  (100)\n4. Observe potential segfault or memory corruption when accessing `crc_pdu_list[100]`\n\nThe
  issue manifests as intermittent crashes during high load scenarios, particularly
  with many UEs active in the cell.\n","extra_fields":{"bug_description":"null pointer
