  Title: Fix process name parsing in read_statfile() for threads with spaces\n\n###
  Summary\nThe `read_statfile()` function in the telnet server process command module
  was not correctly parsing `/proc/*/stat` files when process names contained spaces.
  This caused incorrect thread information display in the \"softmodem show thread\"
  telnet command.\n\nThe issue was in `decode_procstat()` which used `strtok_r` with
  space delimiter, causing process names like \"(softmodem thread 1)\" to be incorrectly
  split into multiple tokens. The original code attempted to handle this by changing
  the token separator but the logic was flawed.\n\n### Changes\n- `common/utils/telnetsrv/telnetsrv_proccmd.c`:
  Rewrote `decode_procstat()` to properly parse `/proc/*/stat` format by:\n  * Extracting
  PID by finding first space\n  * Finding opening and closing parentheses manually
  \n  * Extracting complete process name with `strndup`\n  * Continuing field parsing
  with space delimiter after closing parenthesis\n\nThe fix ensures thread names with
  spaces are displayed correctly in telnet \"show thread\" output.\n","extra_fields":{"bug_description":"copy-paste
