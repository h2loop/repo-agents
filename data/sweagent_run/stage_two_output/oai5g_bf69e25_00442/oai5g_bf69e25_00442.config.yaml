  == NULL) {\n+    prnt(\"Error: Invalid stat format, missing closing parenthesis\\n\");\n+    return;\n+}\n+\n+/*
  Extract process name */\n+int name_len = name_end - name_start - 1;\n+if (name_len
  > 0) {\n+    char *process_name = strndup(name_start + 1, name_len);\n+    if (tdata
