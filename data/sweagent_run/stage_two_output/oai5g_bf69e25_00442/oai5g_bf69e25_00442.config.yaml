  pid\n+ * Field 2: comm (process name in parentheses, may contain spaces)\n+ * Fields
  3+: Other fields separated by spaces\n+ */\n+\n+/* Find the first space to get PID
  */\n+char *pid_end = strchr(record, '' '');\n+if (pid_end == NULL) {\n+    prnt(\"Error:
  Invalid stat format\\n\");\n+    return;\n+}\n+\n+/* Extract PID */\n+char pid_str[32];\n+int
  pid_len = pid_end - record;\n+if (pid_len >= sizeof(pid_str)) pid_len = sizeof(pid_str)
  - 1;\n+strncpy(pid_str, record, pid_len);\n+pid_str[pid_len] = ''\\0'';\n+\n+fieldcnt
  = 1;\n+if (tdata != NULL) {\n+    tdata->lines[tdata->numlines].val[0] = strdup(pid_str);\n+}\n+lptr
