  Title: Fix protocol timer initialization in VRTSIM server connection flow\n\n###
  Summary\nThe VRTSIM implementation had an issue with the protocol timer (timing
  thread) not being started at the correct point in the server connection procedure.
  The timing thread was being created after waiting for the client to connect to the
  shared memory channel, rather than immediately after peer information exchange.\n\nThis
  caused timing inconsistencies in the simulation environment, particularly when measuring
  protocol latencies and ensuring proper synchronization between the server and client.\n\n###
  Changes\n- `radio/vrtsim/vrtsim.c`: Moved timing thread creation to occur immediately
  after shared memory channel creation but before waiting for client connection. Added
  proper error handling for pthread_create failure and improved cleanup logic in vrtsim_end
  function.\n\n","extra_fields":{"bug_description":"protocol timer not started or
  stopped at the required point in the procedure","bug_id":"telecom_timer_missing_start_stop","stage_one_patch":"diff
  --git a/radio/vrtsim/vrtsim.c b/radio/vrtsim/vrtsim.c\nindex f0e0151aa6..2d3707d4df
  100644\n--- a/radio/vrtsim/vrtsim.c\n+++ b/radio/vrtsim/vrtsim.c\n@@ -332,12 +332,15
  @@ static int vrtsim_connect(openair0_device *device)\n                                                      vrtsim_state->peer_info.num_rx_antennas,\n                                                      device->openair0_cfg[0].rx_num_channels);\n     vrtsim_state->run_timing_thread
  = true;\n+    int ret = pthread_create(&vrtsim_state->timing_thread, NULL, vrtsim_timing_job,
  vrtsim_state);\n+    if (ret != 0) {\n+      vrtsim_state->run_timing_thread = false;\n+      AssertFatal(false,
  \"pthread_create() failed: errno: %d, %s\\n\", errno, strerror(errno));\n+    }\n     while
  (!shm_td_iq_channel_is_connected(vrtsim_state->channel)) {\n       LOG_I(HW, \"Waiting
  for client\\n\");\n       sleep(1);\n     }\n-    int ret = pthread_create(&vrtsim_state->timing_thread,
  NULL, vrtsim_timing_job, vrtsim_state);\n-    AssertFatal(ret == 0, \"pthread_create()
  failed: errno: %d, %s\\n\", errno, strerror(errno));\n   } else {\n     vrtsim_state->channel
  = shm_td_iq_channel_connect(vrtsim_state->channel_name, 10);\n   }\n@@ -508,8 +511,11
  @@ static void vrtsim_end(openair0_device *device)\n   vrtsim_state_t *vrtsim_state
  = (vrtsim_state_t *)device->priv;\n   if (vrtsim_state->role == ROLE_SERVER) {\n     vrtsim_state->run_timing_thread
  = false;\n-    int ret = pthread_join(vrtsim_state->timing_thread, NULL);\n-    AssertFatal(ret
  == 0, \"pthread_join() failed: errno: %d, %s\\n\", errno, strerror(errno));\n+    //
  Only join the thread if it was successfully created\n+    if (vrtsim_state->timing_thread
  != 0) {\n+      int ret = pthread_join(vrtsim_state->timing_thread, NULL);\n+      AssertFatal(ret
  == 0, \"pthread_join() failed: errno: %d, %s\\n\", errno, strerror(errno));\n+    }\n   }\n
