  Title: Fix incorrect TDD configuration and frequency settings in signal analyzer\n\n###
  Summary\nThe LTE signal analyzer function had multiple configuration issues that
  caused it to behave unexpectedly when analyzing TDD signals. The analyzer was hardcoded
  to 1.2GHz regardless of the actual carrier frequency, used incorrect GPIB commands
  for TDD special subframe configuration, and didn''t properly utilize the DCI allocation
  information passed to it.\n\nThis fix corrects the frequency configuration, fixes
  the TDD special subframe commands, and properly uses the DCI allocation parameters.\n\n###
  Changes\n- `openair1/SIMULATION/LTE_PHY/signalanalyzer.c`: \n  * Fixed carrier frequency
  to use `frame_parms->dl_CarrierFreq` instead of hardcoded 1.2GHz\n  * Changed TDD
  special subframe configuration command from `CONF:DL:TDD:UDC` to `CONF:DL:TDD:SSC`\n  *
  Added NULL check for frame parameters\n  * Added proper usage of DCI allocation
  RNTI parameter\n  * Fixed format specifier for rnti_t from %d to %u\n- `openair1/SIMULATION/LTE_PHY/signalanalyzer.h`:
  \n  * Fixed include from \"PHY/defs.h\" to \"PHY/defs_common.h\"\n\n### Reproduction\nTo
  reproduce the issue:\n1. Configure a TDD LTE system with a carrier frequency other
  than 1.2GHz\n2. Run the signal analyzer function with valid frame parameters and
  DCI allocation\n3. Observe that the analyzer is configured to 1.2GHz instead of
  the actual carrier frequency\n4. Notice that TDD special subframe configuration
  commands fail due to incorrect command syntax\n5. See that the DCI allocation RNTI
  information is ignored\n\nThe incorrect configuration will cause the signal analyzer
  to produce inaccurate measurements or fail to decode PDCCH properly.\n","extra_fields":{"bug_description":"off-by-one
