  Title: Fix configuration mismatch handling for extended DCI PDU types in MAC scheduler\n\n###
  Summary\nThe MAC scheduler contained a configuration mismatch between protocol layers
  that caused inconsistent behavior when processing extended DCI PDU types (EPDCCH,
  MPDCCH, NPDCCH). The debug function `HI_DCI0_PDU_TYPE` correctly identified all
  PDU types, but several processing functions only handled the basic `NFAPI_HI_DCI0_DCI_PDU_TYPE`,
  leading to dropped DCI allocations for UEs using advanced scheduling modes.\n\nThis
  issue was particularly evident when testing with CE UEs that require MPDCCH-based
  DCI formats. The symptom was that DCI0 allocations would be created for these UEs
  but then ignored during RNTI verification and DL assignment index updates, causing
  UL transmission failures.\n\n### Changes\n- `openair2/LAYER2/MAC/eNB_scheduler_dlsch.c`:
  Updated `update_ul_dci()` to properly handle all DCI PDU types when setting DL assignment
  index\n- `openair2/LAYER2/MAC/eNB_scheduler_primitives.c`: Updated `get_V_UL_DAI()`
  to process extended DCI types consistently  \n- `openair2/LAYER2/MAC/eNB_scheduler_ulsch.c`:
