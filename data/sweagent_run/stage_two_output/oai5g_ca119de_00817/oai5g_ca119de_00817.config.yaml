  rates where LDPC coding gain is most critical.\n\nThe root cause was incorrect memory
  indexing in the 128-bit version of the encoder function. Due to the difference in
  SIMD register width (128-bit vs 256-bit), the indexing calculations needed to be
  scaled accordingly but were not.\n\n### Changes\n- `openair1/PHY/CODING/nrLDPC_encoder/ldpc_BG2_Zc160_byte_128.c`:
