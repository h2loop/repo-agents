  -33,6 +33,7 @@\n #include \"common/utils/nr/nr_common.h\"\n #include \"openair2/LAYER2/NR_MAC_gNB/nr_mac_gNB.h\"\n
  #include \"executables/softmodem-common.h\"\n+#include \"common/utils/LOG/log.h\"\n
  #include \"oai_asn1.h\"\n #include \"SIMULATION/TOOLS/sim.h\" // for taus();\n \n@@
  -513,7 +514,7 @@ static void config_csiim(int do_csirs,\n void set_dl_maxmimolayers(NR_PDSCH_ServingCellConfig_t
  *pdsch_servingcellconfig,\n                           const NR_ServingCellConfigCommon_t
  *scc,\n                           const NR_UE_NR_Capability_t *uecap,\n-\t\t\t  int
  maxMIMO_layers)\n+                          int maxMIMO_layers)\n {\n \n   if(!pdsch_servingcellconfig->ext1)\n@@
  -536,7 +537,20 @@ void set_dl_maxmimolayers(NR_PDSCH_ServingCellConfig_t *pdsch_servingcellconfig,\n       if
  (scs == dl_fs->supportedSubcarrierSpacingDL &&\n           supported_bw_comparison(bw_mhz,
  &dl_fs->supportedBandwidthDL, dl_fs->channelBW_90mhz) &&\n           dl_fs->maxNumberMIMO_LayersPDSCH)
  {\n-        long ue_supported_layers = (2 << *dl_fs->maxNumberMIMO_LayersPDSCH);\n+        //
  MIMO-LayersDL ::= ENUMERATED {twoLayers, fourLayers, eightLayers}\n+        // twoLayers=0
  (2 layers), fourLayers=1 (4 layers), eightLayers=2 (8 layers)\n+        long ue_supported_layers_enum
  = *dl_fs->maxNumberMIMO_LayersPDSCH;\n+        if (ue_supported_layers_enum < 0
  || ue_supported_layers_enum > 2) {\n+          LOG_E(NR_RRC, \"Invalid maxNumberMIMO_LayersPDSCH
  value: %ld\\n\", ue_supported_layers_enum);\n+          *pdsch_servingcellconfig->ext1->maxMIMO_Layers
  = 2;\n+          return;\n+        }\n+        long ue_supported_layers = (2 <<
  ue_supported_layers_enum);\n+        // Add bounds checking for maxMIMO_layers parameter
  as well\n+        if (maxMIMO_layers != -1 && (maxMIMO_layers < 1 || maxMIMO_layers
  > 8)) {\n+          LOG_E(NR_RRC, \"Invalid maxMIMO_layers parameter: %d\\n\", maxMIMO_layers);\n+          maxMIMO_layers
  = -1; // Fall back to using UE supported layers only\n+        }\n         if (maxMIMO_layers
  == -1) \n           *pdsch_servingcellconfig->ext1->maxMIMO_Layers = NR_MAX_SUPPORTED_DL_LAYERS
  < ue_supported_layers ? NR_MAX_SUPPORTED_DL_LAYERS : ue_supported_layers;\n         else
  \n@@ -1204,7 +1218,7 @@ static void set_dl_mcs_table(int scs,\n }\n \n static struct
  NR_SetupRelease_PUSCH_Config *config_pusch(NR_PUSCH_Config_t *pusch_Config,\n-\t\t\t\t\t\t\t
  const bool use_deltaMCS,\n+                                                         const
  bool use_deltaMCS,\n                                                          const
  NR_ServingCellConfigCommon_t *scc,\n                                                          const
