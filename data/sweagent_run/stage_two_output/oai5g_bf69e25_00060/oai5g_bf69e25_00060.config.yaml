  Title: Fix buffer overflow vulnerability in ue_supported_dl_layers function\n\n###
  Summary\nThe NR gNB RRC configuration contained a buffer overflow vulnerability
  in the `set_dl_maxmimolayers` function when processing UE capability information.
  The vulnerability occurred when the UE reported invalid `maxNumberMIMO_LayersPDSCH`
  values that were outside the expected range defined in the 3GPP specification.\n\nThe
  issue was caused by missing bounds checking on the `maxNumberMIMO_LayersPDSCH` enumeration
  value before using it in bit shift operations. According to 3GPP TS 38.331, this
  field should only contain values 0-2 (representing twoLayers, fourLayers, eightLayers),
  but the code did not validate this before processing.\n\n### Changes\n- `openair2/RRC/NR/nr_rrc_config.c`:
  Added bounds checking for `ue_supported_layers_enum` to prevent buffer overflow
  when the value is outside the valid range [0,2]\n- `openair2/RRC/NR/nr_rrc_config.c`:
  Added bounds checking for the `maxMIMO_layers` parameter to ensure it''s within
  reasonable limits [1,8]\n- `openair2/RRC/NR/nr_rrc_config.c`: Added proper error
  logging to help with debugging when invalid values are encountered\n- `openair2/RRC/NR/nr_rrc_config.c`:
  Added missing LOG header include to support the logging functionality\n\nUnder certain
  network conditions with malformed UE capability reports, this could lead to incorrect
  memory access patterns and potential crashes in the RRC configuration processing
  path.\n","extra_fields":{"bug_description":"buffer overflow vulnerability","bug_id":"c_buffer_overflow","stage_one_patch":"diff
  --git a/openair2/RRC/NR/nr_rrc_config.c b/openair2/RRC/NR/nr_rrc_config.c\nindex
