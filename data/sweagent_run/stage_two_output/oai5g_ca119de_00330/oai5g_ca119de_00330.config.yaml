  Title: Fix uninitialized buffer access in NGAP transport layer address conversion\n\n###
  Summary\nThe NGAP gNB procedures contained a potential segmentation fault when handling
  PDU session setup responses with zero-length transport layer addresses. The issue
  occurred in the `allocAddrCopy` function which failed to properly initialize the
  output `BIT_STRING_t` structure when the input transport layer address had zero
  length.\n\nThis led to downstream code accessing uninitialized buffer pointers and
  size fields, causing undefined behavior and potential crashes during PDU session
  establishment procedures.\n\nThe bug was particularly evident when handling PDU
  sessions with dynamically assigned transport addresses that hadn''t been resolved
  yet.\n\n### Changes\n- `openair3/NGAP/ngap_gNB_nas_procedures.c`: Enhanced `allocAddrCopy`
  function to always initialize output structure fields\n- `openair3/NGAP/ngap_gNB_nas_procedures.c`:
