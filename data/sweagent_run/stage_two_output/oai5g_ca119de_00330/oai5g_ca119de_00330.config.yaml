  in)\n     memcpy(out->buf, in.buffer, in.length);\n     out->size = in.length;\n     out->bits_unused
  = 0;\n+  } else {\n+    out->buf = NULL;\n+    out->size = 0;\n+    out->bits_unused
  = 0;\n   }\n }\n \n@@ -631,14 +635,21 @@ int ngap_gNB_initial_ctxt_resp(instance_t
