  Title: Fix uninitialized memory read in nfapi_pnf_p7_nr_uci_ind function\n\n###
  Summary\nThere is a read of uninitialized memory leading to undefined behavior downstream
  of function nfapi_pnf_p7_nr_uci_ind. The issue may be in nfapi_pnf_p7_nr_uci_ind
  or a function downstream/upstream of it.\n\nThis fix adds validation checks to prevent
  reading uninitialized memory in all NR indication functions that use dynamically
  allocated arrays.\n\n### Changes\n- `nfapi/open-nFAPI/pnf/src/pnf_p7_interface.c`:
  Added validation to prevent reading uninitialized memory in NR indication functions:\n  -
  nfapi_pnf_p7_nr_rx_data_ind: Validate number_of_pdus and pdu_list\n  - nfapi_pnf_p7_nr_crc_ind:
  Validate number_crcs and crc_list  \n  - nfapi_pnf_p7_nr_srs_ind: Validate number_of_pdus
  and pdu_list\n  - nfapi_pnf_p7_nr_uci_ind: Validate num_ucis and uci_list (main
  fix)\n  - nfapi_pnf_p7_nr_rach_ind: Validate number_of_pdus and pdu_list\n\n###
  Reproduction\nTo reproduce the issue:\n1. Call nfapi_pnf_p7_nr_uci_ind with an nfapi_nr_uci_indication_t
  structure where:\n   - num_ucis is uninitialized or set to a large garbage value\n   -
  uci_list is NULL or points to uninitialized memory\n2. The downstream packing function
  will attempt to read from uninitialized memory, causing undefined behavior\n3. Symptoms
  may include segfaults, incorrect message packing, or memory corruption\n\nThe fix
  prevents this by validating that count fields are within reasonable bounds and that
  array pointers are not NULL when the count is greater than 0.\n","extra_fields":{"bug_description":"read
