  :\"default\"},\"problem_statement\":{\"text\":\"\\n## Title: Fix incorrect LDPC\
  \ encoder indices causing wrong parity bits\\n\\n### Summary\\nThe AVX2-optimized\
  \ LDPC encoder for Zc=320 contained several indices that were not properly scaled\
  \ down by a factor of 2 compared to the 128-bit reference version. This caused the\
  \ encoder to access incorrect memory locations during parity bit computation, leading\
  \ to wrong channel coding output.\\n\\nThe issue was most noticeable when encoding\
  \ transport blocks with sizes that map to Zc=320 lifting size, where decoded data\
  \ would contain bit errors after passing through the physical layer simulator.\\\
  n\\nRoot cause was incomplete conversion from the 128-bit version to the AVX2 version\
  \ - some array indices were left at their original values instead of being halved\
  \ to account for the wider 256-bit SIMD registers processing twice as much data\
  \ per operation.\\n\\n### Changes\\n- `openair1/PHY/CODING/nrLDPC_encoder/ldpc320_byte.c`:\
  \ Corrected multiple array indices by dividing by 2 to match AVX2 register width.\\\
  n- Fixed specific indices: 14049\u21927024, 13260\u21926660, 14066\u21927033, 14064\u2192\
  7032\\n- Verified alignment with 128-bit reference implementation pattern\\n\\n\"\
