  Title: Fix Incorrect MCS Selection in Network Simulator Not Matching Channel Quality\n\n###
  Summary\nThe network simulator in the NAS testing framework was using a fixed QCI
  value of 3 for all EPS bearer setups, regardless of the reported channel quality
  (RSRP/RSRQ). This caused inappropriate MCS selection downstream of the `_process_ul_info_transfer_req`
  function, as the fixed QCI did not reflect the actual channel conditions or UE capabilities.\n\nWhen
  testing with varying channel conditions, this led to suboptimal resource allocation
  and unrealistic simulation behavior. The simulator would always configure bearers
  with QCI 3 (real-time gaming) even under poor channel conditions where a more tolerant
  QCI would be appropriate.\n\nThe fix implements adaptive QCI selection based on
  the DEFAULT_RSRP and DEFAULT_RSRQ values, mapping them to appropriate CQI values
  and then to QCI values that better match the channel quality.\n\n### Changes\n-
  `openair3/NAS/TEST/NETWORK/network_simulator.c`: \n  * Added `_map_channel_quality_to_cqi()`
  function to map RSRP/RSRQ to CQI values\n  * Added `_map_cqi_to_qci()` function
  to map CQI to appropriate QCI based on channel quality\n  * Modified `_process_pdn_connectivity_request()`
  to use adaptive QCI selection instead of hardcoded value\n","extra_fields":{"bug_description":"incorrect
  MCS selection not matching channel quality or UE capability","bug_id":"telecom_wrong_mcs","stage_one_patch":"diff
  --git a/openair3/NAS/TEST/NETWORK/network_simulator.c b/openair3/NAS/TEST/NETWORK/network_simulator.c\nindex
  492a709463..542b4e5335 100644\n--- a/openair3/NAS/TEST/NETWORK/network_simulator.c\n+++
  b/openair3/NAS/TEST/NETWORK/network_simulator.c\n@@ -92,6 +92,77 @@ Description
  Implements the network simulator running at the network\n #define BIT_RATE_512K
  0x78\n #define BIT_RATE_1024K  0x87\n \n+/* Function to map RSRP/RSRQ to CQI value
  */\n+static int _map_channel_quality_to_cqi(int rsrp, int rsrq)\n+{\n+  /* \n+   *
  Simple mapping based on typical LTE values:\n+   * RSRP: 27 maps to medium quality
  (~-100 dBm)\n+   * RSRQ: 55 maps to medium quality (~-10 dB)\n+   * CQI range: 0-15
  (0 worst, 15 best)\n+   */\n+  \n+  /* Base CQI from RSRP (scale 0-15) */\n+  int
  cqi_rsrp = 0;\n+  if (rsrp <= 10) {\n+    cqi_rsrp = 2;  /* Poor RSRP */\n+  } else
  if (rsrp <= 20) {\n+    cqi_rsrp = 6;  /* Fair RSRP */\n+  } else if (rsrp <= 30)
  {\n+    cqi_rsrp = 10; /* Good RSRP */\n+  } else {\n+    cqi_rsrp = 14; /* Excellent
  RSRP */\n+  }\n+  \n+  /* Base CQI from RSRQ (scale 0-15) */\n+  int cqi_rsrq =
  0;\n+  if (rsrq <= 30) {\n+    cqi_rsrq = 2;  /* Poor RSRQ */\n+  } else if (rsrq
  <= 45) {\n+    cqi_rsrq = 6;  /* Fair RSRQ */\n+  } else if (rsrq <= 60) {\n+    cqi_rsrq
  = 10; /* Good RSRQ */\n+  } else {\n+    cqi_rsrq = 14; /* Excellent RSRQ */\n+  }\n+  \n+  /*
  Combine both metrics (take the minimum as the limiting factor) */\n+  int cqi =
  (cqi_rsrp < cqi_rsrq) ? cqi_rsrp : cqi_rsrq;\n+  \n+  /* Ensure CQI is within valid
  range */\n+  if (cqi < 0) cqi = 0;\n+  if (cqi > 15) cqi = 15;\n+  \n+  return cqi;\n+}\n+\n+/*
  Function to map CQI to appropriate QCI based on channel quality */\n+static int
  _map_cqi_to_qci(int cqi)\n+{\n+  /*\n+   * Map CQI to QCI based on channel quality:\n+   *
  - Higher CQI (better channel) -> Lower latency/better QoS requirements\n+   * -
  Lower CQI (poorer channel) -> More tolerant QoS requirements\n+   */\n+   \n+  if
  (cqi >= 12) {\n+    /* Excellent channel quality - use QCI 1 (conversational voice)
  */\n+    return 1;\n+  } else if (cqi >= 8) {\n+    /* Good channel quality - use
  QCI 2 (conversational video) */\n+    return 2;\n+  } else if (cqi >= 5) {\n+    /*
  Medium channel quality - use QCI 3 (real-time gaming) */\n+    return 3;\n+  } else
  if (cqi >= 2) {\n+    /* Fair channel quality - use QCI 4 (buffered streaming) */\n+    return
  4;\n+  } else {\n+    /* Poor channel quality - use QCI 5 (IMS signaling) or adaptive
  */\n+    return 5;\n+  }\n+}\n+\n /* Eurecom''s Access Point Name */\n static const
  OctetString EURECOM_APN = {\n   14, (uint8_t*)(\"www.eurecom.fr\")\n@@ -1062,7 +1133,12
  @@ static int _process_pdn_connectivity_request(const pdn_connectivity_request_msg*\n     /*
  Setup Activate Default EPS Bearer Request message */\n     activate_default_eps_bearer_context_request_msg*
  request = &rsp->activate_default_eps_bearer_context_request;\n     request->messagetype
  = ACTIVATE_DEFAULT_EPS_BEARER_CONTEXT_REQUEST;\n-    request->epsqos.qci = 3;    /*
  GBR bearer for playback video */\n+    \n+    /* Map channel quality to appropriate
  QCI based on RSRP/RSRQ */\n+    int cqi = _map_channel_quality_to_cqi(DEFAULT_RSRP,
  DEFAULT_RSRQ);\n+    int qci = _map_cqi_to_qci(cqi);\n+    request->epsqos.qci =
  qci;    /* Adaptive QCI based on channel quality */\n+    \n     request->epsqos.bitRatesPresent
  = 1;\n     request->epsqos.bitRates.maxBitRateForUL = BIT_RATE_128K; /* 128K */\n     request->epsqos.bitRates.maxBitRateForDL
