  Title: Fix CRC computation error in iqplayer_loadfile due to incorrect pointer arithmetic\n\n###
  Summary\nThe iqplayer library in the OAI radio framework experiences CRC validation
  failures and data corruption when reading IQ samples from recorded files. This issue
  manifests as incorrect data being processed during replay mode, leading to false
  positive CRC errors in downstream processing functions.\n\nThe root cause was incorrect
  pointer arithmetic in multiple locations where data was being read from or written
  to wrong memory addresses. Specifically, when accessing data following an `iqrec_t`
  header structure, the code used `ptr+1` instead of `(char*)ptr + sizeof(iqrec_t)`,
  causing it to skip to the next `iqrec_t` structure rather than the immediate data
  area.\n\n### Reproduction\nTo reproduce this issue:\n1. Configure OAI with IQ replay
  mode using a recorded IQ file\n2. Run the gNB or UE with `--replay-file` option
  pointing to a valid IQ recording\n3. Observe CRC validation failures or incorrect
  data processing in the baseband processing chain\n4. The issue is more pronounced
  when using the non-mmap mode for file reading\n\n### Changes\n- `radio/iqplayer/iqplayer_lib.c`:
  \n  - Fixed redundant assignment of `s->ms_sample` in mmap mode\n  - Corrected memset
  size to cover entire allocated buffer including data area\n  - Fixed lseek return
  value check to properly validate file positioning\n  - Corrected pointer arithmetic
  when reading IQ data from file in non-mmap mode\n  - Fixed pointer arithmetic when
  copying data to output buffers\n","extra_fields":{"bug_description":"CRC computation
  or checking error causing false positive or missed error detection","bug_id":"telecom_crc_error","stage_one_patch":"diff
