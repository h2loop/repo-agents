  (off_t)sizeof(iqfile_header_t)) {\n           LOG_I(HW,\"Initial seek at beginning
  of the file\\n\" );\n         } else {\n-          LOG_I(HW,\"Problem initial seek
  at beginning of the file, %s\\n\",strerror(errno));\n+          LOG_E(HW,\"Problem
  initial seek at beginning of the file, %s\\n\",strerror(errno));\n+          close(s->fd);\n+          exit(-1);\n         }\n       }
  else {\n         LOG_E(HW,\"Cannot read header in %s exiting.\\n\",c->u_sf_filename
  );\n@@ -285,7 +286,7 @@ static int trx_iqplayer_read(openair0_device *device, openair0_timestamp
  *ptimes\n       LOG_E(HW,\"pb reading iq record header at index %lu %s\\n\",sizeof(iqrec_t)*s->curSamplesBlock,
  strerror(errno) );\n       exit(-1);\n     } else {\n-      if (read(s->fd, s->ms_sample+1,
