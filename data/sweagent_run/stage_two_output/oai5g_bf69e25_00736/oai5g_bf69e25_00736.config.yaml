  -92,7 +92,6 @@ static int iqplayer_loadfile(openair0_device *device, openair0_config_t
  *openair\n       LOG_I(HW,\"Loading subframes using mmap() from %s size=%lu bytes
  ...\\n\",c->u_sf_filename, (uint64_t)sb.st_size );\n       void *mptr = mmap(NULL,
  sb.st_size, PROT_WRITE, MAP_PRIVATE, s->fd, 0) ;\n       if (mptr != MAP_FAILED)
  {\n-        s->ms_sample = (iqrec_t *) ( mptr + sizeof(iqfile_header_t));      \n         parse_iqfile_header(device,
  (iqfile_header_t *)mptr);\n         s->ms_sample = (iqrec_t *)((char *)mptr + sizeof(iqfile_header_t));\n         LOG_I(HW,\"Loaded
  %u subframes.\\n\",s->nbSamplesBlocks );\n@@ -119,13 +118,15 @@ static int iqplayer_loadfile(openair0_device
  *device, openair0_config_t *openair\n           exit(-1);\n         }\n \n-        memset(s->ms_sample,
  0, sizeof(iqrec_t));\n+        memset(s->ms_sample, 0, sizeof(iqrec_t)+BELL_LABS_IQ_BYTES_PER_SF);\n
