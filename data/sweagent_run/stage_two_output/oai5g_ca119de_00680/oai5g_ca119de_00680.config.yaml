  Title: Fix PDCP UE addition and initialization bug\n\n### Summary\nThe `pdcp_add_UE()`
  function was not properly adding UEs due to incorrect array initialization in `pdcp_layer_init()`.
  The memset was only initializing the first element of the `pdcp_enb` array instead
  of the entire array. Additionally, the function lacked proper error handling and
  boundary checks.\n\n### Changes\n- `openair2/LAYER2/PDCP_v10.1.0/pdcp.c`: \n  -
  Fixed memset in `pdcp_layer_init()` to properly initialize entire `pdcp_enb` array\n  -
  Improved `pdcp_add_UE()` with boundary checking and better error handling\n  - Added
  `stdbool.h` include for boolean type usage\n\n### Reproduction\nWhen calling `pdcp_add_UE()`
  with a valid context, the function would sometimes fail to add the UE or behave
  inconsistently. This was particularly noticeable when:\n1. Adding multiple UEs across
  different module IDs\n2. Attempting to add UEs after the PDCP layer had been initialized\n3.
  Running in scenarios with multiple component carriers\n\nUsers observed that UEs
  were not being properly tracked in the PDCP statistics and some UEs would be dropped
  silently without any error messages.\n\nThe fix ensures that:\n1. The entire `pdcp_enb`
  array is properly zero-initialized during startup\n2. `pdcp_add_UE()` validates
  module_id bounds before accessing array elements\n3. Duplicate UEs are detected
  and handled appropriately\n4. Proper error logging is provided when operations fail\n\n","extra_fields":{"bug_description":"magic
