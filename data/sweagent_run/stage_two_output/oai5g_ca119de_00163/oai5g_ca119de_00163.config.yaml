  d8512c0695..9bf6484072 100644\n--- a/openair3/NGAP/ngap_gNB_overload.c\n+++ b/openair3/NGAP/ngap_gNB_overload.c\n@@
  -47,7 +47,51 @@\n \n int ngap_gNB_handle_overload_start(sctp_assoc_t assoc_id, uint32_t
  stream, NGAP_NGAP_PDU_t *pdu)\n {\n-    //TODO\n+    ngap_gNB_amf_data_t        *amf_desc_p;\n+    NGAP_OverloadStart_t       *container;\n+    NGAP_OverloadStartIEs_t    *ie;\n+\n+    DevAssert(pdu
