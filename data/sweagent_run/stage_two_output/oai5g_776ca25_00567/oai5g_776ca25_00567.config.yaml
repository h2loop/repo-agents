  pointers\\n\",\n              shlib_path);\n       lib_idx = i;\n+      // Close
  the previous library handle if it exists\n+      if (loader_data.shlibs[lib_idx].lib_handle)
  {\n+        dlclose(loader_data.shlibs[lib_idx].lib_handle);\n+        loader_data.shlibs[lib_idx].lib_handle
  = NULL;\n+      }\n       break;\n     }\n   }\n@@ -249,7 +254,10 @@ int load_module_version_shlib(char
  *modname, char *version, loader_shlibfunc_t *\n load_module_shlib_exit:\n   if (shlib_path)
  free(shlib_path);\n   if (afname)     free(afname);\n-  if (lib_handle) dlclose(lib_handle);\n+  //
  Don''t close the library handle as we need to keep the function pointers valid\n+  //
  if (lib_handle) dlclose(lib_handle);\n+  // Store the library handle for later use\n+  loader_data.shlibs[lib_idx].lib_handle
  = lib_handle;\n   return ret;\n }\n \n@@ -267,10 +275,45 @@ void * get_shlibmodule_fptr(char
  *modname, char *fname)\n     return NULL;\n }\n \n+void loader_cleanup(void)\n+{\n+    for
  (int i = 0; i < loader_data.numshlibs; i++) {\n+        if (loader_data.shlibs[i].lib_handle)
  {\n+            dlclose(loader_data.shlibs[i].lib_handle);\n+            loader_data.shlibs[i].lib_handle
  = NULL;\n+        }\n+        // Free other allocated memory\n+        if (loader_data.shlibs[i].name)
  {\n+            free(loader_data.shlibs[i].name);\n+            loader_data.shlibs[i].name
  = NULL;\n+        }\n+        if (loader_data.shlibs[i].thisshlib_path) {\n+            free(loader_data.shlibs[i].thisshlib_path);\n+            loader_data.shlibs[i].thisshlib_path
  = NULL;\n+        }\n+        if (loader_data.shlibs[i].funcarray) {\n+            for
  (int j = 0; j < loader_data.shlibs[i].numfunc; j++) {\n+                if (loader_data.shlibs[i].funcarray[j].fname)
  {\n+                    free(loader_data.shlibs[i].funcarray[j].fname);\n+                }\n+            }\n+            free(loader_data.shlibs[i].funcarray);\n+            loader_data.shlibs[i].funcarray
  = NULL;\n+        }\n+    }\n+    loader_data.numshlibs = 0;\n+    loader_data.shlibs
  = NULL;\n+}\n+\n void loader_reset()\n {\n   for (int i = 0; i < loader_data.numshlibs
