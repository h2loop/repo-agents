  Title: Fix invalid function pointers after LDPC library loading\n\n### Summary\nThe
  LDPC library loading mechanism in OAI was broken due to premature closing of shared
  library handles. When `load_nrLDPClib()` was called, the underlying `load_module_version_shlib()`
  function would load the library, extract function pointers with `dlsym()`, but then
  immediately call `dlclose()` on the handle. This made all the function pointers
  invalid, causing segfaults when the LDPC encoder/decoder functions were later invoked.\n\nThe
  issue was particularly evident when running PHY-level simulations or when the LDPC
  offload functionality was enabled, as these code paths directly use the function
  pointers obtained during library loading.\n\n### Changes\n- `common/utils/load_module_shlib.c`:
  \n  * Store library handles instead of immediately closing them\n  * Add proper
  cleanup functions to close handles when needed\n  * Handle library reloading by
  closing previous handles\n- `common/utils/load_module_shlib.h`: \n  * Add `lib_handle`
  field to `loader_shlibdesc_t` structure\n  * Export new cleanup functions\n\n","extra_fields":{"bug_description":"missing
