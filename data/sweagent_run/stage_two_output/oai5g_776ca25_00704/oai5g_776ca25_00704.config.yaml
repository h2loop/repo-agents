  When the VNF simulator executable was missing or failed to start, the function would
  return an invalid PID without any error indication, causing subsequent test operations
  to fail silently or hang indefinitely.\n\nThe issue was particularly evident when
  running integration tests in environments where the VNF simulator had not been built,
  or when incorrect paths were specified. The function also lacked proper error propagation
  for fork() and execv() failures, making debugging difficult.\n\nThis fix improves
  error handling throughout the process management functions and ensures tests gracefully
  handle startup failures.\n\n### Changes\n- `nfapi/open-nFAPI/integration_tests/main.cpp`:
