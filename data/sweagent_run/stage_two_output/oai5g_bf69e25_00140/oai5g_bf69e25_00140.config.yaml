  error\n\n### Summary\nThe radix-4 butterfly function `bfly4_tw1` in the NEON-optimized
  DFT implementation was producing incorrect output values, causing HARQ processes
  to use wrong redundancy versions during retransmissions. This led to failed retransmissions
  and reduced throughput in downlink transmissions.\n\n### Changes\n- `openair1/PHY/TOOLS/oai_dfts_neon.c`:
  Fixed `bfly4_tw1` and `ibfly4_tw1` functions to compute correct radix-4 butterfly
  outputs\n- Corrected output ordering to match standard FFT implementation\n- Made
  implementation consistent with manual optimizations in dft16/idft16 functions\n\n###
  Reproduction\nTo reproduce the issue:\n1. Configure a UE with HARQ enabled in downlink\n2.
  Trigger retransmissions by intentionally corrupting initial transmissions\n3. Observe
  that retransmitted TBs use incorrect redundancy versions\n4. Monitor for increased
  BLER and reduced throughput in poor channel conditions\n5. Check PHY logs for \"HARQ
  retransmission failed\" messages\n\nThe issue manifests as incorrect softbuffer
  combining at the UE side due to mismatched redundancy versions between initial transmission
  and retransmissions, causing decode failures even with sufficient SNR.\n","extra_fields":{"bug_description":"HARQ
