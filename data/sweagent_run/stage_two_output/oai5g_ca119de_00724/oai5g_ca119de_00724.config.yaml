  Title: Fix incorrect bit field extraction in EPS Network Feature Support IE\n\n###
  Summary\nThe EPS Network Feature Support information element decoder only extracted
  a single bit (IMS VoPS) instead of the complete set of network feature flags. This
  caused incomplete debug output in NAS tracing and potentially incorrect network
  behavior negotiation.\n\nThe issue was introduced when the IE structure was simplified
  from a proper bit field to a single uint8_t, losing the multi-bit interpretation
  required by 3GPP TS 24.301.\n\nUnder network conditions where extended EPS features
  are negotiated, this leads to:\n- Incomplete XML debug traces missing EMC BS, EPC
  LS, and other feature flags\n- Potential misinterpretation of network capabilities
  during attach procedures\n- Segfault when accessing uninitialized bit fields in
  debug mode\n\n### Changes\n- `openair3/NAS/COMMON/IES/EpsNetworkFeatureSupport.h`:
  Restored proper bit field structure for all 6 defined EPS features\n- `openair3/NAS/COMMON/IES/EpsNetworkFeatureSupport.c`:
  Fixed decode/encode functions to handle complete bit field extraction\n- `openair3/NAS/COMMON/IES/EpsNetworkFeatureSupport.c`:
  Enhanced dump function to show all feature flags individually\n\nTo reproduce: Enable
  NAS debug tracing and initiate an attach procedure with a network advertising extended
  EPS features. Observe that only the IMS VoPS flag appears in traces, and other flags
  like EMC BS are missing even when present in the air interface capture.\n","extra_fields":{"bug_description":"socket
  resource leak where a socket is not closed after use or on error","bug_id":"c_socket_leak","stage_one_patch":"diff
