  Title: Fix M2SetupResponse generation in M3AP MCE handler\n\n### Summary\nThe `m2ap_MCE_generate_m2_setup_response`
  function in the M3AP implementation was not generating complete M2SetupResponse
  messages due to commented-out code sections. This caused the MCE to send malformed
  responses during M2 setup procedures, leading to connection failures with peer nodes.\n\nThe
  issue was traced to `/repo/openair3/M3AP/m3ap_MME_generate_messages.c` where all
  the mandatory Information Elements (IEs) for the M2SetupResponse were commented
  out. When called, the function would only generate an empty PDU without the required
  GlobalMCE_ID, ServedCells, and GUGroupIDList IEs.\n\n### Changes\n- `openair3/M3AP/m3ap_MME_generate_messages.c`:
  Uncommented and properly implemented all mandatory IEs in `m2ap_MCE_generate_m2_setup_response`\n-
  `openair3/M3AP/m3ap_MCE_generate_messages.h`: Fixed function signature and header
  file consistency\n- Removed the typo file `openair3/M3AP/m3ap_MCE_generate_messsages.c`
  that contained a commented-out version\n- Fixed include references in `openair3/M3AP/m3ap_MME_generate_messages.c`
  to point to correct header\n- Corrected naming inconsistencies in `openair3/M3AP/m3ap_MME_generate_messages.h`\n\n","extra_fields":{"bug_description":"integer
