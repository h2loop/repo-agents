  Title: Fix Positioning Measurement Failure Encoding in F1AP\n\n### Summary\nThe
  F1AP positioning functionality was missing the implementation of `encode_positioning_measurement_failure()`
  function, causing undefined behavior when positioning measurement failures needed
  to be sent. This resulted in crashes during positioning procedures when the gNB
  attempted to report measurement failures to the CU.\n\nThe issue was that the file
  `openair2/F1AP/lib/f1ap_positioning.c` referenced in the codebase didn''t exist,
  and there was no implementation of the encoding function for PositioningMeasurementFailure
  messages. This fix creates the missing file and implements the encoding function
  with proper error handling.\n\n### Changes\n- `openair2/F1AP/lib/f1ap_positioning.c`:
  New file created with implementation of `encode_positioning_measurement_failure()`
  function\n- `openair2/F1AP/lib/f1ap_positioning.h`: New header file created for
  positioning functionality\n- `openair2/F1AP/CMakeLists.txt`: Added F1AP_positioning
  library to build configuration\n- `openair2/F1AP/f1ap_common.h`: Included positioning
  header for global access\n\n","extra_fields":{"bug_description":"dead code that
