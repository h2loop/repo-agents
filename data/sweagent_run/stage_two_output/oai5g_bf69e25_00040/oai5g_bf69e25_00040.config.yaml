  Title: Fix MBMS Session Start Request Handling in M2AP\n\n### Summary\nThe `rrc_eNB_process_M2AP_MBMS_SESSION_START_REQ`
  function in the eNB M2AP module was not properly utilizing the session start request
  parameters. Instead, it was ignoring the actual MBMS session data and reusing stale
  global variables, causing unexpected behavior when starting MBMS sessions.\n\nThe
  root cause was that the `m2ap_session_start_req_t` structure was just a dummy with
  no meaningful fields, and the RRC function was not validating or using the passed
  parameters. This led to sessions being processed with incorrect or outdated configuration
  data.\n\n### Changes\n- `openair2/COMMON/m2ap_messages_types.h`: Enhanced `m2ap_session_start_req_t`
  structure with proper fields for MCE-MBMS-M2AP-ID, TMGI, MBMS-Session-ID, MBMS-Service-Area,
  and TNL-Information based on the M2AP ASN.1 specification.\n- `openair2/RRC/LTE/rrc_eNB_M2AP.c`:
  Updated `rrc_eNB_process_M2AP_MBMS_SESSION_START_REQ` function to validate input
  parameters using AssertFatal and log session details for debugging.\n\n","extra_fields":{"bug_description":"missing
