  Title: Fix memory access violation in PRACH processing for RU\n\n### Summary\nThe
  NR RU PRACH processing function `rx_nr_prach_ru()` contained several potential memory
  access violations that could lead to segmentation faults or incorrect PRACH detection
  under certain conditions.\n\nThe issues were caused by:\n1. Missing bounds checking
  on `prachOccasion` parameter when accessing `ru->prach_rxsigF[prachOccasion]`\n2.
  Missing bounds checking on `numRA` parameter when accessing configuration arrays\n3.
  Missing bounds checking on `prachStartSymbol` parameter in sample offset calculations\n4.
  Unsafe beam index calculation that could cause out-of-bounds access when `ru->nb_rx`
  is zero\n5. Missing boundary checking in PRACH repetition combining logic that could
  access memory beyond allocated space\n\nThese issues could manifest during high
  traffic scenarios with multiple concurrent PRACH occasions or when invalid configuration
  parameters were passed to the function.\n\n### Changes\n- `openair1/PHY/NR_TRANSPORT/nr_prach.c`:
  Added bounds checking for all array accesses in `rx_nr_prach_ru()` function\n- `openair1/PHY/NR_TRANSPORT/nr_prach.c`:
  Added safety checks for beam index calculation\n- `openair1/PHY/NR_TRANSPORT/nr_prach.c`:
  Fixed repetition combining logic with proper boundary checking\n- `openair1/PHY/NR_TRANSPORT/nr_prach.c`:
  Added include for nr_common.h to access NR_NUMBER_OF_SYMBOLS_PER_SLOT definition\n\n","extra_fields":{"bug_description":"deadlock
