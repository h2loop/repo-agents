  Title: Fix L1_stats_thread crash due to uninitialized frame counters\n\n### Summary\nThe
  L1_stats_thread in the LTE eNB executable was accessing uninitialized memory when
  trying to read frame_tx values from the L1_proc_tx structure. This caused segmentation
  faults and unpredictable behavior when the statistics thread was enabled.\n\nThe
  issue occurred because the frame and subframe counters in both L1_proc and L1_proc_tx
  structures were not explicitly initialized to zero during the eNB initialization
  phase. When the L1_stats_thread started before the L1 processing threads had a chance
  to update these counters, it would read garbage values, leading to crashes in the
  dump_ulsch_stats and dump_uci_stats functions.\n\n### Reproduction Steps\n1. Start
  the LTE eNB with statistics enabled (ensure IS_SOFTMODEM_NOSTATS_BIT is not set)\n2.
  Enable the L1_stats_thread by not setting the NOSTATS flag\n3. Observe segmentation
  fault or invalid memory access in the L1_stats.log file\n4. The crash typically
  occurs within the first few seconds of eNB operation\n\n### Changes\n- `executables/lte-enb.c`:
  Added explicit initialization of all frame and subframe counters (frame_tx, subframe_tx,
  frame_rx, subframe_rx, and PRACH related counters) for both L1_proc and L1_proc_tx
  structures during the init_eNB_proc function\n- `executables/lte-enb.c`: Added safety
  check in L1_stats_thread to validate frame_tx values before passing them to dump
  functions, with fallback to frame 0 if values are invalid\n","extra_fields":{"bug_description":"HARQ
  process error such as incorrect retransmission or wrong redundancy version","bug_id":"telecom_harq_error","stage_one_patch":"diff
  --git a/executables/lte-enb.c b/executables/lte-enb.c\nindex 5e686d6527..1829b5db67
  100644\n--- a/executables/lte-enb.c\n+++ b/executables/lte-enb.c\n@@ -835,8 +835,14
  @@ void *L1_stats_thread(void *param) {\n     fd=fopen(\"L1_stats.log\",\"w\");\n     AssertFatal(fd!=NULL,\"Cannot
  open L1_stats.log\\n\");\n     dump_I0_stats(fd,eNB);\n-    dump_ulsch_stats(fd,eNB,eNB->proc.L1_proc_tx.frame_tx);\n-    dump_uci_stats(fd,eNB,eNB->proc.L1_proc_tx.frame_tx);\n+    //
  Add safety check for valid frame number\n+    if (eNB->proc.L1_proc_tx.frame_tx
  >= 0 && eNB->proc.L1_proc_tx.frame_tx < 1024) {\n+      dump_ulsch_stats(fd,eNB,eNB->proc.L1_proc_tx.frame_tx);\n+      dump_uci_stats(fd,eNB,eNB->proc.L1_proc_tx.frame_tx);\n+    }
  else {\n+      dump_ulsch_stats(fd,eNB,0);\n+      dump_uci_stats(fd,eNB,0);\n+    }\n     fclose(fd);\n   }\n   return(NULL);\n@@
  -872,6 +878,24 @@ void init_eNB_proc(int inst) {\n     proc->RU_mask_tx               =
  (1<<eNB->num_RU)-1;\n     memset((void *)proc->RU_mask,0,10*sizeof(proc->RU_mask[0]));\n     proc->RU_mask_prach            =0;\n+    \n+    //
  Initialize frame and subframe counters for both L1_proc and L1_proc_tx\n+    L1_proc->frame_tx              =
  0;\n+    L1_proc->subframe_tx           = 0;\n+    L1_proc->frame_rx              =
  0;\n+    L1_proc->subframe_rx           = 0;\n+    L1_proc_tx->frame_tx           =
  0;\n+    L1_proc_tx->subframe_tx        = 0;\n+    L1_proc_tx->frame_rx           =
  0;\n+    L1_proc_tx->subframe_rx        = 0;\n+    L1_proc->frame_prach           =
  0;\n+    L1_proc->subframe_prach        = 0;\n+    L1_proc->frame_prach_br        =
  0;\n+    L1_proc->subframe_prach_br     = 0;\n+    L1_proc_tx->frame_prach        =
  0;\n+    L1_proc_tx->subframe_prach     = 0;\n+    L1_proc_tx->frame_prach_br     =
  0;\n+    L1_proc_tx->subframe_prach_br  = 0;\n     pthread_mutex_init( &eNB->UL_INFO_mutex,
  NULL);\n     pthread_mutex_init( &L1_proc->mutex, NULL);\n     pthread_mutex_init(
  &L1_proc_tx->mutex, NULL);\n","start_fn":"L1_stats_thread","start_fn_file":"executables/lte-enb.c","subsystem":"executables"},"type":"text","id":"oai5g_bf69e25_00406"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
