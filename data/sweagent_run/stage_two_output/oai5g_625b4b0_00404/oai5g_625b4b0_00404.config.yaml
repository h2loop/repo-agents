  {\n-    case \tLTE_DRX_Config__setup__longDRX_CycleStartOffset_PR_sf10:\n+    case        LTE_DRX_Config__setup__longDRX_CycleStartOffset_PR_sf10:\n       UE_scheduling_control->drx_longCycle_timer_thres
