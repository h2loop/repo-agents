  Title: Fix DRX configuration not properly activating after successful setup\n\n###
  Summary\nThe `eNB_Config_Local_DRX()` function in the MAC layer was not properly
  setting the `cdrx_configured` flag to `true` after successfully configuring DRX
  parameters. This caused the system to behave as if DRX was not configured even when
  the configuration completed successfully.\n\nAdditionally, error handling in the
  function was incomplete - when invalid DRX parameter values were provided, the function
  would log errors but continue execution, potentially leading to incorrect DRX configuration.\n\nThis
  fix ensures that:\n1. When DRX configuration is successful, `cdrx_configured` is
  set to `true` \n2. When DRX configuration fails due to invalid parameters, the function
  returns early\n3. Error cases properly reset the `cdrx_configured` flag to `false`\n\n###
  Changes\n- `openair2/LAYER2/MAC/config.c`: Fixed `eNB_Config_Local_DRX()` function
  to properly set `cdrx_configured = true` after successful configuration and improved
  error handling\n\n### Reproduction\nTo reproduce the issue:\n1. Configure a UE with
  valid DRX parameters using RRC connection reconfiguration\n2. Observe that after
  the configuration is processed by `eNB_Config_Local_DRX()`, the `cdrx_configured`
  flag remains `false` \n3. This causes the scheduler to not apply DRX-specific logic
  even though DRX parameters were configured\n4. When invalid DRX parameters are sent,
  the function logs errors but continues execution, potentially leaving the UE in
  an inconsistent state\n\nThe fix ensures that after successful DRX configuration,
  `cdrx_configured` is properly set to `true`, allowing the scheduler to correctly
  apply DRX behavior.\n","extra_fields":{"bug_description":"missing state validation
  before processing a protocol message","bug_id":"telecom_state_machine_missing_validation","stage_one_patch":"diff
