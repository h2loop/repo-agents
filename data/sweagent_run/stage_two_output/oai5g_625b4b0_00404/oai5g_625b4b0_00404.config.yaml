  to modify */\n   UE_scheduling_control = &(UE_info_mac->UE_sched_ctrl[UE_id]);\n-  UE_scheduling_control->cdrx_configured
  = false; // will be set to true when no error\n \n   /* Check drx_Configuration
  */\n   if (drx_Configuration == NULL) {\n@@ -1061,13 +1060,15 @@ void eNB_Config_Local_DRX(instance_t
  Mod_id,\n   }\n \n   /* Modify scheduling control structure according to DRX configuration:
  doesn''t support every configurations! */  \n-  UE_scheduling_control->cdrx_configured
  = false; // will be set to true when receiving RRC Reconfiguration Complete\n+  UE_scheduling_control->cdrx_configured
  = true; // DRX parameters are configured\n   UE_scheduling_control->cdrx_waiting_ack
  = true; // waiting for RRC Reconfiguration Complete message\n   UE_scheduling_control->in_active_time
  = false;\n   UE_scheduling_control->dci0_ongoing_timer = 0;\n   UE_scheduling_control->on_duration_timer
  = 0;\n   struct LTE_DRX_Config__setup *choiceSetup = &drx_Configuration->choice.setup;\n
  \n+  bool config_error = false;\n+\n   switch (choiceSetup->onDurationTimer) {\n     case
  0:\n       UE_scheduling_control->on_duration_timer_thres = 1;\n@@ -1135,8 +1136,14
  @@ void eNB_Config_Local_DRX(instance_t Mod_id,\n \n     default:\n       LOG_E(MAC,
  \"[eNB_Config_Local_DRX] Error in local DRX configuration, the on duration timer
  value specified is unknown\\n\");\n+      config_error = true;\n       break;\n   }\n+  \n+  if
  (config_error) {\n+    UE_scheduling_control->cdrx_configured = false;\n+    return;\n+  }\n
  \n   UE_scheduling_control->drx_inactivity_timer = 0;\n \n@@ -1235,8 +1242,14 @@
  void eNB_Config_Local_DRX(instance_t Mod_id,\n \n     default:\n       LOG_E(MAC,
