  Title: Fix memory allocation mismatch in new_eNB_dlsch() function\n\n### Summary\nThe
  `new_eNB_dlsch()` function in the LTE transport channel coding module had inconsistent
  memory allocation and deallocation sizes. When allocating memory for the `b` buffer,
  the function used a scaled size based on `bw_scaling`, but the corresponding `free_eNB_dlsch()`
  function always freed the full buffer size. This mismatch could lead to memory corruption
  or incorrect memory management.\n\nAdditionally, the loop for allocating `c[r]`
  segments used `MAX_NUM_DLSCH_SEGMENTS/bw_scaling` which could result in insufficient
  segment allocation when `bw_scaling` was greater than 1.\n\nThis fix ensures consistent
  memory allocation/deallocation sizes and proper error handling throughout the function.\n\n###
  Changes\n- `openair1/PHY/LTE_TRANSPORT/dlsch_coding.c`: \n  - Fixed memory allocation/deallocation
  size mismatch for the `b` buffer\n  - Corrected loop limit for `c[r]` segment allocation
  to use `MAX_NUM_DLSCH_SEGMENTS`\n  - Added proper error checking for all memory
  allocations\n  - Added null pointer checks in the free function to prevent crashes\n\n###
  Reproduction\nTo reproduce the issue, create an eNB DLSCH with `N_RB_DL` values
  of 6 or 25 (which set `bw_scaling` to 4) or 50 (which sets `bw_scaling` to 2). The
  inconsistent memory handling would manifest as:\n1. Potential memory corruption
  during deallocation\n2. Insufficient memory allocation for turbo code segments\n3.
  Possible crashes when accessing uninitialized memory\n\nThe fix ensures that all
  allocated memory is properly managed regardless of the bandwidth scaling factor.\n","extra_fields":{"bug_description":"socket
