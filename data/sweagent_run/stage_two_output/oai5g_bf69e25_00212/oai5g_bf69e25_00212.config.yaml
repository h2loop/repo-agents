  Title: Fix memory leak in init_eNB_afterRU() function\n\n### Summary\nThe `init_eNB_afterRU()`
  function in `lte-enb.c` was not properly managing memory allocation for PRACH signal
  arrays, causing memory leaks when the function was called multiple times during
  eNB reconfiguration. This issue manifested as increased memory consumption over
  time, especially in scenarios where RUs were dynamically added or removed.\n\nThe
  problem occurred because the function allocated new memory for `prach_vars.rxsigF[0]`
  and `prach_vars_br.rxsigF[ce_level]` pointer arrays without checking if they were
  already allocated, leading to orphaned memory blocks. Additionally, the function
  did not handle the case where no RUs were attached to the eNB, which could happen
  during certain initialization sequences.\n\n### Changes\n- `executables/lte-enb.c`:
  Added proper memory management using `free_and_zero()` to prevent leaks\n- `executables/lte-enb.c`:
  Added conditional handling for cases with no attached RUs  \n- `executables/lte-enb.c`:
  Changed from `malloc16` to `malloc16_clear` for consistency with codebase\n- `executables/lte-enb.c`:
  Added `#include \"common/utils/utils.h\"` for `free_and_zero` macro\n","extra_fields":{"bug_description":"protocol
