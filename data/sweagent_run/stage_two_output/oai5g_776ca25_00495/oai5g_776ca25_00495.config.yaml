  Title: Fix signed integer serialization in NFAPI message encoding\n\n### Summary\nThe
  `pusharrays32()` function in the NFAPI library was not correctly serializing signed
  32-bit integers due to improper handling of bit operations on signed types. This
  caused incorrect byte representations to be written to the output buffer, leading
  to corrupted NFAPI messages.\n\nThe issue was traced to the underlying `pushs32()`
  function which performed bitwise operations directly on signed integers, resulting
  in implementation-defined behavior. On certain platforms, negative values were not
  being encoded correctly, causing the receiving end to reconstruct incorrect values.\n\nThis
  fix ensures proper serialization by casting signed integers to their unsigned equivalents
  before bit manipulation, and properly reconstructing signed values during deserialization.\n\n###
  Changes\n- `nfapi/open-nFAPI/nfapi/src/nfapi.c`: Fixed `pushs32()` to cast input
  to unsigned before bit operations\n- `nfapi/open-nFAPI/nfapi/src/nfapi.c`: Fixed
  `pushs16()` for consistency \n- `nfapi/open-nFAPI/nfapi/src/nfapi.c`: Updated `pulls32()`
  and `pulls16()` to properly reconstruct signed values\n\n### Reproduction\nTo reproduce
  the issue:\n1. Create an array of signed 32-bit integers containing negative values\n2.
  Use `pusharrays32()` to serialize the array into a buffer\n3. On some platforms,
  the negative values will be incorrectly encoded\n4. When the message is received
  and processed, the original negative values cannot be correctly reconstructed\n\nThe
  symptom is that NFAPI messages containing signed integer arrays (such as power control
  parameters or timing adjustments) will have incorrect values, potentially causing
  radio link failures or incorrect UE behavior.\n","extra_fields":{"bug_description":"missing
