  Title: Fix memory leak in cp_positioning_measurement_report function\n\n### Summary\nThe
  F1AP positioning measurement report copy function was not properly allocating memory
  for the copied structure, causing segmentation faults when accessing the copied
  data. The issue occurred when the gNB received positioning measurement reports from
  the DU and attempted to process them.\n\nThe bug was introduced when the positioning
  functionality was added but the copy function implementation was incomplete. The
  function signature existed but the actual memory allocation was missing.\n\n###
  Changes\n- `openair2/F1AP/lib/f1ap_positioning.c`: Implemented proper memory allocation
  and copying logic in cp_positioning_measurement_report\n- `openair2/F1AP/lib/f1ap_positioning.h`:
  Added proper function declarations for positioning measurement report handling\n-
  `openair2/COMMON/f1ap_messages_types.h`: Added f1ap_positioning_measurement_report_t
  structure definition\n- `openair2/F1AP/lib/CMakeLists.txt`: Added f1ap_positioning.c
  to build\n- `openair2/F1AP/lib/f1ap_lib_extern.h`: Included positioning header\n\n###
  Reproduction\nTo reproduce the issue:\n1. Configure gNB with positioning capabilities
  enabled\n2. Connect a UE that supports positioning measurements\n3. Trigger a positioning
  measurement report from the UE\n4. Observe segmentation fault when the gNB attempts
  to process the report\n\nThe crash occurs in the cp_positioning_measurement_report
  function when it tries to access fields of the copied structure that were not properly
  allocated.\n","extra_fields":{"bug_description":"incorrect protocol state machine
  transition that violates 3GPP specification","bug_id":"telecom_state_machine_invalid_transition","stage_one_patch":"diff
