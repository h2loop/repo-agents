  Title: Fix blocking issue in rrc_enb_process_itti_msg when called from rrc_rx_tx\n\n###
  Summary\nThe `rrc_enb_process_itti_msg()` function was designed as an infinite message
  processing loop for the RRC eNB task. However, it was also being called directly
  from `rrc_rx_tx()`, which caused the calling function to block indefinitely waiting
  for more messages that may never arrive.\n\nThis fix separates the message processing
  logic into a reusable helper function and creates a new non-blocking variant for
  use in contexts like `rrc_rx_tx()`.\n\n### Changes\n- `openair2/RRC/LTE/rrc_eNB.c`:
  \n  - Created `rrc_enb_process_one_itti_msg()` helper function containing the message
  processing logic\n  - Modified `rrc_enb_process_itti_msg()` to use the helper in
  its loop\n  - Added `rrc_enb_process_itti_msg_one_shot()` function that processes
  available messages without blocking\n  - Updated `rrc_rx_tx()` to call the new one-shot
  function instead of the blocking version\n- `openair2/RRC/LTE/rrc_proto.h`: Added
  function prototype for `rrc_enb_process_itti_msg_one_shot()`\n\n### Reproduction\nWhen
  running the OAI eNB with active UEs, calling procedures that trigger `rrc_rx_tx()`
  (such as periodic subframe processing) would cause the function to hang indefinitely.
  This manifested as:\n- No response to subsequent RRC messages from UEs\n- MAC layer
  becoming unresponsive\n- Eventually leading to timeout errors in the S1AP connection\n\nThe
  issue was particularly noticeable during handover procedures or when processing
  RRC reconfigurations, where the system would appear to freeze after sending a `RRC_SUBFRAME_PROCESS`
  message.\n","extra_fields":{"bug_description":"deadlock caused by inconsistent lock
