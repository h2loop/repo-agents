  *m, int ue_id, m2id_state_t state)\n {\n+  if (ue_id < 0 || ue_id >= M2AP_MAX_IDS)
  {\n+    return; // Invalid UE ID\n+  }\n   m->ids[ue_id].state = state;\n }\n \n
