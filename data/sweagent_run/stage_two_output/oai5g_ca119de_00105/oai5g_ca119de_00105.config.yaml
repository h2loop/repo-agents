  Title: Fix integer underflow in M2AP ID management functions\n\n### Summary\nThe
  M2AP ID management code was vulnerable to integer underflow issues due to lack of
  bounds checking on UE ID parameters. When invalid UE IDs were passed to functions
  like `m2ap_set_ids`, they could cause out-of-bounds array access, leading to memory
  corruption and unpredictable behavior including integer underflow that produced
  unexpectedly large unsigned values downstream.\n\nThis fix adds proper bounds checking
  to all M2AP ID management functions that use UE IDs as array indices.\n\n### Changes\n-
  `openair2/M2AP/m2ap_ids.c`: Added bounds checking to prevent out-of-bounds array
  access in all functions that take UE ID parameters\n- Functions protected include:
  `m2ap_set_ids`, `m2ap_release_id`, `m2ap_id_set_target`, `m2ap_id_set_state`, `m2ap_set_reloc_prep_timer`,
  `m2ap_set_reloc_overall_timer`, and all getter functions\n\n### Reproduction\nTo
  reproduce the original issue:\n1. Call `m2ap_set_ids` with a negative UE ID or UE
  ID >= M2AP_MAX_IDS\n2. Observe memory corruption as the function writes to invalid
  memory locations\n3. This can manifest as integer underflow when corrupted data
  is later interpreted as unsigned values\n4. Symptoms include segfaults, incorrect
  timer calculations, or unexpected behavior in M2AP handover procedures\n\nThe fix
  ensures all such functions validate their UE ID parameters before accessing the
  `ids` array, preventing the memory corruption that leads to downstream integer underflow
  issues.\n","extra_fields":{"bug_description":"integer underflow producing an unexpectedly
  large unsigned value","bug_id":"c_integer_underflow","stage_one_patch":"diff --git
