  *m, int id)\n {\n+  if (id < 0 || id >= M2AP_MAX_IDS) {\n+    return; // Invalid
  ID\n+  }\n   m->ids[id].rnti = -1;\n }\n \n@@ -81,6 +84,9 @@ int m2ap_find_id_from_rnti(m2ap_id_manager
  *m, int rnti)\n \n void m2ap_set_ids(m2ap_id_manager *m, int ue_id, int rnti, int
  id_source, int id_target)\n {\n+  if (ue_id < 0 || ue_id >= M2AP_MAX_IDS) {\n+    return;
  // Invalid UE ID, don''t set anything\n+  }\n   m->ids[ue_id].rnti      = rnti;\n   m->ids[ue_id].id_source
  = id_source;\n   m->ids[ue_id].id_target = id_target;\n@@ -89,40 +95,64 @@ void
  m2ap_set_ids(m2ap_id_manager *m, int ue_id, int rnti, int id_source, int id\n /*
