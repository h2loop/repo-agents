  Title: Fix websrv_callback_set_softmodemvar response handling and variable validation\n\n###
  Summary\nThe `websrv_callback_set_softmodemvar` function in the web server module
  had several issues that caused incorrect behavior when setting softmodem variables
  through the web interface. The main problems were:\n\n1. Insufficient buffer size
  for error reporting which caused truncated messages\n2. Missing validation of the
  variable name in JSON requests\n3. No proper error reporting when a variable was
  not found\n4. Incomplete error handling for different data types\n\nThese issues
  led to confusing error messages and incorrect HTTP status codes being returned to
  the web frontend.\n\nThe fix includes:\n- Increased buffer size from 256 to 1024
  for better error reporting\n- Added validation for the \"name\" field in JSON requests\n-
  Added tracking of whether a variable was found\n- Improved error messages with specific
  information about what went wrong\n- Proper HTTP status codes (404 for variable
  not found, 400 for bad request, 500 for server errors)\n- Better success messages
  showing the actual values being set\n\n### Changes\n- `common/utils/websrv/websrv.c`:
  \n  - Increased buffer size in `websrv_printf_start` from 256 to 1024\n  - Added
  `#include <stdbool.h>` for bool type support\n  - Added validation for JSON \"name\"
  field\n  - Added `var_found` flag to track if variable was found\n  - Improved error
  messages and HTTP status codes\n  - Added success messages showing actual values
  being set\n  - Added proper handling for when variable is not found (404 status)\n","extra_fields":{"bug_description":"power
