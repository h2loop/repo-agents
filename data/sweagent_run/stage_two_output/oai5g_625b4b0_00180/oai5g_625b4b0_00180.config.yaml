  %d, phase_max %d \\n\",phase, Nid1, metric, *tot_metric, *phase_max);\n+        LOG_D(PHY,\"(phase,Nid1)
  (%d,%d), metric_phase %d tot_metric %d, phase_max %d \\n\",phase, Nid1, metric,
  *tot_metric, *phase_max);\n \n #endif\n       }\n","start_fn":"pss_ch_est_nr","start_fn_file":"openair1/PHY/NR_UE_TRANSPORT/sss_nr.c","subsystem":"openair1/PHY/NR_UE_TRANSPORT"},"type":"text","id":"oai5g_625b4b0_00180"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
