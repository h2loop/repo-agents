  Title: Fix potential crash in SSS detection due to invalid NID2 values\n\n### Summary\nThe
  `pss_ch_est_nr` function in the SSS detection chain was vulnerable to out-of-bounds
  array access when provided with invalid NID2 values. This could occur during cell
  search when the PSS detection algorithm returned erroneous NID2 values outside the
  valid range [0,2] for normal mode or [0,1] for SL mode.\n\nThe issue manifests as
  a segmentation fault during initial cell search, particularly in poor RF conditions
  where PSS detection may produce false positives with invalid NID2 values.\n\n###
  Reproduction Steps\n1. Configure UE for initial cell search\n2. Place UE in environment
  with poor signal conditions or interference\n3. Start cell search procedure\n4.
  When PSS detection returns an invalid NID2 (e.g., -1 or 3+), the SSS detection will
  attempt to access `primary_synchro_nr2[nid2]` with out-of-bounds index\n5. Segmentation
  fault occurs due to invalid memory access\n\n### Changes\n- `openair1/PHY/NR_UE_TRANSPORT/sss_nr.c`:
  Added bounds checking in `pss_ch_est_nr` function to validate NID2 values before
  array access\n- `openair1/PHY/NR_UE_TRANSPORT/sss_nr.c`: Modified `rx_sss_nr` to
  properly handle error returns from `pss_ch_est_nr`\n","extra_fields":{"bug_description":"missing
  NULL check after memory allocation that can fail","bug_id":"c_missing_null_check_after_alloc","stage_one_patch":"diff
