  amp)\n       /* Modulation of SSS is a BPSK TS 36.211 chapter 5.1.2 BPSK */\n #if
  1\n         d_sss[N_ID_2][N_ID_1][n]   = dss_current;// * amp;\n-\t(void) amp;\n+        (void)
  amp;\n #else\n         (void) amp;\n         d_sss[N_ID_2][N_ID_1][n]   = (dss_current
  * SHRT_MAX)>>SCALING_PSS_NR;\n@@ -192,6 +192,14 @@ static int pss_ch_est_nr(const
  NR_DL_FRAME_PARMS *frame_parms,\n                          c16_t pss_ext[NB_ANTENNAS_RX][LENGTH_PSS_NR],\n                          c16_t
  sss_ext[NB_ANTENNAS_RX][LENGTH_SSS_NR])\n {\n+  // Check that nid2 is within valid
  bounds\n+  int max_nid2 = get_softmodem_params()->sl_mode == 0 ? NUMBER_PSS_SEQUENCE
  : NUMBER_PSS_SEQUENCE_SL;\n+  if (nid2 < 0 || nid2 >= max_nid2) {\n+    LOG_E(PHY,
  \"Invalid nid2 value %d, must be in range [0, %d] for %s mode\\n\", \n+          nid2,
  max_nid2 - 1, get_softmodem_params()->sl_mode == 0 ? \"normal\" : \"SL\");\n+    return
  -1;\n+  }\n+  \n   int16_t *pss = get_primary_synchro_nr2(nid2);\n \n   for (int
  aarx = 0; aarx < frame_parms->nb_antennas_rx; aarx++) {\n@@ -408,7 +416,10 @@ bool
  rx_sss_nr(const NR_DL_FRAME_PARMS *frame_parms,\n   // get conjugated channel estimate
  from PSS, H* = R* \\cdot PSS\n   // and do channel estimation and compensation based
  on PSS\n \n-  pss_ch_est_nr(frame_parms, nid2, pss_ext, sss_ext);\n+  if (pss_ch_est_nr(frame_parms,
  nid2, pss_ext, sss_ext) != 0) {\n+    LOG_E(PHY, \"pss_ch_est_nr failed for nid2
  %d\\n\", nid2);\n+    return false;\n+  }\n \n   // now do the SSS detection based
  on the precomputed sequences in PHY/LTE_TRANSPORT/sss.h\n   *tot_metric = INT_MIN;\n@@
  -481,7 +492,7 @@ bool rx_sss_nr(const NR_DL_FRAME_PARMS *frame_parms,\n \n #ifdef
