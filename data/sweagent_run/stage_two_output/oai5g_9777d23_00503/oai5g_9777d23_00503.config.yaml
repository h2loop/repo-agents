  Title: Fix path loss calculation precision in get_PL function\n\n### Summary\nThe
  `get_PL()` function in LTE UE measurements was experiencing precision loss due to
  integer arithmetic operations. This caused incorrect path loss calculations that
  affected uplink power control algorithms.\n\n### Changes\n- `openair1/PHY/LTE_ESTIMATION/lte_ue_measurements.c`:
  Refactored `get_PL()` function to use explicit 32-bit integer arithmetic and clearer
  variable naming to prevent precision loss during path loss calculations.\n\n###
  Reproduction\nUsers may observe unexpected behavior in uplink power control, with
  UEs transmitting at incorrect power levels. This can manifest as:\n- Poor uplink
  SNR performance\n- Increased uplink interference\n- UE failing to establish connections
  in poor coverage conditions\n\nThe issue is most noticeable when `rx_total_gain_dB`
  and `referenceSignalPower` values result in intermediate calculations that lose
  precision due to integer division truncation.\n\n","extra_fields":{"bug_description":"missing
