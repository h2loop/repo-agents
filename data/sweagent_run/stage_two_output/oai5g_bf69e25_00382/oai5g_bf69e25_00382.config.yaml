  Title: Fix potential buffer overflow in HARQ rounds statistics handling\n\n### Summary\nThis
  PR addresses a potential buffer overflow issue in the handling of HARQ rounds statistics.
  The `rounds` arrays in `NR_bler_stats_t` and `NR_mac_dir_stats_t` have a fixed size
  of 8 elements, but the code was potentially accessing these arrays with indices
  that could exceed the array bounds when `harq_round_max` was set to a value greater
  than 8.\n\n### Changes\n- `openair2/LAYER2/NR_MAC_gNB/main.c`: Added bounds checking
  in loops that iterate over the `rounds` array to ensure `i < 8`\n- `openair2/LAYER2/NR_MAC_gNB/gNB_scheduler_dlsch.c`:
  Added assertion to check bounds before accessing `UE->mac_stats.dl.rounds[harq->round]`\n-
  `openair2/LAYER2/NR_MAC_gNB/gNB_scheduler_RA.c`: Added assertion to check bounds
  before accessing `UE->mac_stats.dl.rounds[harq->round]`\n- `openair2/GNB_APP/gnb_config.c`:
  Added constraints to ensure `harq_round_max` doesn''t exceed 8 when reading from
  configuration\n\n### Reproduction\nThe issue can be reproduced by configuring `dl_harq_round_max`
  or `ul_harq_round_max` to a value greater than 8 in the gNB configuration. When
  the code attempts to access the `rounds` arrays with an index >= 8, it would result
  in a buffer overflow, potentially causing a segfault or memory corruption.\n\nWith
  these changes, the code now properly validates array indices before accessing the
  `rounds` arrays, preventing the buffer overflow.\n","extra_fields":{"bug_description":"stack
  buffer overflow from unbounded copy into fixed-size local array","bug_id":"c_stack_buffer_overflow","stage_one_patch":"diff
