  Title: Fix memory corruption in vendor extension handling for FAPI messages\n\n###
  Summary\nThe FAPI message copy functions in the NR stack had incorrect memory allocation
  and parameter passing for vendor extensions. Since `nfapi_vendor_extension_tlv_t`
  is defined as `nfapi_tl_t*`, the code was allocating memory for a pointer (8 bytes)
  instead of the actual TLV structure it should point to. Additionally, function calls
  were passing addresses of pointer variables instead of the pointer values themselves.\n\nThis
  caused memory corruption when processing FAPI messages with vendor extensions, leading
  to unpredictable behavior and potential crashes during message handling.\n\n###
  Changes\n- `nfapi/open-nFAPI/fapi/src/nr_fapi_p5_utils.c`: Fixed memory allocation
  and parameter passing in all copy functions that handle vendor extensions:\n  -
  `copy_param_request`\n  - `copy_param_response` \n  - `copy_config_request`\n  -
  `copy_config_response`\n  - `copy_start_request`\n  - `copy_start_response`\n  -
  `copy_stop_request`\n  - `copy_stop_indication`\n  - `copy_error_indication`\n\nThe
  changes ensure proper memory is allocated for TLV structures and correct parameters
  are passed to `copy_vendor_extension_value`.\n\n","extra_fields":{"bug_description":"incorrect
