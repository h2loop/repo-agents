  bool use_deltaMCS,\n                                                          const
  NR_ServingCellConfigCommon_t *scc,\n                                                          const
  NR_UE_NR_Capability_t *uecap)\n {\n@@ -2634,7 +2647,7 @@ NR_BCCH_DL_SCH_Message_t
  *get_SIB1_NR(const NR_ServingCellConfigCommon_t *scc,\n                                frequency_range);\n
  \n   LOG_I(NR_RRC,\n-\t\"SIB1 freq: offsetToPointA %d\\n\",\n+        \"SIB1 freq:
