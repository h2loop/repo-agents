  Title: Fix potential crash in scheduling_request_config due to missing validation\n\n###
  Summary\nThe `scheduling_request_config()` function in the NR MAC gNB code could
  crash when called with PUCCH configurations that lack resource sets or resources.
  The function assumed the existence of resource set 0 and its resources without proper
  validation, leading to null pointer dereferences.\n\nThis fix adds validation checks
  to prevent crashes when PUCCH resource sets or resources are not available. The
  function now logs appropriate error messages and returns gracefully when the required
  resources are missing.\n\n### Changes\n- `openair2/LAYER2/NR_MAC_gNB/nr_radio_config.c`:
  Added validation checks in `scheduling_request_config()` to verify the existence
  of PUCCH resource sets and resources before accessing them.\n\n### Reproduction\nTo
  reproduce the issue:\n1. Configure a UE with a PUCCH configuration that has no resource
  sets\n2. Call `scheduling_request_config()` with this configuration\n3. The function
  would crash with a segmentation fault due to null pointer dereference\n\nAfter this
  fix, the function will log an error message and return without crashing.\n","extra_fields":{"bug_description":"race
  condition on shared data accessed from multiple threads without synchronization","bug_id":"c_race_condition","stage_one_patch":"diff
