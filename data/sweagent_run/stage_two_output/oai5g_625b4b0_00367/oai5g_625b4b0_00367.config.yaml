  b/openair2/LAYER2/NR_MAC_gNB/nr_radio_config.c\n@@ -1341,8 +1341,21 @@ static void
  set_SR_periodandoffset(NR_SchedulingRequestResourceConfig_t *schedul\n \n static
  void scheduling_request_config(const NR_ServingCellConfigCommon_t *scc, NR_PUCCH_Config_t
  *pucch_Config, int scs)\n {\n+  // Check if resourceSetToAddModList exists and has
  at least one element\n+  if (!pucch_Config->resourceSetToAddModList || pucch_Config->resourceSetToAddModList->list.count
  == 0) {\n+    LOG_E(NR_MAC, \"No PUCCH resource sets available for scheduling request
  configuration\\n\");\n+    return;\n+  }\n+  \n   // format with <=2 bits in pucch
  resource set 0\n   NR_PUCCH_ResourceSet_t *pucchresset = pucch_Config->resourceSetToAddModList->list.array[0];\n+  \n+  //
  Check if the resource set has resources\n+  if (!pucchresset || pucchresset->resourceList.list.count
  == 0) {\n+    LOG_E(NR_MAC, \"PUCCH resource set 0 has no resources for scheduling
  request configuration\\n\");\n+    return;\n+  }\n+  \n   // assigning the 1st pucch
  resource in the set to scheduling request\n   NR_PUCCH_ResourceId_t *pucchressetid
  = pucchresset->resourceList.list.array[0];\n \n@@ -1446,7 +1459,7 @@ static void
