  UCI payload corruption when extracting HARQ, SR, and CSI information. The bug manifested
  when UEs transmitted PUCCH format 2 with mixed payload types (e.g., HARQ+CSI).\n\nThe
  incorrect bit shifts were causing payload bytes to be extracted with wrong bit alignments,
  leading to incorrect ACK/NACK decisions and CQI reporting.\n\n### Changes\n- `openair1/PHY/NR_TRANSPORT/pucch_rx.c`:
