  Title: Fix SCTP client connection establishment failure\n\n### Summary\nWhen calling
  `sctp_handle_new_association_req()` to establish SCTP client connections, the function
  fails to properly establish connections due to incorrect socket binding logic and
  missing association state notifications.\n\nThe issue manifests as connections appearing
  to be created but no actual SCTP association being established with the remote peer.
  Upper layers do not receive proper association response notifications, causing them
  to hang waiting for connection establishment.\n\nThis fix restructures the client
  connection logic to properly create sockets, set SCTP options, optionally bind to
  local addresses, and connect to remote peers with proper error handling and state
  notifications.\n\n### Changes\n- `openair3/SCTP/sctp_eNB_task.c`: Completely restructured
  `sctp_handle_new_association_req()` to follow proper client connection pattern\n-
  Fixed incorrect use of `sctp_bindx()` with `SCTP_BINDX_ADD_ADDR` \n- Added proper
  association response notifications using `sctp_itti_send_association_resp()`\n-
  Improved error handling with proper resource cleanup\n- Fixed stream information
  initialization using `sctp_get_sockinfo()`\n\n","extra_fields":{"bug_description":"missing
