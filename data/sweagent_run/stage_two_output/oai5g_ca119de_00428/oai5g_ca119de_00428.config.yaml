  Title: Fix APN decoding and NULL pointer handling in NAS process functions\n\n###
  Summary\nThe NAS message processing functions in the AS simulator had unsafe memory
  access patterns when handling Access Point Name (APN) fields. The code directly
  cast OctetString values to char* without checking for NULL pointers or proper null-termination,
  leading to potential crashes when processing PDN connectivity requests.\n\nAdditionally,
  the APN format used in NAS messages (length-prefixed labels) was incorrectly treated
  as a simple string, causing garbled output when displaying APN values.\n\nThis fix
  addresses these issues by:\n1. Adding proper NULL pointer checks before accessing
  APN data\n2. Implementing correct APN format decoding for NAS messages\n3. Adding
  comprehensive error handling for various failure conditions\n4. Using proper memory
  management for temporary buffers\n\n### Changes\n- `openair3/NAS/TEST/AS_SIMULATOR/nas_process.c`:
  \n  - Added `decode_apn_format()` helper function to properly decode NAS APN format\n  -
  Fixed `_pdn_connectivity_request()` to handle NULL pointers and decode APN correctly\n  -
  Fixed `_activate_default_eps_bearer_context_request()` for consistency\n  - Added
  stdlib.h header for malloc/free functions\n\n### Reproduction\nTo reproduce the
  original issue:\n1. Process a NAS message containing a PDN connectivity request
  with an APN field\n2. If the APN OctetString value is NULL or improperly formatted,
  the function would crash\n3. If the APN contained the standard NAS length-prefixed
  format, it would display garbled text\n\nThe fix ensures that APN values are properly
  decoded and that NULL pointer dereferences are prevented, making the NAS processing
  functions more robust.\n","extra_fields":{"bug_description":"buffer overflow vulnerability","bug_id":"c_buffer_overflow","stage_one_patch":"diff
