  Title: Fix integer truncation in Msg3 retransmission allocation for TDD configurations\n\n###
  Summary\nThe `get_Msg3_alloc_ret` function in the LTE scheduler had a critical bug
  where it failed to initialize the `subframe` output parameter in TDD mode. This
  caused downstream code to operate on uninitialized memory, leading to unpredictable
  scheduling behavior.\n\nAdditionally, the function signature used inconsistent types
  (`unsigned char`/`unsigned int`) compared to its declaration in the header files
  (`uint8_t`/`uint32_t`), potentially causing truncation on some platforms.\n\nThis
  fix ensures proper subframe assignment for all TDD configurations and aligns parameter
  types with header declarations.\n\n### Changes\n- `openair1/SCHED/phy_procedures_lte_common.c`:
  Fixed TDD subframe assignment logic and parameter types in `get_Msg3_alloc_ret`\n-
  The function now properly sets both `frame` and `subframe` outputs for all TDD configurations\n-
  Parameter types now match header file declarations\n\n### Reproduction\nTo reproduce
  the original issue:\n1. Configure UE in TDD mode with any TDD configuration (1,
  3, 4, or 5)\n2. Trigger a Msg3 retransmission scheduling request\n3. Observe that
  `get_Msg3_alloc_ret` leaves `subframe` uninitialized\n4. Downstream scheduler uses
  garbage `subframe` value, causing incorrect UL resource allocation\n5. This may
  result in transmission failures or unexpected behavior in RA procedure handling\n\nThe
  fix ensures deterministic behavior by properly initializing the subframe allocation
  for Msg3 retransmissions in all TDD configurations.\n","extra_fields":{"bug_description":"integer
