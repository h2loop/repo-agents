  Title: Fix incorrect criticality flags in E-RAB Modification Indication\n\n### Summary\nThe
  `s1ap_eNB_generate_E_RAB_Modification_Indication` function was using incorrect criticality
  flags for mandatory IEs (MME_UE_S1AP_ID and eNB_UE_S1AP_ID), causing the MME to
  reject valid E-RAB modification indications. This led to failed bearer modification
  procedures and radio link failures when UEs attempted to modify their bearers.\n\nThe
  issue was that these IEs were marked with `S1AP_Criticality_reject` instead of `S1AP_Criticality_ignore`,
  which is inconsistent with other similar S1AP procedures and can cause interoperability
  issues with certain MME implementations that strictly enforce criticality handling.\n\n###
  Reproduction Steps\n1. Configure a UE to trigger an E-RAB modification procedure
  (e.g., through QoS changes)\n2. Observe that the gNB sends an E-RAB Modification
  Indication with incorrect criticality flags\n3. Some MME implementations will reject
  the message due to the incorrect flags\n4. The bearer modification fails and may
  lead to radio link failure\n\n### Changes\n- `openair3/S1AP/s1ap_eNB_nas_procedures.c`:
  Changed criticality values for MME_UE_S1AP_ID and eNB_UE_S1AP_ID IEs from `S1AP_Criticality_reject`
  to `S1AP_Criticality_ignore` in the `s1ap_eNB_generate_E_RAB_Modification_Indication`
  function to align with other S1AP procedures\n","extra_fields":{"bug_description":"incorrect
