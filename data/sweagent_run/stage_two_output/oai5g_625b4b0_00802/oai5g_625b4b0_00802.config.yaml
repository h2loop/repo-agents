  Title: Fix M3AP Session Response IE Value Assignment and Deprecated API Usage\n\n###
  Summary\nThe M3AP MBMS session response handling in the MCE module had multiple
  critical issues that caused incorrect message encoding and potential crashes. The
  `MCE_send_MBMS_SESSION_START_RESPONSE`, `MCE_send_MBMS_SESSION_STOP_RESPONSE`, and
  `MCE_send_MBMS_SESSION_UPDATE_RESPONSE` functions were not properly setting IE values,
  using deprecated ASN.1 sequence addition APIs, and had incorrect IE type assignments.\n\nSpecifically,
  the SESSION_START_RESPONSE function was leaving MCE_MBMS_M3AP_ID and MME_MBMS_M3AP_ID
  IEs uninitialized, causing the MME to receive malformed responses. Additionally,
  all three response functions were using the deprecated `asn1cSeqAdd` macro which
  has known safety issues, and the SESSION_STOP_RESPONSE and SESSION_UPDATE_RESPONSE
  functions were incorrectly assigning both IEs to the same MCE_MBMS_M3AP_ID value
  instead of their respective correct values.\n\n### Reproduction Steps\n1. Configure
  MCE to handle MBMS session requests from MME\n2. Trigger an MBMS session start procedure\n3.
  Observe that the MME receives a SESSION_START_RESPONSE with uninitialized IE values\n4.
  When the MME tries to parse these values, it encounters invalid data leading to:\n   -
  Segmentation faults during ASN.1 decoding\n   - Protocol errors due to missing mandatory
  IEs\n   - Failed MBMS session establishment\n\n### Changes\n- `openair2/COMMON/m3ap_messages_types.h`:
  Enhanced `m3ap_session_start_resp_t`, `m3ap_session_stop_resp_t`, and `m3ap_mbms_session_update_resp_t`
  structures to include `mme_mbms_m3ap_id` and `mce_mbms_m3ap_id` fields\n- `openair3/M3AP/m3ap_MCE_interface_management.c`:
  \n  - Replaced deprecated `asn1cSeqAdd` macro with direct `ASN_SEQUENCE_ADD` calls\n  -
  Fixed IE value assignments to properly set MCE_MBMS_M3AP_ID and MME_MBMS_M3AP_ID
  values\n  - Corrected SESSION_STOP_RESPONSE and SESSION_UPDATE_RESPONSE to use proper
  IE types\n  - Updated function signatures to use correct response structure types\n-
  `openair3/M3AP/m3ap_MCE_interface_management.h`: Updated function signature for
  SESSION_STOP_RESPONSE\n- `openair3/M3AP/m3ap_MCE.c`: Fixed message structure references
  in function calls\n","extra_fields":{"bug_description":"usage of deprecated API
