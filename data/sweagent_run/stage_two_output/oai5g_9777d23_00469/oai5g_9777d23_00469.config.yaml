  Title: Fix incorrect size calculation in get_crc_indication_size function\n\n###
  Summary\nThe `get_crc_indication_size` function in `nr_fapi_p7_utils.c` was using
  an incorrect formula to calculate the size needed for CB CRC status bits. This caused
  overallocation of memory when the number of CBs was a multiple of 8. The same bug
  was present in several related functions and has been fixed consistently across
  the codebase.\n\n### Changes\n- `nfapi/open-nFAPI/fapi/src/nr_fapi_p7_utils.c`:
  Fixed size calculation formula from `x / 8 + 1` to `(x + 7) / 8` in multiple functions:\n  -
  `get_crc_indication_size()` - primary fix\n  - `copy_crc_indication_CRC()`\n  -
  `eq_crc_indication_CRC()`\n  - `dump_crc_indication()`\n  - UCI indication functions
  for SR, HARQ, CSI Part 1 & 2\n  - PUSCH-related functions\n  - All equality, copy,
  and dump functions for these structures\n\n### Reproduction\nWhen processing CRC
  indications with a number of CBs that is a multiple of 8 (e.g., 8, 16, 24 CBs),
  the function would allocate 1 extra byte per CRC entry. For example, with 8 CBs,
  the function would allocate 2 bytes instead of the correct 1 byte needed to store
  8 bits. This leads to memory waste and inconsistent behavior between size calculations
  and actual memory allocation in related functions.\n\n","extra_fields":{"bug_description":"CRC
