  would either crash or leak memory, causing instability in the UE PHY layer.\n\nThe
  issue was particularly evident when running the UE in high-load scenarios where
  malloc might fail due to memory pressure. This would cause the functions to return
  without freeing previously allocated memory blocks.\n\n### Changes\n- `openair1/PHY/LTE_UE_TRANSPORT/dlsch_demodulation.c`:
