  Title: Fix format string vulnerability in config_libconfig_init downstream functions\n\n###
  Summary\nThere is a format string vulnerability where user-controlled data is passed
  as format argument downstream of function config_libconfig_init in common/config/libconfig/config_libconfig.c.
  This could potentially allow an attacker to crash the application or leak memory
  contents through carefully crafted configuration files.\n\nThe issue occurs when
  user-controlled strings from configuration files are used directly in printf-like
  function arguments where they might contain format specifiers that get interpreted.\n\n###
  Changes\n- `common/config/libconfig/config_libconfig.c`: Split several fprintf/printf
  calls into multiple calls to prevent user-controlled data from being used directly
  in format string contexts\n- Modified error reporting functions to handle user-controlled
  strings more safely\n- Updated config_libconfig_get and config_libconfig_getlist
  to use defensive printing patterns\n\n### Reproduction\nTo reproduce this issue:\n1.
  Create a configuration file with specially crafted string values containing format
  specifiers like \"%n\" \n2. Run any OAI application that uses the libconfig backend
  with this configuration file\n3. Observe potential crashes or unexpected behavior
  when the configuration values are printed in error messages\n\nThe vulnerability
  is particularly exploitable when error paths are triggered during configuration
  parsing, causing user-controlled strings to be printed in diagnostic messages.\n","extra_fields":{"bug_description":"format
