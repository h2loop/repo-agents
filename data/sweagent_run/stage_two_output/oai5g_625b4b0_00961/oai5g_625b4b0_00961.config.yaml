  Title: Fix SRS Indication TLV Padding Byte Comparison\n\n### Summary\nThe `eq_srs_indication_PDU`
  function in the nFAPI utilities was incorrectly comparing SRS report TLVs by including
  padding bytes in the comparison. This caused false negatives when two TLVs contained
  identical valid data but had different values in their padding bytes, leading to
  failed equality checks during message processing.\n\nThe issue occurred because
  the original implementation used a simple loop comparing all 32-bit words without
  considering that the last word might contain a mix of valid data bytes and padding
  bytes that should be ignored according to the SCF specification.\n\n### Changes\n-
  `nfapi/open-nFAPI/fapi/src/nr_fapi_p7_utils.c`: \n  * Modified `eq_srs_indication_report_tlv`
  to properly handle padding bytes by calculating complete words vs partial words
  and using bitmasks to compare only valid bytes\n  * Updated `copy_srs_indication_report_tlv`
  for consistency to preserve padding bytes during copy operations\n  * Added detailed
  comments explaining the padding byte handling logic\n\nWhen processing SRS indications
  with report TLVs where the length is not a multiple of 4 bytes, the function now
  correctly ignores the padding bytes during comparison. For example, a TLV with length=5
  will only compare the first 5 bytes of data rather than all 8 bytes in the underlying
  32-bit word array.\n\nThis resolves intermittent failures in SRS indication message
  validation where identical reports were incorrectly flagged as different due to
  uninitialized padding byte values.\n","extra_fields":{"bug_description":"format
  string vulnerability where user-controlled data is passed as format argument","bug_id":"c_format_string_vulnerability","stage_one_patch":"diff
  --git a/nfapi/open-nFAPI/fapi/src/nr_fapi_p7_utils.c b/nfapi/open-nFAPI/fapi/src/nr_fapi_p7_utils.c\nindex
  0a858e0be9..50c9993ad7 100644\n--- a/nfapi/open-nFAPI/fapi/src/nr_fapi_p7_utils.c\n+++
  b/nfapi/open-nFAPI/fapi/src/nr_fapi_p7_utils.c\n@@ -793,9 +793,23 @@ static bool
  eq_srs_indication_report_tlv(const nfapi_srs_report_tlv_t *a, const\n {\n   EQ(a->tag,
  b->tag);\n   EQ(a->length, b->length);\n-  for (int i = 0; i < (a->length + 3) /
  4; ++i) {\n+  \n+  // Calculate number of complete 32-bit words and remaining bytes\n+  uint32_t
  complete_words = a->length / 4;\n+  uint32_t remaining_bytes = a->length % 4;\n+  \n+  //
  Compare complete words\n+  for (uint32_t i = 0; i < complete_words; ++i) {\n     EQ(a->value[i],
  b->value[i]);\n   }\n+  \n+  // Compare remaining bytes in the last partial word,
  if any\n+  if (remaining_bytes > 0) {\n+    // Create masks to compare only valid
  bytes (in most significant positions)\n+    uint32_t mask = 0xFFFFFFFF << ((4 -
  remaining_bytes) * 8);\n+    EQ(a->value[complete_words] & mask, b->value[complete_words]
  & mask);\n+  }\n+  \n   return true;\n }\n \n@@ -1882,9 +1896,29 @@ void copy_srs_indication_report_tlv(const
  nfapi_srs_report_tlv_t *src, nfapi_srs\n {\n   dst->tag = src->tag;\n   dst->length
  = src->length;\n-  for (int i = 0; i < (dst->length + 3) / 4; ++i) {\n+  \n+  //
  Calculate number of complete 32-bit words and remaining bytes\n+  uint32_t complete_words
  = src->length / 4;\n+  uint32_t remaining_bytes = src->length % 4;\n+  \n+  // Copy
  complete words\n+  for (uint32_t i = 0; i < complete_words; ++i) {\n     dst->value[i]
  = src->value[i];\n   }\n+  \n+  // Copy remaining bytes in the last partial word,
  if any\n+  if (remaining_bytes > 0) {\n+    // Copy only valid bytes and zero out
  padding bytes\n+    uint32_t mask = 0xFFFFFFFF << ((4 - remaining_bytes) * 8);\n+    uint32_t
  padding_mask = ~mask;\n+    dst->value[complete_words] = (src->value[complete_words]
  & mask) | (dst->value[complete_words] & padding_mask);\n+  }\n+  \n+  // Zero out
  any remaining words in the destination array\n+  uint32_t total_words = (src->length
  + 3) / 4;\n+  for (uint32_t i = total_words; i < sizeof(dst->value) / sizeof(dst->value[0]);
  ++i) {\n+    dst->value[i] = 0;\n+  }\n }\n \n void copy_srs_indication_PDU(const
  nfapi_nr_srs_indication_pdu_t *src, nfapi_nr_srs_indication_pdu_t *dst)\n","start_fn":"eq_srs_indication_PDU","start_fn_file":"nfapi/open-nFAPI/fapi/src/nr_fapi_p7_utils.c","subsystem":"nfapi/open-nFAPI/fapi"},"type":"text","id":"oai5g_625b4b0_00961"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
