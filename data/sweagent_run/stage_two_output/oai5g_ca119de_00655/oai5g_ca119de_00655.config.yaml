  +519,14 @@ static bool set_fh_io_cfg(struct xran_io_cfg *io_cfg, const paramdef_t
  *fhip, in\n \n static bool set_fh_eaxcid_conf(struct xran_eaxcid_config *eaxcid_conf,
  enum xran_category cat)\n {\n+  // Validate input parameters\n+  if (eaxcid_conf
  == NULL) {\n+    return false;\n+  }\n+\n+  // Initialize the structure to zero
  to ensure all fields are cleared\n+  memset(eaxcid_conf, 0, sizeof(struct xran_eaxcid_config));\n+\n   //
  values taken from sample app\n   switch (cat) {\n     case XRAN_CATEGORY_A:\n@@
  -548,6 +556,34 @@ static bool set_fh_eaxcid_conf(struct xran_eaxcid_config *eaxcid_conf,
  enum xran\n   return true;\n }\n \n+// Extended version that allows custom eAxC
  ID configuration\n+static bool set_fh_eaxcid_conf_custom(struct xran_eaxcid_config
  *eaxcid_conf,\n+                                      uint16_t mask_cuPortId, uint8_t
  bit_cuPortId,\n+                                      uint16_t mask_bandSectorId,
  uint8_t bit_bandSectorId,\n+                                      uint16_t mask_ccId,
  uint8_t bit_ccId,\n+                                      uint16_t mask_ruPortId,
  uint8_t bit_ruPortId)\n+{\n+  // Validate input parameters\n+  if (eaxcid_conf ==
  NULL) {\n+    return false;\n+  }\n+\n+  // Initialize the structure to zero to
  ensure all fields are cleared\n+  memset(eaxcid_conf, 0, sizeof(struct xran_eaxcid_config));\n+\n+  //
  Set custom values\n+  eaxcid_conf->mask_cuPortId = mask_cuPortId;\n+  eaxcid_conf->mask_bandSectorId
  = mask_bandSectorId;\n+  eaxcid_conf->mask_ccId = mask_ccId;\n+  eaxcid_conf->mask_ruPortId
  = mask_ruPortId;\n+  eaxcid_conf->bit_cuPortId = bit_cuPortId;\n+  eaxcid_conf->bit_bandSectorId
  = bit_bandSectorId;\n+  eaxcid_conf->bit_ccId = bit_ccId;\n+  eaxcid_conf->bit_ruPortId
  = bit_ruPortId;\n+\n+  return true;\n+}\n+\n uint8_t *get_ether_addr(const char
  *addr, struct rte_ether_addr *ether_addr)\n {\n #pragma GCC diagnostic push\n@@
  -603,6 +639,8 @@ bool set_fh_init(struct xran_fh_init *fh_init)\n \n   if (!set_fh_io_cfg(&fh_init->io_cfg,
  fhip, nump))\n     return false;\n+  // Use Category A for eAxC ID configuration
  by default for backward compatibility\n+  // In the future, this could be made configurable
  if different categories are needed\n   if (!set_fh_eaxcid_conf(&fh_init->eAxCId_conf,
  XRAN_CATEGORY_A))\n     return false;\n \n@@ -732,7 +770,9 @@ static bool set_fh_frame_config(const
  openair0_config_t *oai0, struct xran_frame\n static bool set_fh_ru_config(const
  paramdef_t *rup, uint16_t fftSize, int nru, struct xran_ru_config *ru_config)\n
  {\n   ru_config->xranTech = XRAN_RAN_5GNR;\n-  ru_config->xranCat = XRAN_CATEGORY_A;\n+  //
  Read category from configuration, default to Category A\n+  int category = *gpd(rup,
  nru, ORAN_RU_CONFIG_CATEGORY)->iptr;\n+  ru_config->xranCat = (category == 1) ?
  XRAN_CATEGORY_B : XRAN_CATEGORY_A;\n   ru_config->xranCompHdrType = XRAN_COMP_HDR_TYPE_STATIC;\n   ru_config->iqWidth
  = *gpd(rup, nru, ORAN_RU_CONFIG_IQWIDTH)->uptr;\n   AssertFatal(ru_config->iqWidth
