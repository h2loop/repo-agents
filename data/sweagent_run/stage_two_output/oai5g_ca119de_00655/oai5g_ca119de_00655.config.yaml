  Title: Fix buffer overread in eAxC ID configuration when using custom categories\n\n###
  Summary\nThe `set_fh_eaxcid_conf` function in the O-RAN fronthaul configuration
  could cause a segmentation fault when called with invalid category values. The function
  did not properly validate input parameters before dereferencing pointers.\n\nThis
  issue occurred when users attempted to configure custom eAxC ID mappings through
  modified configuration paths. The original function would attempt to write to uninitialized
  memory locations when passed NULL pointers or invalid category enums.\n\n### Changes\n-
  `radio/fhi_72/oran-config.c`: Added NULL pointer validation and structure initialization
  in `set_fh_eaxcid_conf`\n- `radio/fhi_72/oran-config.c`: Added `set_fh_eaxcid_conf_custom`
  for flexible eAxC ID configuration\n- `radio/fhi_72/oran-params.h`: Added configurable
  RU category parameter\n\n### Reproduction Steps\n1. Modify configuration to expose
  `set_fh_eaxcid_conf` function externally\n2. Call function with NULL pointer: `set_fh_eaxcid_conf(NULL,
  XRAN_CATEGORY_A)`\n3. Observe segmentation fault due to direct pointer dereference\n4.
  Alternatively, call with invalid category enum value outside expected range\n5.
  Function would return false without clear indication of failure reason\n\nThe fix
  ensures proper error handling and prevents crashes when invalid parameters are provided,
  while maintaining backward compatibility with existing configurations.\n","extra_fields":{"bug_description":"missing
  mandatory information element in outgoing signaling message","bug_id":"telecom_missing_mandatory_ie","stage_one_patch":"diff
  --git a/radio/fhi_72/oran-config.c b/radio/fhi_72/oran-config.c\nindex 2973fdc2b0..ad7cc302b4
