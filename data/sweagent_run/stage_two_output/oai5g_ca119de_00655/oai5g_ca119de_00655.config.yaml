  ORAN_RU_CONFIG_CATEGORY \"category\"\n \n // clang-format off\n #define ORAN_RU_DESC
  {\\\n   {ORAN_RU_CONFIG_IQWIDTH,       \"sample IQ width (16=uncompressed)\\n\",       PARAMFLAG_MANDATORY,
  .u8ptr=NULL, .defuintval=16, TYPE_UINT8, 0}, \\\n   {ORAN_RU_CONFIG_IQWIDTH_PRACH,
  \"PRACH sample IQ width (16=uncompressed)\\n\", PARAMFLAG_MANDATORY, .u8ptr=NULL,
  .defuintval=16, TYPE_UINT8, 0}, \\\n+  {ORAN_RU_CONFIG_CATEGORY,      \"RU Category
  (0=Category A, 1=Category B)\\n\", 0,                   .iptr=NULL,  .defintval=0,   TYPE_INT,   0},
  \\\n }\n // clang-format on\n \n","start_fn":"set_fh_eaxcid_conf","start_fn_file":"radio/fhi_72/oran-config.c","subsystem":"radio/fhi_72"},"type":"text","id":"oai5g_ca119de_00655"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
