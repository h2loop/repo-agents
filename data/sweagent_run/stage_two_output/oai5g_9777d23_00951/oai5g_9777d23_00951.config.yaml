  \ b/openair3/NGAP/ngap_gNB_mobility_management.c\\nindex 95290f7bc3..84c10fb307\
  \ 100644\\n--- a/openair3/NGAP/ngap_gNB_mobility_management.c\\n+++ b/openair3/NGAP/ngap_gNB_mobility_management.c\\\
  n@@ -37,6 +37,16 @@\\n  *         (9.2.3.1 of 3GPP TS 38.413) NG-RAN node \u2192\
  \ AMF */\\n NGAP_NGAP_PDU_t *encode_ng_handover_required(const ngap_handover_required_t\
  \ *msg)\\n {\\n+  if (msg == NULL) {\\n+    LOG_E(NGAP, \\\"encode_ng_handover_required:\
  \ NULL message\\\\n\\\");\\n+    return NULL;\\n+  }\\n+\\n+  if (msg->source2target\
  \ == NULL) {\\n+    LOG_E(NGAP, \\\"encode_ng_handover_required: NULL source2target\\\
  \\n\\\");\\n+    return NULL;\\n+  }\\n+\\n   NGAP_NGAP_PDU_t *pdu = calloc_or_fail(1,\
  \ sizeof(*pdu));\\n \\n   /* Prepare the NGAP message to encode */\\n@@ -100,7 +110,11\
  \ @@ NGAP_NGAP_PDU_t *encode_ng_handover_required(const ngap_handover_required_t\
  \ *msg\\n                                                     &hoRequiredTransfer,\\\
  n                                                     ho_req_transfer_transparent_container_buffer,\\\
  n                                                     128);\\n-    AssertFatal(enc_rval.encoded\
  \ > 0, \\\"ASN1 message encoding failed (%s, %lu)!\\\\n\\\", enc_rval.failed_type->name,\
  \ enc_rval.encoded);\\n+    if (enc_rval.encoded < 0) {\\n+      LOG_E(NGAP, \\\"\
  ASN1 message encoding failed (%s, %lu)!\\\\n\\\", enc_rval.failed_type->name, enc_rval.encoded);\\\
  n+      ASN_STRUCT_FREE(asn_DEF_NGAP_NGAP_PDU, pdu);\\n+      return NULL;\\n+ \
  \   }\\n     hoRequiredPduSession->handoverRequiredTransfer.buf = CALLOC(1, (enc_rval.encoded\
  \ + 7) / 8);\\n     memcpy(hoRequiredPduSession->handoverRequiredTransfer.buf,\\\
  n            ho_req_transfer_transparent_container_buffer,\\n@@ -125,7 +139,7 @@\
  \ NGAP_NGAP_PDU_t *encode_ng_handover_required(const ngap_handover_required_t *msg\\\
  n \\n   // PDU Session Resource Information List (O)\\n   asn1cCalloc(source2target->pDUSessionResourceInformationList,\
  \ pduSessionList);\\n-  for (uint16_t i = 0; i < msg->nb_of_pdusessions; ++i) {\\\
  n+  for (uint16_t i = 0; i < msg->nb_of_pdusessions && i < msg->source2target->nb_pdu_session_resource;\
  \ ++i) {\\n     const pdusession_resource_t *pduSession = &msg->pdusessions[i];\\\
  n     NGAP_DEBUG(\\\"Handover Required: preparing PDU Session Resource Information\
  \ List for PDU Session ID %d\\\\n\\\",\\n                pduSession->pdusession_id);\\\
  n@@ -177,10 +191,10 @@ NGAP_NGAP_PDU_t *encode_ng_handover_required(const ngap_handover_required_t\
