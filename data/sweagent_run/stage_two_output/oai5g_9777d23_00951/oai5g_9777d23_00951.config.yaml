  n                 enc_rval.encoded);\\n+    ASN_STRUCT_FREE(asn_DEF_NGAP_NGAP_PDU,\
  \ pdu);\\n     return NULL;\\n   }\\n \\n@@ -190,6 +204,7 @@ NGAP_NGAP_PDU_t *encode_ng_handover_required(const\
