  Title: Fix memory leaks in HandoverPreparation and HandoverCommand functions\n\n###
  Summary\nThe `do_HandoverPreparation()` and `do_HandoverCommand()` functions in
  the LTE RRC ASN.1 message handling code were not properly freeing allocated memory,
  leading to memory leaks. This was causing issues when these functions were called
  repeatedly, resulting in increased memory consumption over time and potential instability.\n\nThe
  issue was identified by the presence of \"TODO: free the OCTET_STRING\" comments
  in the code, indicating that memory cleanup was not implemented.\n\nThis fix implements
  proper memory cleanup for both functions by:\n1. Adding calls to `OCTET_STRING_free()`
  to free OCTET_STRING buffers\n2. Adding calls to `ASN_STRUCT_FREE_CONTENTS_ONLY()`
  to properly free ASN.1 structures\n3. Removing the TODO comments since the memory
  is now properly freed\n\n### Changes\n- `openair2/RRC/LTE/MESSAGES/asn1_msg.c`:
  \n  - Added proper OCTET_STRING buffer cleanup in `do_HandoverPreparation()`\n  -
  Added proper ASN.1 structure cleanup in `do_HandoverPreparation()`\n  - Added proper
  OCTET_STRING buffer cleanup in `do_HandoverCommand()`\n  - Added proper ASN.1 structure
  cleanup in `do_HandoverCommand()`\n  - Removed TODO comments about freeing OCTET_STRING\n\n###
  Reproduction\nTo reproduce the issue:\n1. Call `do_HandoverPreparation()` function
  multiple times in a loop\n2. Monitor memory usage - it will continuously increase
  without being freed\n3. The same behavior can be observed with `do_HandoverCommand()`\n\nThe
  fix ensures that memory is properly freed after each function call, preventing memory
  leaks and maintaining stable memory usage over time.\n","extra_fields":{"bug_description":"unchecked
  return value from a function that can indicate failure","bug_id":"c_unchecked_return_value","stage_one_patch":"diff
