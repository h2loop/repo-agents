  Title: Fix uninitialized mutex/condition variable usage in NFAPI sync\n\n### Summary\nThe
  `wait_nfapi_init()` function in multiple OAI executables was using uninitialized
  pthread mutex and condition variables (`nfapi_sync_mutex` and `nfapi_sync_cond`).
  This could lead to undefined behavior, including potential deadlocks or crashes
  when the synchronization primitives were accessed.\n\nThe variables were declared
  in the global scope but never initialized with `pthread_mutex_init()` and `pthread_cond_init()`
  before being used in the `wait_nfapi_init()` function.\n\n### Changes\n- `executables/lte-softmodem.c`:
  Added initialization of `nfapi_sync_mutex` and `nfapi_sync_cond` in the NFAPI-related
  initialization block\n- `executables/lte-uesoftmodem.c`: Added initialization and
  cleanup of `nfapi_sync_mutex` and `nfapi_sync_cond` \n- `executables/nr-softmodem.c`:
  Added initialization of `nfapi_sync_mutex` and `nfapi_sync_cond` in the NFAPI-related
  initialization block\n\n### Reproduction\nWhen running OAI in NFAPI mode (VNF or
  PNF), the `wait_nfapi_init()` function would be called during startup. Due to the
  uninitialized synchronization primitives, the behavior was undefined and could manifest
  as:\n- Deadlock during startup when waiting for NFAPI synchronization\n- Segmentation
  fault when trying to lock/unlock the uninitialized mutex\n- Incorrect synchronization
  allowing premature continuation before NFAPI connection was established\n\nThe issue
  was particularly noticeable in environments with varying timing or when NFAPI connections
  took longer to establish.\n","extra_fields":{"bug_description":"format string vulnerability
