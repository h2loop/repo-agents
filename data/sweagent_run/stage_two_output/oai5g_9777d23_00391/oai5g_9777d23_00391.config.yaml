  Title: Fix decode_fgs_service_request buffer overflow vulnerability\n\n### Summary\nThe
  `decode_fgs_service_request` function in the 5GMM NAS layer contained a critical
  buffer overflow vulnerability that could be triggered during Service Request message
  processing. The issue occurred because the decoder was not properly validating the
  length field of the 5GS mobile identity IE before attempting to decode the identity
  contents.\n\nUnder certain conditions with malformed Service Request messages, this
  could lead to memory corruption and potential remote code execution. The vulnerability
  was particularly dangerous because Service Request messages are processed early
  in the connection establishment phase.\n\nThe root cause was in the decode function
  skipping the 2-byte length field without actually reading or validating it, then
  passing an incorrect length parameter to the mobile identity decoder.\n\n### Changes\n-
  `openair3/NAS/NR_UE/5GS/5GMM/MSG/fgs_service_request.c`: \n  - Fixed decode_fgs_service_request
  to properly read and validate the mobile identity length field\n  - Added bounds
  checking before decoding mobile identity contents\n  - Updated encode_fgs_service_request
  for consistency in length handling\n  - Added minimum length validation at function
  entry\n\n","extra_fields":{"bug_description":"incorrect argument order in function
  call swapping similarly-typed parameters","bug_id":"c_wrong_arg_order","stage_one_patch":"diff
  --git a/openair3/NAS/NR_UE/5GS/5GMM/MSG/fgs_service_request.c b/openair3/NAS/NR_UE/5GS/5GMM/MSG/fgs_service_request.c\nindex
  4603db55c5..5a6aee70b6 100644\n--- a/openair3/NAS/NR_UE/5GS/5GMM/MSG/fgs_service_request.c\n+++
  b/openair3/NAS/NR_UE/5GS/5GMM/MSG/fgs_service_request.c\n@@ -50,16 +50,22 @@ int
  encode_fgs_service_request(uint8_t *buffer, const fgs_service_request_msg_t\n   *buffer
  = ((encode_nas_key_set_identifier(&service_request->naskeysetidentifier, IEI_NULL)
  & 0x0f) << 4)\n             | (service_request->serviceType & 0x0f);\n   encoded++;\n-  len
  -= encoded;\n-\n-  // 5GS Mobile Identity (M) type 5G-S-TMSI (9 octets)\n-  encoded
  += LEN_FGS_MOBILE_ID_CONTENTS_SIZE; // skip \"Length of 5GS mobile identity contents\"
  IE\n-  len -= encoded;\n-  encoded += encode_stmsi_5gs_mobile_identity(buffer +
  encoded, &service_request->fiveg_s_tmsi, len);\n+  \n+  // Reserve space for length
  field\n+  if (len < encoded + LEN_FGS_MOBILE_ID_CONTENTS_SIZE)\n+    return -1;\n+  encoded
  += LEN_FGS_MOBILE_ID_CONTENTS_SIZE;\n+  \n+  // Encode 5GS Mobile Identity (M) type
  5G-S-TMSI\n+  int mobile_id_len = encode_stmsi_5gs_mobile_identity(buffer + encoded,
  &service_request->fiveg_s_tmsi, len - encoded);\n+  if (mobile_id_len < 0)\n+    return
  -1;\n+  \n   // encode length of 5GS mobile identity contents\n-  uint16_t tmp =
  htons(encoded - LEN_FGS_MOBILE_ID_CONTENTS_SIZE - 1);\n+  uint16_t tmp = htons(mobile_id_len);\n   memcpy(buffer
  + 1, &tmp, sizeof(tmp));\n-\n+  \n+  encoded += mobile_id_len;\n   return encoded;\n
  }\n \n@@ -71,6 +77,10 @@ int decode_fgs_service_request(fgs_service_request_msg_t
  *sr, const uint8_t *buf\n   uint32_t decoded = 0;\n   int decoded_rc = 0;\n \n+  //
  Check minimum length\n+  if (len < MIN_LEN_FGS_SERVICE_REQUEST)\n+    return -1;\n+\n   //
  Service type (1/2 octet) (M)\n   sr->serviceType = *buffer & 0x0f;\n   // KSI (1/2
  octet) (M)\n@@ -78,10 +88,27 @@ int decode_fgs_service_request(fgs_service_request_msg_t
  *sr, const uint8_t *buf\n     return decoded_rc;\n   }\n   decoded++;\n+  len--;\n+\n+  //
  Check that we have at least 2 bytes for the length field\n+  if (len < 2) {\n+    return
  -1;\n+  }\n+\n+  // Read the length of 5GS mobile identity contents\n+  uint16_t
  mobile_id_len;\n+  memcpy(&mobile_id_len, buffer + decoded, sizeof(mobile_id_len));\n+  mobile_id_len
  = ntohs(mobile_id_len);\n+  decoded += 2;\n+  len -= 2;\n+\n+  // Check that we
  have enough data for the mobile identity\n+  if (len < mobile_id_len) {\n+    return
  -1;\n+  }\n \n   // 5GS Mobile Identity (M) type 5G-S-TMSI (9 octets) (M)\n-  decoded
  += LEN_FGS_MOBILE_ID_CONTENTS_SIZE; // skip \"Length of 5GS mobile identity contents\"
  IE\n-  if ((decoded_rc = decode_stmsi_5gs_mobile_identity(&sr->fiveg_s_tmsi, buffer
