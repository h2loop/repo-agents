  Title: Fix memory allocation error handling in static mobility generator\n\n###
  Summary\nThe `start_static_generator()` function in the OMG mobility module was
  not properly handling memory allocation failures, which could lead to segmentation
  faults when the system is under memory pressure. Additionally, the function had
  an inconsistent interface compared to other generator functions in the codebase.\n\nThis
  fix addresses these issues by:\n1. Changing the function signature to return an
  integer status code\n2. Adding proper error checking for memory allocation failures\n3.
  Ensuring consistent error handling across all generator functions\n4. Adding proper
  cleanup when allocation fails\n\n### Changes\n- `openair2/UTIL/OMG/static.c`: Changed
  return type from void to int, added error checking for node and mobility structure
  allocation, added proper return values\n- `openair2/UTIL/OMG/static.h`: Updated
  function signature and documentation to reflect return value\n- `openair2/UTIL/OMG/omg.c`:
  Updated caller to check return value and log errors appropriately\n- `openair2/UTIL/OMG/rwalk.h`:
  Updated documentation to reflect correct return type\n- `openair2/UTIL/OMG/rwp.h`:
  Updated documentation to reflect correct return type\n- `openair2/UTIL/OMG/steadystaterwp.h`:
  Added missing function documentation\n- `openair2/UTIL/OMG/trace.h`: Added missing
  function documentation\n\n### Reproduction\nTo reproduce the original issue:\n1.
  Run the OMG mobility generator with static node configuration\n2. Under memory pressure
  or when malloc fails, the function would crash instead of returning an error\n3.
  The inconsistent interface made it difficult to handle errors properly in the calling
  code\n\nThe fix ensures that allocation failures are properly reported and that
  all generator functions have a consistent interface for error handling.\n","extra_fields":{"bug_description":"dead
