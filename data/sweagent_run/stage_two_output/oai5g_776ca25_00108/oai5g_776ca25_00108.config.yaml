  Title: Fix monitoring periodicity offset handling in SearchSpace configuration\n\n###
  Summary\nThe `set_monitoring_periodicity_offset` function in the NR MAC layer was
  not properly validating input parameters, leading to unexpected behavior when invalid
  periodicity or offset values were passed. This caused issues during SearchSpace
  configuration where the monitoring pattern was not set correctly.\n\nThe root cause
  was missing input validation that allowed invalid parameter combinations to pass
  through without proper error handling. Additionally, the function lacked clear documentation
  on expected parameter ranges and valid values.\n\n### Changes\n- `openair2/LAYER2/NR_MAC_COMMON/nr_mac_common.c`:
  Added input validation for period (must be > 0) and offset (must be < period for
  period > 1)\n- `openair2/LAYER2/NR_MAC_COMMON/nr_mac_common.c`: Added function documentation
  with valid parameter ranges\n- `openair2/LAYER2/NR_MAC_COMMON/nr_mac_common.c`:
