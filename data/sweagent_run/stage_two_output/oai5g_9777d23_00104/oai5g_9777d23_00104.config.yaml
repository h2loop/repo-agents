  Title: Fix heap buffer overflow in phy_sr_indication and related functions\n\n###
  Summary\nThere is a heap buffer overflow due to incorrect memory management in the
  phy_sr_indication function and similar functions in nfapi/oai_integration/nfapi_vnf.c.
  When these functions are called multiple times for the same subframe index, they
  allocate new memory without freeing previously allocated memory, leading to memory
  leaks and potential heap corruption.\n\n### Changes\n- `nfapi/oai_integration/nfapi_vnf.c`:
  \n  - Added memory deallocation checks in `phy_sr_indication()` before allocating
  new memory\n  - Added error handling for malloc failures\n  - Applied same fixes
  to `phy_harq_indication()` and `phy_crc_indication()` for consistency\n  - Ensured
  proper mutex unlocking even in error cases\n\n### Reproduction\nThe issue can be
  reproduced by running the VNF in a scenario where multiple SR/HARQ/CRC indications
  are received for the same subframe index before the previous indications are processed
  and freed by the downstream code. This leads to:\n- Memory leaks\n- Potential heap
  corruption\n- Segmentation faults under heavy load conditions\n\nThe symptoms include
  crashes in the VNF when handling multiple simultaneous UE connections with high
  uplink traffic.\n\n","extra_fields":{"bug_description":"heap buffer overflow due
  to incorrect size calculation","bug_id":"c_heap_buffer_overflow","stage_one_patch":"diff
  --git a/nfapi/oai_integration/nfapi_vnf.c b/nfapi/oai_integration/nfapi_vnf.c\nindex
  777da7c319..bfc3b601ff 100644\n--- a/nfapi/oai_integration/nfapi_vnf.c\n+++ b/nfapi/oai_integration/nfapi_vnf.c\n@@
  -569,9 +569,19 @@ int phy_harq_indication(struct nfapi_vnf_p7_config *config, nfapi_harq_indicatio\n
  \n     UL_RCC_INFO.harq_ind[index] = *ind;\n \n+    // Free previously allocated
  memory if it exists\n+    if (UL_RCC_INFO.harq_ind[index].harq_indication_body.harq_pdu_list
  != NULL) {\n+      free(UL_RCC_INFO.harq_ind[index].harq_indication_body.harq_pdu_list);\n+      UL_RCC_INFO.harq_ind[index].harq_indication_body.harq_pdu_list
  = NULL;\n+    }\n     assert(ind->harq_indication_body.number_of_harqs <= NFAPI_HARQ_IND_MAX_PDU);\n     if
  (ind->harq_indication_body.number_of_harqs > 0) {\n       UL_RCC_INFO.harq_ind[index].harq_indication_body.harq_pdu_list
  = malloc(sizeof(nfapi_harq_indication_pdu_t) * NFAPI_HARQ_IND_MAX_PDU);\n+      if
  (UL_RCC_INFO.harq_ind[index].harq_indication_body.harq_pdu_list == NULL) {\n+        LOG_E(MAC,
  \"Failed to allocate memory for harq_pdu_list\\n\");\n+        AssertFatal(pthread_mutex_unlock(&eNB->UL_INFO_mutex)==0,
  \"Mutex unlock failed\");\n+        return 0;\n+      }\n     }\n     for (int i=0;
  i<ind->harq_indication_body.number_of_harqs; i++) {\n         memcpy(&UL_RCC_INFO.harq_ind[index].harq_indication_body.harq_pdu_list[i],
  &ind->harq_indication_body.harq_pdu_list[i], sizeof(nfapi_harq_indication_pdu_t));\n@@
  -601,9 +611,19 @@ int phy_crc_indication(struct nfapi_vnf_p7_config *config, nfapi_crc_indication_\n
  \n     UL_RCC_INFO.crc_ind[index] = *ind;\n \n+    // Free previously allocated
  memory if it exists\n+    if (UL_RCC_INFO.crc_ind[index].crc_indication_body.crc_pdu_list
  != NULL) {\n+      free(UL_RCC_INFO.crc_ind[index].crc_indication_body.crc_pdu_list);\n+      UL_RCC_INFO.crc_ind[index].crc_indication_body.crc_pdu_list
  = NULL;\n+    }\n     assert(ind->crc_indication_body.number_of_crcs <= NFAPI_CRC_IND_MAX_PDU);\n     if
  (ind->crc_indication_body.number_of_crcs > 0) {\n       UL_RCC_INFO.crc_ind[index].crc_indication_body.crc_pdu_list
  = malloc(sizeof(nfapi_crc_indication_pdu_t) * NFAPI_CRC_IND_MAX_PDU);\n+      if
  (UL_RCC_INFO.crc_ind[index].crc_indication_body.crc_pdu_list == NULL) {\n+        LOG_E(MAC,
  \"Failed to allocate memory for crc_pdu_list\\n\");\n+        AssertFatal(pthread_mutex_unlock(&eNB->UL_INFO_mutex)==0,
  \"Mutex unlock failed\");\n+        return 0;\n+      }\n     }\n \n     assert(ind->crc_indication_body.number_of_crcs
  <= NFAPI_CRC_IND_MAX_PDU);\n@@ -779,9 +799,19 @@ int phy_sr_indication(struct nfapi_vnf_p7_config
  *config, nfapi_sr_indication_t\n \n     UL_RCC_INFO.sr_ind[index] = *ind;\n     LOG_D(MAC,\"%s()
  UL_INFO[%d].sr_ind.sr_indication_body.number_of_srs:%d\\n\", __FUNCTION__, index,
  eNB->UL_INFO.sr_ind.sr_indication_body.number_of_srs);\n+    // Free previously
  allocated memory if it exists\n+    if (UL_RCC_INFO.sr_ind[index].sr_indication_body.sr_pdu_list
  != NULL) {\n+      free(UL_RCC_INFO.sr_ind[index].sr_indication_body.sr_pdu_list);\n+      UL_RCC_INFO.sr_ind[index].sr_indication_body.sr_pdu_list
