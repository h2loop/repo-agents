  Title: Fix protocol timer initialization in ULSCH HARQ processes\n\n### Summary\nThe
  ULSCH HARQ processes were not being properly initialized with explicit protocol
  state values when created by new_eNB_ulsch. While memset was setting fields to zero,
  critical state fields like status, round, and repetition counters should be explicitly
  initialized for protocol compliance. This could lead to undefined behavior in downstream
  procedures that depend on these values for timing management.\n\nThis fix ensures
  all HARQ process state fields are properly initialized at creation time.\n\n###
  Changes\n- `openair1/PHY/LTE_TRANSPORT/ulsch_decoding.c`: Added explicit initialization
  of HARQ process state fields in new_eNB_ulsch function including status=SCH_IDLE,
  round=0, rvidx=0, phich_active=0, phich_ACK=0, repetition_number=0, and total_number_of_repetitions=1.
  Updated clean_eNb_ulsch to maintain consistency.\n\n### Reproduction\nUnder certain
  network conditions with high ULSCH retransmission rates, users may observe inconsistent
  HARQ timing behavior or unexpected PHICH handling. The issue manifests as sporadic
  decoding failures that correlate with improper HARQ state initialization rather
  than actual channel conditions.\n","extra_fields":{"bug_description":"protocol timer
