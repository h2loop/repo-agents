  Title: Fix Out-of-Bounds Access in PRS Generation Loop\n\n### Summary\nThe PRS (Positioning
  Reference Signal) generation function `nr_generate_prs` in the gNB PHY layer contains
  a potential out-of-bounds array access when handling large PRS configurations. Under
  certain conditions where the number of PRS resource blocks is at maximum (272 RBs)
  and the comb size is minimal (2), the inner loop index `m` can exceed the bounds
  of both the `mod_prs` buffer and the `gold` sequence array.\n\nSpecifically, when
  `m` reaches 1632, the code attempts to access `gold[m >> 4]` which evaluates to
  `gold[102]`, but the `gold` array is only allocated with 102 elements (indices 0-101).
  This leads to undefined behavior and potential crashes during PRS transmission.\n\nThe
  fix introduces a bounds check on the loop limit to ensure `m` never exceeds 1631,
  preventing the out-of-bounds access while maintaining correct PRS generation for
  all valid configurations.\n\n### Changes\n- `openair1/PHY/NR_TRANSPORT/nr_prs.c`:
  Added bounds checking for the PRS generation loop index to prevent accessing beyond
  the `gold` sequence array limits. Also fixed a debug log line referencing an incorrect
  variable name.\n","extra_fields":{"bug_description":"incorrect loop bounds causing
  iteration over invalid indices","bug_id":"c_incorrect_loop_bounds","stage_one_patch":"diff
  --git a/openair1/PHY/NR_TRANSPORT/nr_prs.c b/openair1/PHY/NR_TRANSPORT/nr_prs.c\nindex
  382e995a65..8c7a652d5d 100644\n--- a/openair1/PHY/NR_TRANSPORT/nr_prs.c\n+++ b/openair1/PHY/NR_TRANSPORT/nr_prs.c\n@@
  -43,13 +43,18 @@ int nr_generate_prs(int slot,\n     \n     // QPSK modulation\n     uint32_t
  *gold = nr_gold_prs(prs_cfg->NPRSID, slot, l);\n-    for (int m = 0; m < (12/prs_cfg->CombSize)
  * prs_cfg->NumRB; m++) {\n+    int max_m = (12/prs_cfg->CombSize) * prs_cfg->NumRB;\n+    //
  Limit max_m to avoid accessing beyond gold sequence bounds\n+    // gold sequence
  has NR_MAX_PRS_INIT_LENGTH_DWORD = 102 elements\n+    // we access gold[m >> 4],
  so maximum m should be less than 102*16 = 1632\n+    if (max_m > 1631) max_m = 1631;\n+    for
  (int m = 0; m < max_m; m++) {\n       idx = (((gold[(m << 1) >> 5]) >> ((m << 1)
  & 0x1f)) & 3);\n       mod_prs[m<<1] = nr_qpsk_mod_table[idx<<1];\n       mod_prs[(m<<1)+1]
  = nr_qpsk_mod_table[(idx<<1) + 1];\n       \n #ifdef DEBUG_PRS_MOD\n-      LOG_D(\"m
  %d idx %d gold seq %d mod_prs %d %d\\n\", m, idx, nr_gold_prs[l][(m<<1)>>5], mod_prs[m<<1],
  mod_prs[(m<<1)+1]);\n+      LOG_D(\"m %d idx %d gold seq %d mod_prs %d %d\\n\",
  m, idx, gold[(m<<1)>>5], mod_prs[m<<1], mod_prs[(m<<1)+1]);\n #endif\n       \n
  #ifdef DEBUG_PRS_MAP\n","start_fn":"nr_generate_prs","start_fn_file":"openair1/PHY/NR_TRANSPORT/nr_prs.c","subsystem":"openair1/PHY/NR_TRANSPORT"},"type":"text","id":"oai5g_ca119de_00252"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
