  b/openair3/NAS/COMMON/IES/EpsUpdateResult.c\n@@ -34,6 +34,10 @@ int decode_eps_update_result(EpsUpdateResult
  *epsupdateresult, uint8_t iei, uint\n   CHECK_PDU_POINTER_AND_LENGTH_DECODER(buffer,
  EPS_UPDATE_RESULT_MINIMUM_LENGTH, len);\n \n   if (iei > 0) {\n+    /* For Type
  1 IEs, expected IEI should have lower nibble = 0 */\n+    if ((iei & 0x0F) != 0)
  {\n+      return -1;\n+    }\n     CHECK_IEI_DECODER((*buffer & 0xf0), iei);\n   }\n
  \n@@ -65,8 +69,14 @@ int encode_eps_update_result(EpsUpdateResult *epsupdateresult,
  uint8_t iei, uint\n #if defined (NAS_DEBUG)\n   dump_eps_update_result_xml(epsupdateresult,
  iei);\n #endif\n-  *(buffer + encoded) = 0x00 | (iei & 0xf0) |\n-                        (*epsupdateresult
  & 0x7);\n+  \n+  /* For Type 1 IEs, if IEI is specified, lower nibble must be 0
  */\n+  if ((iei > 0) && ((iei & 0x0F) != 0)) {\n+    /* Invalid Type 1 IE format
  - this function only supports Type 1 IEs */\n+    return -1;\n+  }\n+  \n+  *(buffer
  + encoded) = (iei & 0xf0) | (*epsupdateresult & 0x7);\n   encoded++;\n   return
  encoded;\n }\n","start_fn":"encode_eps_update_result","start_fn_file":"openair3/NAS/COMMON/IES/EpsUpdateResult.c","subsystem":"openair3/NAS/COMMON"},"type":"text","id":"oai5g_9777d23_00791"},"output_dir":"DEFAULT","actions":{"open_pr":false,"pr_config":{"skip_if_commits_reference_issue":true},"apply_patch_locally":false},"env_var_path":null}'
