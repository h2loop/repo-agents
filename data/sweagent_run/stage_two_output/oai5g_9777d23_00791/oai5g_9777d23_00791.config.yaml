  Title: Fix encode_eps_update_result IEI validation and bit manipulation\n\n### Summary\nThe
  `encode_eps_update_result` function in EpsUpdateResult.c was not properly validating
  IEI values, which could lead to unexpected behavior when called with invalid Type
  1 IEI formats. This fix adds proper validation and cleans up the bit manipulation
  logic.\n\n### Changes\n- `openair3/NAS/COMMON/IES/EpsUpdateResult.c`: \n  - Added
  validation in `encode_eps_update_result` to check that Type 1 IEIs have the correct
  format (lower nibble = 0)\n  - Added consistent validation in `decode_eps_update_result`\n  -
  Cleaned up the bit manipulation logic by removing redundant operations\n  - Return
  -1 for invalid inputs instead of producing incorrect results\n\n### Reproduction\nWhen
  calling `encode_eps_update_result()` with invalid IEI values (like Type 2 IEIs with
  non-zero lower nibble), the function would silently corrupt the data instead of
  returning an error. This could lead to incorrect NAS message encoding.\n\nTo reproduce:\n1.
  Call `encode_eps_update_result()` with an IEI value like 0x5A (Type 2 IEI)\n2. Observe
  that the function produces incorrect output instead of returning an error\n3. The
  encoded byte would have the wrong IEI value (0x50 instead of 0x5A) due to the bit
  masking\n\nWith this fix, invalid IEI values will properly return -1, making the
  function behavior more predictable and preventing silent data corruption.\n","extra_fields":{"bug_description":"incorrect
  signaling procedure sequence violating 3GPP message flow","bug_id":"telecom_wrong_procedure_sequence","stage_one_patch":"diff
  --git a/openair3/NAS/COMMON/IES/EpsUpdateResult.c b/openair3/NAS/COMMON/IES/EpsUpdateResult.c\nindex
