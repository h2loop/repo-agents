  :\"default\"},\"problem_statement\":{\"text\":\"\\n## Title: Fix missed scheduling\
  \ opportunities due to unprocessed SR in PUCCH format 2/3/4 UCI indications\\n\\\
  n### Summary\\nNR gNB scheduler was missing scheduling opportunities for UEs that\
  \ sent Scheduling Requests (SR) on PUCCH format 2/3/4. The root cause was that the\
  \ `unpack_nr_uci_pucch_2_3_4` function correctly unpacked the SR payload but did\
  \ not extract the SR indication bit, making it inaccessible to the scheduler.\\\
  n\\nUnlike PUCCH format 0/1 which has a dedicated `sr_indication` field, format\
  \ 2/3/4 only stored the raw SR payload. The MAC scheduler had a TODO comment indicating\
  \ SR was not being handled, causing UEs requesting uplink resources via SR on format\
  \ 2/3/4 to be ignored.\\n\\n### Reproduction\\nUnder load testing with mixed PUCCH\
  \ formats, UEs using PUCCH format 2/3/4 with active SR were consistently not scheduled\
  \ for uplink transmission, while identical UEs using PUCCH format 0/1 were scheduled\
  \ correctly. This led to increased access delays and reduced throughput for affected\
  \ UEs.\\n\\nThe issue was particularly noticeable in scenarios with high UE density\
  \ where format 2/3/4 is preferred due to better multiplexing capabilities.\\n\\\
  n### Changes\\n- `nfapi/open-nFAPI/nfapi/public_inc/nfapi_nr_interface_scf.h`: Added\
  \ `sr_indication` field to `nfapi_nr_sr_pdu_2_3_4_t` structure for consistency with\
  \ format 0/1\\n- `nfapi/open-nFAPI/fapi/src/nr_fapi_p7.c`: Modified `unpack_nr_uci_pucch_2_3_4`\
  \ to extract SR indication from payload[0] bit 0\\n- `nfapi/open-nFAPI/fapi/src/nr_fapi_p7_utils.c`:\
  \ Updated `copy_uci_indication_sr_pdu_2_3_4` to copy new field\\n- `openair2/LAYER2/NR_MAC_gNB/gNB_scheduler_uci.c`:\
  \ Replaced TODO with SR processing logic using new field\\n- `nfapi/tests/p7/nr_fapi_uci_indication_test.c`:\
  \ Updated test function to populate new field\\n\\n\",\"extra_fields\":{\"bug_description\"\
  :\"missed scheduling opportunity where a UE with pending data is not scheduled\"\
