  Title: Fix thread-unsafe access in M2AP eNB management procedures\n\n### Summary\nThe
  M2AP module contains several functions that access global/shared data structures
  without proper synchronization, leading to potential race conditions and data corruption
  when multiple threads access these functions concurrently. This issue manifests
  as intermittent segmentation faults and inconsistent eNB state reporting during
  M2 setup procedures.\n\nThe problem occurs in functions that iterate through the
  global `m2ap_eNB_internal_data` structure using STAILQ and RB tree macros. Without
  mutex protection, concurrent access can result in:\n- Segmentation faults when one
  thread modifies the data structure while another is traversing it\n- Inconsistent
  results from lookup functions\n- Corruption of the internal eNB instance lists\n\n###
  Changes\n- `openair2/M2AP/m2ap_eNB_management_procedures.c`: \n  * Added pthread
  mutex to protect global `m2ap_eNB_internal_data` structure\n  * Added proper locking/unlocking
  around all functions accessing shared data:\n    - `m2ap_is_eNB_pci_in_list`\n    -
  `m2ap_is_eNB_id_in_list` \n    - `m2ap_is_eNB_assoc_id_in_list`\n    - `m2ap_get_eNB`\n    -
  `m2ap_eNB_get_instance`\n    - `m2ap_dump_eNB_list`\n  * Used goto-based cleanup
  pattern to ensure mutex is always unlocked exactly once\n  * Added error handling
  for mutex operations using existing M2AP logging macros\n\n### Reproduction\nTo
  reproduce this issue:\n1. Configure multiple eNBs to establish M2 connections simultaneously\n2.
  Monitor logs for intermittent segmentation faults during M2 setup procedures\n3.
  Observe inconsistent eNB state reporting when querying eNB information concurrently
  from multiple threads\n4. Run with thread sanitizer to detect data races in the
  M2AP management functions\n\nThe issue is most likely to occur under high load conditions
  with multiple concurrent M2 setup requests or when external management interfaces
  query eNB state information simultaneously with ongoing M2 procedures.\n","extra_fields":{"bug_description":"thread-unsafe
