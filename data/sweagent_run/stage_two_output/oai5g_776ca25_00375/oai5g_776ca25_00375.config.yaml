  Title: Fix race condition in log memory buffer handling\n\n### Summary\nThere is
  a race condition in the log memory buffer handling code that can cause incorrect
  resource block allocation violating scheduling constraints. The issue occurs in
  `log_output_memory()` where the buffer index is updated before data is copied, and
  the active side is switched before data is safely written.\n\n### Changes\n- `common/utils/LOG/log.c`:
  Fixed order of operations in log memory buffer handling to ensure data is copied
  before buffer index update and side switching\n\n### Reproduction\nUnder high logging
  load with multiple threads, the race condition can cause:\n1. Data corruption in
  log buffers\n2. Incorrect buffer index values leading to memory access violations\n3.
  Segfaults in the log flushing thread\n\nTo reproduce:\n1. Enable high-frequency
  logging in a multi-threaded environment\n2. Run the system under load for an extended
  period\n3. Monitor for segfaults in the log handling code or corrupted log output\n\nThe
  issue is most likely to manifest when the log buffers are frequently switching between
  sides due to high volume logging.\n\n","extra_fields":{"bug_description":"incorrect
