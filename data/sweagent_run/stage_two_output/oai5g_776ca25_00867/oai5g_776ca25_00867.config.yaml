  Title: Fix incomplete QPSK LUT initialization in TM2 transmit diversity\n\n### Summary\nThe
  `init_modulation_LUT_qam4_tm2_p2()` function was only initializing 16 entries instead
  of the required 256 entries for 4 QPSK symbols. This caused incorrect modulation
  mapping when using TM2 transmit diversity with QPSK, leading to degraded throughput
  and incorrect signal constellation patterns.\n\nThis fix corrects the array sizing
  and loop bounds to process all 8-bit input combinations.\n\n### Changes\n- `openair1/PHY/LTE_TRANSPORT/dlsch_modulation.c`:
  \n  - Changed qam4_tm2_p2 array declarations from [8][16] to [8][256]\n  - Updated
  loop bounds from index<16 to index<256\n  - Fixed bit extraction logic to properly
  handle all 8 bits for 4 QPSK symbols\n  - Corrected TM2 precoding implementation
  for 4-symbol mapping\n\n### Reproduction\nTo reproduce the issue:\n1. Configure
  eNB with TM2 transmit diversity mode\n2. Set modulation to QPSK\n3. Transmit data
  continuously \n4. Observe degraded BLER performance and constellation distortion\n5.
  Memory analysis shows only 16 LUT entries were initialized instead of 256\n\nThe
  symptoms manifest as poor link performance specifically with QPSK in TM2 mode, while
  16QAM and 64QAM work correctly since their LUT initialization was already properly
  implemented.\n","extra_fields":{"bug_description":"missing break statement in switch
