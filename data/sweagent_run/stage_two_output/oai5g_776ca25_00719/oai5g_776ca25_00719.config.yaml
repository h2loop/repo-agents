  Title: Fix heap buffer overflow in nr_fapi_p7_utils dump_harq_0_1 function\n\n###
  Summary\nThe `dump_harq_0_1` function in `nfapi/open-nFAPI/fapi/src/nr_fapi_p7_utils.c`
  was accessing `harq_list` array elements without proper bounds checking or NULL
  pointer validation. This caused heap buffer overflows when `num_harq` contained
  invalid values or when `harq_list` was NULL, leading to segmentation faults during
  UCI indication processing.\n\nThe issue occurred because the function directly accessed
  `harq_list[i]` without validating that:\n1. `harq_list` pointer is not NULL\n2.
  `num_harq` doesn''t exceed the allocated size of the array\n3. `i` stays within
  valid bounds\n\nSimilar issues were found in the `eq_uci_indication_harq_pdu_0_1`
  and `copy_uci_indication_harq_pdu_0_1` functions that process the same structure.\n\n###
  Changes\n- `nfapi/open-nFAPI/fapi/src/nr_fapi_p7_utils.c`: \n  - Added validation
  in `dump_harq_0_1` to check `harq->num_harq > 8` and `harq->harq_list == NULL` before
  accessing array elements\n  - Added validation in `eq_uci_indication_harq_pdu_0_1`
  to check both `a->num_harq > 8` and `b->num_harq > 8` and NULL pointer checks for
  both `harq_list` pointers\n  - Added validation in `copy_uci_indication_harq_pdu_0_1`
  to check `src->num_harq > 8` and NULL pointer checks for both `src->harq_list` and
  `dst->harq_list`\n- `nfapi/open-nFAPI/fapi/inc/nr_fapi_p7_utils.h`: Created header
  file with function declarations\n\n","extra_fields":{"bug_description":"heap buffer
  overflow due to incorrect size calculation","bug_id":"c_heap_buffer_overflow","stage_one_patch":"diff
