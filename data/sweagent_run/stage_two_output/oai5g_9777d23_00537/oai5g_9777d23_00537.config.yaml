  Title: Fix stack buffer overflow in NFAPI configuration functions\n\n### Summary\nThere
  was a stack buffer overflow vulnerability from unbounded copy into fixed-size local
  arrays in the NFAPI integration code. The issue was in functions downstream of `oai_subframe_ind`
  where `strcpy` was used to copy strings into fixed-size character arrays without
  checking the length of the source strings.\n\nThis fix replaces unsafe `strcpy`
  operations with bounded `strncpy` and ensures proper null termination.\n\n### Changes\n-
  `nfapi/oai_integration/nfapi_pnf.c`: Fixed buffer overflows in `configure_nr_nfapi_pnf`
  and `configure_nfapi_pnf` functions\n- `nfapi/oai_integration/nfapi_vnf.c`: Fixed
  similar buffer overflows in VNF configuration functions\n\n### Reproduction\nTo
  reproduce the issue:\n1. Configure NFAPI with IP address strings longer than 79
  characters\n2. Observe stack corruption and potential segfault in `oai_subframe_ind`
  downstream functions\n3. Memory analysis tools will show stack buffer overflow violations\n\nThe
  fix prevents potential crashes and security vulnerabilities when long IP address
  strings are used in NFAPI configuration.\n","extra_fields":{"bug_description":"stack
