  >= sched_get_priority_min(SCHED_OAI) && priority <= sched_get_priority_max(SCHED_OAI),\n                 \"Scheduling
  priority %d not possible: must be within [%d, %d]\\n\",\n                 priority,\n@@
  -272,7 +286,10 @@ void threadCreate(pthread_t* t, void * (*func)(void*), void *
