  Title: Fix incorrect errno usage in thread creation and synchronization functions\n\n###
  Summary\nThe OpenAirInterface 5G codebase contained incorrect errno usage patterns
  in several pthread-related functions. The bug manifested as incorrect error codes
  being reported when pthread operations failed, particularly under high system load
  or resource contention scenarios.\n\nThe issue was that errno was being accessed
  directly in AssertFatal calls, but intervening function calls within the AssertFatal
  macro (such as fprintf) could modify errno before it was actually used in the format
  string. This led to misleading error reports that made debugging thread creation
  failures extremely difficult.\n\nThe problem was particularly evident in functions
  that create and manage the process_stats_thread, where error reports would show
  unrelated errno values instead of the actual pthread failure codes.\n\n### Changes\n-
  `common/utils/system.c`: Fixed errno handling in threadCreate, has_cap_sys_nice,
  and lock_memory_to_ram functions by saving errno immediately after pthread function
  failures before calling AssertFatal or logging functions.\n\n","extra_fields":{"bug_description":"incorrect
  errno usage where errno is checked after an intervening call has overwritten it","bug_id":"c_incorrect_errno_usage","stage_one_patch":"diff
