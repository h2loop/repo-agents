  CAP_SYS_NICE, i.e. */\n bool has_cap_sys_nice(void)\n {\n+  int saved_errno;\n   /*
  get capabilities of calling PID */\n   cap_t cap = cap_get_pid(0);\n   cap_flag_value_t
  val;\n   /* check to what CAP_SYS_NICE is currently (\"effective capability\") set
  */\n   int ret = cap_get_flag(cap, CAP_SYS_NICE, CAP_EFFECTIVE, &val);\n-  AssertFatal(ret
  == 0, \"Error in cap_get_flag(): ret %d errno %d\\n\", ret, errno);\n+  if (ret
  != 0) {\n+    saved_errno = errno;\n+    AssertFatal(ret == 0, \"Error in cap_get_flag():
  ret %d errno %d\\n\", ret, saved_errno);\n+  }\n   cap_free(cap);\n   /* return
  true if CAP_SYS_NICE is currently set */\n   return val == CAP_SET;\n@@ -252,17
  +256,27 @@ bool has_cap_sys_nice(void)\n void threadCreate(pthread_t* t, void *
