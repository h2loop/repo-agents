  Title: Fix measurement event processing in NR UE RRC\n\n### Summary\nThe NR UE RRC
  implementation was missing key components for handling measurement events, causing
  `start_meas_event()` to not behave as expected. When the UE received an RRC measurement
  procedure message, it would not properly initialize measurement events or set up
  the necessary data structures for ongoing measurement processing.\n\nThis fix adds
  the missing measurement-related data structures, implements the required functions
  for checking and triggering measurement events, and properly handles the RRC measurement
  procedure message.\n\n### Changes\n- `openair2/RRC/NR_UE/rrc_defs.h`: Added measurement-related
  fields (`measReportList`, `measTimer`, `HandoverInfoUe`) to `NR_UE_RRC_INST_t` structure
  and included `NR_MeasResults.h`\n- `openair2/RRC/NR_UE/rrc_proto.h`: Added function
  declarations for `nr_check_trigger_meas_event` and `nr_rrc_ue_generate_MeasurementReport`\n-
  `openair2/RRC/NR_UE/rrc_UE.c`: \n  - Implemented `nr_check_trigger_meas_event` function
  as a placeholder\n  - Implemented `nr_rrc_ue_generate_MeasurementReport` function
  as a placeholder\n  - Fixed the incomplete `RRC_MEASUREMENT_PROCEDURE` case to properly
  start measurement events\n  - Added periodic measurement processing in the `NRRRC_SLOT_PROCESS`
  case of the RRC task\n\n### Reproduction\nTo reproduce the issue:\n1. Configure
  an NR UE with measurement configuration\n2. Send an RRC measurement procedure message
  to the UE\n3. Observe that measurement events are not properly initialized and the
  UE does not process measurements as expected\n\nWith this fix, the measurement procedure
  will properly initialize and the UE will begin processing measurement events periodically.\n","extra_fields":{"bug_description":"ASN.1
