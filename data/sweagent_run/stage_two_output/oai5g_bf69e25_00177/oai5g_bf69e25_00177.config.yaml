  Title: Fix crash in encode_CG_ConfigInfo due to freeing uninitialized pointer\n\n###
  Summary\nThe `encode_CG_ConfigInfo` function in rrc_eNB.c attempts to free an uninitialized
  `rb_config` pointer, causing a crash when the function is called. This happens because
  the function declares `rb_config` as NULL but never allocates memory for it, then
  tries to free it during cleanup.\n\nThe issue occurs when processing EN-DC measurement
  reports that trigger the encoding of CG-ConfigInfo for X2AP SgNB addition requests.\n\n###
  Changes\n- `openair2/RRC/LTE/rrc_eNB.c`: Removed unused `rb_config` variable declaration
  and corresponding `ASN_STRUCT_FREE` call that was causing the crash.\n\n### Reproduction\nTo
  reproduce the issue:\n1. Configure eNB with EN-DC support\n2. Connect a UE that
  supports EN-DC\n3. Trigger a measurement report that causes SgNB addition\n4. The
  eNB will crash when calling `encode_CG_ConfigInfo` due to attempting to free the
  uninitialized `rb_config` pointer\n\nThe crash occurs in the ASN.1 memory management
  functions when trying to free a NULL pointer that was never allocated.\n","extra_fields":{"bug_description":"file
