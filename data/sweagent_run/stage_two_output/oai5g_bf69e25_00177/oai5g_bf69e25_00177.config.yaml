  enc_rval;\n   char temp_buff[ASN_MAX_ENCODE_SIZE];\n   NR_UE_CapabilityRAT_ContainerList_t
  *ue_cap_rat_container_list = NULL;\n@@ -3329,7 +3328,6 @@ static int encode_CG_ConfigInfo(\n   AssertFatal
