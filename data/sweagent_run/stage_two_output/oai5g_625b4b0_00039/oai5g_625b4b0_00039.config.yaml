  -43,8 +43,8 @@\n \n void rx_prach0(PHY_VARS_eNB *eNB,\n                RU_t *ru,\n-\t       int
  frame_prach,\n-\t       int subframe,\n+               int frame_prach,\n+               int
  subframe,\n                uint16_t *max_preamble,\n                uint16_t *max_preamble_energy,\n                uint16_t
  *max_preamble_delay,\n@@ -107,7 +107,7 @@ void rx_prach0(PHY_VARS_eNB *eNB,\n     prach_ConfigIndex   =
  fp->prach_emtc_config_common.prach_ConfigInfo.prach_ConfigIndex[ce_level];\n     Ncs_config          =
  fp->prach_emtc_config_common.prach_ConfigInfo.zeroCorrelationZoneConfig;\n     restricted_set      =
