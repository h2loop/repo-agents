agent:
  type: default
  templates:
    system_template: |-
      You are an expert C/C++ software engineer working on the OpenAirInterface 5G codebase.
      You can interact with the codebase using bash commands and a file editor to investigate and fix issues.
    instance_template: |-
      <uploaded_files>
      {{working_dir}}
      </uploaded_files>
      I've uploaded the OpenAirInterface 5G codebase in {{working_dir}}. Consider the following issue:

      <pr_description>
      There is a {{bug_description}} downstream of function {{start_fn}} in {{start_fn_file}}.
      When calling {{start_fn}}() the behavior is not what is expected.
      Please investigate and fix this issue.
      </pr_description>

      Can you help me implement the necessary changes to fix this issue?
      Your task is to make minimal changes to fix the bug described above.
      Follow these steps:
      1. Find and read the code around {{start_fn}} in {{start_fn_file}}
      2. Understand the issue and identify the root cause
      3. Make a targeted fix
      4. Verify your changes make sense
      Your thinking should be thorough and so it's fine if it's very long.
    next_step_template: |-
      OBSERVATION:
      {{observation}}
    next_step_no_output_template: |-
      Your last command ran successfully and did not produce any output.
  tools:
    execution_timeout: 300
    bundles:
      - path: tools/registry
      - path: tools/edit_anthropic
      - path: tools/review_on_submit_m
      - path: tools/diff_state
    enable_bash_tool: true
    parse_function:
      type: function_calling
    registry_variables:
      USE_FILEMAP: 'true'
      SUBMIT_REVIEW_MESSAGES:
        - |
          Thank you for your work on this issue. Please review your changes:

          1. Make sure your fix is minimal and targeted
          2. Verify you haven't introduced any new issues
          3. Run the submit command again to confirm

          Here is a list of all of your changes:

          <diff>
          {{diff}}
          </diff>
  history_processors: []
  model:
    name: bedrock/qwen.qwen3-coder-480b-a35b-v1:0
